で、形に残す作業は後回しになりがち。\n・予算の厳密な管理：大枠は把握するが、細かい数字合わせは苦手意識がある。\n・感情的な対人折衝：論理的解決を求めるため、感情が絡む議論は苦手。\n・継続的なルーティンワーク：変化のない反復作業はモチベーションが下がる。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「この状況、なんとかしてくれないか？」→困っている状況を見ると、持ち前の行動力で燃える。\n・「〇〇さんの経験と行動力が必要なんだ」→期待と信頼を寄せられると最高のパフォーマンスを出す。\n・「自由にやっていい、結果を期待している」→裁量と権限を与えられると本領を発揮し、責任感を持って取り組む。\n・「まずは現場を見て、どうすればいいか教えてほしい」→実践的なアプローチを促され、すぐに動き出す。\n・「新しいツールや技術を使ってみてくれないか？」→新しい挑戦や実践を好む性質に火がつく。\n・「緊急事態だ、今すぐ力を貸してほしい」→迅速な対応が求められる場面で頼りになり、率先して動く。\n\n【❌ パフォーマンスが落ちる】\n・「このマニュアル通りに、一字一句間違えずにやって」→自由度がなく、本質から外れた制約を嫌う。\n・「とにかく報告書を毎日細かく提出して」→行動と結果を重視し、形式的な報告は負担に感じる。\n・「細かい数字の計算とチェックを頼む」→単調で正確性が求められる作業は苦手意識が先行する。\n・「指示があるまで待機していて」→じっとしているのが苦手で、すぐに動き出したくなる。\n・「感情的に共感してほしい」→論理的解決を求めるため、感情的な相談はあまり得意ではない。\n\n【💡 コツ】\n1. 「Why（なぜやるのか）」と「What（何を達成したいのか）」を簡潔に伝え、「How（どうやるか）」は本人に任せる。\n2. 緊急性や挑戦の要素を含んだ依頼で、本人の「やってやるぞ」スイッチを入れる。\n3. 現場や実践の場を与え、身体を動かしながら解決策を見つけさせる機会を提供する。\n4. 結果が出たらすぐに感謝と具体的な評価を伝えることで、承認欲求を満たす。\n5. ルーティン作業は可能な限り他の人に任せるか、短期的なタスクに区切って依頼する。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・危機管理コンサルタント：予期せぬ問題に対し、迅速かつ実践的な解決策を提供し、現場を立て直す。\n・プロジェクトマネージャー（緊急対応型）：トラブル続きのプロジェクトを立て直し、現場を巻き込みながら推進するリーダーシップを発揮する。\n・ベンチャー企業の初期メンバー：目まぐるしい変化の中で、自ら手を動かし、次々と課題を解決していく開拓者精神が活きる。\n\n【⭐ かなり合う】\n・フィールドエンジニア：現場に出て、機転を利かせながら技術的な問題を解決し、顧客を安心させる。\n・営業（新規開拓・課題解決型）：顧客の課題をヒアリングし、その場で最適なソリューションを提案するフットワークの軽さが強み。\n・イベントプランナー：ハプニングも楽しみながら、魅力的なイベントを企画・実行し、成功に導く。\n\n【💡 意外とハマる】\n・シェフ・料理人：五感を使い、瞬時の判断力と手腕で美味しい料理を生み出し、客の反応を直接肌で感じる。\n・災害救助隊員：極限状況下で、冷静な判断と行動力で人命救助にあたる、実践的なスキルが求められる職。\n\n【⚠️ 避けた方がいい】\n・データ入力・会計監査：細かい数字の正確性と反復作業が苦痛で、モチベーションの維持が困難。\n・学術研究者：抽象的な理論構築や長期的な文献調査には向かず、現場での実践的な学びを好むため。\n・品質管理・工場ライン作業：変化の少ないルーティンワークはモチベーションを削ぎ、退屈に感じてしまう。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nISTJ-G-Dp「金庫番」：トラブルシューターの行動力を、金庫番が着実な計画と詳細な準備で支える。予測不能な状況でも、トラブルシューターが舵を取り、金庫番が堅実に後方支援し、お互いの弱点をカバーし合える。\nINTJ-G-Dp「戦略家」：トラブルシューターの現場での即断即決を、戦略家が長期的な視野と全体最適の視点で補完する。行動と戦略のバランスが取れ、大きな成果を生み出すコンビ。\n\n【🔥 化学反応が起きるコンビ】\nENTP-O-Br「アイデアマン」：次々と繰り出されるアイデアをトラブルシューターが即座に実行に移す。無限の可能性を追求するアイデアマンと、現実世界で結果を出すトラブルシューターの組み合わせは、新しい価値を創造する爆発力を持つ。\nESTJ-G-Dp「頑固職人」：トラブルシューターが新しいアプローチで現状を打破し、頑固職人がその方法を徹底的に磨き上げて定着させる。対照的ながら、互いの専門性と実用性を尊重し合い、堅実な成果を生み出す。\n\n【☀️ 居心地がいい仲間】\nESTP-O-Dp「開拓者」：同じESTP基盤を持ち、O軸とS軸で共通の価値観を持つ。具体的な行動と挑戦を共に楽しみ、互いのフットワークの軽さを理解し合える、最高の行動仲間。\nESFP-O-Br「エンターテイナー」：社交的で行動派、楽しいことを追求する点で共通の波長を持つ。お互いに刺激し合い、多くの体験を共有できる最高の遊び仲間で、常にポジティブなエネルギーが生まれる。\n\n【⚡ 未知の触発者】\nINFJ-G-Dp「提唱者」：内向的で理念を重視する提唱者の深い洞察が、トラブルシューターに新たな視点を与える。現実志向のトラブルシューターが、理想主義の提唱者の言葉に耳を傾けることで、思わぬインスピレーションを得る。\nINTP-G-Dp「思索家」：思索家の論理的で抽象的な思考が、トラブルシューターに思考の幅を広げるきっかけを与える。実践的なトラブルシューターが、理論的な思索家の意見に耳を傾けることで、行動に深みが加わり、新たな発見があるだろう。"},{title:"🌈 プライベートの顔",content:"休日は常に動き回っている。先週はバイクでツーリング、今週はDIYで棚作り、来週は友人とサバゲー。家でじっとしている時間は少なく、常に新しい刺激を求めて活動しているアクティブなタイプだ。\n\n趣味は多岐にわたり、新しいものにはすぐに挑戦する。「面白いかも」と感じたら、深く考えずに飛び込んでいく。「とりあえずやってみる」がモットーで、スポーツ、料理、キャンプ、ガジェットいじりなど、幅広い経験からくる引き出しの多さが自慢だ。\n\n友人との交流も非常に活発で、飲み会やイベントの企画の中心にいることが多い。「〇〇、面白いことやろうぜ！」と声をかけるのは大抵この人だろう。初対面の人ともすぐに打ち解け、その場で友人の輪を広げる天才だ。\n\n旅行は事前に綿密な計画を立てるよりも、気分で目的地を変えたり、ハプニングを楽しんだりするタイプ。予測不能な状況も旅の醍醐味と捉え、トラブルさえも笑い話に変えてしまう。\n\n困っている人がいれば、損得勘定抜きで手助けする。引っ越しや電化製品の設置、PCのトラブルなど、具体的な手助けを率先して行う。その義侠心とフットワークの軽さに、周囲はいつも助けられている。\n\nどんな場所でもすぐに馴染み、初対面の人ともフランクに会話を始める。居酒屋で隣になった人と意気投合し、そのまま二次会になだれ込む、なんてことも日常茶飯事。身の回りにあるものや起こる出来事を五感で楽しみ、常にポジティブなエネルギーを周囲に振りまいている、まさに人生の冒険家だ。"}]},
"ESTP-G-Br":{name:"安全番長",character:"冴羽獠（シティーハンター）",great:"ベア・グリルス",color:"#CA6F1E",summary:"「どんな状況でも生き延びる」サバイバリスト。冒険より安全な帰還を重視。幅広いスキルで現場の問題を確実に解決。",compatibility:{complement:[{code:"INFJ-O-Dp",name:"真理の探究者",desc:"チームの課題について議論する際、表面的な解決策に留まらず、共にその本質や根源を探ろうとします。静かな洞察と深い共感が共鳴し、根源的な解決策への道を照らす、精神的な安らぎをもたらします。"},{code:"ISFJ-O-Dp",name:"守護者",desc:"チーム内のメンバーが個人的な悩みを抱えている時、ISFJ同士で情報共有し、連携して相手に寄り添うことで、より深いサポートと安心感を提供し、深いケアが共鳴します。"}],chemistry:[{code:"ESTP-O-Br",name:"トラブルシューター",desc:"予期せぬトラブル発生時、互いの冷静な状況分析力と卓越した現場対応力で、即座に問題の根源を特定し、迅速かつ的確に解決へ導く最強のタッグ。"},{code:"ENTJ-G-Br",name:"参謀",desc:"ISFP-O-Dpが追求する美のビジョンを、ENTJ-G-Brが具体的な事業計画や戦略に落とし込み、実現へと導く。展示会の企画で、ISFP-O-Dpが理想とする空間表現に対し、ENTJ-G-Brが予算、人員、スケジュールを統括し、現実的な実行プロセスを構築する。"}],comfort:[{code:"ESTP-G-Dp",name:"求道者",desc:"会議でINFJの壮大なビジョンに対し、求道者は現実的な課題とリソースを洗い出し、堅実に実行計画へと着地させます。未来への深い洞察を行動に移す補完関係です。"},{code:"ISTP-G-Br",name:"修理屋",desc:"難解な機器のメンテナンスや改造作業において、多くを語らずとも互いの意図を察し、精度の高い技術力で協力し合えるため、非常に居心地が良い。"}],catalyst:[{code:"ENFJ-O-Br",name:"カリスマ委員長",desc:"プロジェクト発表会で、ISTP-O-Dpの高度な技術が生み出した成果を、ENFJ-O-Brが情熱的なプレゼンで社内外に広め、技術の価値を最大化する。"},{code:"INFP-O-Dp",name:"理想主義者",desc:"共通の「真理」や「理想」について語り合うことで、互いの内なる情熱を深く理解し、増幅させます。ブレインストーミングでは、静かながらも熱い議論が生まれ、革新的な解決策に繋がります。"}]},careers:{top:["消防士隊長","救急救命士","フィールドエンジニア"],good:["施設管理","アウトドアインストラクター","現場監督"],surprise:["防災コンサル","サバイバル番組制作"],avoid:["抽象的戦略のみ","長期基礎研究"]},strengths:["現場での冷静さ","幅広い実践スキル","安全管理","堅実な問題解決"],weaknesses:["抽象的議論","長期ビジョン","感情ケア","書類仕事"],tips:{do:"「この新しい作業、現場の安全を確保する上で何が一番必要だと思う？君の目で確認して、確実な手順を組んでくれないか？」と、現場の安全への配慮を前面に出して具体的な行動を促しましょう。「緊急で〇〇のトラブルが発生した。君の幅広い知識と現場での判断力で、一番安全で確実な解決策を見つけて、すぐに実行に移してほしい。必要なものは全て手配するから言ってくれ。」と、問題解決能力と現場での実行力に期待を伝えることで、すぐに動き出します。「来週の〇〇プロジェクト、特にこの部分が危険を伴うから、君に現場の安全管理を任せたい。リスクを洗い出し、事故ゼロで完了させるための具体的な計画を立てて、指揮をとってくれないか？」と、具体的なタスクと結果を明確にして責任を委ねる頼み方が効果的です。",dont:"「この企画、もっとクリエイティブな視点で考えてみてくれない？安全は二の次でいいから、斬新なアイデアが欲しいんだけど、どうかな？」のように、抽象的な指示や理念だけを語り、安全を軽視する発言は絶対に避けましょう。「新しい安全マニュアル、現場のことは考えずに、とにかく分厚い計画書を納期までに作ってほしいんだけど、お願いできるかな？」と、現場での行動を伴わない机上の作業だけを依頼すると、モチベーションが著しく低下します。「たぶん大丈夫だと思うから、この件は適当にやっておいてくれない？もし何かあっても、その時考えればいいでしょ。」といった不確実な情報や無責任な依頼は、安全番長の最も嫌う対応です。信頼を損ねる原因となるため注意しましょう。"},fullSections:[{title:"👤 この人はこんな人",content:"「まあ、なんとかなるっしょ。俺がいるんだから。」が口癖。どんな予想外の事態が起きても、この人がいれば最終的にはどうにかなるだろう、と思わせる現場の頼れるプロフェッショナルだ。目の前で起きている現実を冷静に捉え、持ち前の幅広いスキルと経験を総動員して、常に安全な着地を目指す。机上の空論は好まず、まずは状況に飛び込んで解決策を見つけ出す実践主義者。\n\n人と関わることで活力が湧いてくるが、それは「みんなで楽しく過ごしたい」というより「みんなが安心して安全に活動できるよう、自分が現場を仕切る」という意識が強いからだ。チームのムードメーカーというよりは、影のガードマンのような存在。グループ旅行では気づけば全員の持ち物をチェックし、万が一の事態に備えて常備薬や工具を忍ばせている。\n\n仕事においては、予測不能なトラブルや緊急事態が起こった時こそ真価を発揮する。パニックになる周囲をよそに、論理的かつ迅速に状況を判断し、手際よく具体的な対処法を講じる。その場にある資源を最大限に活用し、最も効率的で確実な解決策を瞬時に導き出す能力は並外れている。「大丈夫、これはこうすればいい。」と、まるで魔法のように問題を解決してしまうその姿は、多くの人にとって心強い。\n\n一方で、抽象的な長期計画や、感情的な対立は苦手とするところ。先の見えない議論にはすぐに飽きてしまい、「で、結局何をするの？」「具体的なアクションは何？」と結論を急かす傾向がある。また、感情的な訴えよりも事実に基づいた論理を重視するため、時として冷たいと誤解されることもある。しかし、それは感情に流されず、確実な解決に集中している証拠だ。\n\n興味の幅は広く、ジャンルを問わずさまざまな知識や技術を身につけている。DIY、サバイバル術、応急処置、格闘技、料理、プログラミング…と、まるで百科事典のように引き出しが多い。しかし、その知識はすべて「いざという時に役立つ」という実用的な観点から選ばれている。広く浅く、しかし必要な時に確実に使えるスキルを身につけることが、この人にとっての「安全」の定義なのだ。\n\n対人関係においては、率直で飾り気のないコミュニケーションを好む。言葉の裏を読むような駆け引きは苦手で、思ったことはストレートに伝える。ただし、それは決して無神経なのではなく、「相手に正確な情報を伝え、行動を促す」という目的意識に基づいている。困っている人がいれば放っておけず、実用的なアドバイスや具体的な手助けを惜しまない、義理堅い一面も持つ。\n\nこの人の根底にあるのは「みんなが平穏でいられるように、自分が動く」という強い使命感だ。冒険や変化を求めるよりも、今ある安全と安定を守り、現状をより確実なものに改善していくことに情熱を燃やす。どんな困難な状況に直面しても、最後は「俺に任せろ」と笑顔で言い放つ、まさにチームの「安全番長」である。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n目の前で起きている問題や、今すぐ着手すべき具体的なタスクがあると、すぐに動き出す。まず現場に赴き、五感を使って状況を正確に把握することから始める。「この問題、一体何が起きてる？」と、情報収集を優先し、計画を立てるよりもまずは実践的なアプローチで手を動かすタイプだ。机上で完璧な計画を練るよりも、走りながら最適な方法を見つけ出すことを好む。緊急性の高いタスクには、誰よりも早く対応し、初動のスピードは抜群に速い。\n\n【進行フェーズ】\n複数のタスクを並行して進めるというよりは、優先順位をつけ、最も緊急度・重要度の高いものから確実に片付けていく。常に状況の変化に目を光らせ、予定外の問題が発生すれば、すぐさまそちらに対応を切り替える。臨機応変な対応力で、予期せぬトラブルにも動じず、その場で最適な解決策を導き出す。進捗報告は、事実に基づいた客観的な情報が多く、感情的な表現は少ない。具体的な数字や「〇〇が完了した」といった完了ベースでの報告を重視する。\n\n【完了フェーズ】\n「安全番長」の名前の通り、物事を確実に完了させること、そしてその後の安定を重視する。タスクの最終チェックや品質確認は怠らない。細かい調整や、潜在的なリスクの洗い出し、マニュアル作成など、最後の詰めこそが最も重要だと考えている。徹底した品質管理と、将来のトラブルを未然に防ぐための整備を責任を持って行う。たとえ面倒な作業でも、その重要性を理解していれば手を抜くことはない。\n\n【1日の働き方】\n朝からエンジン全開で、午前中から具体的なタスクに着手し、次々と片付けていく。午前中に現場の状況を確認したり、チームメンバーとの具体的な打ち合わせで、その日のタスクと優先順位を明確にするのが好きだ。午後には、午前中の情報をもとに、実践的な作業や問題解決に集中する。イレギュラーな事態に備え、常に柔軟に動けるよう、時間配分も余裕を持たせる傾向がある。決まったルーティンよりも、日々の状況に合わせて最適な働き方を見つけるタイプだ。"},{title:"🗣️ 会議での振る舞い",content:"会議では、常に現実的な視点と実践的な解決策を提示する。抽象的な議論や、実現性の低いアイデアが飛び交うブレストでは、一歩引いて冷静に聞いていることが多い。しかし、「で、具体的にどうするの？」「現状の課題は何？」といった、本質を突く質問で議論を現実路線に戻す役割を担う。「それは絵空事だ。まずは足元を固めるべきだ」と、はっきり意見を言うこともためらわない。\n\n問題解決のための具体的なアクションプランを練る場や、リスクヘッジを検討する会議では、積極的に発言する。過去の経験や、その場で収集した情報に基づき、実行可能な解決策や、潜在的なリスクとその対策を具体的に提示する。長時間の座学のような会議は苦手で、できれば「結論」と「アクション」を早く出したいと思っている。\n\n【ベストな会議の使い方】\n・具体的な問題解決や課題検討の場にはマスト\n・リスクアセスメントや品質改善会議のキーパーソン\n・緊急事態発生時の対策会議では頼れる司令塔\n・定期的な進捗報告会議では、事実に基づいた報告で場を引き締める\n・非現実的なアイデア出しだけの会議には、参加しても発言は少なめ"},{title:"💬 チャットでの傾向",content:"チャットは、簡潔かつ要点をまとめたメッセージを送ることが多い。「了解」「対応中」「完了しました」など、ステータスを明確に伝えることを重視する。絵文字やリアクションは必要最低限で、感情的な表現は控えめ。長文のメッセージや、曖昧な表現には、「結局何をすればいいの？」と具体的なアクションを求めてしまう。\n\n緊急性の高い情報や、具体的な指示は、チャットであっても見落とさないように注意している。ただし、議論の進捗や、抽象的な話題のチャンネルにはあまり積極的に参加しない。メッセージを送る頻度は高くないが、一度送るメッセージには重要な情報が詰まっていることが多い。\n\n【周囲が知っておくと楽なこと】\n・「何か問題があったら言ってくれ」は、本当に困った時に頼ってほしいというサイン\n・「考えておく」は、具体的に何ができるか検証中であるという意味\n・返信が遅いのは、忙しいか、具体的なアクションを検討中かのどちらか\n・要点と必要なアクションを明確に伝えると、すぐに動いてくれる\n・長文で意見を求めるより、簡潔な質問の方が返信が早い"},{title:"👔 上司として／部下として",content:"【上司として】\n現場の状況を誰よりも理解している実践的なリーダー。メンバーには具体的な目標と、達成のための手段を明確に提示する。危険予知能力が高く、潜在的なリスクをいち早く察知し、チーム全体に注意を促すことで、安全で安定した業務遂行をサポートする。「問題が起きる前に手を打て」が信条。\n\nメンバーの自主性を尊重しつつも、責任範囲と品質基準は明確に求める。困っているメンバーがいれば、自ら現場に赴き、実践的なアドバイスや具体的な手助けを惜しまない。感情的なマネジメントは苦手だが、論理に基づいた公平な評価を行う。いざという時に頼りになる、まさにチームの「安全基地」のような存在だ。\n\n【部下として】\n具体的な目標と裁量を与えられると、持ち前の問題解決能力と幅広いスキルを存分に発揮する。現場での判断を任せられることを好み、自らの責任でタスクを確実に遂行しようとする。抽象的な指示や、頻繁な進捗報告はストレスに感じるが、緊急性の高いタスクや、トラブルシューティングには燃えるタイプ。\n\n上司には、事実に基づいた報告と、解決策の提案を行う。感情的なコミュニケーションよりも、論理的で建設的な議論を好むため、上司とはプロフェッショナルな関係を築きたいと思っている。自分の意見が論理的に正しいと確信すれば、臆することなく主張する強さも持っている。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・現場で発生したトラブルを迅速かつ確実に解決できたとき\n・自分のスキルや経験が、具体的な成果や安全確保に直結したとき\n・未然にリスクを防ぎ、チームや組織を危機から守れたとき\n・明確な目標と具体的なタスクを与えられ、それを遂行できたとき\n・「〇〇さんがいてくれたから助かったよ」と感謝されたとき\n・新しい実用的な技術や知識を習得し、すぐに活用できる機会があったとき\n・地道な改善活動が、確実に良い結果に繋がったと実感できたとき\n\n【📉 下がる瞬間】\n・抽象的な議論が延々と続き、具体的なアクションに繋がらないとき\n・非現実的な計画や、実現不可能な目標を押し付けられるとき\n・無意味なルールや、非効率なプロセスに従うことを強いられるとき\n・自分の実用的な提案が、感情的な理由で却下されるとき\n・現場から遠ざけられ、机上の業務ばかりを強いられるとき\n・曖昧な責任範囲や、誰がやるのか不明確なタスクを与えられたとき\n・努力や貢献が、具体的な形で認められないとき"},{title:"📝 フィードバック",content:"【受けるとき】\n感情的な評価や曖昧な表現よりも、事実に基づいた具体的かつ論理的なフィードバックを好む。改善点については、「〇〇という状況で、△△のように行動すると、より良くなる」といった具体的なアドバイスであれば素直に受け入れる。ただし、根拠のない批判や、人格攻撃のようなものは強く反発する。「なぜそうなのか」という理由が明確であれば、厳しい内容でも納得して受け止めることができる。\n\n【伝えるとき】\n論理的で、率直に伝えることを重視する。相手の行動や成果について、客観的な事実に基づいて評価し、改善点があれば具体的な提案を添える。感情に訴えかけるような表現はあまり使わず、遠回しな言い方も苦手。相手にとって耳の痛い内容でも、チーム全体の安全や品質維持のために必要だと判断すれば、はっきりと伝える。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・**現場でのトラブルシューティング**: 突然のシステム障害や機器故障など、目の前の問題を迅速に解決する。\n・**リスクアセスメントと対策立案**: 潜在的な危険を洗い出し、具体的な予防策や対応計画を策定する。\n・**実用的な改善活動**: 既存のプロセスや仕組みを、より効率的かつ安全なものへと改良する。\n・**緊急時の対応と指揮**: 災害や事故発生時に冷静に判断し、適切な指示を出して現場をまとめる。\n・**幅広い専門スキルの活用**: DIY、応急処置、セキュリティ対策など、多様な知識を実践的に応用する。\n・**品質管理と検査**: 製品やサービスの品質基準を厳しくチェックし、安定性を確保する。\n・**実践的なトレーニング・指導**: チームメンバーに具体的な手順や安全対策を教え、スキルアップを促す。\n\n【😰 苦手】\n・**抽象的な理念の策定**: 「なぜ」よりも「何を」「どうする」に重きを置くため、ビジョンやミッションの言語化は苦手。\n・**長期的な戦略立案**: 目先の具体的な課題解決に集中するため、遠い未来の計画には関心が薄い。\n・**感情的な調整・カウンセリング**: 論理的な解決策を求めるため、感情に寄り添う対話はあまり得意ではない。\n・**膨大なデータ分析とレポート作成**: 実践的な結論に直結しない、細かい数字の検証や分析は苦痛に感じる。\n・**緻密なスケジュール管理**: 状況の変化に柔軟に対応したいので、ガチガチに固められた計画は苦手。\n・**意味不明な定型業務**: 目的や効果が見えないルーティン作業は、モチベーションが著しく低下する。\n・**理論的な研究開発**: 実践的応用が見込めない基礎研究や、机上の学術的な探求は苦手意識がある。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・**「今すぐ現場が困っているんだ！」**: 緊急性と必要性を明確に伝えられると、すぐに駆けつけてくれる。\n・**「〇〇さんの実践的な知恵が必要なんだ」**: 頼られることで、自分のスキルが役立つと認識すれば、喜んで引き受ける。\n・**「この問題、どうすれば一番安全に解決できる？」**: 問題解決のプロセスに責任感と挑戦意欲が湧く。\n・**「具体的なゴールと、ここまでなら自由にやっていい」**: 裁量と同時に目的を明確にすると、最高のパフォーマンスを発揮する。\n・**「過去の事例から何かヒントをもらえないか？」**: 経験と知見を活かす依頼だと、積極的に協力してくれる。\n・**「まずは30分で状況を見て、可能な範囲で対処してほしい」**: 小さなタスクからでも行動に移しやすい。\n\n【❌ パフォーマンスが落ちる】\n・**「とりあえず、何か面白いことないかな？」**: 抽象的すぎて、具体的なアクションが見えない依頼には困惑する。\n・**「理論的にこの問題の根源を分析してほしい」**: 机上の思考を延々と求められると、実用性が見えずモチベーションが下がる。\n・**「みんなの気持ちをまとめて、平和的に解決してほしい」**: 感情的な調停役は苦手で、論理的な解決に集中できない。\n・**「細かい手順書を完璧に作って」**: 状況の変化に対応できないガチガチなマニュアル作成は苦痛。\n・**「なぜか分からないけど、ルールだから守って」**: 理由が納得できない規則には従いたがらない。\n・**「失敗したら困るから、一挙手一投足報告して」**: 信頼されていないと感じ、自主性が奪われる。\n\n【💡 コツ】\n1.  **「何を解決したいのか、なぜ解決すべきなのか」を明確に**: 具体的な目的と緊急性を伝えることで、行動を促す。\n2.  **現場での裁量と、具体的な解決策の提示を促す**: 自由な発想で最も効率的な方法を見つけさせると良い。\n3.  **情報共有は、事実とデータに基づいて簡潔に**: 抽象的な話よりも、現状と課題を客観的に伝える。\n4.  **感謝は具体的な行動と成果に対して伝える**: 「おかげで〇〇が解決した」と、貢献を具体的に認めると喜ぶ。\n5.  **リスク管理や安全確保の重要性を強調する**: その観点からの依頼は、この人の得意分野と合致する。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・**危機管理スペシャリスト**: 予期せぬトラブルや災害時において、迅速な判断と実用的な対処で被害を最小限に抑える。\n・**現場施工管理/プロジェクトマネージャー（小規模）**: 現場の状況を把握し、問題を解決しながらプロジェクトを安全かつ確実に推進する。\n・**品質保証/品質管理**: 製品やサービスの品質を徹底的にチェックし、安定した品質を維持・向上させる。\n\n【⭐ かなり合う】\n・**技術サポート/カスタマーサービス（現場対応型）**: 顧客の具体的な問題に対し、迅速かつ実用的な解決策を提供する。\n・**施設管理/設備保全**: 建物や設備のトラブルを未然に防ぎ、快適で安全な環境を維持する。\n・**安全衛生管理者**: 職場の安全性を確保するためのルール作りや啓蒙活動、緊急時の対応を行う。\n\n【💡 意外とハマる】\n・**イベント警備/運営責任者**: 大人数が集まるイベントで、想定外の事態に備え、参加者の安全と円滑な運営を両立させる。\n・**DIY/クラフトインストラクター**: 実用的な技術や知識を教え、受講者が安全に物作りを楽しめるよう指導する。\n\n【⚠️ 避けた方がいい】\n・**戦略コンサルタント**: 抽象的な概念や長期的なビジョンを扱うことが多く、具体的な行動との乖離にストレスを感じる。\n・**学術研究者**: 実践的応用が見込めない理論の探求や、論文執筆など、机上の作業が中心の業務は苦手。\n・**感情的なカウンセラー**: 感情的な問題に深く寄り添うより、論理的な解決策を探すため、適性が合わない場合がある。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\n・**INFJ-J-Dp「思想家」**: 安全番長が現場で培った知見を思想家が長期的なビジョンや哲学へと昇華させる。行動と熟考、現実と理想のバランスが取れる。\n・**INTJ-J-Dp「戦略家」**: 安全番長の具体的な行動力と戦略家の緻密な計画力・全体設計力が合わさる。戦略家の描いた青写真を、安全番長が現場で確実なものにしていく。\n\n【🔥 化学反応が起きるコンビ】\n・**ISTJ-G-Dp「金庫番」**: どちらも堅実で安定志向だが、金庫番の厳密なルール順守と安全番長の臨機応変な対応力が、時に衝突しながらも、より強固なシステムを構築する。\n・**ESTJ-J-Dp「司令官」**: どちらも現実的で実践的だが、司令官の組織的な統率力と安全番長の現場での問題解決能力が相乗効果を生む。互いの強みで迅速に目標達成へ向かう。\n\n【☀️ 居心地がいい仲間】\n・**ESTP-O-Br「トラブルバスター」**: どちらも現場での問題解決を好むが、トラブルバスターの攻めの姿勢と安全番長の守りの姿勢が、互いの行動を理解し合い、刺激し合う。\n・**ISFP-G-Br「職人肌」**: どちらも目の前の作業に集中し、五感を活用するタイプ。安全番長の現実的な視点と職人肌の美的感覚が、具体的なプロジェクトで共鳴し合う。\n\n【⚡ 未知の触発者】\n・**ENFP-O-Br「着火マン」**: 着火マンの無限のアイデアと安全番長の現実的な視点が、全く異なる角度からの刺激をもたらす。実現不可能な夢を着火マンが見る中、安全番長は「まずはここから固めよう」と現実に戻す。\n・**INTP-J-Dp「理論家」**: 理論家の抽象的な思考実験と安全番長の実践的な問題解決は、互いの視野を広げる。理論家が複雑なシステムを設計し、安全番長がその現場での実現性を検証する。"},{title:"🌈 プライベートの顔",content:"「この工具、キャンプに持っていくと超便利なんだよ」と、やたら多機能なアイテムを常に携帯している人。休日は家でじっとしていることはほとんどなく、常に何かを「している」。「先週は友達と廃墟探索でサバイバル訓練、今週はDIYで自宅の庭にピザ窯作った」と、その活動内容はバラエティ豊かだ。Googleカレンダーには、実用的なスキルアップにつながるワークショップや、友人と体を動かす予定がぎっしり詰まっている。\n\n新しい趣味に手を出しても、その道の専門家を目指すよりは、実用的な知識やスキルを身につけることに重きを置く。例えば料理なら、凝った料理よりも「どんな食材でも美味しく、安全に調理する方法」に関心を持つ。車のメンテナンスも、ディーラー任せにせず、自分で基本を覚えてしまうタイプだ。そのスキルはどれも「いざという時に役立つ」という基準で選ばれている。\n\n旅行に行くとなれば、現地の治安や交通手段、緊急時の避難経路まで事前に調べている。同行者が忘れ物をしたり、道に迷ったりしても、動じることなくテキパキと対処する。「まぁ、俺がなんとかするから大丈夫」というセリフは、プライベートでも健在だ。友達からは「頼りになるけど、ちょっと心配性？」と言われることも。\n\n人との交流は好きだが、飲み会では騒ぐより、みんなが安全に楽しめているか周囲に気を配ることが多い。トラブルが起きれば、真っ先に仲裁に入り、具体的な解決策を提案する。友達の悩み事にも、感情的に共感するよりも、「で、どうしたいの？具体的に何が問題なの？」と、解決策を共に考える姿勢を見せる。\n\nお金の使い方も実用性を重視する。流行のブランド品よりも、長く使える高機能なアウトドア用品や工具への投資を惜しまない。何かを購入する際も、レビューを徹底的に調べ、耐久性や安全性を重視する。まるで「どんな環境でも生き残る」ためのギアを選んでいるようだ。\n\nどんな状況でも、冷静で現実的な判断ができるため、周りからは「動じない人」と見られている。しかし、それは決して無関心なのではなく、常に周囲の安全と安心を守るための準備を怠らない、彼なりの愛情表現なのだ。"}]},
"ESTP-G-Dp":{name:"求道者",character:"緑谷出久（僕のヒーローアカデミア）",great:"イチロー",color:"#A04000",summary:"「一つの技を磨き続け確実に結果を出す」堅実な実行者。コツコツ積み上げた実力で確実に成果。守りの姿勢で深く一つの道を極める。",compatibility:{complement:[{code:"INFJ-O-Br",name:"革命家",desc:"目の前の技術課題に集中する彼に、革命家が「この技術で、どんな未来を創りたい？」と問いかけ、深い洞察と大きなビジョンで技術の方向性と意義を触発する。"},{code:"ISFJ-O-Br",name:"献身サポーター",desc:"プロジェクトでISFJ-O-Dpが深くコミットする対象を、ISFJ-O-Brも献身的に支えます。お互いの揺るぎないサポート精神が共鳴し、チームに安心感と確実性をもたらすでしょう。"}],chemistry:[{code:"ESTP-O-Dp",name:"エース",desc:"エースの迅速な行動力と実行力が、癒し職人が温めていたアイデアを現実の形にするきっかけを与えます。新しい施術メニューの導入テストでは、エースの行動力が実験を加速させます。"},{code:"ISTJ-G-Dp",name:"金庫番",desc:"求道者の技術への深い探求心と、金庫番の厳格な品質管理が融合し、揺るぎない専門性と信頼性を生み出します。共同でシステム開発を行う際、求道者が高度な機能を実装し、金庫番がその安定性とセキュリティを徹底的に検証することで、完璧な製品を完成させます。"}],comfort:[{code:"ESTP-G-Br",name:"安全番長",desc:"求道者の技術へのこだわりと安全番長の現場での実践力が共鳴し、お互いに安心して仕事に取り組めます。現場作業で求道者が専門的なツールを扱う際、安全番長は周囲の状況を的確に把握し、安全な作業環境を確保することで、集中力を高めます。"},{code:"ISTP-G-Dp",name:"専属オペレーター",desc:"求道者の深い専門性と専属オペレーターの静かで精密な技術が互いに理解し合い、言葉なくとも連携が可能です。共同で複雑な機械のメンテナンスを行う際、求道者が問題の根源を特定し、専属オペレーターが熟練した手つきで調整することで、完璧な連携を見せます。"}],catalyst:[{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"},{code:"ENTP-O-Dp",name:"常識クラッシャー",desc:"既存プロセスの見直し会議では、ENTP-G-Brが現状の背景知識を提供する一方で、ENTP-O-Dpが常識にとらわれない大胆な提案で既成概念を打ち破る。知的好奇心を刺激し合い、自由な議論が交わされる居心地の良い関係。"}]},careers:{top:["プロスポーツ選手","伝統技能の職人","専門技術者"],good:["パイロット","外科医","スポーツトレーナー"],surprise:["寿司職人","時計修理士"],avoid:["抽象コンサル","毎日変わるクリエイティブ"]},strengths:["持続的向上","確実な実行","冷静な判断","忍耐"],weaknesses:["新分野への転換","抽象的思考","自己PR","変化のスピード"],tips:{do:"この分野の専門家として、〇〇システムのコア技術開発をあなたに任せたいと考えています。長期的な視点で最高峰の技術を追求し、この領域を徹底的に極めてくれませんか？ 数年先のプロダクトの根幹を支える重要な役割です。現在直面しているこの技術的な課題について、あなたの持つ深い専門知識を活かして、根本原因と最適な解決策を究明してくれないでしょうか？ 表面的な対応ではなく、本質的な改善を期待しています。あなたが磨いてきた〇〇の技術が、このプロジェクトでどのように貢献し、どのような具体的な成果を生み出すか、ぜひあなたの言葉で聞かせてくれませんか？ 今後のあなたの成長パスも一緒に考えたいです。",dont:"悪いんだけど、この新規事業でいくつか手伝ってほしいことがあって。まずは幅広く情報収集から始めて、関連する全ての業務にざっと目を通してみてくれない？ 何か面白そうなものがあれば深掘りして。ごめん、この前のプロジェクトの方針が変わったんだ。まだ具体的な内容は決まってないけど、とりあえず新しい方向性で何か試してみてくれないかな？ 色々試行錯誤して、面白いアイデアを見つけてきてほしい。このタスク、とりあえず今日中に形にしてくれないかな？ 品質は二の次でいいから、とにかく早くアウトプットが欲しいんだ。後で修正すればいいし、細かいことは気にしなくて大丈夫だよ。"},fullSections:[{title:"👤 この人はこんな人",content:"「一つのことを極めて結果を出す」ことに喜びを感じる実践者だ。「何ができるか」よりも「どうすればもっと確実か」を追求する。口癖は「もっとやれるはず」「これで本当に大丈夫か？」。現状維持・改善こそが真の成長だと信じ、昨日よりも今日、今日よりも明日と、地道な積み重ねを重んじる。\n\n人との交流は好きだが、騒がしいだけの関係は好まない。具体的な情報交換や共通の目標に向かって協力する中でエネルギーを得る。例えばランチの誘いも、「あの店のアレが美味いらしい、行かないか？」と具体的な誘い方をする。人の気持ちを慮るよりも、論理的な思考と実践的な行動で物事を解決しようとするタイプだ。\n\n仕事においては、0→1の派手な新規事業よりも、1→100、あるいは100を120にするプロセスに情熱を燃やす。既存の仕組みを徹底的に分析し、わずかな無駄や非効率を見つけては改善していく。その探求心と粘り強さはチーム随一で、誰もが諦めかけた課題にも黙々と取り組み、確実に結果を出す。\n\n弱点は、新しい変化への着手には少し時間がかかることだ。慎重に吟味し、確実な勝算が見えるまでは動かない。また、非効率なことや意味のない慣習には強い違和感を覚える。「なんでそうするんですか？」と本質を問うことも少なくない。感情的な議論や抽象的な話は苦手で、具体的なデータや事実に基づいて話が進まないと居心地の悪さを感じる。\n\n興味の幅は広くないが、一度関心を持った分野はとことん深く掘り下げる。例えば、スポーツを始めたらその競技の歴史、理論、トレーニング方法まで徹底的に調べ上げ、誰よりも詳しくなる。「とりあえずやってみよう」ではなく、「どうすれば最も効率的に、最短で上達できるか」を考えてから行動に移す。\n\nチームにおいては、揺るぎない実力と責任感で信頼を勝ち取る。何か問題が起きた時、「〇〇さんに聞けば間違いない」と頼られる存在だ。感情的に共感するよりは、「具体的にどうすればいい？」と現実的な解決策を提示する。そのクールな印象とは裏腹に、困っている仲間がいれば率先して手助けする義理堅さも持ち合わせる。\n\n彼らの根底にあるのは「プロ意識」と「最高の品質への追求」だ。自分に課せられた役割を完璧に果たすことに価値を見出し、妥協を許さない。そのストイックな姿勢は、周囲に確かな安心感と目標達成への推進力をもたらす。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n「面白いアイデア」よりも「改善すべき課題」を見つけたときにエンジンがかかるタイプだ。現状のプロセスや品質に問題点を見つけると、それをどうすればより良くできるかを徹底的に考える。まずは既存のデータを収集・分析し、具体的な解決策を複数検討。計画を立ててから行動する慎重さも持ち合わせているが、実際に手を動かして検証する実践主義者でもある。新しい技術やツールを導入する際は、その効果とリスクを十分に見極めてから着手する。\n\n【進行フェーズ】\n一つのタスクに集中し、深く掘り下げていくのが真骨頂だ。複数のタスクを並行して進めるのは苦手で、目の前の課題を確実に解決することに全力を注ぐ。改善活動は地道で根気が必要だが、彼らはそれを苦としない。むしろ、少しずつ品質が向上していく過程に喜びを感じる。進捗報告は事実に基づいて簡潔に行い、曖度な表現は避ける。具体的な数値やデータを示しながら、課題と解決策を明確に伝える。\n\n【完了フェーズ】\n「これで終わり」という概念はあまりない。常に「もっとできることはないか」と改善の余地を探し続ける。品質チェック、数値の検証、ドキュメントの整備といった最後の詰めの作業こそが、彼らが最も力を発揮する領域だ。妥協を許さず、納得がいくまで徹底的に磨き上げる。締切は厳守するが、品質を確保するためならスケジュール調整も厭わない。ノウハウやナレッジの共有も重要視し、再現性のある形でアウトプットする。\n\n【1日の働き方】\n計画的でルーティンを重視する。朝は決まった時間にスタートし、日中の集中力が最も高い時間帯に、最も重要なタスクに取り組む。一度集中すると周りの声も耳に入らないほど没頭することが多い。午後は、午前中に見つけた改善点や課題の具体的な検証、データ入力、品質管理など、着実な作業をこなす。突発的な依頼よりも、事前に計画された仕事の方がパフォーマンスが出やすい。"},{title:"🗣️ 会議での振る舞い",content:"会議では、具体的な議題や解決すべき課題がある場合にこそ真価を発揮する。抽象的なブレストやアイデア出しの場では口数が少なくなる傾向があるが、議論が具体的な問題解決や改善策の検討に移ると、途端に発言量が増える。自らの専門知識に基づいて、データや過去の事例を引用しながら、論理的で実用的な意見を述べる。\n\n無駄な会議や、結論が出ないまま感情論に終始する議論には不満を感じやすい。「具体的にどうするのか」「誰が、いつまでにやるのか」が不明瞭なまま会議が終わることを嫌う。議事録は、決定事項やアクションアイテムを正確に記録することにこだわる。\n\n【ベストな会議の使い方】\n・既存プロセスの課題発見・改善策検討会議にはマスト\n・特定の技術やプロダクトに関する詳細なレビュー会議で活躍\n・プロジェクトの進捗報告会議では、正確な状況と今後の見通しを共有\n・意思決定の会議では、事実に基づいた客観的な情報提供者として参加\n・新規事業のアイデア出しのような発散型の会議は、必須でなければ参加を減らす方が効果的"},{title:"💬 チャットでの傾向",content:"メッセージは簡潔かつ要点を押さえていることが多い。感情的な表現や絵文字はあまり使わず、事実やタスク、確認事項をストレートに伝える。長文になる場合は、箇条書きや番号付けを使って構造化し、読み手が理解しやすいように工夫する。\n\nチャットでの雑談は控えめで、業務に必要な連絡が中心だ。レスポンスは確実だが、即座に返信しないこともある。それは、メッセージの内容を正確に理解し、必要な情報を確認してから返信しようとするためだ。一度「承知しました」と返信すれば、そのタスクは確実に実行されると期待してよい。\n\n【周囲が知っておくと楽なこと】\n・曖昧な表現ではなく、具体的なタスクや期待する成果を明確に伝える方が伝わる\n・「〇〇はどう思いますか？」と漠然と聞くより、「〇〇の改善案について意見が欲しい」と具体的に質問する\n・返信が遅くても焦らない。内容を精査している可能性が高い\n・絵文字やリアクションはあまり使わないが、それは感情がないわけではなく、業務に集中しているサイン\n・深夜にメッセージを送ることは稀。業務時間内に集中して対応したいタイプ"},{title:"👔 上司として／部下として",content:"【上司として】\n結果と品質にこだわり、具体的な目標と期限を明確に設定するリーダーだ。メンバー一人ひとりの専門性を尊重し、得意な分野で最高のパフォーマンスを発揮できるよう環境を整える。新しいことへの挑戦よりも、既存のプロジェクトの安定稼働と継続的な改善を重視。メンバーには具体的な行動指針と、自身の経験に基づいた実践的なアドバイスを与える。\n\n一方で、感情的なケアやモチベーション管理はやや苦手な側面もある。論理的で客観的なフィードバックを好むため、メンバーが感情的に落ち込んでいる時には、どのように接すればいいか迷うことも。個人の成長を促すために、ややストイックな基準を求める傾向がある。\n\n【部下として】\n任された仕事は責任を持ってやり遂げ、期待以上の結果を出そうと努力する頼れる存在だ。上司からの指示は、それが論理的で明確であれば、忠実に実行する。自分の専門性を深める機会や、品質改善に貢献できるプロジェクトには積極的に取り組む。目標達成のためなら、地道な努力も厭わない。\n\n管理が曖昧な上司や、感情論で物事を進める上司とは相性が悪い。具体的な指示がなく「適当にやってみて」と言われると、何から手をつけていいか戸惑う。成果よりもプロセスを重視されすぎたり、品質よりもスピードを優先させられるとモチベーションが低下する。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・自分の専門性が認められ、重要な役割を任されたとき\n・改善活動が成功し、具体的な数値として成果が出たとき\n・難易度の高い課題を、自らのスキルと努力で解決できたとき\n・既存のプロセスや製品の品質が明確に向上したとき\n・自分のスキルや知識が着実に向上していると実感できたとき\n・安定した環境で、一つのことに深く集中できる時間を与えられたとき\n・「〇〇さんがいなかったら、この品質は出せなかった」と具体的に評価されたとき\n\n【📉 下がる瞬間】\n・曖昧な目標や指示で、何から手をつけていいか分からないとき\n・努力しても成果が数字や事実として見えないとき\n・非効率なプロセスや無駄な慣習を改善できないとき\n・感情論ばかりで、具体的な議論が進まない会議が続くとき\n・自分の専門性や経験が活かせない、ルーティンばかりの業務を強いられたとき\n・頻繁に業務が中断され、集中できる環境が奪われたとき"},{title:"📝 フィードバック",content:"【受けるとき】\n感情的な言葉ではなく、事実に基づいた具体的なフィードバックを求める。「なぜそうなるのか」「具体的にどこを改善すればいいのか」が明確であれば、素直に受け入れ、すぐに実践しようとする。耳の痛い指摘でも、それが自身の成長や品質向上に繋がると判断すれば、真摯に受け止める。曖昧な褒め言葉や抽象的な批判は、あまり響かない。\n\n【伝えるとき】\n論理的で具体的なアドバイスを伝えるのが得意だ。感情を抜きにして、データや事実に基づいて「ここが現状の課題で、こうすると改善できる」と明確に指摘する。遠回しな表現はあまり使わず、直接的になりがちだが、それは相手の成長を願うがゆえだ。具体的な改善策や、そのためのリソースも併せて提示しようと努力する。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・**品質管理・検証**: 細かい数値や仕様を徹底的にチェックし、最高の品質を追求する。\n・**データ分析・報告**: 大量のデータから傾向を読み解き、具体的な改善点や戦略を導き出す。\n・**プロセス改善**: 既存の業務フローを分析し、効率化や生産性向上に繋がる改善策を実行する。\n・**トラブルシューティング**: 発生した問題の原因を論理的に特定し、迅速かつ確実に解決する。\n・**専門技術指導**: 培ってきた専門知識や技術を、実践的なトレーニングを通じて正確に教える。\n・**ルーティン作業の最適化**: 定型的な作業をより効率的、かつミスなくこなせるよう工夫する。\n・**仕様書・手順書作成**: 曖昧さを排除し、誰が見ても正確に理解できるドキュメントを作成する。\n\n【😰 苦手】\n・**抽象的な戦略立案**: 具体的なデータや根拠が少ない、ビジョン先行型の企画は苦手。\n・**新規事業のアイデア出し**: 既存の枠組みを大きく超える発想や、0→1の創造にはあまり関心がない。\n・**感情的な顧客対応**: 相手の感情に寄り添うよりも、具体的な解決策を提示しようとしてしまう。\n・**会議でのブレインストーミング**: 意見を広げることよりも、具体的な結論を出すことを優先しがち。\n・**広報・ブランディング**: 抽象的なイメージや感情に訴えかけるコミュニケーションは苦手。\n・**イベント企画・運営**: 細かい調整や人との交渉よりも、技術的な課題解決に集中したい。\n・**デザイン業務**: 主観的な美意識や感覚に頼る作業には、論理的な根拠を求めてしまう。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「〇〇さんの専門知識を活かして、この課題の改善策を検討してくれませんか？」 → 専門性を信頼されると期待に応えようとする。\n・「このデータの分析をお願いします。目的は〇〇の品質向上です」 → 具体的な目的とデータがあれば、迷わず着手できる。\n・「この製品の品質基準を再検討してほしい。より盤石なものにするために」 → 既存のものをより良くすることに情熱を燃やす。\n・「じっくり時間をかけて、この技術を習得してほしい」 → 一つのことを深く掘り下げる機会を与えられると本気を出す。\n・「〇〇プロジェクトの品質保証は〇〇さんに任せたい」 → 責任のある役割を任されると、プロ意識を発揮する。\n\n【❌ パフォーマンスが落ちる】\n・「とりあえず何か面白いことない？」 → 曖昧な問いかけにはどう反応していいか困惑する。\n・「感覚でいいから、ざっくりこの辺のアイデア出しといて」 → 論理や根拠がないと動けない。\n・「この企画、みんなの意見聞いて決めていこう」 → 結論が出ない議論にはストレスを感じる。\n・「感情的にこの部分が良くないと思うんだよね」 → 感情論だけでは改善のしようがないと感じる。\n・「〇〇さんの仕事、頻繁に状況確認させてもらうね」 → 信頼されていないと感じ、集中力を阻害される。\n\n【💡 コツ】\n1.  **目的と期待成果を明確に**: 「何のために」「何を」「どうなってほしいか」を具体的に伝える。\n2.  **専門性を尊重し、裁量を与える**: 特定の分野でのプロフェッショナルとして信頼し、その領域で自律的に動けるよう任せる。\n3.  **情報と根拠を提供する**: 判断に必要なデータや事実を最初に共有する。\n4.  **具体的なフィードバックを求める**: 途中経過で「どうすればもっと良くなるか」と聞くと、建設的な意見が得られる。\n5.  **結果だけでなく、そのプロセスでの努力と品質を評価する**: 地道な作業への労いを忘れない。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・**品質管理スペシャリスト** — 徹底した品質追求と改善活動で、製品・サービスの価値を最大化する。\n・**研究開発（専門分野）** — 特定の技術や理論を深く探求し、画期的なソリューションを生み出す。\n・**熟練職人/技術者** — 一つの技を極め、その分野で誰にも負けない技術と経験を提供する。\n\n【⭐ かなり合う】\n・**データサイエンティスト/アナリスト** — 大量のデータから具体的な洞察を見出し、意思決定をサポートする。\n・**システムエンジニア（保守・運用）** — 既存システムの安定稼働と継続的な改善に貢献する。\n・**トレーニングインストラクター（専門技術）** — 自身の専門知識を実践的な方法で正確に伝える。\n\n【💡 意外とハマる】\n・**アフターサービス/テクニカルサポート** — 発生した問題を論理的に解決し、顧客の信頼を得る。\n・**医療技術者（臨床検査技師など）** — 正確な診断と検査で、医療現場の品質を支える。\n\n【⚠️ 避けた方がいい】\n・**広報/ブランディング** — 抽象的なイメージ戦略や、感情に訴えかける表現は苦手意識がある。\n・**新規事業企画/ベンチャーキャピタル** — 既存の枠組みにとらわれない発想や、リスクの高い投資判断は不向き。\n・**イベントプランナー/マーケター** — 人の感情を動かす大規模な企画や、トレンドを追う仕事はストレスを感じやすい。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nENFP-O-Br「着火マン」 — 「着火マン」が次々と生み出すアイデアを、「求道者」が現実的かつ高品質な形に落とし込む。互いの強みが最大限に活かされる、0→1と1→100の理想的な連携が生まれる。\n\nINFJ-O-Dp「導き手」 — 「導き手」が描く深い洞察と未来のビジョンを、「求道者」が地に足のついた具体的なステップで実現していく。内向的なビジョンと外向的な実行力が合わさり、壮大な目標も達成可能に。\n\n【🔥 化学反応が起きるコンビ】\nENTJ-G-Dp「将軍」 — 論理的思考と結果への執着が共通。緻密な戦略と揺るぎない実行力で、どんな難題も乗り越える最強のタッグになる。\nISTJ-G-Dp「金庫番」 — 共に安定と品質を追求するタイプ。細部にまでこだわる職人気質が共鳴し、完璧な成果物を生み出す。\n\n【☀️ 居心地がいい仲間】\nESTJ-G-Dp「頑固職人」 — 現実主義で、具体的な成果を重視する点が共通。互いの仕事の質を認め合い、切磋琢磨できる。\nISFJ-G-Dp「世話役」 — 「求道者」の専門性を「世話役」が実務面でサポート。安定した環境で、お互いの役割を尊重しながら協力し合える。\n\n【⚡ 未知の触発者】\nINFP-O-Br「夢追い人」 — 感情豊かで内省的な「夢追い人」の視点が、「求道者」の論理的思考に新しいインスピレーションをもたらす。異なる価値観から新たな発見が生まれる可能性がある。\nENFJ-O-Br「伝道師」 — 人の心を動かすことに長けた「伝道師」との交流は、「求道者」の視野を広げ、自身の専門性を伝える新たな方法を学ぶきっかけになるかもしれない。"},{title:"🌈 プライベートの顔",content:"休日は、無目的な過ごし方よりも、何かしら「極める」ための活動に時間を使う。例えば、スポーツを始めたらその競技の専門誌を読み漁り、フォームを徹底的に研究。週末には必ず練習に出かけ、昨日よりも少しでも上手くなることを目指す。ゴルフならスイングの軌道を解析し、釣りが趣味なら特定の魚の生態や釣り方をプロ並みに深掘りするだろう。\n\n友人との付き合いは、広く浅くよりも、深く狭くを好む。気の置けない仲間とは、共通の趣味や目標を通じて長く付き合う。飲み会では、無駄話よりも、趣味のテクニックや仕事の専門的な話で盛り上がることが多い。特定のバーやレストランがお気に入りで、そこを「自分の場所」として頻繁に利用する。\n\n新しい家電やガジェットを購入する際は、機能性、耐久性、コストパフォーマンスを徹底的に比較検討する。衝動買いはせず、時間をかけてレビューを読み込み、スペック表と睨めっこする。一度買ったものは長く使いこなし、そのメンテナンスにも余念がない。\n\n旅行に行くとしても、目的は明確だ。「あの有名な美術館の全作品を見る」「あの山の特定のルートを制覇する」といった具合に、計画を綿密に立ててから実行に移す。観光地をただ巡るだけではなく、その土地の歴史や文化を深く学ぶことに興味を持つ。\n\nお金の使い方も堅実で、無駄な出費はしない。趣味や自己投資には惜しみなく使うが、それは「より良い自分になるため」という明確な目的があるからだ。貯蓄や資産形成にも関心があり、長期的な視点で安定した計画を立てる。常に「もっと良い方法はないか」と探求する姿勢は、プライベートでも変わらない。\n\n「とりあえずやってみる」ではなく、「どうすれば最高の体験ができるか」を追求し、日々の生活の質を高めていく。そのストイックさこそが、求道者の日常なのだ。"}]},
"ESFJ-O-Br":{name:"総支配人",character:"ハンコック（ONE PIECE）",great:"ココ・シャネル",color:"#EC7063",summary:"「人を魅了し場を華やかにする」社交の女王。おもてなしの天才で空間の美しさにもこだわる。",compatibility:{complement:[{code:"INTP-G-Dp",name:"数式が友達",desc:"会議で総支配人が場の空気を和ませる一方、数式が友達はデータに基づいた鋭い分析で議論に深みをもたらします。企画書作成では、総支配人の魅力的な表現に、数式が友達の客観的な視点が加わり、説得力が増します。"},{code:"INTJ-G-Dp",name:"設計狂",desc:"共通のプロジェクトで、INTPの根本原理に基づき、より洗練された複雑なシステム設計やモデル構築を二人で深く掘り下げる。チャットで夜遅くまで議論を交わし、精緻な構造を創り上げる。"}],chemistry:[{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"},{code:"ESFP-O-Br",name:"お祭り総隊長",desc:"職場イベントやカジュアルな場で、INTPはESFPがもたらす多様な人々の感情や反応、場の雰囲気を観察。これにより、理論だけでは見過ごしがちな人間行動のパターンや非言語情報に気づかされる。"}],comfort:[{code:"ESFJ-O-Dp",name:"肝っ玉番長",desc:"現場の技術的な問題解決に集中する彼に対し、番長は利用者目線で具体的なニーズを伝え、成果が「みんなのため」になるよう橋渡しをする。"},{code:"ESFJ-G-Br",name:"調和の達人",desc:"会議でINTPの専門的な発見が難解で周囲が戸惑う際、調和の達人がその意図を分かりやすく翻訳し、チームの理解と協力を促進します。探究の孤立を防ぎ、職場に円滑な空気をもたらします。"}],catalyst:[{code:"ISTP-O-Dp",name:"一刀流の職人",desc:"新しい技術課題に対し、互いに専門知識を深く掘り下げ、実践的な解決策を冷静に議論できる。高度な技術の探求で刺激し合う関係。"},{code:"INTJ-O-Br",name:"軍師",desc:"INTP-O-Brの多角的な知識と軍師の戦略的思考が融合し、複雑な課題に対する包括的なロードマップが描かれます。企業戦略の策定プロジェクトで深い洞察を共有します。"}]},careers:{top:["ホテル支配人","ブランドマネージャー","ウェディングプランナー"],good:["PR・広報","インテリアデザイナー","イベントプロデューサー"],surprise:["外交官","高級レストランのマダム"],avoid:["一人データ分析","工場ライン"]},strengths:["社交力","おもてなし","空間の美的センス","広い人脈"],weaknesses:["一人の地味な作業","厳しいFB","数字評価","孤独"],tips:{do:"このプロジェクト、あなたの社交性とおもてなしの才能を活かして、関係各所との連携をスムーズにしたり、チームメンバーの士気を高めてもらえないかな？ あなたがいるだけで場が華やぐから、ぜひ力を貸してほしいんだけど、どうかな？来月のイベントで、参加者全員が『来てよかった！』と思えるような、記憶に残るおもてなし空間を一緒に作ってほしいんです。あなたの美的センスと、人を惹きつける力で、会場を最高に素敵な場所にしてもらえたら嬉しいな。ぜひ、あなたのアイデアを聞かせてほしいんだけど、どう？新しいメンバーが加わるんだけど、早くチームに馴染んで、最高のパフォーマンスを発揮できるように、あなたの温かいサポートをお願いしたいんだ。あなたがいてくれるだけで、みんなが安心して楽しく働けるようになるから、ぜひお力をお借りしたいんだけど、どうかな？",dont:"この資料、一人で黙々とデータ入力しておいてくれる？ 締め切りは明日中だから、誰にも相談せずに進めてね。特に他の人と連携する必要もないから。この業務、誰がやっても同じだから、特にこだわりなく進めてくれればいいよ。あなたの特別なスキルは必要ないから、マニュアル通りに淡々とこなして。来客があるけど、特に気を使わなくていいから。お茶出しも準備もいらないし、部屋もそのままで大丈夫。あとは適当にやっておいて。"},fullSections:[{title:"👤 この人はこんな人",content:"「みんなが笑顔で、最高の体験をしてくれるのが一番！」\nそんな言葉がぴったりな、場を華やかにし、人を魅了する社交の女王だ。彼女の行動のすべては、周囲の人々が心地よく、そして喜んでくれるためにあると言っても過言ではない。\n\n持ち前の外向性で、どんなコミュニティにも瞬く間に溶け込み、中心的な存在となる。人といることでエネルギーが湧いてくる生粋の社交家。パーティーやイベントの幹事は、だいたいこの人の声かけで始まる。「みんな、次はどんなことで盛り上がりたい？」と、常に周囲の楽しみにアンテナを張っている。\n\n現実的で実践的な視点を持つため、ただ盛り上がるだけでなく、具体的な行動や計画に落とし込むのが得意だ。「どうすればもっと良くなるか」を常に考え、現状をより良いものへと変革していく「攻め」の姿勢を持つ。現状維持では満足せず、積極的に新しい挑戦や改善に取り組む。\n\n弱点は、人の感情に敏感なあまり、批判やネガティブな意見を個人的に受け止めやすいこと。感情の波に乗りやすい側面もあるため、時には冷静さを保つのが難しいと感じることもある。また、細かすぎる抽象的な議論や、感情を抜きにしたドライな論理展開は苦手だ。\n\n興味の幅は広く、多趣味なBrタイプ。最新のトレンドから歴史、アート、料理まで、多様な分野からインスピレーションを得て、それを現実世界の課題解決や、人を楽しませるための企画に活かす。「この前の旅行で見たデザイン、今度のイベント会場の装飾に使えないかな？」と、常に実用的な応用を考えている。\n\n面倒見が良く、誰かが困っていると放っておけないお姉さん気質。チームやグループのハブとなり、メンバー間の人間関係を円滑にするために尽力する。「〇〇さん、最近元気ないみたいだけど、何かあった？」と、率先して声をかけ、サポートに回るだろう。\n\n根底にあるのは、みんなが気持ちよく働ける環境、そして調和と協力の精神だ。具体的な成果を通じて人々の幸福に貢献したいという強い願望が、彼女のすべての行動を突き動かしている。彼女がいるだけで、周囲の空気は明るく、温かいものへと変わっていく。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n目標が明確で、「みんなのため」という大義があれば、躊躇なくすぐさま動き出す。まず頭の中で具体的な計画を立て、関係者に共有。タスクの割り振りも早い。「とりあえずやってみよう」ではなく、「どう進めるか」を最初にしっかり考えるJ型だ。会議で新しいプロジェクトが持ち上がると、その場で「じゃあ、この部分は私が担当します！」と手を挙げることも多い。\n\n【進行フェーズ】\n計画通りに進めることを何よりも重視する。進捗をこまめに確認し、もし遅れが出ているメンバーがいれば、積極的に声をかけ、サポートに回る。チーム全体の動きを把握し、ボトルネックがあればすぐに改善策を講じるのが得意だ。トラブルが起きても感情的にならず、現実的な解決策を冷静に探し、状況をコントロールする。\n\n【完了フェーズ】\nきっちりと物事を終わらせることを重要視する。最後の細部の確認や、次に繋がるドキュメント作成、振り返りまで抜かりなく行う。達成感はチーム全体で分かち合いたいタイプで、「みんなのおかげでここまで来られたね！」と労いと感謝を忘れない。プロジェクトの最終報告会では、達成までのストーリーを熱く語るだろう。\n\n【1日の働き方】\n規則正しいルーティンを好み、計画的に一日をスタートさせる。午前中には重要な打ち合わせや段取りを済ませ、午後は実務やチームメンバーとのコミュニケーションに時間を割くことが多い。夕方以降は翌日の準備や残務処理をてきぱきとこなし、スッキリと一日を終えることを理想とする。突発的な事態にも対応できる柔軟性も持ち合わせているが、基本的なリズムは崩したくないと考えている。"},{title:"🗣️ 会議での振る舞い",content:"会議では、建設的な議論と具体的なアクションプランの策定に関心が高い。参加者の意見をしっかり聞き、それをまとめて次の一歩に繋げる役割を担うことが多い。「〇〇さんの意見、具体的にどう進めましょうか？」と、常に実行フェーズを意識している。\n\n発言は積極的に行うが、場の調和を崩さないよう細心の配慮をする。意見が対立しても、感情的にならず、両者の良い部分をすくい取ってまとめようと努めるだろう。議論が停滞したり、空中戦になったりすると、「じゃあ、ここで一旦整理して、次のステップを決めませんか？」と、現実的な方向へ誘導する。\n\n抽象的な議論や、結論が出ない長時間の会議は苦手。具体的な成果に繋がらないとフラストレーションを感じ、集中力が途切れがちになる。\n\n【ベストな会議の使い方】\n・チームの方向性や目標を確認する定例会議には欠かせない存在\n・プロジェクトの進捗管理や問題解決会議で、具体的なアクションを促進\n・役割分担や具体的なタスクを決める会議では、計画性を発揮\n・チームビルディングや懇親会など、関係性を深める場では最高のムードメーカー"},{title:"💬 チャットでの傾向",content:"メッセージは常に丁寧で礼儀正しい。絵文字やスタンプを適度に使い、感情や親しみを表現することが多い。「お疲れ様です！」「いつもありがとうございます😊」など、労いや感謝の言葉を添えるのが得意だ。\n\n返信は早く、必要な情報共有や進捗報告はこまめに行う。誤解を生まないよう、短く要点をまとめたメッセージを心がける。何か依頼を受けた際には、「承知いたしました！〇〇までに対応します」と、具体的なアクションを伝えることを意識する。\n\n【周囲が知っておくと楽なこと】\n・「〇〇しておきました」など、報告を求めなくても自らこまめに連絡をくれる。安心材料になる。\n・依頼内容は具体的に伝えるのが吉。曖昧な指示は不安にさせてしまう。\n・感謝の言葉や、ねぎらいの言葉を伝えると非常に喜ぶ。モチベーションに直結する。\n・深夜に送られたメッセージでも、緊急性がない限り返信は翌日で大丈夫だと伝えておくと安心する。\n・既読無視や返信がない状態は、相手に何かあったのかと心配になりやすい。"},{title:"👔 上司として／部下として",content:"【上司として】\nメンバーの成長を心から願い、手厚くサポートする面倒見の良いリーダーだ。具体的な目標設定とその達成プロセスを丁寧に指導し、必要に応じて具体的なアドバイスやノウハウを惜しみなく提供する。チームの雰囲気作りを非常に重視し、全員が働きやすい、居心地の良い環境を整えるために尽力する。メンバーが困っていると放っておけず、「何か手伝えることはない？」と積極的に声をかけるだろう。\n\n一方で、マイクロマネジメントではなく、信頼して任せるタイプ。ただし、進捗が滞っていると見ればすぐに介入し、問題解決に乗り出す。チームの調和を乱すような行動には厳しく対処することもある。ISTP型やINTP型のように、指示が抽象的だと動きにくいメンバーには、具体的な手順をしっかり伝える必要がある。\n\n【部下として】\n上司の期待に応えようと、真面目に努力する模範的な部下だ。任された仕事は責任を持って計画的にやり遂げ、報告もこまめに行う。チームや組織への貢献意欲が非常に高く、自分の役割を全うするだけでなく、「何か困っていることはありませんか？」と積極的に周囲のサポートに回る。ルールや手順をきちんと守り、協調性を重んじるため、チームの一員として非常に信頼される。\n\nただし、自分の価値観やチームの調和が無視されるような指示には、内心反発を感じることもある。感情的な配慮のない叱責や、具体的な目標が見えない漠然とした業務には、モチベーションが低下しやすい。具体的なフィードバックと、自分の貢献が明確に見える環境で最高のパフォーマンスを発揮する。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・チームが目標を達成し、みんなで喜びを分かち合うとき\n・自分のサポートや尽力で誰かが助かり、感謝されたとき\n・改善提案が採用され、それが具体的な成果に繋がったとき\n・チームの結束力が高まるイベントを企画・実行し、成功したとき\n・自分の働きが正当に評価され、承認の言葉をもらったとき\n・新しいプロジェクトで、自分の具体的な役割が明確になったとき\n・場を整えることで、みんなが笑顔で働けるようになったと実感するとき\n\n【📉 下がる瞬間】\n・チーム内の人間関係が悪化し、ギスギスした雰囲気が続くとき\n・自分の努力や貢献が誰にも認められないと感じるとき\n・曖昧な目標や非現実的な計画を押し付けられたとき\n・規則や秩序が守られない、混沌とした状況に置かれたとき\n・努力が報われず、感謝や承認の言葉が一切ないとき\n・個人的な感情や人間関係が無視される、ドライな環境にいるとき\n・具体的な成果が見えない抽象的な議論に終始するとき"},{title:"📝 フィードバック",content:"【受けるとき】\n基本的に感情で受け取るタイプのため、ネガティブなフィードバックは最初は感情的に落ち込むこともある。しかし、相手が「自分のことを思って言ってくれている」という前提が見えれば、真摯に耳を傾け、改善点があれば素直に受け入れてすぐに実践しようとするだろう。人格否定のような言葉や、感情的な批判には深く傷ついてしまうため注意が必要だ。まずはポジティブな面を伝え、「ここをこうするともっと良くなる」といった具体的な提案の仕方が最も効果的だ。\n\n【伝えるとき】\n相手の感情に配慮し、非常に言葉を選んで伝える。ポジティブな面や日頃の感謝を最初に伝え、改善点については具体的に、かつソフトな表現で伝えることを心がける。相手の成長を心から願う気持ちが強いからこそ、フィードバックは避けて通れないと理解している。ただし、「嫌われたくない」という気持ちから、厳しいことを言うのは苦手で、遠回しな表現になることもある。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・イベント企画・運営: 人を巻き込み、場を盛り上げ、最高の体験を提供する\n・チームビルディング: メンバー間の関係性を円滑にし、結束力を高める\n・顧客対応・おもてなし: 相手のニーズを察し、細やかな気配りで信頼を築く\n・職場環境整備・効率化: 働きやすい具体的な仕組みやルールを整える\n・プロジェクトの進捗管理: 全体の流れを把握し、遅滞なく目標達成に導く\n・新規ルールの策定・浸透: 新しい基準を設け、みんなにその意義を伝え広める\n・プレゼンテーション: 説得力のある話し方で共感を生み、人を動かす\n・関係者との調整業務: 様々な立場の人と交渉し、合意形成を図る\n\n【😰 苦手】\n・抽象的なデータ分析・理論構築: 具体的な活用イメージが湧きにくく、退屈に感じる\n・長期間の単独研究開発: 人との繋がりがないとモチベーションが続かない\n・黙々としたプログラミングやバグ修正: チームとの交流が少ないと精神的に辛い\n・曖昧な意思決定・結論が出ない議論: 計画的に物事を進めたいので落ち着かない\n・感情や人間関係が考慮されない論理的思考のみの議論: 納得しにくい\n・クレーム処理の初動対応: 感情的な板挟みになりやすく、精神的負担が大きい\n・複雑で細かい契約書のレビュー: 数字や細部に没頭するのが苦手"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「〇〇さんの力が必要です、助けてください！」→必要とされていると感じるとモチベーションが燃え上がる。\n・「みんながもっと働きやすくなるために、アイデアが欲しいんだけど…」→チームへの貢献意識を刺激され、積極的に関わろうとする。\n・「この目標を達成するために、具体的な計画を一緒に立ててくれませんか？」→J型なので、計画段階から巻き込まれると責任感を発揮する。\n・「〇〇さんの得意分野ですよね！ぜひお願いしたいです」→承認と信頼を感じ、期待に応えようと全力で取り組む。\n・「期限は〇〇日まで、もし困ったらすぐに相談してくださいね」→明確な指示とサポートがあると安心して業務に取り組める。\n・「この取り組みが、最終的に誰を笑顔にするのか教えてください」→目的意識が明確だと、より一層頑張れる。\n\n【❌ パフォーマンスが落ちる】\n・「あとは適当にやっといて」→適当は苦手。具体的な指示がないと不安になり、行動できない。\n・「一人で黙々と作業を進めておいて」→人との繋がりが断たれると孤立感を感じ、モチベーションが続かない。\n・「なぜそうなるのか、ロジカルに説明して」→感情的な側面が無視されると反発を感じる可能性。\n・理由を説明せずに「ルールだから何も考えずに従え」→納得感がないと行動に移しにくい。意義を求める。\n・「君の意見は関係ない」→貢献意欲が削がれ、チームへのエンゲージメントが低下する。\n\n【💡 コツ】\n1. 最初に「この仕事がチームや顧客、そして社会にどう貢献するのか」という目的（Why）を明確に共有する。\n2. 計画段階から積極的に巻き込み、具体的な役割と目標、そして期待値を明確に伝える。\n3. 進捗をこまめに確認し、「何か困っていることはないか」と寄り添い、適宜サポートを提供する。\n4. 努力や貢献を具体的に褒め、感謝の言葉を惜しまない。承認欲求が満たされると最高のパフォーマンスを発揮する。\n5. チームで協力する体制を整え、孤立させない。定期的なコミュニケーションの機会を設ける。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・イベントプランナー: 人々を喜ばせ、場を活性化させる才能を存分に発揮。企画力、実行力、人間関係構築力すべてが活きる。\n・ホテル支配人/コンシェルジュ: 最高の顧客体験を提供し、施設全体の運営を円滑に回す。おもてなしの心と計画性が融合する。\n・組織開発/人事担当: 働きやすい環境を作り、社員のモチベーションを向上させる。人と組織の成長を支援することに喜びを感じる。\n\n【⭐ かなり合う】\n・広報/PR: 会社の顔として魅力を伝え、社内外の関係者を巻き込む。コミュニケーション能力と情報発信力が活きる。\n・チームリーダー/プロジェクトマネージャー: メンバーを鼓舞し、具体的な目標達成に導く。計画性と対人スキルが光る。\n・カスタマーサクセス: 顧客に寄り添い、長期的な関係を築くことで顧客の成功を支援。共感力と問題解決能力が活きる。\n\n【💡 意外とハマる】\n・地域活性化コーディネーター: 地域の人々を巻き込み、具体的なプロジェクトを推進。多様な興味と行動力が活きる。\n・小売店舗マネージャー: 顧客体験の向上と、店舗運営の効率化を両立。現場の雰囲気作りと実務管理が得意。\n\n【⚠️ 避けた方がいい】\n・高度な専門性を要する研究職: 単独での黙々とした作業が多く、人との繋がりが希薄になりがち。\n・論理的な分析に特化した財務アナリスト: 感情的な側面が考慮されにくく、数字と論理のみの世界は居心地が悪い。\n・プログラマー/SE: 長時間パソコンと向き合う作業が多く、対人交流の機会が少ないと精神的に辛い。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nISTJ-G-Dp「金庫番」 — 総支配人の社交性と、金庫番の地に足の着いた実務処理能力は最高の組み合わせ。総支配人が広げたアイデアやネットワークを、金庫番が着実に形にして維持してくれる。お互いの弱点を完璧にカバーし合える関係だ。\nINTJ-G-Dp「戦略家」 — 総支配人の行動力と現実的な視点に、戦略家の深い洞察力と長期計画が加わる。新しい挑戦を具体的な成功に導くための、盤石な基盤を築けるコンビだ。\n\n【🔥 化学反応が起きるコンビ】\nENFJ-O-Br「コミュニティリーダー」 — 共に人を中心に考え、コミュニティを盛り上げることに情熱を燃やす。O-Br同士で新しい挑戦や多角的なアイデアが次々と生まれ、大きなムーブメントを起こせるだろう。\nESTJ-O-Dp「経営者」 — 総支配人の「人」を重視する視点と、経営者の揺るぎない目標達成意識が融合する。現実的な成果を出しつつ、チームの満足度も高める理想的なパートナーだ。\n\n【☀️ 居心地がいい仲間】\nISFJ-G-Dp「縁の下の力持ち」 — 総支配人の活発さやリーダーシップを、縁の下の力持ちが献身的に支える。お互いの価値観が近く、安心して協力し合える居心地の良い関係だ。\nESFJ-G-Dp「おもてなし職人」 — 共にS-F-Jの価値観を持つため、互いの行動原理を深く理解し合える。OとGの違いが、お互いの視野を広げる良い刺激となるだろう。\n\n【⚡ 未知の触発者】\nINTP-O-Br「探求者」 — 総支配人の現実的な視点に、探求者の斬新で理論的なアイデアが刺激を与える。普段出会わない思考パターンが、新しい発見をもたらしてくれる関係だ。\nENTP-O-Br「アイデアマン」 — アイデアマンの無限の可能性と、総支配人の実行力が交錯する。実現可能性を巡る議論が白熱するが、それが互いの成長に繋がる触媒となるだろう。"},{title:"🌈 プライベートの顔",content:"休日の予定は常にぎっしり詰まっている。「来週末は友達とグランピングに行って、その翌日は新しいフラワーアレンジメント教室！」と、常に何か新しい刺激を求めている多趣味なBrタイプだ。\n\n周囲の人を楽しませることが大好きで、自宅でホームパーティーを頻繁に開催する。料理の腕も一流で、「みんなが喜ぶ顔が見たいから」と、手間暇惜しまず準備に時間をかける。空間の美しさにもこだわり、テーブルセッティングからBGMまで完璧に演出するだろう。\n\n「最近オープンしたあのカフェ、一緒に行かない？」「今話題の映画、もう見た？」と、流行に敏感で常にアンテナを張っている。友人を誘い出すのも得意で、週末にはいつも誰かと会っているイメージだ。\n\n友人との旅行計画は、だいたいこの人が立てる。「みんなが楽しめるように」と、宿泊先から観光スポット、食事まで細部まで気を配り、完璧な旅程を組む。もし何かトラブルが起きても、冷静に状況を判断し、代替案をすぐに提案できる頼れる存在だ。\n\n家族や友人の誕生日、記念日は絶対に忘れない。事前に念入りに準備し、心を込めたプレゼントやサプライズを仕掛けるのが得意。「〇〇がこんなことしてくれたの！」と、みんなを感動させるのが至福の瞬間だ。\n\nお金の使い方は、人との交流や体験、そして「美」に関わるものに惜しまない。「この服、みんなで食事に行く時に着ていったら喜んでくれるかな？」と、自分のためだけでなく、周囲の反応も考えて買い物をすることが多い。"}]},
"ESFJ-O-Dp":{name:"肝っ玉番長",character:"レイア姫（スター・ウォーズ）",great:"エリザベス女王二世",color:"#CD6155",summary:"「この人たちを絶対に守る」覚悟の人。一つのコミュニティに深くコミットし深い愛情を注ぐ。威厳と温かさを併せ持つ。",compatibility:{complement:[{code:"INTP-G-Br",name:"教育者",desc:"技術検討会議では、ENTP-G-Brが多様な事例を提示し、INTP-G-Brがその法則性や理論的背景を深く掘り下げることで、新たな知見が次々と生まれる最高の知的対話が実現する。"},{code:"INTJ-O-Dp",name:"ラスボス",desc:"難解な技術課題についてチャットで議論する際、ラスボスとINTPは互いの鋭い洞察をぶつけ合い、緻密な論理で構築された全く新しい解決策を生み出します。妥協なき知的探求が、組織に革新的な戦略をもたらすでしょう。"}],chemistry:[{code:"ENTJ-O-Dp",name:"将軍",desc:"将軍が組織全体の戦略を構築し、癒し職人が提供する質の高いケアをより多くの人に届ける仕組みを作ります。プロジェクト計画において、癒し職人の専門性を最大限に活かす場を整えます。"},{code:"ENFJ-O-Dp",name:"恩師",desc:"チームビルディングの場で、ENFJ-O-Dpが掲げる明確なビジョンや使命感が、ENTP-G-Brの膨大な知識に具体的な方向性と目的を与える。知識が単なる情報ではなく、人や組織を動かす力として触発される。"}],comfort:[{code:"ESFJ-O-Br",name:"総支配人",desc:"INTPの深遠な理論を社内外に適切に伝え、関係部署との調整や情報共有を円滑に進める。会議での発表資料作成や対外折衝で、その理論の価値を理解者に届ける手助けとなる。"},{code:"ESFJ-G-Dp",name:"ベテラン寮長",desc:"新入社員の歓迎会を企画する際、ESFJが全体をまとめ、ISFJが細かい準備や配慮を担うことで、参加者全員が心から楽しめる温かい場を作り上げ、ケアの心が一致します。"}],catalyst:[{code:"ENTP-O-Br",name:"アイデアマン",desc:"新規事業の企画会議では、ENTP-G-Brが知識の引き出しから多様な情報を提示し、ENTP-O-Brがそれに触発されて次々と新しいアイデアを繰り出す。知識と発想が高速で応酬し、無限の可能性が広がる。"},{code:"ESTP-O-Br",name:"トラブルシューター",desc:"予期せぬトラブル発生時、互いの冷静な状況分析力と卓越した現場対応力で、即座に問題の根源を特定し、迅速かつ的確に解決へ導く最強のタッグ。"}]},careers:{top:["病院長","自治体首長","慈善団体トップ"],good:["看護部長","学校長","大使"],surprise:["映画プロデューサー","ワイナリーオーナー"],avoid:["人と無関係な研究","短期転売"]},strengths:["深い愛情と責任感","威厳あるリーダーシップ","守るための勇気","一人ひとりへのケア"],weaknesses:["自分のケア後回し","客観的距離","切る判断","視野の狭さ"],tips:{do:"このプロジェクトが成功すれば、チームのみんながもっと働きやすくなるはずなんだ。ぜひ、みんなを守るためにあなたの力を貸してくれないかな？新しい制度を導入するにあたって、メンバーが安心して働けるように、あなたの視点で最適な方法を一緒に考えてくれないか？みんなの未来のために、ぜひ力を借りたい。今、部署全体で少し士気が下がっているように見えるんだ。みんなが前向きに仕事に取り組めるように、あなたの温かい声かけでリードしてくれないかな？あなたの存在がみんなの支えになると思う。",dont:"この人員削減はビジネス上の合理的な判断だから、個人的な感情は抜きにして進めてほしいんだ。ドライに、客観的な数値だけで判断してくれないか？チームメンバーの意見は一旦置いておいて、トップダウンでこの方針をすぐに実行に移してほしい。感情的な議論は不要だから。あのメンバーはもう見込みがないから、冷徹に切り捨てて、他の優秀なメンバーにリソースを集中させよう。情けをかける必要はない。"},fullSections:[{title:"👤 この人はこんな人",content:"「この人たちを絶対に守る」。その覚悟が、この人の行動原理の全てだ。与えられた役割や所属するコミュニティへの責任感が尋常ではなく、まるで大家族の母親のように、威厳と温かさを兼ね備えながら皆を導く。\n\n人といるとエネルギーが湧いてくる外向型でありながら、その活動は特定のコミュニティや組織に深くコミットする一点深堀（Dp）型。興味の対象が散漫になることはなく、「私のチームをより良くするにはどうすればいいか」「このプロジェクトを成功させるためには何が必要か」と、常に現実的で実践的な視点で物事を捉えている。感覚（S）タイプならではの具体性と、判断（J）タイプならではの計画性で、どんな状況でもチームを前向きな方向に動かそうとする。\n\n「もっとやれるはず」「もっと良くなるはず」という攻め（O）の姿勢で、現状維持には満足しない。問題が見つかれば「私がなんとかする！」と先陣を切って改善に乗り出す。周囲の人々は、その強いリーダーシップと面倒見の良さから、自然とこの人に信頼を寄せることになるだろう。\n\n人の気持ちに敏感な感情（F）タイプのため、チームの雰囲気やメンバーのモチベーションの変化を真っ先に察知する。困っている人がいれば、「大丈夫？何かあったら言ってね」と声をかけ、具体的なサポートを惜しまない。時には厳しく指導することもあるが、それも全て「この人たちの成長のため」「このチームのため」という深い愛情からくるものだ。\n\n弱点としては、自分の意見や感情を後回しにし、周囲の期待に応えようとしすぎることがある点。また、一度決めたことや信じたコミュニティへの忠誠心が強すぎるあまり、客観的な視点を見失い、頑固になってしまうこともある。自分が抱え込みすぎてしまい、疲弊してしまう可能性も。\n\n「チームのため」「みんなのため」という言葉を最も大切にする。その行動は、常に誰かの、何かの役に立つことを目指している。まさに「肝っ玉番長」の異名にふさわしい、頼りがいと情熱に満ちたリーダーだ。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\nまず具体的な計画を立てることから始める。目標達成のために必要な手順、スケジュール、責任者を明確にし、必要なリソースを洗い出す。プロジェクトの全体像を把握し、メンバー一人ひとりの役割を振り分ける。タスクの割り振りは、それぞれの得意分野や成長に繋がるかを考慮した上で行うため、メンバーは納得感を持って業務に着手できる。最初に「このプロジェクトで何を目指すのか」「なぜ今これに取り組むのか」を明確に共有し、チームの士気を高める。\n\n【進行フェーズ】\n計画に沿って着実にプロジェクトを推進する。定期的な進捗確認を重視し、遅れが生じていないか、メンバーが困っていないかを細かくチェックする。問題が発生した際には、感情的にならず、具体的な状況を把握した上で、現実的な解決策を提示する。必要であれば、自ら率先して現場に飛び込み、問題解決に加わる。「私が何とかするから大丈夫！」と、チーム全体を鼓舞しながら、目標達成に向けて粘り強くリードしていく。他者との調整や交渉も得意で、プロジェクトに必要な支援を外部から引き出すこともできる。\n\n【完了フェーズ】\n細部の詰めまで決して妥協しない完璧主義者。最終的な成果物の品質はもちろんのこと、関係者への報告、ドキュメントの整備、プロジェクトの振り返りまで抜かりなく行う。完了時には、チームメンバー一人ひとりの貢献を具体的に称賛し、労をねぎらうことを忘れない。「みんな、よくやったね！」と、達成感を共に味わうことで、次のプロジェクトへの意欲も高めていく。最後まで責任を持って見届ける姿勢は、周囲に安心感を与える。\n\n【1日の働き方】\nルーティンを重視し、計画通りに物事を進めることを好む。朝は早めに活動を開始し、メールチェックやタスクの優先順位付けなど、午前中に集中して作業を進める。午後にはチームメンバーとの個別面談や会議、連携業務に時間を割くことが多い。夕方にはその日の進捗を整理し、翌日の計画を立てるなど、常に効率を意識して働く。計画外の突発的な業務には柔軟に対応するが、基本的には安定したリズムで業務に取り組むことを好む。"},{title:"🗣️ 会議での振る舞い",content:"会議では、その場を仕切り、議論を建設的な方向に導く役割を果たすことが多い。「今日の議題はこれ。ここで何を決めるか、皆で集中して話し合おう」と、最初に会議の目的とゴールを明確に提示する。メンバーからの意見は注意深く聞き、事実に基づいた発言を促す。感情的な対立が起きそうな場面では、調和を保ちつつも、必要な意見ははっきりと伝える。時には「一旦落ち着いて、現実的な視点で考えてみよう」と諭すこともある。\n\n決定事項やタスクの割り振りは明確にし、誰が何をいつまでにやるのか、曖昧さを残さない。議事録の作成や確認も率先して行い、認識の齟齬が起きないように配慮する。無駄な議論や目的のない長時間の会議には不満を感じやすく、時間厳守や効率的な進行を求める。ブレストのような発散的な会議よりも、具体的な課題解決や意思決定を目的とした会議で本領を発揮するタイプだ。"},{title:"💬 チャットでの傾向",content:"チャットは業務連絡ツールとして効率的に活用するタイプだ。メッセージは具体的で分かりやすく、回りくどい表現は避ける。指示や質問には、期日や具体的な内容を明確に含めることを心がける。「〇月〇日〇時までに、△△について意見をお願いします」のように、シンプルかつ的確なメッセージを送る。\n\n絵文字は、相手への配慮や感謝の気持ちを伝えるために適度に使うが、業務を阻害するほど多用することはない。返信は早く、依頼への対応も迅速。既読無視や返信漏れはほとんどない。グループチャットでは、困っているメンバーへのサポートや、重要な情報共有を積極的に行う。時として「みんな、この情報見落としてない？」と、お節介とも取れるようなおせっかいを焼くこともある。\n\n【周囲が知っておくと楽なこと】\n・重要な依頼は、具体的な期日と内容を明確に伝えること。曖昧な表現はNG。\n・事実に基づいた情報共有を心がけること。憶測や感情的な話は避ける。\n・返信が遅れることは稀なので、基本的にすぐに対応すると考えてOK。\n・「困っていることがあればいつでも声をかけて」というメッセージは本気なので、頼ってOK。\n・業務外の雑談はそこまで得意ではない。効率的なコミュニケーションを好む。"},{title:"👔 上司として／部下として",content:"【上司として】\nチームの和と成果を最も重視するリーダーだ。メンバー一人ひとりの成長を親身にサポートし、困っている人がいれば率先して手を差し伸べる。目標設定や進捗管理は明確で、具体的な指示を出すことを得意とする。「このチームを強くする」「このプロジェクトを必ず成功させる」という強いコミットメントを持ち、そのためには自らも先陣を切って動くことを厭わない。メンバーに対しては、愛情深くも時には厳しく、規律を重んじる姿勢を見せる。チームの士気を高めるためのイベント企画なども率先して行うだろう。\n\nただし、過保護になりすぎたり、自分のやり方を押し付けすぎたりする可能性もある。また、メンバーの自律性を尊重するよりも、手厚くサポートしようとしすぎる傾向も。自分が抱え込みすぎてしまい、チームに頼るのが苦手な面もあるかもしれない。感情的になりやすい一面もあるため、冷静な判断を促すサブリーダーがいるとチームが安定する。\n\n【部下として】\n責任感が強く、与えられたタスクは最後まで完璧にこなす。チームへの貢献意欲が非常に高く、周囲のサポートも惜しまない。具体的な指示や明確な目標があると、モチベーション高く、かつ計画的に取り組むことができる。上司を信頼し、期待に応えようと努力する、非常に頼りになる存在だ。報連相もこまめに行い、周囲に不安を与えない。\n\n一方で、非論理的な指示や、チームの調和を乱すような状況には不満を感じやすい。また、自分の意見を主張するよりも、周囲の意見を優先し、チームの和を保とうとすることがある。そのため、不満を抱えていても表に出さず、一人で抱え込んでしまうこともあるため、上司は積極的に声をかける必要がある。過度な競争を煽られる環境や、チームワークを軽視する上司とは相性が悪い。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・自分の貢献でチームやコミュニティが目に見えて良くなったとき\n・「〇〇さんがいてくれて本当に助かった」と具体的に感謝されたとき\n・具体的な課題を解決し、実用的な成果が出たとき\n・立てた計画通りに物事がスムーズに進んだとき\n・チームメンバーが自分の言葉やサポートで成長しているのを感じたとき\n・重要な役割やプロジェクトリーダーを任され、期待に応えようとするとき\n・チームや組織の目標達成に貢献している実感が得られたとき\n\n【📉 下がる瞬間】\n・チーム内の不和や感情的な対立が解決しないとき\n・自分の努力や献身が正当に評価されない、または軽視されるとき\n・曖昧な指示ばかりで、具体的な目標や進め方が見えないとき\n・非効率的なプロセスや無駄な作業が改善されず、時間ばかりが過ぎるとき\n・所属するコミュニティや組織に対する責任を果たせないと感じたとき\n・孤立して一人で作業することになり、チームへの貢献が感じられないとき\n・チームの調和が乱れたり、信頼関係が崩れたりしたとき"},{title:"📝 フィードバック",content:"【受けるとき】\n建設的なフィードバックは非常に素直に受け止める。特にチームや自身の成長に繋がるものであれば、真摯に耳を傾け、改善しようと努力する。感情的な批判や根拠のない指摘、あるいは個人的な攻撃には深く傷つくこともあるが、責任感から正面から向き合おうとする。フィードバックの際には、「〇〇さんの努力は素晴らしい。一方で、ここをこうすればもっと良くなると思う」のように、ポジティブな側面を先に伝え、具体的な改善点を示すと効果的だ。\n\n【伝えるとき】\n相手の感情に最大限配慮しつつも、チームのため、個人の成長のために必要なことははっきりと伝える。まずは相手の良い点や努力を具体的に認め、「いつもありがとう」と感謝の気持ちを伝えることから始める。その上で、改善点については感情的にならず、具体的な根拠や期待を添えて伝える。「〇〇さんがもっと活躍するために、こういう視点も必要だと思う」と、相手の未来を思って伝える姿勢を見せる。厳しいフィードバックの後には、必ずフォローアップを行い、相手が孤立しないように配慮する。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・チーム内の調整・マネジメント：メンバーの状況を把握し、最適な配置やサポートでチームを機能させる。\n・プロジェクトの計画立案：具体的な手順、スケジュール、役割分担を明確にし、実行可能な計画を作る。\n・顧客対応・関係構築：相手のニーズを的確に捉え、信頼関係を築き、長期的な関係を維持する。\n・マニュアル・手順書の作成：実践的で分かりやすいドキュメントを作成し、組織の知識を蓄積する。\n・トラブルシューティング：現実的な視点で問題を特定し、具体的な解決策を実行する。\n・チームイベントの企画・運営：メンバーの士気を高める企画を実務的に遂行し、チームの一体感を醸成する。\n・品質管理・最終チェック：細部まで抜かりなく品質を保証し、完璧な成果物を目指す。\n\n【😰 苦手】\n・抽象的なコンセプトの検討：具体性のない漠然とした議論や、絵空事のようなアイデア出しは苦手。\n・単独でのアイデア出し：他者との対話や意見交換の中でアイデアを具体化したい。\n・突発的な方向転換への対応：計画が大きく変更されると、ストレスを感じ、対応に時間を要する。\n・変化の激しい環境への適応：安定した、予測可能な環境で力を発揮するため、変化は苦手。\n・個人競争が激しい環境：チームワークや協調性を重視するため、競争ばかりの環境は疲弊する。\n・ルーティンではない細かい調査：漠然とした調査や、終わりが見えない深掘り作業は苦手。\n・自分の意見を主張し続けること：調和を重んじるため、時に我慢してしまいがち。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「このプロジェクト、〇〇さんの力が絶対に必要なんです！」「このチームをより強くするために、ぜひ力を貸してほしい」→頼られると喜んで引き受け、責任感を持って取り組む。\n・「〇〇さんの意見が聞きたいです。どうすればもっと良くなるでしょうか？」→意見を求められると真剣に考え、具体的な改善策を提案しようとする。\n・具体的な目標と期日を明確に伝えること。曖昧な指示ではなく「〇月〇日までに、△△を完了してください」と明確に伝える。→計画性があるため、明確な指示で動きやすい。\n・「もし困ったことがあれば、いつでも声をかけてくださいね。一人で抱え込まないで」→孤立させない安心感と、サポートの意思を伝えることで、より力を発揮できる。\n・「〇〇さんの〇〇なところが素晴らしいから、この役割をお願いしたい」と、具体的に強みを評価しながら依頼する。\n\n【❌ パフォーマンスが落ちる】\n・「とりあえずアイデアを出してみて」→漠然とした依頼や、目的が不明確なタスクは苦手。具体的な指示がないと何をすればいいか迷ってしまう。\n・「一人でなんとかして」→チームワークを好むため、孤立させるとモチベーションが下がり、パフォーマンスが落ちる。\n・「計画は立てなくていいから、まずやってみて」→無計画な行動は不安を感じ、生産性が落ちる。\n・「もっと柔軟に対応して。臨機応変に」→明確な基準やルールがないと混乱し、自分の軸を見失いがち。\n・理由を説明せずに「とにかくやって」と指示する。→納得できない指示には反発するか、不満を抱えながら実行する。\n\n【💡 コツ】\n1. 最初に「Why（なぜこの仕事をするのか）」と「What（何を達成したいのか）」を明確に共有する。\n2. チームへの貢献という視点で依頼し、具体的な役割と責任範囲を明確に伝える。\n3. 具体的な計画立案の機会を与え、その計画に沿って進めることを認める。\n4. 定期的な進捗共有の場を設け、困っていることがないか確認する。\n5. 感謝の気持ちと、チームにおける貢献度を具体的に、こまめに伝える。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・コミュニティマネージャー：特定のコミュニティを育成し、メンバー間の結束を強める。彼らの成長と幸福に直接貢献できる。\n・プロジェクトマネージャー：プロジェクト全体を計画し、チームを率いて目標達成に導く。実務と人間関係の両面でリーダーシップを発揮できる。\n・人事・組織開発：従業員の育成や組織風土の改善を通じて、企業文化を強化する。人々の成長と組織の発展に貢献するやりがいを感じる。\n\n【⭐ かなり合う】\n・カスタマーサクセス：顧客との長期的な関係を築き、顧客の成功を支援する。顧客の課題解決に具体的に貢献できる。\n・サービスオペレーションマネージャー：サービスの品質維持と改善を実務的に推進する。安定した高品質なサービスを提供することに喜びを感じる。\n・学校の先生・教育者：生徒一人ひとりに寄り添い、成長をサポートする。教育を通じて、未来を担う人材を育てることに情熱を燃やす。\n\n【💡 意外とハマる】\n・イベントプランナー：計画性と実行力で大規模イベントを成功させる。人々が集い、喜ぶ場を作り出すことに達成感を感じる。\n・チームビルディングコンサルタント：組織内の人間関係と生産性を改善する。具体的なソリューションを提供し、チームを活性化させる。\n\n【⚠️ 避けた方がいい】\n・戦略コンサルタント（抽象的な戦略立案中心）：具体性や実行フェーズが少ない、抽象的な戦略立案が主体の仕事。実践的な貢献が見えにくい。\n・データサイエンティスト（孤独な分析が主）：人との交流が少なく、黙々とデータ分析を行う作業。チームへの貢献実感が薄い。\n・新規R&D（長期的な基礎研究）：実用化までの道のりが長く、不確実性の高い基礎研究。具体的な成果や人への影響が見えにくい。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nINTP-G-Dp「知の探求者」：論理的思考で冷静に物事を分析するINTPが、感情的になりがちな肝っ玉番長の視野を広げ、客観的な視点をもたらす。肝っ玉番長はINTPの実用化をサポートし、その知識を現実世界に落とし込む手助けをする。\nISTP-G-Dp「孤高の職人」：実践的なスキルと問題解決能力に長けたISTPが、肝っ玉番長の計画を実行に移す強力なサポートとなる。冷静沈着さが肝っ玉番長の感情的な側面を補完し、お互いにプロフェッショナルとして信頼し合える関係を築く。\n\n【🔥 化学反応が起きるコンビ】\nENTJ-O-Dp「将軍」：どちらもリーダーシップがあり、目標達成に向けて強力な推進力を生み出す。肝っ玉番長の人間味とENTJの戦略性が合わさることで、強固な組織を築き、大きな目標を達成できる。互いに刺激し合い、高め合える関係だ。\nESTJ-O-Dp「剛腕隊長」：現実的で実務的なアプローチが共通しており、共に計画を立て、実行に移す点で強力なコンビネーションを発揮する。互いの責任感と行動力で困難を乗り越え、目覚ましい成果を出すことができる。\n\n【☀️ 居心地がいい仲間】\nESFJ-G-Dp「世話焼きママ」：同じESFJ基盤で、コミュニティへの愛情や世話焼きな一面を互いに理解し合える。自然体でいられ、お互いをサポートし合いながら、穏やかで安心できる関係を築くことができる。\nISFJ-G-Dp「控えめな支え手」：ISFJの献身的なサポートと実務能力が、肝っ玉番長のリーダーシップを温かく支える。お互いを尊重し、言葉を多く交わさずとも分かり合える、居心地のいい関係だ。\n\n【⚡ 未知の触発者】\nINFP-O-Br「夢追い人」：感情的で理想主義的なINFPの視点が、肝っ玉番長に新しい価値観や共感の深さをもたらす。異なる発想に触れることで、コミュニティの可能性を広げるヒントを得られる。\nENFP-O-Br「着火マン」：奔放なアイデアと人脈の広さを持つ着火マンが、肝っ玉番長の固定観念を揺さぶり、新たな視点や可能性を示してくれる。その自由な発想は、時に肝っ玉番長の計画性にはない斬新さをもたらすだろう。"},{title:"🌈 プライベートの顔",content:"休日は家族や親しい友人との時間を何よりも大切にする。週末の予定は事前にしっかりと立てており、家族旅行や友人との食事会、地域のボランティア活動などで忙しく過ごす。Googleカレンダーは色々な予定で埋まっていることが多いだろう。\n\n自宅はいつもきれいに片付いており、季節の飾り付けが施されていることもある。「誰かがいつ来ても大丈夫なように」と、常に快適な空間を保つことを心がけている。料理やおもてなしをすることが大好きで、ホームパーティーでは率先して腕を振るい、皆が喜ぶ顔を見るのが最高の喜びだ。\n\n趣味は一点深掘り（Dp）型らしく、例えばガーデニングなら土壌改良から植物の選び方、育て方まで徹底的に研究し、まるで専門家のように詳しい。特定のスポーツクラブの活動や、手工芸（陶芸、キルトなど）に打ち込み、コミュニティの中心メンバーとして活躍することも多いだろう。その道のエキスパートになるべく、関連書籍を読み漁ったり、講座に参加したりと、一切の妥協を許さない。\n\n旅行に行く際も、事前のリサーチと計画は抜かりない。「せっかく行くなら最高の体験を」と、宿泊先から食事、観光ルートまで完璧にプランニングする。そして、旅行先では地元の人との交流を楽しみ、その土地の文化や歴史に深く触れようとする。\n\nまるで、所属するコミュニティ全てを「自分の庭」のように大切にし、愛情を注ぎ、より良い場所にしようと日々奮闘している。その行動の全てが、周囲の人々への深い愛情と責任感から来ていることを、周りの人々は知っている。"}]},
"ESFJ-G-Br":{name:"調和の達人",character:"サクラ（NARUTO）",great:"黒柳徹子",color:"#F1948A",summary:"「みんなが笑顔でいられる場を守りたい」。チームの調和を保つ天才。誰一人取りこぼさない。",compatibility:{complement:[{code:"INTP-O-Dp",name:"研究者",desc:"INTP-G-Dpの探究する原理に対し、INTP-O-Dpはデータの深堀りや細部の検証で貢献。互いの専門性を尊重し、高度な専門知識が必要な議論で深い共感を覚える。"},{code:"INTJ-O-Br",name:"軍師",desc:"INTP-O-Brの多角的な知識と軍師の戦略的思考が融合し、複雑な課題に対する包括的なロードマップが描かれます。企業戦略の策定プロジェクトで深い洞察を共有します。"}],chemistry:[{code:"ENFJ-G-Br",name:"守護霊",desc:"プロジェクトの技術課題解決時、修理屋の的確な技術力に、守護霊がチームの士気を高める温かいフォローを加える。技術と人の調和で円滑な進行を助けます。"},{code:"ENFP-G-Br",name:"ムードメーカー",desc:"プロジェクトで黙々と作業する任務遂行者に対し、ムードメーカーが休憩中に明るい話題を提供し、チームの雰囲気を和ませる。業務の効率とメンバーのモチベーション維持に貢献する。"}],comfort:[{code:"ESFJ-O-Br",name:"総支配人",desc:"INTPの深遠な理論を社内外に適切に伝え、関係部署との調整や情報共有を円滑に進める。会議での発表資料作成や対外折衝で、その理論の価値を理解者に届ける手助けとなる。"},{code:"ESFJ-G-Dp",name:"ベテラン寮長",desc:"新入社員の歓迎会を企画する際、ESFJが全体をまとめ、ISFJが細かい準備や配慮を担うことで、参加者全員が心から楽しめる温かい場を作り上げ、ケアの心が一致します。"}],catalyst:[{code:"ENTJ-O-Dp",name:"将軍",desc:"将軍が組織全体の戦略を構築し、癒し職人が提供する質の高いケアをより多くの人に届ける仕組みを作ります。プロジェクト計画において、癒し職人の専門性を最大限に活かす場を整えます。"},{code:"ESTP-O-Dp",name:"エース",desc:"エースの迅速な行動力と実行力が、癒し職人が温めていたアイデアを現実の形にするきっかけを与えます。新しい施術メニューの導入テストでは、エースの行動力が実験を加速させます。"}]},careers:{top:["カスタマーサポート責任者","養護教諭","コミュニティマネージャー"],good:["人事（福利厚生）","医療ソーシャルワーカー","図書館司書"],surprise:["結婚相談所アドバイザー","地域FMパーソナリティ"],avoid:["厳格な監査","一人の長時間プログラミング"]},strengths:["調和維持","幅広い気配り","心理的安全性","包容力"],weaknesses:["自分の意見主張","厳しい判断","対立の直接解決","大きなリスク"],tips:{do:"「今度の会議で少し意見が割れそうなテーマがあるんだけど、あなたが調整役として参加してくれたら心強いな。みんなが納得できる形でスムーズに進めたいから、ぜひ力を貸してくれない？」と、チーム全体の調和への貢献を明確に伝えて協力を求めましょう。「新しく入ったメンバーが少し孤立しているように見えるんだ。彼らがチームに馴染んで、安心して意見を言えるような雰囲気作りを、ぜひあなたにお願いできないかな？みんなが笑顔で働ける場にしたいんだ。」と、具体的な困り事を共有し、チームメンバーへの配慮を期待する形で頼むと良いでしょう。「この資料、細部の確認をお願いしたいんだけど、あなたがチェックしてくれたら、みんなが安心して使える完璧なものができると思うんだ。いつも細やかな気配りをしてくれてありがとう。」と、具体的な業務と、その仕事がチームに与える良い影響、そして日頃の感謝を添えて依頼しましょう。",dont:"「あの意見には真っ向から反論して、彼らを論破してくれない？もっと強く主張して、こっちの意見を通したいんだ。」と、対立を煽るような依頼は避けてください。感情的な衝突や誰かを傷つけることを非常にストレスに感じます。「正直、あの人のことはどうでもいいから、こっちの都合のいいように周りを丸め込んでおいてくれない？面倒なことはあなたに任せるよ。」と、他者への配慮を欠いた個人的な利益のための依頼や、無責任な丸投げは不信感を与えます。「この件、〇〇さんのやり方がどう考えても間違ってるから、直接厳しく指摘して変えさせてほしいんだけど。みんながどう思うかは気にしなくていいから。」と、特定の個人を攻撃するような依頼は、調和の達人の精神的負担となり、関係を損ねる可能性があります。"},fullSections:[{title:"👤 この人はこんな人",content:"「みんなが笑顔でいられる場を守りたい」――それがこの人の人生のモットーだ。\n困っている人がいれば放っておけず、迷わず手を差し伸べる。チームやコミュニティの中で、誰もが安心して過ごせる調和の取れた空間を作り出すことに、この上ない喜びを感じる。\n\n人といるとエネルギーが満ち溢れてくるタイプで、ランチや休憩中に「ねえ、何か困ってることない？」と、さりげなく声をかけるのはいつもの光景だ。その質問の裏には、相手を気遣い、サポートしたいという純粋な気持ちが隠されている。チームのムードメーカーでありながら、同時にしっかりとしたまとめ役でもある。\n\n現実的な視点で物事を捉え、具体的な計画を立てて着実に実行する。新しいことへの挑戦よりも、既存のものをより良く、安定させることに長けている。マニュアルやルールを大切にし、それを守ることでみんなが安心して働けると考えている。「まずは基本に忠実にやってみよう」という言葉をよく使う。\n\n一方で、急な変化や未知の状況には少し戸惑いを覚えることもある。計画が大幅に狂ったり、前例のない挑戦を求められたりすると、ストレスを感じやすい。また、人との衝突を極端に避けるため、自分の意見を主張するよりも、相手に合わせてしまう傾向もある。\n\n興味の幅は広く、様々なことに顔を出すが、一つを深く探究するというよりは、多くのことを浅く広く体験し、みんなで楽しむことに価値を見出す。「これ、みんなでやったら楽しそうだよね！」と、レクリエーションやイベントを企画するのも得意だ。\n\n周囲の人の感情の機微には非常に敏感で、誰かの元気がないとすぐに察知する。言葉には出さなくても、その人の表情や雰囲気から「何かあったな」と見抜き、適切なタイミングでサポートに回る。チームのメンバーが最高のパフォーマンスを出せるよう、裏方で支える力はピカイチだ。\n\n根底にあるのは、人との繋がりを何よりも大切にする価値観。信頼関係を築き、みんなで協力し合って目標に向かうことに幸福を感じる。組織やチームの一員として、自分ができる貢献を最大限に果たしたいという強い思いが、この人を突き動かしている。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\nまずは全体像を把握し、具体的な計画を立てることから始める。過去の事例やマニュアルを参考にしながら、抜け漏れがないように手順を整理する。いきなり手を動かすのではなく、「どうすればみんながスムーズに動けるか」を考え、関係者と認識を合わせる。「このやり方で合ってるか、一度確認しよう」と声をかけることも多い。\n\n【進行フェーズ】\n計画通りに着実に物事を進めることを重視する。複数のタスクを並行してこなすよりも、一つ一つを丁寧に確実に完了させる方が得意だ。進捗報告はこまめに行い、チーム全体の足並みが揃っているかを常に確認する。困っているメンバーがいないか気を配り、必要であればすぐにサポートに回る。計画からの逸脱は最小限に抑えたい。\n\n【完了フェーズ】\n細部まで完璧な状態を目指し、丁寧に作業を仕上げる。ドキュメントの整備や、関係者への最終的な情報共有も徹底する。最終確認を怠らず、提出物には間違いがないか入念にチェックする。期限ギリギリで慌てるよりも、余裕を持って完了させたいタイプで、「これで大丈夫かな？」と最後の最後まで確認する几帳面さがある。\n\n【1日の働き方】\n定時出社・定時退社を基本とし、規則正しいルーティンワークを好む。朝はメールチェックやスケジュール確認、午前中に定例会議やチーム内の情報共有、午後に集中して実務作業、夕方には明日の準備といったリズムが理想的だ。急な割り込みタスクや、予測不能な事態にはストレスを感じやすい。"},{title:"🗣️ 会議での振る舞い",content:"会議では、チーム全体の調和を保ち、円滑な進行を心がける。発言しにくいメンバーには「〇〇さんはどう思う？」と優しく声をかけ、全員が意見を出しやすい雰囲気を作るのが得意だ。具体的な進捗報告や、現状の課題共有などで会議に貢献する。\n\n意見が対立した際には、それぞれの意見を丁寧に聞き、建設的な落としどころを探ろうと努力する。ホワイトボードに議論のポイントをまとめたり、アジェンダを事前に準備したりと、会議が脱線しないよう裏方で支えることが多い。\n\n一方で、結論が出ない抽象的な議論や、目的の不明確なブレインストーミングは苦手。具体的なネクストアクションやToDoが決まらないと、少しソワソワしてしまう。感情的な対立や、場がギスギスする状況は避けたいと考えている。\n\n【ベストな会議の使い方】\n・定例会議の進行役や議事録作成者として最適\n・プロジェクトの進捗確認や課題共有の場では頼りになる存在\n・関係者間の合意形成や情報共有の会議にマスト\n・チームビルディングや懇親会などの企画会議ではリーダーシップを発揮する"},{title:"💬 チャットでの傾向",content:"丁寧な言葉遣いを心がけ、メッセージは誤解がないように具体的かつ正確に書く。句読点や定型的な挨拶（「お疲れ様です」「ありがとうございます」など）を欠かさない。絵文字は状況に応じて使うが、多用はしない。\n\n返信は早く、未読メッセージを放置することはほとんどない。グループチャットでは、困っている人への助言や、ポジティブなリアクションで場を和ませる役割を担う。「〇〇さん、その情報助かります！」など、感謝の気持ちを伝えることも多い。\n\n誰かにタスクを依頼する際は、「〇〇さんの状況はいかがですか？もし可能であれば、〇〇までにお願いしたいのですが」と、相手への配慮を忘れない。\n\n【周囲が知っておくと楽なこと】\n・緊急時以外は、明確な情報提供と具体的な依頼でコミュニケーションを取るのが効果的\n・「いつもありがとう」「助かるよ」といった感謝の言葉を伝えると、モチベーションが大きく上がる\n・チャットのやり取りが長くなってきたら、口頭やWeb会議で確認する方がスムーズに進むことが多い\n・長文メッセージを送る際は、箇条書きで要点をまとめると、よりスムーズに理解してもらえる"},{title:"👔 上司として／部下として",content:"【上司として】\nメンバーの育成やサポートに惜しみない力を注ぐ、温かく面倒見の良いリーダーだ。一人ひとりの成長を喜び、困っているメンバーがいればすぐに気づき、手助けをする。チーム内の人間関係を円滑に保ち、誰もが働きやすい雰囲気作りを最優先する。会議では「何か困ってることはない？」と、積極的にメンバーに声をかけるだろう。\n\n具体的な指示と明確な期待値を伝えることを得意とし、スケジュール管理も抜け目ない。全体の進捗を見ながら、メンバーが安心して業務に取り組めるよう細かくサポートする。一方で、チームの調和を乱す言動や、ルールからの逸脱には厳しく対処することもある。急な方針転換や、計画外の変更は避けたいと考える。\n\n【部下として】\n上司からの指示を忠実に実行し、期待に応えようと努力する、信頼できる部下だ。チームや組織のルール、慣例を尊重し、真面目に業務に取り組む。進捗報告もマメで、何か問題が発生した際には、状況を整理した上で速やかに相談する。言われたことを素直に受け止め、着実にこなす。\n\n「いつも頼りになるね」「〇〇さんがいてくれて助かるよ」といった感謝の言葉や、自分の貢献がチームに役立っているという実感が、最高のモチベーションになる。曖昧な指示や頻繁な方針変更、あるいはチーム内の人間関係が悪化する環境では、ストレスを感じやすく、パフォーマンスが低下する傾向がある。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・自分の仕事がチームや誰かの役に立っていると実感したとき\n・計画通りに物事が進み、チーム全体で目標を達成したとき\n・「〇〇さんがいてくれて本当に助かる」と感謝されたとき\n・チームの雰囲気が良く、全員が笑顔で仕事をしているとき\n・周囲の期待に応え、信頼を深められたとき\n・具体的な改善提案が採用され、良い結果が出たとき\n・みんなで協力し合い、一体感を持って課題を乗り越えたとき\n\n【📉 下がる瞬間】\n・チーム内の人間関係が悪化し、ギスギスした雰囲気が続くとき\n・自分の貢献が評価されず、誰の役にも立っていないと感じるとき\n・ルールや手順が守られず、組織が混乱しているとき\n・急な方針転換や、計画が大きく狂い、先が見えなくなったとき\n・誰かが困っているのに、自分に何もできないと感じるとき\n・感情的な対立や、不当な批判に直面したとき\n・不公平な状況や、誰かが損をしている状況を見たとき"},{title:"📝 フィードバック",content:"【受けるとき】\nフィードバックは真摯に耳を傾け、自分の成長の糧として受け止めようと努力する。具体的な改善点やアドバイスであればあるほど、次への行動に繋げやすい。ただし、感情的な言葉や人格否定のようなフィードバックは深く傷つき、立ち直るのに時間がかかることもある。\n\nまずは自分の努力や貢献を認めてもらい、「ここが良かった」というポジティブな側面から伝えてほしい。「〇〇さんの〇〇な視点は素晴らしい。もし〇〇を改善できたら、もっとチームに貢献できるはずだよ」といった、具体的な例を交えた建設的な伝え方が理想的だ。\n\n【伝えるとき】\n相手の気持ちを最大限に考えて言葉を選び、丁寧かつ建設的に伝えようと努力する。ストレートに厳しいことを言うのは苦手で、遠回しになったり、肝心な部分を伝えきれなかったりすることもある。「嫌われたくない」という思いや、相手を傷つけたくないという気持ちが強いからだ。\n\nしかし、根底には相手の成長を願う気持ちがあるため、どうすれば良くなるかを一緒に考えようとする。もし厳しいフィードバックが必要な場合は、事前に準備し、個人的な感情を交えずに事実に基づいて伝えることを心がける。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・チーム内の調整・連携: 関係者間の橋渡し役として、スムーズなコミュニケーションを促し、一体感を醸成する。\n・イベント企画・運営: 参加者が楽しめるよう細部まで気を配り、計画通りに進行させ、成功に導く。\n・マニュアル・手順書作成: 誰が見ても分かりやすいように、具体的かつ網羅的に言語化し、共有する。\n・進捗管理・スケジュール調整: 全体の状況を正確に把握し、遅延なく物事を進めるための段取りを組む。\n・メンバーサポート・育成: 困っているメンバーを積極的に助け、具体的なアドバイスで成長を支援する。\n・定例会議の準備・進行: 効率的で実りある会議をセッティングし、議論を円滑に進める。\n・顧客との関係構築: 相手のニーズを丁寧に聞き出し、信頼関係を築きながら長期的な良好な関係を維持する。\n\n【😰 苦手】\n・突発的なトラブル対応: 計画外の事態や緊急事態に、冷静かつ迅速に対応するのが難しい。\n・単独での0→1の新規事業立ち上げ: 新しいものを生み出すよりも、既存の改善や安定化が得意分野だ。\n・抽象的な戦略立案: 具体的な実行プランや、具体的な成果が見えないと動きにくい。\n・データ分析・統計処理: 数字の羅列から本質を見抜くより、人との繋がりや感情を重視するため苦手。\n・強引な交渉・対立的な場面: 人間関係の調和を壊すことを極端に避けるため、ストレスを感じる。\n・前例のない大きな変革の推進: 変化より安定を求めるため、既存の枠組みを大きく変えるのは苦手。\n・厳しい納期での仕様変更: 計画通りに進めたいので、急な変更はストレスでパフォーマンスが落ちる。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「このプロジェクト、みんなが安心して進められるように、〇〇さんのサポートが必要なんだけど、お願いできないかな？」→チームへの貢献意識に響く。\n・「〇〇さんの細やかな気配りや丁寧さが、このタスクには不可欠なんだ」→強みを具体的に伝え、頼られていると感じると燃える。\n・「まずは現状をしっかり把握して、どうすればもっと良くなるか、改善策を一緒に考えてほしい」→現実的・実践的なアプローチを好む。\n・「このマニュアル、読みにくいところがあるから、〇〇さんの目線で自由に、分かりやすく改善してほしいんだけど」→既存の改善に裁量を与える。\n・「いつまでに、何を、どういう状態にしてほしいか」を明確に、具体的に伝える→計画的に進められるので安心する。\n\n【❌ パフォーマンスが落ちる】\n・「とりあえずやっといて」のような曖昧で丸投げな指示→具体性がないと不安になり、何から手をつけていいか戸惑う。\n・「これ、今日中にどうしてもやってもらえない？」のような急で無理な依頼→計画を乱されるのが苦手で、対応に焦ってしまう。\n・「なんでこうしなかったの？」といった頭ごなしの批判や感情的な口調→深く傷つき、モチベーションが急降下する。\n・チーム内の人間関係を悪化させるような、軋轢を生む依頼→調和を重んじる性質と相容れない。\n・ルールや手順が頻繁に変わるようなタスク→安定志向と合わず、ストレスが溜まる。\n\n【💡 コツ】\n1. 最初に「なぜその仕事が必要なのか」「誰の役に立つのか」を、具体的に共有する。\n2. 具体的な期待値と、明確な期日をセットで伝える。曖昧さは避ける。\n3. 「みんなのために」「チームのために」といった言葉を添えることで、貢献意欲を引き出す。\n4. こまめに進捗を確認し、「ありがとう」「助かるよ」といった感謝の言葉を惜しみなく伝える。\n5. 急な変更は極力避け、変更が必要な場合は事前に相談する時間を設ける。計画性を尊重する姿勢が大切だ。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・人事・労務担当者: 従業員のケアや制度整備を通じて、組織全体の安定と調和に貢献する。人の話を聞き、サポートする役割にやりがいを感じるだろう。\n・プロジェクトマネージャー（既存事業の改善・維持）: 既存のプロジェクトを円滑に進め、メンバーをサポートしながら目標達成に導く。計画性と実行力でチームを支える。\n・カスタマーサポート/顧客体験担当: 顧客の声に耳を傾け、具体的な解決策を提供しながら、顧客満足度向上に尽力する。共感力と丁寧さが強みになる。\n\n【⭐ かなり合う】\n・オフィスオーガナイザー/総務: 職場環境を整え、誰もが働きやすい空間を作る。細やかな気配りでメンバーをサポートする役割がぴったりだ。\n・イベントコーディネーター: みんなが楽しめるイベントを企画・実行し、一体感を醸成する。細部まで気を配り、成功に導く手腕を発揮する。\n・チームリーダー（管理職）: メンバーを鼓舞し、課題解決をサポートしながらチームをまとめる。温かいリーダーシップで信頼を集めるだろう。\n\n【💡 意外とハマる】\n・教育・研修担当: 相手の理解度や状況に合わせ、具体的な指導で成長を促す。親身な姿勢が受講者の信頼を得る。\n・品質管理・品質保証: プロセスを維持・改善し、高品質な製品やサービスを守る。細部へのこだわりと責任感が活きる。\n\n【⚠️ 避けた方がいい】\n・スタートアップの新規事業開発責任者: 未開拓領域での不確実性や急な方向転換が多く、大きなストレスになる。計画通りに進めることが難しい環境は不向きだ。\n・投資アナリスト/トレーダー: 冷徹な数字の判断や、高リスクな決断が常時求められる環境は、感情を重んじる性質と合わない。\n・単独での研究開発: 人との交流が少なく、既存の枠組みにとらわれない発想が常に求められるため、孤独感やプレッシャーを感じやすい。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nISTJ-G-Dp「金庫番」: 調和の達人の現実的な視点と、金庫番の完璧主義で堅実な実行力が組み合わさることで、抜け目のないプロジェクト推進が可能になる。お互いに計画性と安定を重視し、信頼関係を築きやすい、まさに盤石なコンビだ。\nENTJ-O-Dp「将軍」: 将軍の明確なビジョンと強力なリーダーシップを、調和の達人が具体的な実行プランとチームマネジメントでしっかりと支える。大きな目標に向かって協力し、相互に不足を補い合える、強力なタッグになるだろう。\n\n【🔥 化学反応が起きるコンビ】\nENFJ-G-Br「支え人」: どちらも人との調和を重視し、共感力が高いため、チームの士気を高める素晴らしい相乗効果を生む。感情的なサポートと具体的な行動で互いに支え合い、一体感のある場を創造する。\nISFJ-G-Dp「影の支配者」: 共に守りのスタンスで、現実的な視点と具体的な行動を重んじる。調和の達人が前面に出てチームをまとめ、影の支配者が細部のサポートと着実な実行で貢献する、信頼感あふれる関係を築ける。\n\n【☀️ 居心地がいい仲間】\nESFP-O-Br「ムードメーカー」: どちらも外向的で人間関係を大切にするため、一緒にいると明るく楽しい雰囲気が自然と生まれる。調和の達人がみんなをまとめ、ムードメーカーが場を盛り上げる、心地よい関係性だ。\nISFP-G-Br「職人気質」: 感情を大切にする点で共鳴し、お互いのペースを尊重しながら穏やかで安心できる関係を築ける。調和の達人が全体を気遣い、職人気質が自分の得意な分野で貢献する、互いを尊重し合える仲間だ。\n\n【⚡ 未知の触発者】\nINTP-O-Dp「孤高の戦略家」: 調和の達人の具体的な行動と人への配慮が、孤高の戦略家の抽象的な思考や論理性に新たな視点をもたらす。お互いの異なるアプローチから学び、視野を広げることができる、刺激的な組み合わせとなるだろう。\nENTP-O-Br「アイデアマン」: アイデアマンの無限の可能性と、調和の達人の現実的な着実さが、全く異なる視点での問題解決を促す。時には衝突しつつも、互いの特性を理解することで新しい価値が生まれる、ダイナミックな関係性だ。"},{title:"🌈 プライベートの顔",content:"休日は、友人や家族との予定を何よりも大切にするタイプ。グループでのランチや飲み会、BBQなどを頻繁に企画し、幹事役を買って出ることも多い。「みんなでどこか行かない？」が口癖で、誰かの家でホームパーティーをすることもしばしばだ。\n\n週末は、友達とのカフェ巡りや、季節ごとのイベント（お花見、紅葉狩り、クリスマスマーケットなど）に積極的に参加している。地元の美味しいお店や穴場スポットの情報には詳しく、いつも最新情報をチェックしている。旅行に行くときも、事前に綿密な計画を立てるのが常。観光地の情報、美味しいお店、移動手段、すべてリサーチ済みだ。\n\n趣味は幅広く、ヨガ、料理教室、手芸、スポーツ観戦など、友人や家族と一緒に楽しめるものが多い。「これ、みんなでやったら楽しそうだよね！」と、新しい趣味を提案することも。多趣味ではあるが、何かを深く追求するというよりは、みんなとの共有体験や交流そのものを楽しんでいる。\n\n家族や親しい友人の誕生日には、手作りの料理を振る舞ったり、その人のために心を込めたプレゼントを選んだりする。相手が喜んでくれる顔を見るのが何よりも幸せな瞬間だ。「〇〇ちゃん、これ好きだったよね」と、さりげない気配りを見せることも多い。\n\n自宅はいつもきれいに片付いていて、人を招くのが好き。訪れた人が居心地良く過ごせるよう、スリッパやブランケットを用意したり、飲み物のおかわりを気遣ったりと、細部まで気を配る。友人が泊まりに来るときは、枕カバーからアメニティまで完璧に準備する、おもてなしの達人だ。\n\n旅行の計画を立てる際も、「ここに行きたいんだけど、みんなはどうかな？」と事前に確認し、全員が楽しめるプランを練り上げる。トラブルなく、みんなが笑顔で過ごせる旅にするために、様々な可能性を考慮して準備を進める、まさに旅のオーガナイザーだ。"}]},
"ESFJ-G-Dp":{name:"ベテラン寮長",character:"お母さん（あたしンち）",great:"津田梅子",color:"#D98880",summary:"「この子たちを丁寧に育て守る」。一つのコミュニティに深くコミットしメンバーの成長を見守る。静かだが確かな愛情。",compatibility:{complement:[{code:"INTP-O-Br",name:"発明家",desc:"研究テーマについてチャットで議論する際、お互いの抽象的な発想や仮説をすんなり理解し合い、安心して思考を深められる。居心地の良い知的空間が広がる。"},{code:"INTJ-G-Br",name:"黒幕参謀",desc:"プロジェクトのリスク分析時、INTPが本質的な問いを深掘りし、黒幕参謀はそれに基づいて堅牢な戦略や予見的な解決策を構築する。静かに、しかし強力な同盟が生まれる。"}],chemistry:[{code:"ENFJ-G-Dp",name:"寮長",desc:"技術力で難題を解決する彼が、周囲の協力や感情面を気にせず没頭できるよう、寮長がチームの人間関係を温かく調整し、全体の士気を高める。"},{code:"ISFJ-G-Dp",name:"守り神",desc:"守り神の細やかな気配りと癒し職人の静かな寄り添いが組み合わさり、お客様に最高の安心感を提供します。顧客対応では、互いに補完し合い、深い信頼関係を築くことができます。"}],comfort:[{code:"ESFJ-G-Br",name:"調和の達人",desc:"会議でINTPの専門的な発見が難解で周囲が戸惑う際、調和の達人がその意図を分かりやすく翻訳し、チームの理解と協力を促進します。探究の孤立を防ぎ、職場に円滑な空気をもたらします。"},{code:"ESFJ-O-Dp",name:"肝っ玉番長",desc:"現場の技術的な問題解決に集中する彼に対し、番長は利用者目線で具体的なニーズを伝え、成果が「みんなのため」になるよう橋渡しをする。"}],catalyst:[{code:"ENTP-O-Dp",name:"常識クラッシャー",desc:"既存プロセスの見直し会議では、ENTP-G-Brが現状の背景知識を提供する一方で、ENTP-O-Dpが常識にとらわれない大胆な提案で既成概念を打ち破る。知的好奇心を刺激し合い、自由な議論が交わされる居心地の良い関係。"},{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"}]},careers:{top:["保育士リーダー","民生委員","老人ホーム施設長"],good:["小学校教員","栄養士","介護福祉士"],surprise:["寺子屋の先生","家庭菜園講師"],avoid:["金融トレーディング","ハイペースのスタートアップ"]},strengths:["丁寧なケア","長年の信頼","安定運営","静かな影響力"],weaknesses:["変化","自己主張","外部接点","新環境"],tips:{do:"「このチームの新しいメンバーが馴染めるように、〇〇さんならではの温かいサポートをお願いできませんか？特に彼/彼女が困っていることがあれば、じっくり話を聞いてあげてほしいんです。」「今進めているプロジェクトについて、長期的な視点でリスクがないか、またメンバーが無理なく進められるか、じっくりと見守りながらアドバイスを頂けませんか？〇〇さんの細やかな配慮が頼りです。」「この部署の環境をもっと居心地の良い場所にしたいのですが、何か改善できる点はないでしょうか？皆が安心して働けるよう、〇〇さんの視点から具体的なアイデアや、一人ひとりの声を聞いてまとめてくれないかな？」",dont:"「この新規事業、来週までに広範囲にわたる調査を済ませて、すぐに結果をまとめてくれない？スピードが命だから、細かいところは気にしなくていいよ。」「複数のプロジェクトを並行して担当してほしいんだ。全部を完璧にこなす必要はないから、広く浅くでいいから、とにかく早く手をつけてほしい。」「もっと大胆に、既存のやり方に囚われずに、一気に改革を進めてくれない？過去のしがらみは気にせず、とにかく迅速に全体を変えていきたいんだ。」"},fullSections:[{title:"👤 この人はこんな人",content:"タイプ: ESFJ-G-Dp「ベテラン寮長」（お母さん — あたしンちの、津田梅子）\nE（外向）- S（感覚）- F（感情）- J（判断）- G（守り）- Dp（一点深堀）\n\n「みんなが安心して、心地よく過ごせることが一番」が信念。一度決めた場所やコミュニティに深くコミットし、そこで関わる人々の成長と幸福を支え続けることに全力を注ぐ。困っている人には自然と手が伸び、気づけば世話を焼いている。まるで大家族の頼れるお母さんのようだ。\n\n人といるとエネルギーが湧いてくる外向型だが、ENFPのように新しい刺激を求めるよりは、既存の信頼できる仲間やコミュニティとの交流を通じて活力を得る。特に、自分の貢献が誰かの役に立ち、感謝されたときに最も大きな喜びを感じる。周りの人の気持ちや状況の変化を敏感に察知し、「何かあった？」と声をかけるのが得意だ。\n\n感覚タイプなので、アイデアや抽象的な議論よりも、現実的で具体的な物事を好む。目の前にある課題に対し、着実に、そして具体的な行動で解決していく。計画を立てて、その計画通りに進めることに安心感を覚える。常に先を見越して準備を怠らない。\n\n守り（G）のスタンスは、既存のものを安定させ、より良く改善していくことに本領を発揮する。新しいものを生み出すより、既にある価値を丁寧に磨き上げ、維持・発展させることに喜びを感じる。変化は慎重に受け入れるが、一度必要と判断すれば、その変化を定着させるために尽力する。\n\n弱点は、責任感が強すぎるあまり、すべてを一人で抱え込みがちなこと。完璧主義な面が強く、時には細部にこだわりすぎて、物事をスピーディーに進めるのが苦手になることもある。また、新しい環境や急な変化に対しては、ストレスを感じやすい傾向がある。\n\n興味の範囲は一点深掘り（Dp）タイプなので、幅広く浅くではなく、自分が関わるコミュニティや仕事、プライベートの趣味など、特定の分野に深くコミットし、専門性を高めようとする。知識やスキルを深掘りすることで、その道の「ベテラン」と呼ばれる存在になる。\n\n人の感情に寄り添い、共感する能力が高い。チームの調和を何よりも大切にし、衝突を避けようとする。誰かが孤立しないように気を配り、常に「みんなで一緒に」という意識を持っている。そのため、人間関係の調整役になることも多い。\n\n根底にあるのは「愛」と「責任感」。自分にとって大切なコミュニティや人々が、安心して、快適に、そして成長できる環境を提供することに、無上の喜びと使命感を感じている。縁の下の力持ちとして、日々、周りを支え続けているのだ。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n新しいプロジェクトやタスクが降ってきても、まず全体の計画と具体的な手順を考えることから始める。漠然とした指示では動かず、S（感覚）で具体的な情報を求め、J（判断）で細部までスケジュールを落とし込む。着手は慎重だが、一度決めたらその計画に沿って着実に進める。新しいことへの挑戦よりも、既存の業務の改善や安定稼働に意欲を燃やす。\n\n【進行フェーズ】\n一つのタスクに集中して、深く掘り下げるのが自然体。Dp（一点深堀）なので、並行作業よりもシングルタスクを好み、与えられたミッションを完璧に遂行しようとする。G（守り）の特性から、計画からの逸脱を嫌い、問題が発生すればすぐに原因を究明し、適切な解決策を講じる。進捗報告は詳細かつ丁寧で、周囲も安心して任せられる。責任感が非常に強く、困難な状況でも決して投げ出さない。\n\n【完了フェーズ】\n最後の最後まで手を抜かず、細部まで完璧に仕上げることにこだわる。資料の誤字脱字チェック、数値の正確性、ドキュメントの整備、マニュアル作成など、ENFPが苦手とするような「詰めの作業」で本領を発揮する。完璧主義ゆえに、締切ギリギリまで調整を続けることもあるが、最終的な成果物の品質は非常に高い。成果物が安全で安定稼働することに最大の喜びを感じる。\n\n【1日の働き方】\n朝は早めに会社に来て、一日のタスクとスケジュールを確認する。ルーティンワークを好み、計画通りに物事を進めることで安心感を得る。午前中は集中して自分の作業に取り組み、午後はメンバーからの相談に乗ったり、協力業務を進めたりすることが多い。定時で仕事を終え、プライベートも大切にするタイプだが、必要であれば責任感から残業も厭わない。仕事の環境は整理整頓され、快適な状態を保ちたいと思っている。"},{title:"🗣️ 会議での振る舞い",content:"会議では、場の雰囲気を察知し、チーム全体の調和を保つことに気を配る。E（外向）型なので発言はするが、ENFPのような発散的なアイデア出しよりも、S（感覚）で具体的な状況認識や、J（判断）で建設的な解決策、具体的な改善提案を行うことが多い。\n\n議論が混乱しそうになったら、F（感情）で人々の意見を尊重しつつ、具体的な論点に立ち返らせようとする。場の空気が重いと感じても、あえて軽い話題で和ませるよりは、現実的な解決策を提示することで、建設的な方向へ導こうとするだろう。議事録作成や決定事項の整理整頓は得意中の得意。\n\nブレインストーミングのような場では、あまり多くは発言しないかもしれないが、出たアイデアを「具体的にどう実現するか」「懸念点はないか」という視点で評価し、現実的な着地点を探る役割を担う。長時間の抽象的な議論や、結論が出ない会議は苦手。具体的な成果やアクションプランが明確になる会議で最も活躍する。"},{title:"💬 チャットでの傾向",content:"メッセージは丁寧で分かりやすく、具体的な情報を盛り込むことを心がけている。J（判断）タイプなので、絵文字やリアクションも使うが、過度な乱用はせず、礼儀正しさを保つ。Dp（一点深堀）の特性から、一つの話題をきちんと終えるまで、次の話題に移らない傾向がある。雑談チャンネルでも、場の空気を読んで参加するが、あくまで建設的な交流を重視する。\n\n返信は早く、依頼には「承知しました。〇〇について確認し、〇〇までに進捗を報告します」のように、具体的なアクションと期日を添えて返すことが多い。タスク依頼への返信で不明点があれば、すぐに質問し、曖昧なままにしない。長文のメッセージを送ることも稀にあるが、それは必要な情報を網羅しようとする責任感の表れだ。\n\n【周囲が知っておくと楽なこと】\n・重要な依頼は、チャットだけでなく口頭や会議で補足すると、より丁寧に対応してくれる\n・「承知しました」は、そのまま具体的な行動開始のサインと受け取ってOK\n・不明点があれば率直に質問してOK。曖昧なまま進めるのを嫌う\n・返信が少し遅れる場合でも、丁寧に考えて返事をしようとしている場合が多い"},{title:"👔 上司として／部下として",content:"【上司として】\nメンバーの面倒見が良く、一人ひとりの成長と幸福を心から願う「ベテラン寮長」タイプ。具体的で明確な指示を出し、メンバーが安心して仕事に取り組める環境を整える。G（守り）のスタンスで、チームや部署の安定した運営を最優先し、問題発生時には迅速かつ的確に対処する。Dp（一点深掘り）の特性から、メンバーの専門性を見抜き、それを深く育てることに長けている。\n\nマイクロマネジメントをするわけではないが、進捗状況はきちんと把握しておきたいタイプ。困っているメンバーがいれば、自ら声をかけてサポートする。ビジョンを熱く語るよりも、「みんなで目標を達成しよう」と寄り添い、具体的な行動計画を示すことでチームの士気を高める。時には世話を焼きすぎてしまうこともあるが、その根底には深い愛情と責任感がある。\n\n【部下として】\n責任感が強く、任された仕事は期待以上の品質でやり遂げようとする真面目な部下。具体的で明確な指示と、仕事の目的を理解することで、最大の力を発揮する。上司からのフィードバックは真摯に受け止め、改善に向けて努力を惜しまない。ルールや手順をきちんと守り、計画通りに仕事を進めることを得意とする。組織の安定と調和に貢献することに喜びを感じる。\n\n曖昧な指示や、頻繁な方針変更、無計画な仕事の進め方をする上司とは相性が悪い。自分の専門性が認められ、信頼して任せてもらえると、その期待に応えようと努力を続ける。上司には敬意を払い、報告・連絡・相談を怠らない。チームや組織の模範となるような働き方をするだろう。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・自分の貢献が誰かの役に立ち、感謝されたとき\n・チームやコミュニティが安定し、調和が保たれているとき\n・計画通りに物事が進み、具体的な成果が出たとき\n・自分の専門性が認められ、頼りにされたとき\n・既存の業務やサービスが改善され、品質が向上したとき\n・新人や後輩の成長を間近で見守ることができたとき\n・困難な状況をチーム一丸となって乗り越えられたとき\n\n【📉 下がる瞬間】\n・無秩序な状況や、計画性のない仕事に直面したとき\n・人の意見や感情が尊重されない、不和な環境にいるとき\n・頻繁な方針変更や、曖昧な指示で混乱が生じるとき\n・自分の努力や貢献が正当に評価されないとき\n・チームの調和が乱れ、協力体制が崩れたとき\n・ルールや手順が守られず、質の低い仕事が横行するとき"},{title:"📝 フィードバック",content:"【受けるとき】\nフィードバックは真摯に受け止め、感情的にならずに冷静に分析しようとする。F（感情）タイプなので、言葉遣いや伝え方には敏感だが、内容が具体的で建設的であれば、自身の成長の機会と捉える。まず良かった点を伝え、その上で改善点を具体的な行動に落とし込むように促されると、素直に受け入れやすい。「なぜそのように評価するのか」という理由も明確に伝えてほしいタイプだ。\n\n【伝えるとき】\n基本的にF（感情）タイプなので、相手の感情に配慮し、言葉を選んで伝える。ポジティブなフィードバックは具体的に褒め、相手のモチベーションを高めるのが得意。改善点を伝える場合も、G（守り）の視点から、その人がもっと良くなるための具体的な方法や、期待する行動を添えて伝える。決して感情的に叱責することはなく、常に相手の成長を願う視点でフィードバックを行う。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・マニュアル作成・整備：S（感覚）とJ（判断）で具体的に、漏れなく手順を記述できる\n・業務改善・効率化：G（守り）の視点から既存業務を安定させ、より良くしていく\n・進捗管理・スケジュール調整：J（判断）で計画通りに進める能力が高い\n・新人育成・後輩指導：F（感情）で寄り添い、S（感覚）で具体的に教えるのが上手い\n・顧客サポート・問い合わせ対応：F（感情）で共感し、S（感覚）で具体的な解決策を提示\n・データ整理・文書管理：J（判断）で情報を体系的に整理し、アクセスしやすくする\n・コミュニティ運営・メンバーケア：G（守り）の視点でコミュニティの調和を保ち、メンバーを支える\n\n【😰 苦手】\n・0→1の新規事業・サービス企画：G（守り）なので不確実性の高いことには慎重\n・不確実性の高いプロジェクトの推進：S（感覚）とJ（判断）で計画通りに進めたい\n・抽象的な議論・概念の検討：S（感覚）なので具体的な情報がないと戸惑う\n・突発的な変更対応・アドリブ：J（判断）なので計画外の変更はストレスになりやすい\n・競争的な環境での成果追求：F（感情）なので争いよりも協調を好む\n・複雑な数値分析・統計処理：細かすぎる数字の羅列は、全体像を見失いやすい\n・短期的な成果を求めるプレッシャー：Dp（一点深堀）なので時間をかけて深掘りしたい"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「この業務を安定させて、さらに良くしていく方法を考えてくれない？」→既存の改善に意欲を燃やす\n・「〇〇さんの専門性が必要なんだ」→Dp（一点深掘り）のスキルを認められると燃える\n・「具体的な手順とスケジュールを教えてほしい」→J（判断）で計画を立ててから動き出す\n・「困ったことがあればいつでも相談してね」→F（感情）でサポートを申し出てくれると安心する\n・「〜日までに、ここまで進めてくれると助かる」→明確な期日があると計画を立てやすい\n・成果が出たら「〇〇さんがいてくれて本当に助かった」と具体的に感謝を伝える→貢献が認められると報われる\n\n【❌ パフォーマンスが落ちる】\n・「とりあえず自由にやってみて」→漠然とした指示だとどう動けば良いか戸惑う\n・「計画はなしで、走りながら考えよう」→J（判断）なので計画がないと不安になる\n・「今日中にやってほしい、詳細は後で伝える」→S（感覚）なので具体的な情報がないと動けない\n・「この業務はもっと効率化しろ」と一方的に指示→G（守り）なので丁寧な説明がないと抵抗を感じる\n・頻繁な方針変更や、指示の撤回が多い→J（判断）なので計画が乱れるとストレスに\n・「どうせ〇〇さんの仕事は目立たないから」→貢献が認められないとモチベーションが下がる\n\n【💡 コツ】\n1. 最初に「Why」と「How（具体的な手順）」を共有する\n2. 安定した環境と明確な目標設定を提供する\n3. 責任ある仕事を任せ、信頼していることを伝える\n4. 定期的に進捗を確認し、必要であれば具体的なサポートを提案する\n5. その人の専門性や貢献を、具体的に、こまめに認める言葉をかける\n6. チームやコミュニティへの貢献を促すタスクを依頼する"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・人材育成担当 — メンバーの成長を一番に考え、具体的なサポートを行う\n・品質管理・品質保証 — 既存サービスの安定稼働と品質向上に全力を注ぐ\n・顧客サポート・CS責任者 — 顧客の困りごとに寄り添い、具体的な解決策で満足度を高める\n\n【⭐ かなり合う】\n・組織人事・労務担当 — 従業員の安定した就業環境を整え、サポートする\n・業務改善コンサルタント — 既存の業務フローを分析し、現実的な改善策を提案・実行する\n・教育者・研修講師 — 具体的な知識を体系的に教え、生徒の成長を促す\n\n【💡 意外とハマる】\n・専門職（会計士、弁護士など）— 規則や前例を重視し、一点深掘りの専門性を活かす\n・図書館司書 — 情報の整理・管理を通じて、利用者の知的好奇心を支える\n\n【⚠️ 避けた方がいい】\n・広告クリエイティブ — 不確実性が高く、抽象的な発想を求められる\n・新規事業開発 — 0→1の創出はG（守り）タイプには負荷が高い\n・ベンチャーキャピタリスト — スピードとリスクを伴う意思決定が多い\n・M&A担当 — 組織の急激な変化や、人間関係の軋轢が生じやすい"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nINTJ-O-Dp「戦略家」 — ベテラン寮長が守り育てたコミュニティに、戦略家が長期的なビジョンと効率性をもたらす。寮長の現場感覚と戦略家の洞察力が組み合わさることで、安定した基盤の上に革新的な発展をもたらす。お互いの専門性を深く尊重し合い、信頼関係を築ける関係だ。\n\nISTP-O-Dp「孤高の技術者」 — 寮長の温かいサポートと技術者の実践的なスキルが融合。技術者が目の前の問題を解決するのに集中できるよう、寮長が環境を整える。多くを語らずとも、互いの存在価値を認め合う、静かで強力なパートナーシップが生まれる。\n\n【🔥 化学反応が起きるコンビ】\nESTJ-G-Dp「頑固職人」 — 同じJ-S-G-Dpの軸を持ち、現実的な視点と堅実な実行力で協力し合い、安定した成果を出し続ける。互いの専門性を深く尊重し合い、意見の相違があっても建設的に議論を進められる。互いの完璧主義な部分が、さらなる高みを目指す原動力となるだろう。\n\nENTJ-O-Dp「将軍」 — 寮長の献身的なサポートと将軍の強力なリーダーシップが合わさる。将軍の掲げる目標に対し、寮長が現実的な道筋と安定した基盤を提供する。異なるアプローチながらも、共通の目標達成に向けて強力な推進力を生み出す。\n\n【☀️ 居心地がいい仲間】\nISFJ-G-Dp「影の支え人」 — どちらも人の役に立つことを喜び、静かに支えることに喜びを感じるタイプ。言葉がなくとも通じ合う深い絆が生まれ、互いに安心感を与える存在だ。共にいると心が休まり、日常の些細な幸せを分かち合える。\n\nESFJ-G-Dp「ベテラン寮長」 — 同じタイプなので、価値観や行動パターンが似ており、自然体でいられる。互いの頑張りを理解し合い、困っている時は真っ先に助け合える。同じコミュニティに所属すれば、強力な安定の柱となるだろう。\n\n【⚡ 未知の触発者】\nENTP-O-Br「アイデアマン」 — 寮長の安定した世界に、アイデアマンが新しい視点と刺激をもたらす。最初は寮長がアイデアマンの無秩序さに戸惑うかもしれないが、アイデアマンの柔軟な発想は寮長に新たな可能性を示し、視野を広げるきっかけとなる。互いの違いから学び、成長できる関係だ。\n\nINFP-P-Dp「夢見る詩人」 — 寮長の現実的で安定した価値観と、詩人の内向的で理想主義的な世界観が交錯する。寮長は詩人の繊細な感性に触れることで、普段見過ごしている美しさや感情の深さに気づかされる。詩人は寮長の安定感に安心感を覚える。互いに異なる魅力を発見し合える関係だ。"},{title:"🌈 プライベートの顔",content:"休日は家で過ごすことが多いが、それは単に休んでいるわけではない。料理を作り置きしたり、庭の手入れをしたり、趣味のガーデニングに没頭したりと、生活の質を高めるための活動に精を出す。家族や親しい友人を大切にし、特に凝ったイベントでなくても、一緒に食卓を囲んだり、自宅に招いて手料理を振る舞ったりする時間を愛している。\n\n旅行に行くなら、計画をしっかり立ててから出発する。ガイドブックを読み込み、現地の情報を深く掘り下げてから旅程を組む。一度気に入った場所は何度もリピートして訪れ、その土地の文化や歴史を深く知ろうとする。Dp（一点深掘り）の特性は、プライベートでもしっかり発揮される。\n\n地域コミュニティの活動やボランティアにも積極的に参加する。町の清掃活動や子供たちの見守りなど、具体的な形で社会に貢献することに喜びを感じる。E（外向）型なので、そうした活動を通じて新たな人との出会いも楽しむが、特に既存の信頼できる人々との交流を重視する。\n\n趣味は多岐にわたるが、一つひとつを深く極める傾向がある。例えば、手芸を始めたらプロ並みの腕前になったり、特定の歴史分野に興味を持ったら関連書籍を読み漁ったり。その道のベテランとして、友人から「今度教えてよ！」と頼られることも多い。\n\nお金の使い方も堅実で、無駄遣いはしない。しかし、家族や友人のため、あるいは自分の成長のためになる投資（スキルアップの講座受講など）には惜しみなく使う。質の良いものを長く使い続けることを好み、流行に流されることはあまりない。\n\nプライベートでも「ベテラン寮長」の顔は健在。周囲の人が困っていたらすぐに声をかけ、具体的なサポートを提供する。周囲の安心と調和を保つことが、自身の心の安定にも繋がっているのだ。"}]},
"ESFP-O-Br":{name:"お祭り総隊長",character:"ルパン三世",great:"マドンナ",color:"#AF7AC5",summary:"「人生は楽しむためにある」を全身で体現。圧倒的エンタメ力で場を支配する。新しい経験を求めて次々冒険する。",compatibility:{complement:[{code:"INTJ-G-Dp",name:"設計狂",desc:"共通のプロジェクトで、INTPの根本原理に基づき、より洗練された複雑なシステム設計やモデル構築を二人で深く掘り下げる。チャットで夜遅くまで議論を交わし、精緻な構造を創り上げる。"},{code:"ISTJ-G-Dp",name:"金庫番",desc:"求道者の技術への深い探求心と、金庫番の厳格な品質管理が融合し、揺るぎない専門性と信頼性を生み出します。共同でシステム開発を行う際、求道者が高度な機能を実装し、金庫番がその安定性とセキュリティを徹底的に検証することで、完璧な製品を完成させます。"}],chemistry:[{code:"ESFJ-O-Br",name:"総支配人",desc:"INTPの深遠な理論を社内外に適切に伝え、関係部署との調整や情報共有を円滑に進める。会議での発表資料作成や対外折衝で、その理論の価値を理解者に届ける手助けとなる。"},{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"}],comfort:[{code:"ESFP-O-Dp",name:"パフォーマー",desc:"プレゼンテーション準備中、ESFP-O-Dpのダイナミックで感情豊かな表現が、ENTP-G-Brの持つ豊富な知識に新たな視覚的・感覚的要素をもたらす。知識が鮮やかに彩られ、聴衆を惹きつけるコンテンツへと触発される。"},{code:"ESFP-G-Br",name:"盛り上げ隊長",desc:"持ち前のユーモアとポジティブさで、過酷な目標達成の現場に活気と一体感を生み出す。プロジェクトの士気が下がりかけた時、チーム全体のモチベーションを高める。"}],catalyst:[{code:"INTJ-O-Dp",name:"ラスボス",desc:"難解な技術課題についてチャットで議論する際、ラスボスとINTPは互いの鋭い洞察をぶつけ合い、緻密な論理で構築された全く新しい解決策を生み出します。妥協なき知的探求が、組織に革新的な戦略をもたらすでしょう。"},{code:"INFJ-G-Dp",name:"カウンセラー",desc:"互いの内省的な思考や感情を安心して分かち合い、プロジェクトの精神的な側面を支え合います。困難な状況での個別面談は、心の負担を軽減し、前向きな解決策を見つける助けとなります。"}]},careers:{top:["エンターテイナー","イベントプロデューサー","ブランドアンバサダー"],good:["トップセールス","旅行プランナー","MC"],surprise:["体験型教育講師","フードトラック経営"],avoid:["定型事務","一人の研究職"]},strengths:["エンタメ力","空気を変える力","開放性","人を楽しませる才能"],weaknesses:["長期集中","ルーティン","内省","計画性"],tips:{do:"今度の社内イベント、ぜひ君のエンタメ力で最高に盛り上げてほしいんだけど、何か面白いアイデアないかな？君にしかできない、新しい企画でみんなをアッと驚かせてほしい！この新プロジェクト、ちょっとマンネリ気味で活気がないんだ。ぜひ、君の明るさと行動力で風穴を開けてほしいんだけど、どうすればもっと楽しく、みんなが積極的に参加できると思う？自由に発想してみて！来月のチームミーティング、いつも堅苦しいから、オープニングを任せたいんだけど。君のパフォーマンスで、みんなが笑顔になれるような、サプライズ企画を考えてくれないかな？どんなやり方でもOK、君らしさを存分に出してほしい！",dont:"この資料、細かいデータ入力が大量にあって地味な作業なんだけど、締め切りが近いから黙々とやってくれないかな？正確さが命だから、コツコツと集中して頼むよ。新プロジェクトの裏方として、ひたすら名簿作成や会場設営の地味な準備をお願いしたいんだけど。目立つ仕事じゃないけど、誰かがやらなきゃいけないから、淡々と進めてくれると助かる。今回のキャンペーンでは、君にはマニュアル通りに顧客対応をしてもらうことになるんだけど。イレギュラーな対応は避け、決められた手順を厳守して、ミスなくこなしてほしい。"},fullSections:[{title:"👤 この人はこんな人",content:"「人生は楽しむためにある」を全身で体現する、生粋のエンターテイナー。目の前にある「面白い」や「楽しい」を見つけると、居ても立っても居られず、すぐに飛び込むタイプだ。\n\n人が集まる場所にエネルギーが湧いてくる。オフィスで一番のムードメーカーであり、自然と周囲に人が集まってくる。彼・彼女が「これ、みんなでやろうぜ！」と声を上げれば、どんな企画も一気に現実味を帯びる。\n\n仕事においても、その推進力は抜群だ。アイデアを練り続けるよりも、まずは「やってみる」ことを重視する。具体的な行動を通して課題を解決したり、新しいやり方を生み出したりする。チームの雰囲気を盛り上げ、周囲のやる気を引き出すのが得意だ。\n\n一方で、決まりきったルーティン作業や、綿密な計画を立てることは苦手。細かい数字のチェックや書類作成は、途中で集中力が切れてしまうことが多い。飽きっぽい一面もあり、刺激のない環境では持ち前の明るさが失われがちだ。\n\n興味の幅はとてつもなく広く、とにかく新しい経験に飢えている。五感で感じられる具体的な体験を何よりも大切にするため、「とりあえずやってみよう！」「見て、聞いて、触れてみないと分からないだろ？」が口癖。色々なことを幅広く浅く体験することで、インスピレーションを得る。\n\n人との距離をすぐに縮めるオープンな性格で、誰とでも友達になれる。相手の感情に敏感で、場が盛り上がっていないと感じたら、自ら率先して空気を変えようとする。みんなが笑顔でいることが、この人にとって最高のモチベーションだ。\n\n根底にあるのは「今この瞬間を最大限に楽しむ」という価値観。未来の可能性を探るよりも、目の前にある現実をどう最高に彩るかを常に考えている。そのため、具体的な行動と経験が、この人の思考と行動の源泉となる。\n\n「なんだか最近、面白くないな〜」と感じたら、それはこの人のエネルギーが低下しているサイン。新しい刺激と人との交流が、この人を再び輝かせる。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n「これ面白そう！」と思った瞬間に、もう動き出している。計画を立てるより先に、まずは「やってみる」派。具体的な行動から入るため、フットワークは驚異的に軽い。「資料作るより、まず顧客に話聞きに行こうぜ！」と提案することも多い。直感と感覚を信じて、最初の一歩を迷いなく踏み出す。\n\n【進行フェーズ】\n複数のタスクを並行して進めるのが自然体で、常に何かを「動かしている」状態を好む。一つのことに集中し続けると飽きてしまうため、適度な切り替えが必要。途中で「もっと面白いやり方があるかも！」と思いついたら、柔軟に方向転換することも。進捗は感覚で把握しているため、具体的な報告はざっくりしがち。\n\n【完了フェーズ】\n最後の詰めの作業が最大の弱点だ。目標達成は嬉しいが、細かい検証やドキュメント整備は「誰かに任せたい…」と思ってしまう。ゴールした瞬間の達成感や周囲の喜びを味わうことで満足するため、そこから先の地道な作業はモチベーションが続かない。得意なメンバーに協力を仰ぐと品質が劇的に向上する。\n\n【1日の働き方】\n朝から人と話して元気をもらい、午前中にウォーミングアップ。午後にチームを巻き込みながら、具体的なアクションをガンガン進めるのがベストだ。日によって働く場所や内容が変わる方が、パフォーマンスが上がる。ルーティンに縛られるより、常に刺激がある環境を求める。"},{title:"🗣️ 会議での振る舞い",content:"会議の空気を一変させる盛り上げ役。議論が停滞したり、重い空気が漂ったりすると、自分から冗談を言ったり、ポジティブな発言をしたりして場を和ませる。ブレストでは「それ、絶対面白い！」「じゃあ、まずやってみない？」と具体的な行動に繋がる提案を連発する。\n\n抽象的な議論や、過去のデータ分析ばかりの会議は苦手。話が細かくなりすぎると、次第に集中力が途切れてしまう。資料を読み上げるだけの報告会は、ほとんどの場合、心ここにあらず状態だ。参加するなら、皆で意見を出し合い、具体的に「何をするか」を決める場を好む。\n\n【ベストな会議の使い方】\n・イベント企画や新規プロジェクトのキックオフ会議にはマスト\n・チームビルディングやモチベーションアップを目的とした会議のファシリテーターとして最適\n・具体的な行動計画を立てる場では、「じゃあ、誰がいつまでに何をやる？」と積極的に動く\n・詳細な数字レビューや長時間の報告会は、必須でなければ参加不要にする方が効率的"},{title:"💬 チャットでの傾向",content:"メッセージの量が多く、絵文字やスタンプ、GIF画像を多用する。感情表現が豊かで、他の人の投稿にも積極的にリアクションを付ける。「最高！」「これ、やりたい！」といったノリの良い返信が多い。雑談チャンネルや社内SNSの常連で、自らも積極的に投稿する。\n\n思いついたらすぐに送るため、メッセージが断片的になったり、誤字脱字があったりすることも。テキストだけのコミュニケーションは、感情が伝わりにくいと感じるため、電話や対面での会話を好む。重要な依頼もライトなトーンで送りがちで、相手が重要性を認識していない場合もある。\n\n【周囲が知っておくと楽なこと】\n・重要な依頼は、チャットだけでなく口頭でも念押しする方が安全\n・「いいね！」や「最高！」のリアクションは、必ずしも「やります」の意味ではない\n・絵文字やスタンプの多用は、共感や好意の表現なので気にしなくてOK\n・深夜に「これ、面白そうじゃない？」と突然メッセージが来るが、返信は翌日で全然OK"},{title:"👔 上司として／部下として",content:"【上司として】\nメンバーには「とにかく楽しんでほしい」と願う、自由奔放なリーダー。チームのムードを明るく保ち、メンバー一人ひとりの「好き」や「得意」を引き出すのが得意だ。「〇〇さんのアイデア、すごく面白いね！すぐやってみよう！」と、具体的な行動を促し、背中を押す。\n\n一方、細かい進捗管理や緻密な計画は苦手。基本的にメンバーを信頼して任せるため、「楽しくやってるなら大丈夫でしょ」と見守るスタンス。結果だけでなく、プロセスをどれだけ楽しめたかを重視する。G型やDp型のサブリーダーを置くと、チームの足元が固まる。\n\n【部下として】\n「自由にやらせてもらえる」ことが最高のモチベーション。上司から信頼され、「面白そうだから、まずやってみて」と言われると、持ち前の行動力を爆発させる。上司とはフラットな関係性を好み、友達のように接したいタイプだ。明るい雰囲気で、どんどん提案や報告をする。\n\nルールやマニュアルでがんじがらめにされたり、細かい報告を求められたりすると、途端に元気がなくなる。自分のやり方に口出しされると、やる気を失いやすい。「もっと面白くできるのに…」と不満が募ることも。具体的な体験を通して学びたいタイプなので、座学研修よりもOJTを好む。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・新しいイベントや企画の立ち上げが決まったとき\n・「前例はないけど、君の好きにやってみて」と言われたとき\n・自分の行動で、周囲の人たちが笑顔になったとき\n・五感で楽しめる新しい体験や冒険に挑戦できるとき\n・チームメンバーとワイワイガヤガヤと協力して進めているとき\n・「君がいると、場が明るくなるね」とフィードバックされたとき\n\n【📉 下がる瞬間】\n・同じ作業の繰り返しや、単調なルーティンが続くと\n・具体的な行動に移せない、机上の空論ばかりの議論\n・「ルールだから」と、理由の説明なく行動を制限されるとき\n・自由度のない環境で、自分の意見が全く通らないとき\n・チームの雰囲気が重く、会話が少ないとき\n・自分の頑張りや貢献が、誰にも気づかれないとき"},{title:"📝 フィードバック",content:"【受けるとき】\n感情で受け取るタイプ。ポジティブなフィードバックには素直に喜び、全身で感謝を表現する。ネガティブなフィードバックは、最初は感情的に落ち込むこともあるが、少し時間を置けば建設的に受け止められる。「まずは良かった点」から伝え、「ここをこうすれば、もっと楽しくなるよ！」といった、ポジティブな言葉で具体的な改善点を伝えるのが鉄則だ。\n\n【伝えるとき】\n基本的にポジティブなことを言うのが得意で、褒め上手。相手の良い面を見つけるのが得意なので、フィードバックはいつも明るい雰囲気で行われる。厳しいフィードバックを伝えるのは苦手で、相手の気持ちを考えて遠回しになりがちだ。「嫌われたくない」「場の空気を悪くしたくない」という気持ちが根底にある。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・イベント企画・運営：人を巻き込み、場を盛り上げるプロ\n・プレゼン・デモンストレーション：全身で表現し、魅力を伝える\n・チームビルディング：チームの結束力を高め、モチベーションを上げる\n・社外パートナーとの交流：フットワーク軽く、新しい繋がりを作る\n・顧客との対面でのコミュニケーション：相手の感情を読み取り、信頼関係を築く\n・新規サービスの体験・テスト：実際に使ってみて、直感的なフィードバックを出す\n・ワークショップのファシリテーション：参加者を巻き込み、活発な議論を促す\n\n【😰 苦手】\n・定型的なデータ入力：単調な作業は飽きてしまいやすい\n・数字の細かいチェック：論理的な検証や精密な確認は苦手\n・長期間の単独作業：人との交流がないとエネルギーが枯渇する\n・手順書・マニュアルの作成：きっちりした文書化はストレス\n・予算管理・リスク分析：地道な分析や先の見通しは苦手\n・長期的な戦略立案：目の前の楽しさに集中しがち\n・バグの地道なデバッグ：細かい検証作業は苦痛"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「これ、みんなで最高に面白くしない？」→人を巻き込む言葉にワクワクする\n・「〇〇さんなら、きっとこの企画を盛り上げられると思って」→期待されると俄然やる気が出る\n・「まずはやってみて、あとは自由にアイデア出してOK！」→裁量と自由度を与えられると本気を出す\n・締切は「いつまでに、まずはここまでやってみてほしい」と明確に伝える\n・「まずは体験してみて、その感想を聞かせてほしい」→具体的な経験を促す\n・「〇〇さんの得意なところを活かしてほしい」→強みにフォーカスすると喜ぶ\n\n【❌ パフォーマンスが落ちる】\n・「このフォーマット通りに、一字一句間違えず入力して」→自由度がなく窮屈に感じる\n・「細かい進捗を毎日報告して」→監視されている感覚に陥り、モチベーションが下がる\n・理由を説明せずに「とにかく前例通りにやって」→納得しないと行動できない\n・「一人で黙々と作業してほしい」→孤立感を感じ、エネルギーが失われる\n・「感情論ではなく、論理的に説明して」→感覚や感情を否定されると傷つく\n\n【💡 コツ】\n1. 最初に「Why」を共有し、その仕事の「楽しさ」や「意義」を伝える。\n2. 自由と裁量を渡し、具体的な行動のきっかけを提供する。締切とチェックポイントは明確に。\n3. 一人にしない。積極的に会話をしたり、壁打ち相手になったりする。\n4. 得意な「動かす」「盛り上げる」フェーズに集中させ、苦手な「詰める」フェーズは他のメンバーに協力を仰ぐ。\n5. こまめに「ありがとう！」「最高！」「君のおかげで盛り上がったね！」とポジティブなフィードバックを伝える。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・イベントプランナー：人々を楽しませる場を作り、自らも盛り上がる\n・エンターテイナー/パフォーマー：全身で表現し、観客を魅了する\n・体験型サービスの企画・運営：ユーザーの五感を刺激する新しい体験を創造する\n\n【⭐ かなり合う】\n・ブランドマーケティング/PR：製品やサービスの魅力を伝えるためのイベントやキャンペーンを企画する\n・コンシューマー向け営業（体験提案型）：顧客に具体的な体験を提案し、その価値を伝える\n・チームビルディングコンサルタント：組織の活性化やチームの一体感を高める施策を実行する\n\n【💡 意外とハマる】\n・ホテル・レジャー施設のスタッフ：お客様と直接触れ合い、その場で喜びを提供する\n・ワークショップ講師：参加者を巻き込み、アクティブな学びの場を作る\n\n【⚠️ 避けた方がいい】\n・定型的な経理・監査：数字を黙々と追う作業は苦痛でしかない\n・品質検査・製品テスト（細かい検証）：精密さや反復作業が求められるため苦手\n・データアナリスト：抽象的なデータと向き合うより、具体的な体験を求める"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nISTJ-G-Dp「金庫番」 — お祭り総隊長が次々繰り出す「面白い」を、金庫番が現実的な計画と確かな実行力で形にする。行動の勢いと着実さが互いの弱点を完璧にカバーし、最強のタッグとなる。\nISFJ-G-Dp「縁の下の力持ち」 — お祭り総隊長が場を盛り上げる裏で、縁の下の力持ちが細やかな気配りでサポート。安心して活動できる基盤を作り、チームの安定に貢献する。\n\n【🔥 化学反応が起きるコンビ】\nENTJ-O-Dp「将軍」 — お祭り総隊長の行動力と将軍の戦略的思考が組み合わさることで、大胆かつ効率的なプロジェクトが生まれる。お互いの強みを引き出し、大きな目標達成を可能にする。\nENFJ-O-Br「伝道師」 — 人を動かす情熱と共感力を持つ伝道師と組むことで、お祭り総隊長のエンタメ力がさらに増幅される。感動と行動を巻き起こす最強のチームビルディングコンビだ。\n\n【☀️ 居心地がいい仲間】\nESFP-G-Dp「エンジョイ職人」 — 同じSFP気質で、楽しむことを追求する姿勢に共感する。エンジョイ職人が一つの楽しみを深く極める姿から、新たな体験のヒントを得ることもある。\nESTP-O-Br「冒険王」 — 目の前の現実を楽しみ、新しい刺激を求める冒険王とは、フットワーク軽くあらゆる場所に飛び込める。スリルと興奮を共有し、常に新しい冒険を追い求める。\n\n【⚡ 未知の触発者】\nINTJ-G-Dp「戦略家」 — お祭り総隊長の衝動的な行動力と、戦略家の深遠な思考が交わることで、全く新しい視点や可能性を発見する。真逆の価値観が視野を広げ、新たな扉を開く。\nINFP-G-Br「夢追い人」 — 外向的なお祭り総隊長と内向的な夢追い人が互いの世界に触れることで、感性と行動が融合する。夢追い人の内なる世界が、お祭り総隊長の表現に深みを与えるだろう。"},{title:"🌈 プライベートの顔",content:"休日の予定はいつもぎっしり。Googleカレンダーにはカラフルな予定がずらりと並び、空白の日が続くと「何か面白いことないかな？」とソワソワし始める。家でじっとしているのは苦手で、常に外に出て新しい体験を求めている人だ。\n\n先週は友達とキャンプでBBQ、今週は週末フェスに参戦、来週は日帰り温泉旅行を計画中…といった具合に、フットワークは驚くほど軽い。特に「体験」を重視するため、アクティビティやイベントには目がない。SNSのストーリーは常に更新され、「これ最高！」の言葉が踊っている。\n\n友達は広く浅く…に見せかけて、実は一人ひとりとの関係をちゃんと大事にしている。様々なコミュニティに顔を出すため、異業種の友達が多く、飲み会で「なんでこのメンツ？」と言われることも日常茶飯事。出会いを何よりも大切にし、常に新しい刺激をくれる人と繋がっていたい。\n\nお金の使い方も「体験」重視。迷ったら「とりあえず行ってみよう！」「買ってみよう！」と衝動買いすることも多いが、それは新しい経験への投資だと考えている。物質的なものよりも、思い出や感動にお金を使うことを惜しまない。\n\n基本的にポジティブで楽天家。何かトラブルが起きても「まあ、なんとかなるっしょ！」と笑い飛ばせる強さを持つ。彼・彼女の周りには常に笑顔と活気が溢れており、その存在自体が周囲を明るくする太陽のような人だ。"}]},
"ESFP-O-Dp":{name:"パフォーマー",character:"嘴平伊之助（鬼滅の刃）",great:"フレディ・マーキュリー",color:"#8E44AD",summary:"「これだけは誰にも負けない表現がある」。一つの表現に全てを注ぎ、舞台で命を燃やすような圧倒的パフォーマンスで魂を揺さぶる。",compatibility:{complement:[{code:"ISTJ-G-Br",name:"組織の記憶庫",desc:"「着火マン」が提示する大胆な企画に対し、「組織の記憶庫」は過去の事例やデータに基づき実現性を分析します。プロジェクトの方向性を議論する際、異なる視点から堅実な意見を出し合い、計画の精度を高めます。"},{code:"INTJ-G-Dp",name:"設計狂",desc:"共通のプロジェクトで、INTPの根本原理に基づき、より洗練された複雑なシステム設計やモデル構築を二人で深く掘り下げる。チャットで夜遅くまで議論を交わし、精緻な構造を創り上げる。"}],chemistry:[{code:"ENFP-O-Dp",name:"伝道師",desc:"「着火マン」と「伝道師」は、情熱と興奮を共有し、お互いのアイデアに深く共感し合えます。休憩時間の雑談でも、熱いビジョンを語り合い、自然体でいられるため、心からリラックスできる関係です。"},{code:"ESTP-O-Dp",name:"エース",desc:"エースの迅速な行動力と実行力が、癒し職人が温めていたアイデアを現実の形にするきっかけを与えます。新しい施術メニューの導入テストでは、エースの行動力が実験を加速させます。"}],comfort:[{code:"ESFP-O-Br",name:"お祭り総隊長",desc:"職場イベントやカジュアルな場で、INTPはESFPがもたらす多様な人々の感情や反応、場の雰囲気を観察。これにより、理論だけでは見過ごしがちな人間行動のパターンや非言語情報に気づかされる。"},{code:"ESFP-G-Dp",name:"ゴッドハンド",desc:"ゴッドハンドの豊かな表現力と癒し職人の繊細な技術が融合し、顧客に感動的な癒し体験を生み出します。イベントでの共同施術では、互いの持ち味を活かし最高のパフォーマンスを発揮します。"}],catalyst:[{code:"ISTJ-O-Br",name:"ルール番人",desc:"作業効率を追求する中で、規律を重んじる番人が定める手順や品質基準を、彼の確かな技術力で実践する。お互いに信頼し、安心して業務に取り組める。"},{code:"INFJ-O-Br",name:"革命家",desc:"目の前の技術課題に集中する彼に、革命家が「この技術で、どんな未来を創りたい？」と問いかけ、深い洞察と大きなビジョンで技術の方向性と意義を触発する。"}]},careers:{top:["アーティスト","独創シェフ","スポーツ選手（個人種目）"],good:["振付師","クリエイティブディレクター","パフォーマー"],surprise:["祭りプロデューサー","ストリートアーティスト"],avoid:["定型事務","コンプライアンス管理"]},strengths:["圧倒的パフォーマンス","没入","魂を揺さぶるインパクト","直感的創造"],weaknesses:["ルーティン","金銭管理","長期計画","協調性"],tips:{do:"このプロジェクト、あなたの独自の表現で最高に魅せてくれない？ どんなアイデアも大歓迎だし、私たちはあなたの才能を最大限に活かしたいんだ。期待しているよ！今度の社内イベントで、参加者全員の魂を揺さぶるようなパフォーマンスを期待しているんだけど、どうすれば一番インパクトが出せると思う？ あなたに全て任せるから、自由に企画してみてほしい。先日〇〇でのあなたのプレゼン、本当に素晴らしかったよ！みんな感動していた。次もあの情熱と表現力で、さらに素晴らしい体験を創り出してくれないかな？ きっと大きな反響を呼ぶはずだよ。",dont:"この企画、マニュアル通りに進めてほしいんだ。手順は全て決まっているから、逸脱しないでね。個性は出さなくていいから、正確にお願い。〇〇さんのやり方を参考にして、同じようにやってみて。あなたの個性は今回は必要ないから、指示通りにこなしてくれればいい。正直、今回のパフォーマンスも別に普通だったよ。もっと基本に忠実にやればよかったんじゃない？次からはもっと効率的に、無難な方法を選んで。"},fullSections:[{title:"👤 この人はこんな人",content:"「これだけは誰にも負けない表現がある」。そう言い切るだけの情熱と努力を、たった一つの道に注ぎ込む。最高のパフォーマンスを追求し、見る人の魂を揺さぶることに全力を尽くす人だ。\n\n人前でスポットライトを浴び、自分が主役になることでエネルギーが最高潮に達する。注目を集め、場の空気を熱狂させることに無上の喜びを感じる。五感をフル稼働させて、いま目の前で起きている現実をありのままに捉え、瞬時に最高のリアクションや表現を返す。その場限りの刹那的な輝きを大切にする。\n\n仕事においては、自身のスキルや表現力を活かせる場所で圧倒的な力を発揮する。新しい表現方法や、既存の枠を超えたアプローチを積極的に試み、常に最高の成果を目指す。妥協を許さず、自分が納得するまで磨き続ける攻めの姿勢が、周囲にも強い影響を与える。\n\n弱点は、緻密な計画や地道な事務作業が苦手なこと。目の前の表現活動に集中しすぎて、周囲が見えなくなったり、期日をうっかり忘れてしまうことも。「最高のパフォーマンスのためには、多少の不備は許される」と、無意識のうちに考えてしまうことがある。\n\n興味の幅は広くないが、一度「これだ！」と決めた対象には底なしの情熱を注ぎ込む。一つの技術や表現を徹底的に極め、その分野においては誰にも負けないプロフェッショナルであろうとする。他の分野の知識にはあまり関心がなく、ひたすら自分の道を深掘りし続ける。\n\n感情が豊かで、喜びや悲しみを素直に表現する。人の気持ちを察する能力が高く、共感力も持ち合わせているが、その場の感情に流されてしまうこともある。人との交流を心から楽しみ、感情を共有することに喜びを感じる。\n\n根底には「自分の表現を通して人々に感動を与えたい」「最高の自分を見てもらいたい」という強い欲求がある。挑戦し続け、高みを目指すことで自己実現を図る、まさに生まれながらのパフォーマーだ。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n「これだ！」と直感的にピンときた瞬間に動き出す。論理的な分析や詳細な計画より、まず実践。身体を動かし、試行錯誤しながら具体的な形にしていく。準備段階から感情移入し、まるで舞台の稽古のように没頭することが多い。ゴールのイメージは鮮明だが、そこに至るプロセスは柔軟に、その場の状況に合わせて最適化しようとする。\n\n【進行フェーズ】\n一点集中型の作業が得意。一度没頭すると、周りの音が聞こえなくなるほど深く集中する。一つのスキルや表現を極めるために、時間を忘れて練習や改善を繰り返す。成果物の「質」には絶対的なこだわりを持ち、自分が納得いくまで何度も手直しする。途中で「もっと良くする方法があるはず」と感じたら、躊躇なく方向転換し、最高の表現を追求する。\n\n【完了フェーズ】\n自分の表現やスキルが関わる部分に関しては、一切の妥協を許さない。細部の仕上げや磨き込みには膨大な時間をかけ、完璧な状態を目指す。しかし、事務的な報告書作成や細かい数値チェックは後回しになりがち。完成した喜びを誰かに伝えたい気持ちが強く、そこから派生する手続きは最小限に留めたい。締切ギリギリまで表現を磨き続け、そこから事務処理へ移行する。\n\n【1日の働き方】\n朝から身体を動かしたり、実践的な作業でエンジンがかかる。午前中に集中してスキルを磨き、午後は人とのデモンストレーションやプレゼンで表現力を発揮するのがベスト。定型のルーティン作業は苦手で、日によって変化のある働き方の方がパフォーマンスは向上する。夜は自分のスキルアップのための自主練に時間を割くことも。"},{title:"🗣️ 会議での振る舞い",content:"会議では積極的に発言し、場の雰囲気を明るくする盛り上げ役。自分の意見やアイデアを、身振り手振りを交えながら具体的に表現するのが得意だ。抽象的な議論よりも「実際にどう動くか」「どう見せるか」といった実践的な視点から意見を出す。デモンストレーションや実演が必要な場面では、率先して中心に立つ。\n\n一方で、数字の羅列や長期計画の策定、抽象的な概念の議論には飽きやすい。詳細な議事録を取る作業は苦手で、会議内容を感情や印象で記憶することが多い。長時間の座学や報告型会議は退屈に感じやすく、つい他のことを考えてしまうことも。\n\n【ベストな会議の使い方】\n・アイデア出しやブレストで、具体的な表現方法を提案する\n・デモンストレーションやプレゼンの中心人物\n・ワークショップなど、参加型で身体を動かす会議のファシリテーター\n・「どう動くか」「どう見せるか」を話し合う場にはマスト"},{title:"💬 チャットでの傾向",content:"チャットでは短く、直感的なメッセージを好む。感情をストレートに表現するため、絵文字やスタンプ、顔文字を
