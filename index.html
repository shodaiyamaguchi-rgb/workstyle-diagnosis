<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>64タイプ ワークスタイル診断</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23667eea'/><stop offset='100%25' stop-color='%23764ba2'/></linearGradient></defs><circle cx='50' cy='50' r='45' fill='url(%23g)'/><text x='50' y='62' text-anchor='middle' font-size='36' font-weight='bold' fill='white'>64</text></svg>">
<meta property="og:title" content="64タイプ ワークスタイル診断">
<meta property="og:description" content="MBTIの4軸に独自の2軸を加えた6軸・64タイプの職場パーソナリティ診断">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="64タイプ ワークスタイル診断">
<meta name="twitter:description" content="MBTIの4軸に独自の2軸を加えた6軸・64タイプの職場パーソナリティ診断">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:rgba(255,255,255,0.03);--card-border:rgba(255,255,255,0.06);--text:#e8e6e3;--text-muted:rgba(255,255,255,0.5);--accent:#E67E22}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.container{max-width:640px;margin:0 auto;padding:0 20px}

/* Start Screen */
#startScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 20px}
.start-label{font-size:11px;letter-spacing:4px;color:var(--text-muted);text-transform:uppercase;margin-bottom:24px}
.start-title{font-family:'Noto Serif JP',serif;font-size:32px;font-weight:700;margin-bottom:12px;line-height:1.4}
.start-sub{font-size:14px;color:var(--text-muted);margin-bottom:48px;line-height:1.8}
.start-btn{display:block;width:100%;max-width:360px;padding:16px 24px;border:none;border-radius:12px;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:500;cursor:pointer;transition:all .3s;margin-bottom:16px}
.start-btn.primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.start-btn.primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(102,126,234,0.3)}
.start-btn.secondary{background:var(--card);color:var(--text);border:1px solid var(--card-border)}
.start-btn.secondary:hover{background:rgba(255,255,255,0.06)}
.start-note{font-size:12px;color:var(--text-muted);margin-top:8px}
.mbti-grid{display:none;flex-wrap:wrap;gap:8px;justify-content:center;max-width:360px;margin:16px auto}
.mbti-grid.show{display:flex}
.mbti-chip{padding:8px 14px;border-radius:8px;background:var(--card);border:1px solid var(--card-border);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.mbti-chip:hover,.mbti-chip.selected{background:rgba(102,126,234,0.2);border-color:rgba(102,126,234,0.5)}

/* Question Screen */
#questionScreen{display:none;min-height:100vh;padding:20px}
.q-header{position:sticky;top:0;background:var(--bg);padding:16px 0 12px;z-index:10}
.q-progress-wrap{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.q-progress-bar{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.q-progress-fill{height:100%;border-radius:2px;transition:width .4s ease;background:linear-gradient(90deg,#667eea,#764ba2)}
.q-count{font-size:12px;color:var(--text-muted);white-space:nowrap}
.q-axis-label{font-size:11px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase}
.q-card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:32px 24px;margin:24px auto;max-width:560px}
.q-text{font-family:'Noto Serif JP',serif;font-size:18px;line-height:1.8;margin-bottom:32px;text-align:center}
.q-scale{display:flex;justify-content:space-between;align-items:center;gap:4px;margin-bottom:12px}
.q-scale-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--card-border);background:transparent;color:var(--text-muted);font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.q-scale-btn:hover{border-color:rgba(102,126,234,0.5);background:rgba(102,126,234,0.1)}
.q-scale-btn.selected{background:linear-gradient(135deg,#667eea,#764ba2);border-color:transparent;color:#fff;transform:scale(1.15)}
.q-scale-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted)}
.q-nav{display:flex;gap:12px;justify-content:center;margin-top:24px;max-width:560px;margin-left:auto;margin-right:auto}
.q-nav-btn{padding:12px 32px;border-radius:10px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:14px;cursor:pointer;transition:all .2s}
.q-nav-btn.prev{background:var(--card);color:var(--text);border:1px solid var(--card-border)}
.q-nav-btn.next{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.q-nav-btn:disabled{opacity:0.3;cursor:not-allowed}

/* Result Screen */
#resultScreen{display:none;padding:40px 0 80px}
.r-header{text-align:center;padding:40px 20px 32px;position:relative;background:radial-gradient(ellipse at center top, color-mix(in srgb, var(--accent) 12%, transparent), transparent 70%)}
.r-label{font-size:11px;letter-spacing:4px;color:var(--text-muted);text-transform:uppercase;margin-bottom:16px}
.r-avatar{width:160px;height:160px;border-radius:50%;border:3px solid var(--accent);background:rgba(255,255,255,0.03);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px color-mix(in srgb, var(--accent) 20%, transparent)}
.r-avatar-letter{font-size:64px;font-family:'Noto Serif JP',serif;font-weight:700}
.r-name{font-family:'Noto Serif JP',serif;font-size:42px;font-weight:700;margin-bottom:8px;text-shadow:0 0 30px color-mix(in srgb, var(--accent) 25%, transparent)}
.r-code{font-size:14px;letter-spacing:2px;margin-bottom:20px;opacity:0.6}
.r-summary{font-size:15px;line-height:1.9;color:var(--text-muted);max-width:540px;margin:0 auto;padding:0 20px}

/* Score bars */
.score-section{padding:24px 20px}
.score-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.score-label{font-size:12px;width:28px;text-align:right;font-weight:700}
.score-bar-wrap{flex:1;height:10px;background:rgba(255,255,255,0.06);border-radius:5px;position:relative;overflow:visible}
.score-bar-fill{height:100%;border-radius:5px;transition:width 1s ease;box-shadow:0 0 8px color-mix(in srgb, var(--accent) 50%, transparent)}
.score-bar-center{position:absolute;top:-2px;left:50%;width:2px;height:14px;background:rgba(255,255,255,0.2);border-radius:1px;transform:translateX(-50%);z-index:1}
.score-pct{font-size:11px;color:var(--text-muted);width:36px}
.score-label-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:-4px;margin-bottom:8px;padding-left:40px;padding-right:36px}

/* Cards */
.r-card{background:rgba(255,255,255,0.04);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--card-border);border-left:4px solid color-mix(in srgb, var(--accent) 60%, transparent);border-radius:16px;margin:16px 20px;overflow:hidden}
.r-card:nth-child(odd){border-left-color:color-mix(in srgb, var(--accent) 40%, transparent)}
.r-card-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;padding:20px 24px;display:flex;align-items:center;gap:10px;color:var(--accent)}
.r-card-title .card-emoji{font-size:22px}

/* Character & Great */
.r-persona{display:flex;gap:16px;padding:0 24px 20px}
.r-persona-item{flex:1;padding:16px;border-radius:12px;background:rgba(255,255,255,0.02);border:1px solid var(--card-border)}
.r-persona-label{font-size:11px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.r-persona-name{font-size:14px;font-weight:500}

/* Accordion */
.accordion-item{border-top:1px solid var(--card-border)}
.accordion-header{padding:16px 24px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:500;transition:background .2s;user-select:none}
.accordion-header:hover{background:rgba(255,255,255,0.02)}
.accordion-arrow{transition:transform .3s;font-size:12px;color:var(--text-muted)}
.accordion-header.open .accordion-arrow{transform:rotate(180deg)}
.accordion-body{display:none;padding:0 24px 20px;font-size:14px;line-height:2;color:var(--text-muted);white-space:pre-line}
.accordion-body.open{display:block}

/* Tabs */
.tab-bar{display:flex;gap:4px;padding:0 24px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--card-border);background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;transition:all .2s}
.tab-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(255,255,255,0.03)}
.tab-content{padding:0 24px 20px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.compat-item{padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.compat-item:last-child{border-bottom:none}
.compat-name{font-weight:700;font-size:14px;margin-bottom:4px}
.compat-code{font-size:12px;color:var(--text-muted)}
.compat-desc{font-size:13px;color:var(--text-muted);margin-top:4px;line-height:1.7}

/* Career */
.career-group{margin-bottom:16px}
.career-group-title{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.career-tags{display:flex;flex-wrap:wrap;gap:6px}

/* Tags */
.tag{display:inline-block;padding:6px 14px;border-radius:20px;font-size:13px;border:1px solid var(--card-border);background:rgba(255,255,255,0.02)}
.tag.green{border-color:rgba(16,185,129,0.4);color:#10b981;background:rgba(16,185,129,0.08);box-shadow:0 0 12px rgba(16,185,129,0.1)}
.tag.red{border-color:rgba(248,113,113,0.35);color:#f87171;background:rgba(248,113,113,0.08)}
.tag.blue{border-color:rgba(59,130,246,0.35);color:#3b82f6;background:rgba(59,130,246,0.08)}
.tag.purple{border-color:rgba(168,85,247,0.35);color:#a855f7;background:rgba(168,85,247,0.08)}
.tag.gold{border-color:rgba(245,158,11,0.4);color:#f59e0b;background:rgba(245,158,11,0.1);box-shadow:0 0 10px rgba(245,158,11,0.08)}
.tag.warn{border-color:rgba(190,60,50,0.25);color:rgba(220,90,80,0.85);background:rgba(190,60,50,0.06)}

/* Tips */
.tip-section{padding:0 24px 20px}
.tip-item{display:flex;gap:10px;padding:10px 14px;font-size:14px;line-height:1.7;color:var(--text-muted);border-radius:10px;margin-bottom:6px}
.tip-item.tip-do{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.12)}
.tip-item.tip-dont{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.12)}
.tip-icon{flex-shrink:0;font-size:16px}

/* Share */
.share-section{position:relative;overflow:hidden;border-radius:16px;background:linear-gradient(135deg,rgba(102,126,234,0.10),rgba(118,75,162,0.10));border:1px solid rgba(102,126,234,0.18);padding:28px 24px}
.share-section::before{content:'';position:absolute;top:-40%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,rgba(102,126,234,0.12),transparent 70%);pointer-events:none}
.share-heading{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
.share-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:20px}
.share-preview{background:rgba(0,0,0,0.25);border-radius:12px;padding:16px;margin-bottom:20px;display:flex;align-items:center;gap:14px;border:1px solid rgba(255,255,255,0.06)}
.share-preview-avatar{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
.share-preview-info{flex:1;min-width:0}
.share-preview-type{font-size:15px;font-weight:700;margin-bottom:2px}
.share-preview-code{font-size:11px;color:var(--text-muted);letter-spacing:1px}
.share-buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.share-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:12px;border:1px solid var(--card-border);background:var(--card);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .25s;text-decoration:none}
.share-btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.share-btn-icon{font-size:24px;line-height:1}
.share-btn.x{background:rgba(0,0,0,0.4);border-color:rgba(255,255,255,0.12)}
.share-btn.x:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.25)}
.share-btn.line{background:rgba(6,199,85,0.08);border-color:rgba(6,199,85,0.25);color:#06c755}
.share-btn.line:hover{background:rgba(6,199,85,0.15);border-color:rgba(6,199,85,0.4)}
.share-btn.copy{background:rgba(102,126,234,0.08);border-color:rgba(102,126,234,0.25);color:#667eea}
.share-btn.copy:hover{background:rgba(102,126,234,0.15);border-color:rgba(102,126,234,0.4)}
.share-toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(102,126,234,0.95);color:#fff;padding:12px 28px;border-radius:12px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:100;backdrop-filter:blur(8px)}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Restart */
.restart-wrap{text-align:center;padding:40px 20px}
.restart-btn{padding:14px 40px;border-radius:12px;border:1px solid var(--card-border);background:var(--card);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;cursor:pointer;transition:all .2s}
.restart-btn:hover{background:rgba(255,255,255,0.06)}

/* fadeInUp animation for result cards */
@keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.r-card{animation:fadeInUp .5s ease both}
.r-card:nth-child(2){animation-delay:.1s}
.r-card:nth-child(3){animation-delay:.2s}
.r-card:nth-child(4){animation-delay:.3s}
.r-card:nth-child(5){animation-delay:.4s}
.r-card:nth-child(6){animation-delay:.5s}
.r-card:nth-child(7){animation-delay:.6s}
.r-card:nth-child(8){animation-delay:.7s}
.r-card:nth-child(9){animation-delay:.8s}
.r-header{animation:fadeInUp .5s ease both}

/* Question fade transition */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-card.fade-in{animation:fadeIn .3s ease both}

/* Type badge chips */
.type-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:16px auto 20px;max-width:480px}
.type-badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:0.5px;border:1.5px solid var(--accent);color:var(--accent);background:rgba(255,255,255,0.03)}
.type-badge.axis-ei{border-color:rgba(99,102,241,0.6);color:#6366f1;background:rgba(99,102,241,0.08)}
.type-badge.axis-sn{border-color:rgba(139,92,246,0.6);color:#8b5cf6;background:rgba(139,92,246,0.08)}
.type-badge.axis-tf{border-color:rgba(236,72,153,0.6);color:#ec4899;background:rgba(236,72,153,0.08)}
.type-badge.axis-jp{border-color:rgba(245,158,11,0.6);color:#f59e0b;background:rgba(245,158,11,0.08)}
.type-badge.axis-og{border-color:rgba(16,185,129,0.6);color:#10b981;background:rgba(16,185,129,0.08)}
.type-badge.axis-db{border-color:rgba(6,182,212,0.6);color:#06b6d4;background:rgba(6,182,212,0.08)}
/* Compat dot */
.compat-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;vertical-align:middle;background:var(--accent);box-shadow:0 0 6px color-mix(in srgb, var(--accent) 40%, transparent)}

/* Prominent restart button for shared links */
.restart-btn.prominent{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;font-size:16px;padding:16px 48px}
.restart-btn.prominent:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(102,126,234,0.3)}

@media(max-width:400px){
  .q-scale-btn{width:38px;height:38px;font-size:13px}
  .r-name{font-size:32px}
  .r-avatar{width:120px;height:120px}
  .r-avatar-letter{font-size:48px}
  .r-persona{flex-direction:column}
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen">
  <div class="start-label">Work Style Personality Map</div>
  <div class="start-title">64タイプ<br>ワークスタイル診断</div>
  <div class="start-sub">MBTIの4軸に独自の2軸を加えた<br>6軸・64タイプの職場パーソナリティ診断</div>
  <button class="start-btn primary" onclick="startFull()">90問で診断する<br><span style="font-size:12px;opacity:0.7">所要時間：約10分</span></button>
  <button class="start-btn secondary" onclick="toggleMbtiSelect()">MBTIを知っている人はこちら<br><span style="font-size:12px;opacity:0.7">30問ショートカット（約4分）</span></button>
  <div class="mbti-grid" id="mbtiGrid"></div>
  <div class="start-note" id="mbtiNote" style="display:none">MBTIタイプを選んでください</div>
</div>

<!-- QUESTION SCREEN -->
<div id="questionScreen">
  <div class="container">
    <div class="q-header">
      <div class="q-progress-wrap">
        <div class="q-progress-bar"><div class="q-progress-fill" id="progressFill"></div></div>
        <div class="q-count" id="qCount"></div>
      </div>
      <div class="q-axis-label" id="qAxisLabel"></div>
    </div>
    <div class="q-card">
      <div class="q-text" id="qText"></div>
      <div class="q-scale" id="qScale"></div>
      <div class="q-scale-labels"><span>全く当てはまらない</span><span>非常に当てはまる</span></div>
    </div>
    <div class="q-nav">
      <button class="q-nav-btn prev" id="prevBtn" onclick="prevQ()">← 戻る</button>
      <button class="q-nav-btn next" id="nextBtn" onclick="nextQ()">次へ →</button>
    </div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="resultScreen">
  <div class="container" id="resultContent"></div>
</div>

<script>
const PROFILES = {
"ENFP-O-Br":{name:"着火マン",character:"ルフィ（ONE PIECE）",great:"マルコ・ポーロ",color:"#E67E22",summary:"「あ、それ面白そう」が人生のエンジン。0→1が圧倒的に得意で、興味の幅が広く異分野の知識を組み合わせてアイデアを出す。人の気持ちに敏感でチームの空気を真っ先に察知する。",compatibility:{complement:[{code:"ISTJ-G-Dp",name:"金庫番",desc:"発散を形にする完璧な分業。"},{code:"ISTJ-G-Br",name:"組織の記憶庫",desc:"広い視野を持ちつつ真逆のアプローチで補い合う。"}],chemistry:[{code:"ENTJ-O-Dp",name:"将軍",desc:"アイデアを戦略に落とし込む爆発力。"},{code:"ENTP-O-Br",name:"アイデアマン",desc:"アイデアの応酬が止まらないコンビ。"}],comfort:[{code:"ENFP-O-Dp",name:"伝道師",desc:"同じ情熱を共有し自然体でいられる。"},{code:"ESFP-O-Br",name:"お祭り総隊長",desc:"一緒にいると楽しさ2倍。"}],catalyst:[{code:"ESTJ-G-Dp",name:"頑固職人",desc:"真逆の価値観が視野を広げる。"},{code:"ISTP-G-Dp",name:"専属オペレーター",desc:"職人的な深さが新しい視点を。"}]},careers:{top:["新規事業開発","プロデューサー","コミュニティマネージャー"],good:["ブランドマーケティング","UXリサーチャー","組織開発"],surprise:["ソリューション営業","ファシリテーター"],avoid:["定型的な経理","品質検査・データ入力"]},strengths:["アイデア出し","企画の初期ドラフト","プレゼン","社外パートナーとの関係構築"],weaknesses:["定型フォーマット入力","数字の細かいチェック","長期間の単独作業","手順書の作成"],tips:{do:"「面白い企画があるんだけど一緒に考えてくれない？」→巻き込まれるのが好き。裁量をもらえると本気を出す。",dont:"「このフォーマット通りにやって」「細かく進捗報告して」→自由度がないと窮屈。"},fullSections:[{title:"👤 この人はこんな人",content:"「あ、それ面白そう」が人生のエンジン。可能性が見えると黙っていられない。0→1のフェーズが圧倒的に得意。\n\n人といるとエネルギーが湧いてくる。ランチに誰かを誘うのはだいたいこの人。興味の幅が広く、全然違う分野の知識を組み合わせてアイデアを出す。\n\n弱点は物事を最後まできっちり詰めるのがしんどいこと。8割できたあたりで「だいたいOK」と思いがち。同じ作業の繰り返しをやっていると魂が抜けていく。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n「面白い」と思った瞬間に動き出す。まず人に話しに行く。着手は早いが計画を立てるよりまず手を動かす派。\n\n【進行フェーズ】\n複数のタスクを並行して進めるのが自然体。途中で「もっといいやり方があるかも」と方向転換することが多い。\n\n【完了フェーズ】\n8割できたあたりで「だいたいOK」と思いがち。詰めの作業は苦手。締切直前に集中力が爆発する。\n\n【1日の働き方】\n朝はゆっくり、午前中に人と話してエンジンをかけ、午後にクリエイティブな仕事。固定ルーティンより日によってリズムが違う方がパフォーマンスが出る。"},{title:"🗣️ 会議での振る舞い",content:"会議の盛り上げ役。沈黙が続くと自分から口火を切る。ブレストでは誰よりもアイデアを出し、他の人の意見に「それいいね！」と乗っかってさらに広げる。\n\n一方で議論が細部の詰めに入ると集中力が落ちる。議事録を取るのは苦手。\n\n【ベストな会議の使い方】\n・ブレスト・アイデア出しの場にはマスト\n・キックオフミーティングのファシリテーターとして最適\n・詳細レビュー会議には必須でなければ参加不要"},{title:"💬 チャットでの傾向",content:"メッセージ量が多い。思いついたらすぐ送る。絵文字・リアクションを多用し、他の人の投稿にもよくリアクション。\n\n【周囲が知っておくと楽なこと】\n・重要な依頼はSlackだけでなく口頭でも確認する方が安全\n・「面白い！」のリアクションは「やります」の意味ではない\n・深夜にアイデアメモが飛んでくることがあるが返信は翌日でOK"},{title:"👔 上司として／部下として",content:"【上司として】\n自由にやらせてくれるリーダー。メンバーの強みを見つけるのが上手く活かすポジションに配置する。ビジョンを熱く語りチームのモチベーションを上げる。一方でマイクロマネジメントは一切しない（できない）。\n\n【部下として】\n自由を与えてもらうと120%の力を発揮する。「好きにやっていいよ」が最高の褒め言葉。管理型の上司とは相性が悪い。理由なきルールが最も苦手。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・新しいプロジェクトのキックオフ\n・「前例がないけどやってみよう」と言われたとき\n・自分のアイデアが採用されたとき\n・チームメンバーが自分の言葉で動いてくれたとき\n\n【📉 下がる瞬間】\n・同じ作業の繰り返しが続くとき\n・アイデアを出しても全部却下されるとき\n・自由度のない環境に閉じ込められたとき\n・一つのことだけを延々とやらされるとき"},{title:"📝 フィードバック",content:"【受けるとき】\n感情で受け取る。ポジティブなFBにはすごく素直に喜ぶ。ネガティブなFBは最初感情的に落ち込むが、少し時間を置くと建設的に受け止められる。\n\n【伝えるとき】\n基本ポジティブなことを言うのが得意で褒め上手。厳しいFBを伝えるのは苦手で遠回しになりがち。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・アイデア出し・ブレスト\n・企画書の初期ドラフト\n・プレゼン・ピッチ\n・社外パートナーとの関係構築\n・ワークショップのファシリ\n・新規プロジェクト立ち上げ\n\n【😰 苦手】\n・定型フォーマットへの入力\n・数字の細かいチェック\n・長期間の単独作業\n・手順書の作成\n・予算管理"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むとうまくいく】\n・「面白い企画があるんだけど」→巻き込まれるのが好き\n・「自由にやってOK、方向性だけ合わせよう」→裁量をもらえると本気を出す\n・締切は明確に伝える→本人は楽観的に見積もるので\n\n【❌ パフォーマンスが落ちる】\n・「このフォーマット通りにやって」→自由度がないと窮屈\n・「細かく進捗報告して」→監視されている感覚に\n・理由を説明せずに「とにかくやって」→納得しないと動けない\n\n【💡 コツ】\n1. 最初に「Why」を共有する\n2. 自由と裁量を渡し、締切とチェックポイントは明確に\n3. 一人にしない。壁打ち相手をつける"},{title:"🎯 適職マップ",content:"【🏆 天職レベル】\n・新規事業開発 — 0→1を作りながら人を巻き込む\n・プロデューサー — 多方面のステークホルダーをまとめビジョンを形にする\n・コミュニティマネージャー — 外向×共感×攻めの三拍子\n\n【⭐ かなり合う】\n・ブランドマーケティング/PR\n・UXリサーチャー\n・組織開発/人事企画\n\n【💡 意外とハマる】\n・ソリューション営業\n・ファシリテーター\n\n【⚠️ 避けた方がいい】\n・定型的な経理・監査\n・品質検査・データ入力"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nISTJ-G-Dp「金庫番」 — 正反対だからこそ最強の補完。着火マンが広げたアイデアを金庫番が着実に形にする。\n\n【🔥 化学反応が起きるコンビ】\nENTJ-O-Dp「将軍」 — アイデアを戦略に落とし込む爆発力。\nENTP-O-Br「アイデアマン」 — アイデアの応酬が止まらない。\n\n【☀️ 居心地がいい仲間】\nENFP-O-Dp「伝道師」 — 同じ情熱を共有し自然体でいられる。\n\n【⚡ 未知の触発者】\nESTJ-G-Dp「頑固職人」 — 真逆の価値観が視野を広げる。"},{title:"🌈 プライベートの顔",content:"休日の予定を聞くと毎回違うことを言っている人。先週は「陶芸体験に行ってきた」、今週は「友達とフットサルした」。Googleカレンダーに空白の日が続くとソワソワする。\n\n友達は広く浅く…に見せかけて、実は一人ひとりとの関係をちゃんと大事にしている。お金の使い方は「体験」重視。「あの時行っておけばよかった」と後悔するのが一番嫌だから迷ったら行く。"}]},
"ENFP-O-Dp":{name:"伝道師",character:"ナルト（NARUTO）",great:"キング牧師",color:"#D35400",summary:"「これだけは絶対に伝えたい」という一つのテーマに人生を賭ける情熱家。着火マンの広さを深さに変えたタイプ。一つの信念で人を動かす。",compatibility:{complement:[{code:"ISTJ-G-Br",name:"組織の記憶庫",desc:"情熱を記録と仕組みで持続させる。"},{code:"ISTJ-O-Dp",name:"任務遂行者",desc:"伝道師のビジョンを確実に遂行。"}],chemistry:[{code:"ENFJ-O-Dp",name:"恩師",desc:"使命感が共鳴し合う深い同盟。"},{code:"ENFP-O-Br",name:"着火マン",desc:"情熱を共有し自然体でいられる。"}],comfort:[{code:"ENFP-G-Dp",name:"共感屋",desc:"深い共感が共通。"},{code:"INFP-O-Dp",name:"理想主義者",desc:"理想への情熱。"}],catalyst:[{code:"ESTP-O-Br",name:"トラブルシューター",desc:"「動こう」が行動に火を。"},{code:"INTP-O-Br",name:"発明家",desc:"知的な刺激が情熱を進化させる。"}]},careers:{top:["社会起業家","布教型マーケター","教育改革者"],good:["NPOリーダー","トレーナー・講師","クリエイティブディレクター"],surprise:["政治家","ドキュメンタリー制作"],avoid:["定型事務","価値観に合わない営業"]},strengths:["一つのテーマへの没入","人を巻き込む情熱","深い共感力","使命感"],weaknesses:["マルチタスク","事務処理","客観性","興味外の仕事"],tips:{do:"「これを世界に広めてほしい」→使命感に火がつく。",dont:"「幅広くいろいろやって」→一つに集中してこそ。"},fullSections:[{title:"👤 この人はこんな人",content:"「これだけは絶対に伝えたい」というテーマに人生を賭ける情熱家。\n\n着火マンの広さを深さに変えたタイプ。一つの信念で人を動かす。話を聞いていると「自分もやりたくなる」と思わせる力がある。\n\n弱点は興味外の仕事へのモチベーションが極端に低いこと。"},{title:"💼 仕事の進め方",content:"【着手】使命に共感できれば即動く。【進行】一つのテーマに深く没入。人を巻き込みながら進める。【完了】「伝わったか」が基準。【1日】テーマに関わる時間が多いほど調子がいい。"},{title:"🗣️ 会議での振る舞い",content:"テーマに関する議論では圧倒的な熱量。人の心を動かすプレゼンが得意。\n【ベスト】ビジョン共有/キックオフ/外部への発信"},{title:"💬 チャットでの傾向",content:"テーマに関する発信は熱い長文。それ以外は少なめ。\n【知っておくと楽】情熱モードの長文は本気の証。事務連絡は別途リマインドを。"},{title:"👔 上司として／部下として",content:"【上司】使命感でチームを引きつける。一人ひとりの「なぜ」を大切にする。管理は弱い。\n【部下】使命を共有できる上司の下で最強。共有できないと沈黙。"},{title:"🔥 モチベーション",content:"【🚀】使命が前進した/人が動いてくれた/共感された/深い対話\n【📉】使命と無関係な仕事/事務処理/価値観の合わない環境"},{title:"📝 フィードバック",content:"【受ける】使命への共感がベースにあると受け入れやすい。【伝える】情熱を込めて。相手の可能性を引き出す。"},{title:"✅ 得意・苦手タスク",content:"【🎯】布教・発信/深い対話/ビジョン共有/人を巻き込む\n【😰】マルチタスク/事務処理/客観的分析/興味外の作業"},{title:"📖 頼み方マニュアル",content:"【✅】「これを世界に広めてほしい」→使命感に火がつく。\n【❌】「いろいろやって」→一つに集中してこそ。\n【💡】1.使命との接続を示す 2.深く没入する時間を 3.事務はサポート体制を"},{title:"🎯 適職マップ",content:"【🏆】社会起業家/布教型マーケター/教育改革者\n【⭐】NPOリーダー/トレーナー/クリエイティブディレクター\n【💡】政治家/ドキュメンタリー\n【⚠️】定型事務/価値観に合わない営業"},{title:"🤝 相性マップ",content:"【💎】ISTJ-G-Br「組織の記憶庫」。ISTJ-O-Dp「任務遂行者」。\n【🔥】ENFJ-O-Dp「恩師」。ENFP-O-Br「着火マン」。\n【☀️】ENFP-G-Dp「共感屋」。INFP-O-Dp「理想主義者」。\n【⚡】ESTP-O-Br「トラブルシューター」。"},{title:"🌈 プライベートの顔",content:"テーマに関連する本、映画、イベントに時間を使う。友達との会話も自然とテーマの話になりがち。「また始まった」と言われるが本人は楽しい。"}]},
"ENFP-G-Br":{name:"ムードメーカー",character:"善逸（鬼滅の刃）",great:"ダイアナ妃",color:"#F0B27A",summary:"「みんなが楽しく過ごせるように」が行動原理。守り×広型で場の空気を温かくする天才。自分が目立つより周囲が笑顔になることが嬉しい。",compatibility:{complement:[{code:"ISTJ-O-Dp",name:"任務遂行者",desc:"温かさに鉄の意志が構造を。"},{code:"INTJ-O-Dp",name:"ラスボス",desc:"温かさと知性のバランス。"}],chemistry:[{code:"ESFJ-G-Br",name:"調和の達人",desc:"場の雰囲気が極上に。"},{code:"INFP-G-Br",name:"やさしさ担当",desc:"温かさ×想像力。"}],comfort:[{code:"ENFP-O-Br",name:"着火マン",desc:"楽しさ共通。"},{code:"ENFP-G-Dp",name:"共感屋",desc:"優しさ共通。"}],catalyst:[{code:"ENTJ-O-Br",name:"総司令",desc:"強い指揮力が方向を与える。"},{code:"ESTJ-O-Dp",name:"鬼教官",desc:"厳しさが優しさを鍛える。"}]},careers:{top:["チームビルディング担当","カスタマーサクセス","社内コミュニケーション担当"],good:["イベント企画","カウンセラー","広報"],surprise:["保育関連","ホスピタリティ"],avoid:["厳格な監査","一人の長時間データ作業"]},strengths:["場の空気を温める","誰にでも優しい","チームの心理的安全性","気配り"],weaknesses:["厳しい判断","自己主張","対立の処理","一人作業"],tips:{do:"「チームの雰囲気をよくしてほしい」→天性の力。",dont:"「もっと厳しく言って」→対立がストレス。"},fullSections:[{title:"👤 この人はこんな人",content:"「みんなが楽しく過ごせるように」が行動原理。場の空気を温かくする天才。\n\n新しいメンバーに真っ先に声をかけ、孤立しがちな人にも自然に話しかける。自分が目立つより周囲が笑顔になることが嬉しい。\n\n弱点は自分の意見を飲み込むこと。対立が苦手で問題を先送りすることがある。"},{title:"💼 仕事の進め方",content:"【着手】周囲の状況を確認してから。【進行】チームと協調しながら場の空気を見て進行。【完了】「みんなが満足しているか」。【1日】穏やかなリズム。人との交流で充電。"},{title:"🗣️ 会議での振る舞い",content:"場を和ませる存在。声の小さい人の意見を拾い上げる。\n【ベスト】チームビルディング/ブレストの場の温め/新メンバー歓迎"},{title:"💬 チャットでの傾向",content:"リアクション多め。ねぎらいと感謝の言葉。雑談チャンネルの盛り上げ役。\n【知っておくと楽】「何でもいいよ」は本心でないことがある。1on1で本音を。"},{title:"👔 上司として／部下として",content:"【上司】みんなに好かれるリーダー。心理的安全性が高い。厳しい判断が苦手。\n【部下】チームの空気を守る縁の下の力持ち。"},{title:"🔥 モチベーション",content:"【🚀】チームの雰囲気が良い/「いてくれて助かる」/新メンバーが馴染んだ\n【📉】チーム内の対立/孤立/攻撃的な環境"},{title:"📝 フィードバック",content:"【受ける】「いつもありがとう。ここをこうするともっと」が理想。【伝える】とても優しい。核心が伝わらないことも。"},{title:"✅ 得意・苦手タスク",content:"【🎯】場を温める/気配り/心理的安全性/包容力\n【😰】自己主張/厳しい判断/対立解決/一人作業"},{title:"📖 頼み方マニュアル",content:"【✅】「チームの雰囲気をよくして」「新メンバーの面倒を」。\n【❌】「強く言って」「一人で」。\n【💡】1.人関わりの多い仕事 2.貢献を見える化 3.厳しい場面は分担"},{title:"🎯 適職マップ",content:"【🏆】チームビルディング/カスタマーサクセス/社内コミュニケーション\n【⭐】イベント企画/カウンセラー/広報\n【💡】保育関連/ホスピタリティ\n【⚠️】厳格な監査/一人のデータ作業"},{title:"🤝 le:"🌈 プライベートの顔",content:"同じ趣味を長く。ワイン、盆栽、囲碁。変わらない日常を好む。少数の深い友人と年に数回。"}]},
"ENFJ-O-Br":{name:"カリスマ委員長",character:"オールマイト（僕のヒーローアカデミア）",great:"オバマ",color:"#F39C12",summary:"「みんなを巻き込んで、もっといい場所にする」。攻め×広型で人を動かすビジョナリー。話すだけで人が「ついていきたい」と思う天性のカリスマ。",compatibility:{complement:[{code:"ISTP-O-Dp",name:"一刀流の職人",desc:"カリスマに寡黙な実力が重みを。"},{code:"ISTP-G-Dp",name:"専属オペレーター",desc:"ビジョンに職人的な深さを。"}],chemistry:[{code:"ENFP-O-Br",name:"着火マン",desc:"ビジョン×アイデアで場が盛り上がる。"},{code:"ENTJ-O-Br",name:"総司令",desc:"人を動かす力と戦略の最強タッグ。"}],comfort:[{code:"ENFJ-O-Dp",name:"恩師",desc:"同じENFJ-O。使命感。"},{code:"ENFJ-G-Br",name:"守護霊",desc:"同じENFJ-Br。温かさ。"}],catalyst:[{code:"INTP-O-Dp",name:"研究者",desc:"知性がカリスマに深みを。"},{code:"ISTP-O-Br",name:"現場の万能技師",desc:"技術がビジョンを現実に。"}]},careers:{top:["スタートアップCEO","政治家","教育のリーダー"],good:["人事責任者","ブランドディレクター","NGOリーダー"],surprise:["牧師・宗教指導者","TED級のスピーカー"],avoid:["一人のデータ分析","バックオフィスのルーティン"]},strengths:["人を動かすカリスマ","ビジョンの発信","チームのモチベーション","広い人脈"],weaknesses:["一人の地味な作業","厳しい判断","自分のケア","数字の管理"],tips:{do:"「人を巻き込んで変えてほしい」→カリスマ全開。",dont:"「一人で黙々とやって」→人といてこそ。"},fullSections:[{title:"👤 この人はこんな人",content:"話すだけで人が「ついていきたい」と思うカリスマ。ビジョンを語ると人が集まる。\n\n人の強みを見つけて引き出すのが天才的に上手い。\n\n弱点は自分のケアの後回しと、嫌われることへの恐怖。"},{title:"💼 仕事の進め方",content:"【着手】ビジョンを語って人を集める。【進行】チームを巻き込みながら。一人ひとりの役割を明確に。【完了】「みんなが成長できたか」。【1日】人との交流が多い日が好調。"},{title:"🗣️ 会議での振る舞い",content:"場を引っ張る。ビジョンを語り、メンバーの意見を引き出す。\n【ベスト】キックオフ/ビジョン共有/チームビルディング"},{title:"💬 チャットでの傾向",content:"メッセージは温かく励ます内容。個別DMでのケアも多い。\n【知っておくと楽】本人が疲れていても「大丈夫」と言いがち。"},{title:"👔 上司として／部下として",content:"【上司】カリスマ型。メンバーの成長を心から喜ぶ。ただし厳しい判断は苦手。\n【部下】ビジョンに共感すれば驚異的な力を発揮。"},{title:"🔥 モチベーション",content:"【🚀】ビジョンが前進/人が動いてくれた/メンバーの成長/感謝された\n【📉】ビジョンを否定/孤立/人が離れていく/嫌われた"},{title:"📝 フィードバック",content:"【受ける】人格を認めた上でのFBは受容。【伝える】温かく、相手の強みに焦点。"},{title:"✅ 得意・苦手タスク",content:"【🎯】ビジョン発信/人を動かす/チームのモチベ/人脈構築\n【😰】一人作業/厳しい判断/自分のケア/数字管理"},{title:"📖 頼み方マニュアル",content:"【✅】「人を巻き込んで変えてほしい」→カリスマ全開。\n【❌】「一人で黙々と」→人といてこそ。\n【💡】1.ビジョンを共有 2.人と関わる仕事 3.カリスマを認める"},{title:"🎯 適職マップ",content:"【🏆】スタートアップCEO/政治家/教育リーダー\n【⭐】人事責任者/ブランドディレクター/NGOリーダー\n【💡】宗教指導者/TEDスピーカー\n【⚠️】一人のデータ分析/バックオフィスルーティン"},{title:"🤝 相性マップ",content:"【💎】ISTP-O-Dp「一刀流の職人」。ISTP-G-Dp「専属オペレーター」。\n【🔥】ENFP-O-Br「着火マン」。ENTJ-O-Br「総司令」。\n【☀️】ENFJ-O-Dp「恩師」。ENFJ-G-Br「守護霊」。\n【⚡】INTP-O-Dp「研究者」。"},{title:"🌈 プライベートの顔",content:"人と過ごすことが充電。友達が多く週末は予定ぎっしり。人の相談に乗ることが多い。自分のケアは後回しになりがち。"}]},

-Dp「詩人」。INFJ-G-Br「語り部」。\n【🔥】ENTJ-O-Br「総司令」。ESTP-O-Dp「エース」。\n【☀️】ESTJ-O-Dp「鬼教官」。ESTJ-G-Br「なんでも屋」。\n【⚡】ENFP-O-Br「着火マン」。"},{title:"🌈 プライベートの顔",content:"休日も「やることリスト」。ジム、ゴルフ、DIY。成果が見えるもの。人間関係は戦友のような絆。"}]},

const CUSTOM_QUESTIONS = QUESTIONS.filter(q => q.id >= 61);

// スコアリング
function calcScores(answers, mbtiOverride) {
  const axes = { EI: 0, SN: 0, TF: 0, JP: 0, OG: 0, DB: 0 };
  const counts = { EI: 0, SN: 0, TF: 0, JP: 0, OG: 0, DB: 0 };

  for (const q of QUESTIONS) {
    if (mbtiOverride && q.id < 61) continue;
    const val = answers[q.id];
    if (val === undefined) continue;
    const score = q.dir === 1 ? val : (8 - val);
    axes[q.axis] += score;
    counts[q.axis]++;
  }

  const results = {};
  for (const axis of Object.keys(axes)) {
    if (mbtiOverride && (axis === "EI" || axis === "SN" || axis === "TF" || axis === "JP")) continue;
    const max = counts[axis] * 7;
    const min = counts[axis];
    results[axis] = { raw: axes[axis], pct: Math.round(((axes[axis] - min) / (max - min)) * 100) };
  }
  return results;
}

// タイプ判定
function getType(scores, mbtiOverride) {
  let e, n, t, j;
  if (mbtiOverride) {
    e = mbtiOverride[0] === "E"; n = mbtiOverride[1] === "N";
    t = mbtiOverride[2] === "T"; j = mbtiOverride[3] === "J";
  } else {
    e = scores.EI.pct >= 50; n = scores.SN.pct >= 50;
    t = scores.TF.pct >= 50; j = scores.JP.pct >= 50;
  }
  const o = scores.OG.pct >= 50;
  const br = scores.DB.pct >= 50;
  const code = `${e?"E":"I"}${n?"N":"S"}${t?"T":"F"}${j?"J":"P"}-${o?"O":"G"}-${br?"Br":"Dp"}`;
  return code;
}

  document.getElementById('startScreen').style.display = 'none';

  renderQuestion();
}

function renderQuestion() {
  const q = currentQs[currentIdx];
  const total = currentQs.length;
  document.getElementById('progressFill').style.width = ((currentIdx + 1) / total * 100) + '%';
  document.getElementById('qCount').textContent = `${currentIdx + 1} / ${total}`;
  // Axis label hidden to avoid response bias
  document.getElementById('qText').textContent = q.text;

  // Trigger fade animation on question card
  const qCard = document.querySelector('.q-card');
  if (qCard) {
    qCard.classList.remove('fade-in');
    void qCard.offsetWidth; // force reflow
    qCard.classList.add('fade-in');
  }
  
  const scaleDiv = document.getElementById('qScale');
  scaleDiv.innerHTML = '';
  for (let i = 1; i <= 7; i++) {
    const btn = document.createElement('button');
    btn.className = 'q-scale-btn' + (answers[q.id] === i ? ' selected' : '');
    btn.textContent = i;
    btn.onclick = () => selectAnswer(q.id, i);
    scaleDiv.appendChild(btn);
  }
  
  document.getElementById('prevBtn').disabled = currentIdx === 0;
  const isLast = currentIdx === total - 1;
  document.getElementById('nextBtn').textContent = isLast ? '結果を見る →' : '次へ →';
  document.getElementById('nextBtn').disabled = answers[q.id] === undefined;
}

function selectAnswer(qid, val) {
  answers[qid] = val;
  renderQuestion();
  // Auto-advance after short delay
  setTimeout(() => {
    if (currentIdx < currentQs.length - 1) {
      nextQ();
    }
  }, 300);
}

function nextQ() {
  const q = currentQs[currentIdx];
  if (answers[q.id] === undefined) return;
  if (currentIdx < currentQs.length - 1) {
    currentIdx++;
    renderQuestion();
    window.scrollTo({top: 0, behavior: 'smooth'});
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentIdx > 0) {
    currentIdx--;
    renderQuestion();
  }
}

function renderScoreBars(allScores, color) {
  const wrap = document.getElementById('scoreBars');
  const axes = ['EI','SN','TF','JP','OG','DB'];
  const axisColors = {EI:'#6366f1',SN:'#8b5cf6',TF:'#ec4899',JP:'#f59e0b',OG:'#10b981',DB:'#06b6d4'};
  let html = '';
  axes.forEach(axis => {
    const s = allScores[axis];
    const pct = s ? s.pct : 50;
    const labels = AXIS_LABELS[axis];
    const ac = axisColors[axis];
    html += `
      <div class="score-row">
        <div class="score-label" style="color:${ac}">${labels[0].split(' ')[0]}</div>
        <div class="score-bar-wrap">
          <div class="score-bar-center"></div>
          <div class="score-bar-fill" data-pct="${pct}" style="width:0%;background:${ac};box-shadow:0 0 10px ${ac}44"></div>
        </div>
        <div class="score-pct">${pct}%</div>
      </div>
      <div class="score-label-row"><span>${labels[0]}</span><span>${labels[1]}</span></div>
    `;
  });
  wrap.innerHTML = html;
  // Animate bars from 0 to target width
  requestAnimationFrame(() => {
    wrap.querySelectorAll('.score-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.pct + '%';
    });
  });
}

function renderAccordion(sections) {
  const wrap = document.getElementById('accordionWrap');
  if (!sections || !sections.length) { wrap.innerHTML = '<p style="padding:20px 24px;color:var(--text-muted)">詳細データなし</p>'; return; }
  let html = '';
  sections.forEach((sec, i) => {
    html += `
      <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(this)">
          <span>${sec.title}</span>
          <span class="accordion-arrow">▼</span>
        </div>
        <div class="accordion-body">${sec.content}</div>
      </div>
    `;
  });
  wrap.innerHTML = html;
  // Open first by default
  const first = wrap.querySelector('.accordion-header');
  if (first) toggleAccordion(first);
}

function toggleAccordion(header) {
  header.classList.toggle('open');
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

function renderCompatibility(compat, color) {
  if (!compat) return;
  const tabs = [
    {key:'complement',label:'💎 補完',data:compat.complement},
    {key:'chemistry',label:'🔥 化学反応',data:compat.chemistry},
    {key:'comfort',label:'☀️ 居心地',data:compat.comfort},
    {key:'catalyst',label:'⚡ 触発',data:compat.catalyst}
  ];
  
  const tabBar = document.getElementById('compatTabs');
  const content = document.getElementById('compatContent');
  
  let tabHtml = '';
  let panelHtml = '';
  tabs.forEach((t, i) => {
    tabHtml += `<button class="tab-btn${i===0?' active':''}" onclick="switchTab(this,'compat',${i})">${t.label}</button>`;
    let items = '';
    if (t.data && t.data.length) {
      t.data.forEach(item => {
        items += `<div class="compat-item"><div class="compat-name"><span class="compat-dot"></span>${item.name || ''}</div><div class="compat-code">${item.code || ''}</div><div class="compat-desc">${item.desc || ''}</div></div>`;
      });
    } else {
      items = '<p style="color:var(--text-muted);font-size:14px">データなし</p>';
    }
    panelHtml += `<div class="tab-panel${i===0?' active':''}" data-tab-group="compat" data-tab-idx="${i}">${items}</div>`;
  });
  tabBar.innerHTML = tabHtml;
  content.innerHTML = panelHtml;
}

function switchTab(btn, group, idx) {
  btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll(`[data-tab-group="${group}"]`).forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-tab-group="${group}"][data-tab-idx="${idx}"]`).classList.add('active');
}

function renderCareers(careers) {
  if (!careers) return;
  const wrap = document.getElementById('careerContent');
  const groups = [
    {key:'top',label:'🏆 天職レベル',cls:'gold'},
    {key:'good',label:'⭐ かなり合う',cls:'blue'},
    {key:'surprise',label:'💡 意外とハマる',cls:'purple'},
    {key:'avoid',label:'⚠️ 避けた方がいい',cls:'warn'}
  ];
  let html = '';
  groups.forEach(g => {
    const items = careers[g.key];
    if (items && items.length) {
      html += `<div class="career-group"><div class="career-group-title">${g.label}</div><div class="career-tags">`;
      items.forEach(item => { html += `<span class="tag ${g.cls}">${item}</span>`; });
      html += '</div></div>';
    }
  });
  wrap.innerHTML = html;
}

function renderTags(containerId, items, cls) {
  const wrap = document.getElementById(containerId);
  if (!items || !items.length) { wrap.innerHTML = '<span style="color:var(--text-muted);font-size:13px">データなし</span>'; return; }
  wrap.innerHTML = items.map(item => `<span class="tag ${cls}">${item}</span>`).join('');
}

function renderTips(tips) {
  if (!tips) return;
  const wrap = document.getElementById('tipContent');
  let html = '';
  if (tips.do) {
    html += '<div style="margin-bottom:16px"><div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#10b981">✅ こうすると動く</div>';
    tips.do.split(/[。\n]/).filter(Boolean).forEach(t => {
      html += `<div class="tip-item tip-do"><span class="tip-icon">✅</span><span>${t.trim()}</span></div>`;
    });
    html += '</div>';
  }
  if (tips.dont) {
    html += '<div><div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#f87171">❌ これはNG</div>';
    tips.dont.split(/[。\n]/).filter(Boolean).forEach(t => {
      html += `<div class="tip-item tip-dont"><span class="tip-icon">❌</span><span>${t.trim()}</span></div>`;
    });
    html += '</div>';
  }
  wrap.innerHTML = html;
}

// ── Share functions ──
function buildShareURL(typeCode, allScores) {
  const base = window.location.href.split('?')[0].split('#')[0];
  const s = ['EI','SN','TF','JP','OG','DB'].map(a => (allScores[a]||{pct:50}).pct).join(',');
  return `${base}?type=${encodeURIComponent(typeCode)}&s=${s}`;
}

function setupShareLinks(typeCode, profile, allScores) {
  const url = buildShareURL(typeCode, allScores);
  const text = `私のワークスタイルタイプは「${profile.name}」（${typeCode}）でした！\n64タイプワークスタイル診断`;

  const xLink = document.getElementById('shareX');
  if (xLink) xLink.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;

  const lineLink = document.getElementById('shareLine');
  if (lineLink) lineLink.href = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;

  // Store URL for copy
  window._shareURL = url;
}

function copyShareLink() {
  if (!window._shareURL) return;
  navigator.clipboard.writeText(window._shareURL).then(() => {
    showToast('リンクをコピーしました！');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = window._shareURL;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('リンクをコピーしました！');
  });
}

function showToast(msg) {
  let toast = document.querySelector('.share-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.className = 'share-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── Load from URL params (shared link) ──
function loadFromURL() {
  const params = new URLSearchParams(window.location.search);
  const typeCode = params.get('type');
  const scoreStr = params.get('s');
  if (!typeCode || !PROFILES[typeCode]) return false;

  const profile = PROFILES[typeCode];
  const color = profile.color || '#667eea';
  document.documentElement.style.setProperty('--accent', color);

  // Parse scores
  const allScores = {};
  const axes = ['EI','SN','TF','JP','OG','DB'];
  if (scoreStr) {
    const vals = scoreStr.split(',').map(Number);
    axes.forEach((a, i) => { allScores[a] = {pct: vals[i] || 50}; });
  } else {
    axes.forEach(a => { allScores[a] = {pct: 50}; });
  }

  // Show result directly
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('questionScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  // Build badge chips for shared view
  const badgeAxes2 = ['EI','SN','TF','JP','OG','DB'];
  const badgeAxisCls2 = {EI:'axis-ei',SN:'axis-sn',TF:'axis-tf',JP:'axis-jp',OG:'axis-og',DB:'axis-db'};
  const badgeHTML2 = badgeAxes2.map(axis => {
    const s = allScores[axis];
    const pct = s ? s.pct : 50;
    const labels = AXIS_LABELS[axis];
    const winLabel = pct >= 50 ? labels[0] : labels[1];
    return `<span class="type-badge ${badgeAxisCls2[axis]}">${winLabel}</span>`;
  }).join('');

  // Reuse showResult rendering by setting globals and calling render
  const rc = document.getElementById('resultContent');
  rc.innerHTML = `
    <div class="r-header">
      <div class="r-label">Your Work Style Type</div>
      <div class="r-avatar" style="border-color:${color}">
        <span class="r-avatar-letter" style="color:${color}">${profile.name[0]}</span>
      </div>
      <div class="r-name" style="color:${color}">${profile.name}</div>
      <div class="r-code">${typeCode}</div>
      <div class="type-badges">${badgeHTML2}</div>
      <div class="r-summary">${profile.summary}</div>
    </div>
    <div class="r-card">
      <div class="r-card-title"><span class="card-emoji">📊</span> 6軸スコア</div>
      <div class="score-section" id="scoreBars"></div>
    </div>
    <div class="r-card">
      <div class="r-card-title"><span class="card-emoji">🎭</span> キャラクター・偉人</div>
      <div class="r-persona">
        <div class="r-persona-item">
          <div class="r-persona-label">架空キャラ</div>
          <div class="r-persona-name">${profile.character}</div>
        </div>
        <div class="r-persona-item">
          <div class="r-persona-label">偉人</div>
          <div class="r-persona-name">${profile.great}</div>
        </div>
      </div>
    </div>
    <div class="r-card">
      <div class="r-card-title"><span class="card-emoji">📖</span> 詳細プロフィール</div>
      <div id="accordionWrap"></div>
    </div>
    <div class="r-card">
      <div class="r-card-title"><span class="card-emoji">🤝</span> 相性マップ</div>
      <div class="tab-bar" id="compatTabs"></div>
      <div class="tab-content" id="compatContent"></div>
    </div>
    <div class="r-card">
      <div class="r-card-title"><span class="card-emoji">🎯</span> 適職マップ</div>
      <div id="careerContent" style="padding:0 24px 20px"></div>
    </div>
    <div class="r-card">
      <div class="r-card-title"><span class="card-emoji">✅</span> 得意・苦手タスク</div>
      <div style="padding:0 24px 20px">
        <div style="margin-bottom:16px">
          <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#10b981">🎯 得意なタスク</div>
          <div class="career-tags" id="strengthTags"></div>
        </div>
        <div>
          <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#f87171">😰 苦手なタスク</div>
          <div class="career-tags" id="weaknessTags"></div>
        </div>
      </div>
    </div>
    <div class="r-card">
      <div class="r-card-title"><span class="card-emoji">📘</span> 頼み方マニュアル</div>
      <div class="tip-section" id="tipContent"></div>
    </div>
    <div class="share-section">
      <div class="share-heading">結果をシェアしよう</div>
      <div class="share-sub">友達や同僚にも診断を勧めてみよう</div>
      <div class="share-preview">
        <div class="share-preview-avatar" style="background:${color}">${profile.name.charAt(0)}</div>
        <div class="share-preview-info">
          <div class="share-preview-type">${profile.name}</div>
          <div class="share-preview-code">${typeCode}</div>
        </div>
      </div>
      <div class="share-buttons">
        <a class="share-btn x" id="shareX" href="#" target="_blank" rel="noopener">
          <span class="share-btn-icon">𝕏</span>ポスト
        </a>
        <a class="share-btn line" id="shareLine" href="#" target="_blank" rel="noopener">
          <span class="share-btn-icon">💬</span>LINE
        </a>
        <button class="share-btn copy" onclick="copyShareLink()">
          <span class="share-btn-icon">📋</span>コピー
        </button>
      </div>
    </div>
    <div class="restart-wrap">
      <button class="restart-btn prominent" onclick="restart()">🔄 自分も診断する</button>
    </div>
  `;

  renderScoreBars(allScores, color);
  renderAccordion(profile.fullSections);
  renderCompatibility(profile.compatibility, color);
  renderCareers(profile.careers);
  renderTags('strengthTags', profile.strengths, 'green');
  renderTags('weaknessTags', profile.weaknesses, 'red');
  renderTips(profile.tips);
  setupShareLinks(typeCode, profile, allScores);
  return true;
}

function restart() {
  // Clear URL params
  history.replaceState(null, '', window.location.pathname);
  document.getElementById('startScreen').style.display = 'flex';
  document.getElementById('questionScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('resultContent').innerHTML = '';
  document.documentElement.style.setProperty('--accent', '#667eea');
  // Reset MBTI grid
  document.getElementById('mbtiGrid').classList.remove('show');
  document.getElementById('mbtiNote').style.display = 'none';
  window.scrollTo({top: 0});
}

// ── On page load, check for shared URL ──
window.addEventListener('DOMContentLoaded', () => { loadFromURL(); });
</script>
