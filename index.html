"ISFP-O-Dp":{name:"美の求道者",character:"鬼舞辻無惨（鬼滅の刃）",great:"ミケランジェロ",color:"#BA4A00",summary:"「この一つの美を極限まで追求する」究極の美意識。一つの表現に生涯を捧げ完璧を目指す。",compatibility:{complement:[{code:"ENTP-G-Br",name:"歩く百科事典",desc:"プロジェクトでISFJ-O-Dpが深くコミットする中、ENTP-G-Brが多角的な知識で具体的な改善案を提示。二人の連携で献身が最適な形で実を結び、チームの成果を最大化します。"},{code:"ENTJ-G-Br",name:"参謀",desc:"ISFP-O-Dpが追求する美のビジョンを、ENTJ-G-Brが具体的な事業計画や戦略に落とし込み、実現へと導く。展示会の企画で、ISFP-O-Dpが理想とする空間表現に対し、ENTJ-G-Brが予算、人員、スケジュールを統括し、現実的な実行プロセスを構築する。"}],chemistry:[{code:"ISFP-O-Br",name:"美の探偵",desc:"製品開発の初期段階で、ENTP-G-Brが技術的知識を提供する一方、ISFP-O-Brはユーザーの五感体験に基づいた具体的なフィードバックで、知識を現実的な形で昇華させる。"},{code:"ENFP-O-Dp",name:"伝道師",desc:"「着火マン」と「伝道師」は、情熱と興奮を共有し、お互いのアイデアに深く共感し合えます。休憩時間の雑談でも、熱いビジョンを語り合い、自然体でいられるため、心からリラックスできる関係です。"}],comfort:[{code:"ISFP-G-Dp",name:"癒し職人",desc:"ストレスの多いプロジェクトの休憩時間、ISFJとISFPは静かにカフェで過ごし、お互いの存在が自然な癒しとなり、穏やかな気持ちでリフレッシュできる居心地の良い関係です。"},{code:"ISFJ-O-Dp",name:"守護者",desc:"チーム内のメンバーが個人的な悩みを抱えている時、ISFJ同士で情報共有し、連携して相手に寄り添うことで、より深いサポートと安心感を提供し、深いケアが共鳴します。"}],catalyst:[{code:"ESFP-O-Br",name:"お祭り総隊長",desc:"職場イベントやカジュアルな場で、INTPはESFPがもたらす多様な人々の感情や反応、場の雰囲気を観察。これにより、理論だけでは見過ごしがちな人間行動のパターンや非言語情報に気づかされる。"},{code:"ENTP-O-Br",name:"アイデアマン",desc:"新規事業の企画会議では、ENTP-G-Brが知識の引き出しから多様な情報を提示し、ENTP-O-Brがそれに触発されて次々と新しいアイデアを繰り出す。知識と発想が高速で応酬し、無限の可能性が広がる。"}]},careers:{top:["彫刻家","ハイブランドデザイナー","ミシュランシェフ"],good:["建築デザイナー","香水師","研師"],surprise:["盆栽師","和菓子職人"],avoid:["量産品管理","定型事務"]},strengths:["極限の美意識","生涯献身","完璧主義","感覚の鋭さ"],weaknesses:["コミュニケーション","柔軟性","日常管理","他者基準"],tips:{do:"あなたが追求する最高の美意識を、このプロジェクトで存分に表現してくれないか？締切は〇日だが、納得いくまで時間をかけて、細部に至るまで完璧を追求してほしい。もし何か障壁があれば、私が全力でサポートするから遠慮なく言ってほしい。このデザインコンセプトについて、あなたの他に誰も気づかないような、もっと深い美しさを見つける手伝いをしてくれないか？あなたの感性で「これは違う」と感じる点があれば、遠慮なく指摘し、どのようにすればより本質的な美に近づけるか、ぜひ意見を聞かせてほしい。あなたが手がける〇〇は、いつも見る人の心を揺さぶる傑作だ。今回の〇〇も、あなたの独自の美学を最大限に発揮し、一切の妥協なく最高の品質を目指してほしい。必要なリソースは全て用意するから、心ゆくまで創造に没頭してほしい。",dont:"このプロジェクト、そこそこの出来でいいから、もう少し早く仕上げてくれない？完璧を目指すのはわかるけど、時間がないんだ。質よりスピードを重視してほしい。これ、前にやった〇〇と似た感じでいいよ。あなたの個性はそこまで求めないから、テンプレート通りにさっと済ませてくれないかな？細かい修正は後でこっちでやるから。この部分はコスト削減のため、少し品質を落としてもいいかな？誰も気づかないような細部だから、目をつぶってくれないか。全体的な予算を考慮すると、仕方ないんだ。"},fullSections:[{title:"👤 この人はこんな人",content:"「この一つの美を極限まで追求する」――自らの美意識を形にするためなら、一切の妥協を許さない孤高の職人であり、芸術家だ。内に秘めた情熱と、細部まで研ぎ澄まされた感覚で、唯一無二の“完璧”を目指し続ける。彼の基準は常に「これで良い」ではなく「これが良い」である。\n\nエネルギーは内側から湧き出てくる。一人の静かな時間で深く内省し、自身の内なる理想の形を掘り起こす。群衆の中にいるよりも、アトリエや書斎のような孤独な作業空間で集中する方が、彼の創造性は最高潮に達する。思考が研ぎ澄まされ、五感が冴え渡る。\n\n仕事においては、具体的なアウトプットの質に徹底的にこだわる。既存のやり方や常識に安易に満足することなく、「なぜこれではダメなのか」「もっと洗練された表現があるはずだ」と常に問い続ける。そのため、より効果的で美しい表現方法を常に模索し、既存の枠を打ち破ることを厭わない。まさに、一つのことに深く没頭し、その分野で唯一無二のクオリティを生み出すことを喜びとするタイプだ。\n\n弱点は、自分の理想が高すぎるがゆえに、納得いく完成に時間がかかること。また、他者の意見よりも自身の美意識を優先する傾向があり、時に頑固に見えることもある。効率やスピードよりも質を重視するため、短納期や同時並行で複数のタスクをこなす状況には大きなストレスを感じやすい。自分のこだわりや深い思考を言葉で説明するのが苦手で、周囲から誤解されることもある。\n\n興味の対象は、決して広くはないが、一度関心を持ったテーマに対しては、徹底的に深く掘り下げる。表面的な情報で満足することはなく、その背景、本質、歴史、素材、技法、あらゆる側面を理解しようと情熱を注ぐ。まるで職人のように、一つの技術や表現を極めることに人生の喜びを見出す。\n\n人間関係においても、広く浅い交流よりも、狭く深い関係性を好む。他者の感情の機微には非常に敏感で、場の空気も敏感に察知するが、自分の感情や本心をストレートに表現することは少ない。心から信頼できるごく少数の友人や仲間と、質の高い交流を大切にする。言葉よりも、行動や自身の作品を通して、想いを伝えようとすることが多い。\n\n根底には、個人の自由と自己表現への強い欲求がある。自分の価値観や美意識に反するものを極端に嫌い、常に「自分らしい」表現を追求する。既存の常識や流行に流されることなく、自分だけの、新しい「美」を創造しようとする孤高の探求者である。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n着手は非常に慎重だ。何よりも自身の「納得」を重視するため、「これでいい」ではなく「これがいい」という明確で揺るぎないイメージが固まるまで、何度も内省し、頭の中でシミュレーションを繰り返す。一度「これだ」と確信が持てれば、その美学を貫くため、周りの意見に流されることなく、強い意志をもってプロジェクトをスタートさせる。計画を綿密に立てるよりも、自分の感覚を信じ、試行錯誤しながら最適な道筋を探り、具体的な行動に移すことを選ぶ。\n\n【進行フェーズ】\n一つのタスクに集中し、深く掘り下げるのが最も得意な働き方だ。他のプロジェクトが割り込んできたり、細かく進捗報告を求められたりすると、集中力が途切れ、パフォーマンスが著しく低下する。作業の進行中にも「もっと良い方法、より美しい表現があるのではないか」と立ち止まり、既存のプロセスや手法を根本から見直すことも珍しくない。自己の納得感を何よりも重視するため、一度着手したことに手抜きは一切せず、細部にまでこだわり、完璧な仕上がりを目指して邁進する。\n\n【完了フェーズ】\n最後まで一切妥協せず、品質の完璧さを追求する。99%の完成度では満足せず、残りの1%を埋めるために、並々ならぬ情熱と時間を注ぎ込む。ドキュメントの細かな表現、デザインのわずかなズレ、コードの一行に至るまで、自身の美意識に反するものは徹底的に修正し、磨き上げる。しかし、その「完璧」の基準はあくまで彼自身の内側にあり、外部からの「これで十分」という声は、彼の耳にはほとんど届かない。妥協は彼の辞書にはない。\n\n【1日の働き方】\n誰にも邪魔されない一人の時間で、集中して作業に没頭する。時間を忘れ、創作活動や研究に打ち込める環境が理想的だ。午前中に内省や情報収集、インスピレーションを得る活動を行い、午後に具体的なアウトプット作業に深く集中することが多い。自分のペースを乱されることを極端に嫌い、突発的な会議や割り込み作業は大きなストレスとなる。深夜に突然閃きが訪れ、創作の炎が燃え上がることも頻繁にある。"},{title:"🗣️ 会議での振る舞い",content:"会議では積極的に発言することはあまりないが、一度口を開けば、議論の核心を突くような鋭い意見や、誰も気づかなかった本質的な視点を提供する。場の空気や他者の感情には敏感だが、自分の美学や価値観に反することに対しては、静かに沈黙を選ぶか、控えめながらも明確に異議を唱える。表面的な議論よりも、具体的なアウトプットの質を向上させるための、建設的で深い意見交換を最も好む。\n\nブレストのような漠然としたアイデア出しの場は苦手だが、具体的なテーマや課題が提示された時に最も力を発揮する。資料のデザインやコンテンツの表現に関するレビュー会議では、誰よりも鋭い視点で改善点を見つけ出し、クオリティを一段階引き上げる。しかし、長時間の雑談中心の会議や、形式的な報告会議では、エネルギーを著しく消耗し、集中力を維持するのが難しい。\n\n【ベストな会議の使い方】\n・具体的な成果物のレビュー会議にはマストで参加\n・デザインやコンテンツの方向性を、深く議論する場\n・少人数での、一つのテーマに特化した深掘り議論\n・品質向上や、本質的な改善提案を求める会議\n・意見がまとまらない膠着状態では、静かに全体を見渡し、最適な解決策を提示する役割"},{title:"💬 チャットでの傾向",content:"チャットでの発言は基本的に少なめだ。必要最低限の情報を、最も簡潔かつ明確な形で伝えることを好む。絵文字やリアクションを多用することはほとんどないが、送られてきたメッセージの内容はきちんと深く読み込んでいる。グループチャットでの雑談にはほとんど参加しないが、必要な情報収集のためには隅々まで目を通していることが多い。\n\n重要なメッセージや依頼に対しては、じっくりと内容を吟味し、自身の納得がいくまで深く考えてから返信する。曖昧な表現や抽象的な指示には、具体性を求める質問を投げかけることが多い。「美の求道者」にとって、言葉もまた「完璧」な表現の一部であるため、軽々しい返信や、誤解を招くような表現は極力避ける。\n\n【周囲が知っておくと楽なこと】\n・返信に時間がかかっても、それは真剣に考えている証拠だと理解する\n・簡潔なメッセージの裏には、深い洞察と検討がある\n・「はい」「いいえ」だけの返信でも、本人は最大限の意思を込めている\n・曖昧な指示を出すと、具体的な質問が返ってくることを想定しておく\n・言葉よりも、彼が最終的に生み出す具体的な成果物でコミュニケーションをとることを好む"},{title:"👔 上司として／部下として",content:"【上司として】\nメンバー一人ひとりの個々の才能や得意分野を深く見極め、それぞれの強みが最大限に活かされるような役割を与える。成果物の品質には一切妥協せず、最高の完成度を求めるが、その過程でのメンバーの努力やこだわりを最も深く理解し、正当に評価する。自身のビジョンや美学を声高に語ることは少ないが、その背中や生み出す作品のクオリティで、チーム全体を牽引するタイプだ。\n\nマイクロマネジメントは一切しないが、品質基準をクリアしていないものに対しては、厳しく、しかし具体的にフィードバックを行う。成果物への強いこだわりを持つため、時に納期よりも質を優先しがちだ。メンバーの自主性を深く尊重し、彼らが集中できる一人の作業空間を確保することで、最高のパフォーマンスを引き出すことができる。\n\n【部下として】\n自分の裁量で、こだわりを持って仕事に取り組むことを任されると、期待をはるかに超える最高のパフォーマンスを発揮する。一度納得した仕事には、時間や労力を惜しまず深く没頭し、期待以上の成果を必ず出す。上司からの指示が自身の美学や価値観と一致していると感じると、強い忠誠心と情熱をもって、誰よりも深く、その仕事に取り組む。\n\n細かすぎる指示や、自身の美意識に反するやり方を強制されると、モチベーションは著しく低下する。成果の質を軽視する上司や、安易な妥協を求める環境では、本来の力を発揮することができない。自分の生み出した成果物に対して、正当で深い評価を求めており、表面的な賞賛や、不当な扱いは決して受け入れない。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・自らの美学やこだわりを形にするための、新しいプロジェクトが始まったとき\n・品質や表現の改善提案が採用され、より洗練されたものが生まれたとき\n・一つのテーマを深く掘り下げ、その本質や真理に到達できたとき\n・自分のこだわりが込められた成果物が、正当かつ深く評価されたとき\n・誰も到達したことのない高みを目指せるような、挑戦的な機会が与えられたとき\n・時間を忘れ、創作活動や研究に心ゆくまで没頭できる環境が与えられたとき\n・「これがあなたの作品だ」と、その独自性とクオリティを認められたとき\n\n【📉 下がる瞬間】\n・自分のこだわりや美意識が、誰にも理解されないと感じたとき\n・品質よりもスピードや量だけが、一方的に求められる状況に陥ったとき\n・意味のないルーティンワークや、創造性の低い単純作業を強いられるとき\n・成果物のクオリティが低いのに「これで十分」と安易に言われたとき\n・細かすぎる指示や、過度なマイクロマネジメントを受けるとき\n・周囲の雑音や、頻繁な割り込みによって集中力が途切れるとき\n・自分の仕事が、誰かの都合で安易に妥協されたり、改変されたりするとき"},{title:"📝 フィードバック",content:"【受けるとき】\nフィードバックは非常に感情的に受け止める。自身の作品に対する評価は、自分自身への評価と捉えるため、ネガティブな内容だと深く傷つき、一時的に落ち込むこともある。しかし、それが「より良いものを生み出すため」の建設的な提案であれば、一時的な感情の揺れの後、真摯に受け止め、改善に向けて並々ならぬ情熱を燃やす。抽象的な指摘よりも、具体的で論理的な改善点や、その理由を求めており、不明瞭なフィードバックには納得できない。\n\n【伝えるとき】\n他者にフィードバックする際は、相手の感情を考慮しつつも、自身の品質向上へのこだわりを伝えるため、厳しくなることもある。しかし、その根底には「より良いものを共に創り出してほしい」という情熱と、深い期待がある。言葉選びは慎重になりがちだが、本当に伝えたい核となる部分は明確に持つ。自身の美学に反する部分に対しては、多くを語らず黙って修正するか、あるいは理論的に改善点を明確に指摘する。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・**専門性の高いデザイン業務:** ユーザー体験を深く洞察し、美的にも機能的にも優れたUI/UXを設計・実装する。\n・**特定の技術研究・開発:** 一つの技術や分野を徹底的に深掘りし、ブレイクスルーを生み出す研究開発。\n・**高品質なコンテンツ制作:** 妥協なく、こだわり抜いた文章、映像、アートなどのコンテンツを生み出す。\n・**製品の品質管理・改善:** わずかな欠陥も見逃さず、完璧な製品品質を追求し、改善提案を行う。\n・**芸術・クリエイティブ活動:** 独自の美意識に基づき、形のないアイデアを具体的な創造物として表現する。\n・**職人技を要する作業:** 繊細な手作業や、高度な専門技術が必要な精密な作業に没頭する。\n・**個人のプロジェクト推進:** 自分のペースで、納得がいくまで集中して取り組むことができるプロジェクト。\n\n【😰 苦手】\n・**大量の定型事務作業:** 決まりきったフォーマットへの入力や、単調な書類整理など。\n・**短納期での複数タスク並行:** 一つのことに集中できないような、タイトなスケジュールでのマルチタスク。\n・**人前での即興発表・プレゼン:** 事前準備なしでの発表や、突然意見を求められること。\n・**社交的なネットワーキング:** 大人数の中での表面的な交流や、形式的な会合。\n・**予算管理・数値目標の達成:** 自身の美意識とは異なる、具体的な数字目標への執着。\n・**顧客からの無茶な要求対応:** 自身の美学に反するような変更や、品質を下げる妥協を強いられること。\n・**成果物の細かい共有・報告:** 進捗状況を頻繁に共有したり、プロセスを細かく報告したりすること。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「この分野であなたの右に出る者はいないと思う。ぜひ力を貸してほしい」→彼の専門性やこだわりを評価し、頼りにしていることを伝える\n・「あなたの美意識で最高のものを生み出してほしい。表現方法は自由だ」→裁量と創造性を尊重されると、最高のパフォーマンスを発揮する\n・「これにはまだ改善の余地があるはずだ。もっと良くならないか？」→品質向上への挑戦を促されると、集中力が最大限に高まる\n・「納期は少し余裕を持たせるので、あなたが納得いくまで最高の品質で仕上げてほしい」→クオリティ追求を許されると、時間を惜しまず没頭する\n・「最終的なアウトプットの美しさと品質を最も重視する」→プロセスよりも結果の質で評価されると、モチベーションが大きく上がる\n\n【❌ パフォーマンスが落ちる】\n・「〇〇さんのやり方を踏襲して、同じようにやって」→独自の表現や創造性を制限されると、非常に窮屈に感じる\n・「とにかく早く、質は二の次でいいから」→彼の美学に反する指示に、強い反発を覚える\n・「今すぐ会議に出て、ざっくりでいいから意見を聞かせて」→集中を邪魔されたり、準備不足での発言を求められたりすると苛立ちを感じる\n・「もっとコミュニケーション量を増やして、状況を逐一共有してほしい」→無理に社交性を求められたり、監視されている感覚を与えると疲弊する\n・「なぜこんなに時間がかかるのか。もっと効率的にできないか？」→プロセスの詳細や効率性を問われると、説明に困り、不本意に感じる\n\n【💡 コツ】\n1.  **Whyを共有する:** なぜこの成果物が必要で、どのような価値を生み出すのかを、彼の美意識に訴えかける形で明確に伝える。\n2.  **自由と裁量を与える:** プロセスは彼に任せ、最終的なアウトプットの品質と美しさを期待していることを明確に伝える。\n3.  **深い議論の機会を設ける:** 彼の疑問やこだわりを解消するための、個別で集中できる壁打ちや相談の時間を定期的に用意する。\n4.  **品質への具体的な評価を伝える:** 彼の生み出した成果物の、具体的な良さやこだわった点、美しさを言葉にして深く褒める。\n5.  **一人の作業時間を確保する:** 集中できる静かな環境を整え、割り込みや邪魔を最小限にすることで、彼の創造性を最大限に引き出す。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・**プロダクトデザイナー/UIUXデザイナー:** ユーザー体験の美しさと機能性を極限まで追求し、革新的なデザインを生み出す。\n・**アーティスト/クリエイター:** 自身の内なる美意識やビジョンを、唯一無二の作品として世に送り出す創造活動。\n・**研究開発エンジニア（専門領域）:** 特定の技術や理論を深く掘り下げ、誰も到達したことのない新たな価値を生み出す専門的な研究。\n\n【⭐ かなり合う】\n・**品質管理/品質保証:** 完璧な製品品質を追求し、僅かな欠陥も見逃さないことで、信頼性の高い製品を提供する。\n・**高級ブランドの商品開発:** 素材選びからデザイン、製造プロセスまで、一切妥協しない美と品質を創造する。\n・**専門職コンサルタント:** 特定の領域で深い専門知識と洞察を持ち、クライアントの本質的な課題解決を追求する。\n\n【💡 意外とハマる】\n・**職人（伝統工芸/飲食）:** 一つの道を極め、長年の研鑽で培った技術と感性で、最高のものを生み出す。\n・**美術修復家:** 過去の傑作の美を深く理解し、その完璧な復元に情熱を注ぎ、作品に新たな命を吹き込む。\n\n【⚠️ 避けた方がいい】\n・**テレアポ/飛び込み営業:** 短期的な成果と、不特定多数への社交性が重視される、彼の美意識とはかけ離れた仕事。\n・**総務/一般事務（定型業務中心）:** ルーティンワークが多く、創造性の低い、単調な業務。\n・**メディアリレーションズ/広報:** 広く浅いコミュニケーションと、即応性が強く求められる、彼のペースとは合わない業務。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\n**ESTJ-G-Dp「頑固職人」:** 完璧主義と一点深堀という共通点を持つが、ISFPの感情的で内向的な美意識を、ESTJの論理的で外向的な実行力で現実の形にする。ISFPが描く理想の美を、ESTJが徹底的に構造化し、現実的な計画に落とし込むことで、唯一無二の相乗効果を生む。\n**INTJ-G-Dp「戦略家」:** ISFPが持つ繊細な美意識や感覚的な洞察を、INTJが持つ壮大な戦略的視点と卓越した論理で体系化し、その実現可能性を飛躍的に高める。INTJの客観的な分析力とISFPの直感的な美学が融合し、洗練された、かつ実行力のあるビジョンが生まれる。\n\n【🔥 化学反応が起きるコンビ】\n**ENFJ-O-Br「カリスマ」:** ISFPの内に秘めた情熱と、こだわり抜いた美学を、ENFJが持つ熱烈なリーダーシップと共感力でチーム全体に伝え、プロジェクトの強大な推進力に変える。ENFJがISFPの秘めたる才能と情熱を引き出し、周囲を巻き込みながら、これまでにない大きなうねりやムーブメントを生み出す。\n**ENTP-O-Br「アイデアマン」:** ENTPの無限に湧き出る革新的なアイデアが、ISFPの研ぎ澄まされた美意識と合致した時に、他に類を見ない革新的な表現方法やプロダクトが生まれる。ISFPは特定のアイデアを深く掘り下げて形にするため、ENTPの多岐にわたる発想から真に価値ある一つを選び、それを最高のクオリティで昇華させることができる。\n\n【☀️ 居心地がいい仲間】\n**INFP-G-Br「夢追い人」:** どちらも内向的で、自身の感情や価値観を深く重視するタイプであるため、お互いの繊細な心や独自の美意識、深い価値観を言葉を交わさずとも深く理解し合える。無理に会話をせずとも、お互いの存在が安らぎとなり、心地よい空間を共有できる。\n**ISTP-O-Dp「孤高の技術者」:** 寡黙で職人気質という共通点があり、技術やスキルを極めることへの深いこだわりで、強く共感し合える。お互いの作業空間や独立性を深く尊重し、必要な時にだけ協力し合う、非常に心地よく、生産的な関係性を築けるだろう。\n\n【⚡ 未知の触発者】\n**ESFJ-G-Br「世話焼き」:** ISFPの内に秘めた感情や、繊細なこだわりを、ESFJが持つ卓越した社交性と細やかな気配りが引き出すことがある。最初は戸惑うかもしれないが、ESFJの温かいサポートと積極的な関わりが、ISFPの新たな表現や活動の扉を開く可能性を秘めている。\n**ESTP-O-Br「ムードメーカー」:** ISFPが普段触れることのないような、現実的で行動的な世界をESTPが見せてくれる。時には価値観の衝突もあるかもしれないが、その予期せぬ刺激が、ISFPの創作活動に新たなインスピレーションや、予期せぬ方向性をもたらすことがある。"},{title:"🌈 プライベートの顔",content:"休日は、まるで自分だけの秘密基地のような空間で過ごすことを心から好む。彼の部屋には、こだわり抜いて選ばれた家具や、彼自身の美意識が反映されたアート作品が並び、そこは彼にとっての「聖域」だ。絵を描いたり、楽器を演奏したり、あるいは特定の分野の工芸品に没頭したりと、内なる創造性を満たす活動に、時間を忘れ没頭する。\n\n人混みを避けて、静かなカフェで一人じっくりと読書に耽ったり、美術館で心揺さぶられる美しい作品を時間をかけて鑑賞したりすることも多い。自然の中に身を置き、散策したり、瞑想したりすることで、心身の充電と、五感を研ぎ澄ます時間を大切にする。自分だけの世界に深く入り込み、そこから新たなインスピレーションを得る。\n\nSNSの投稿は厳選された美しい写真や、心に響く、研ぎ澄まされた言葉ばかりだ。しかし、その投稿頻度は決して多くなく、日々の些細な出来事を逐一シェアするタイプではない。あくまで自己表現の場として捉え、無作為な情報発信はせず、一つひとつの投稿に彼の美意識とメッセージが込められている。\n\nファッションや持ち物にも、彼ならではの独自のこだわりが強く表れる。流行を追いかけることはなく、自分にとって「本当に美しい」と感じるもの、長く愛せる質の高いものを選ぶ。一つひとつのアイテムには、彼なりの物語や背景があり、それを大切に手入れし、愛情を注ぎながら使い続ける。\n\n友達は多くないが、深く信頼し、心を通わせることができる数少ない友人との時間を何よりも大切にする。一緒にアートイベントに出かけたり、お気に入りのカフェで静かに語り合ったりと、穏やかで質の高い交流を好む。言葉ではなく、感覚で深く繋がっていると感じる仲間といる時が、彼が心からリラックスできる瞬間だ。\n\nお金の使い方も、「体験」や「作品」への投資が中心となる。一生ものの家具、一点物の絵画、心を揺さぶるライブ体験など、自身の美意識を豊かにするものには、惜しみなく投資する。衝動買いはせず、じっくりと吟味し、本当に納得した上で、その価値あるものを手に入れることを選ぶ。"}]},
"ISFP-G-Br":{name:"クラフト職人",character:"マルクル（ハウルの動く城）",great:"ターシャ・テューダー",color:"#E8DAEF",summary:"「自然と調和し穏やかに暮らす」森の精霊。守り×広型で幅広い感性を持ちながら穏やかに日常を彩る。",compatibility:{complement:[{code:"ENTP-O-Dp",name:"常識クラッシャー",desc:"既存プロセスの見直し会議では、ENTP-G-Brが現状の背景知識を提供する一方で、ENTP-O-Dpが常識にとらわれない大胆な提案で既成概念を打ち破る。知的好奇心を刺激し合い、自由な議論が交わされる居心地の良い関係。"},{code:"ENTJ-O-Br",name:"総司令",desc:"互いに高度な戦略と実行力を評価し合う知的同盟関係。大規模プロジェクトの初期計画段階で、複雑な問題を瞬時に分解し、実現可能な戦略を構築する。"}],chemistry:[{code:"ISFP-O-Br",name:"美の探偵",desc:"製品開発の初期段階で、ENTP-G-Brが技術的知識を提供する一方、ISFP-O-Brはユーザーの五感体験に基づいた具体的なフィードバックで、知識を現実的な形で昇華させる。"},{code:"ISFJ-G-Br",name:"屋台骨",desc:"既存業務プロセスの見直し会議で、ISFJ同士は現状の課題を共有し、既存の良さを残しつつ地道な改善を提案する際、互いに意見に深く共感し合い、居心地の良い関係を築きます。"}],comfort:[{code:"ISFP-G-Dp",name:"癒し職人",desc:"ストレスの多いプロジェクトの休憩時間、ISFJとISFPは静かにカフェで過ごし、お互いの存在が自然な癒しとなり、穏やかな気持ちでリフレッシュできる居心地の良い関係です。"},{code:"INFP-G-Br",name:"やさしさ担当",desc:"プロジェクトで課題に直面した際、INFPの優しく深い共感力とISFPの穏やかな受容力が、互いの気持ちを尊重し合い、安心して相談できる関係性を築きます。"}],catalyst:[{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"},{code:"ESTP-O-Dp",name:"エース",desc:"エースの迅速な行動力と実行力が、癒し職人が温めていたアイデアを現実の形にするきっかけを与えます。新しい施術メニューの導入テストでは、エースの行動力が実験を加速させます。"}]},careers:{top:["ガーデンデザイナー","動物保護施設","手工芸作家"],good:["フラワーアレンジメント","自然写真家","アロマセラピスト"],surprise:["養蜂家","森林セラピスト"],avoid:["激しい営業","大規模管理"]},strengths:["自然との調和","穏やかな美意識","五感の繊細さ","静かな創造力"],weaknesses:["競争","自己主張","スピード","都市環境"],tips:{do:"この資料、視覚的に心地よく、かつ自然な流れで情報が伝わるようにデザインしてくれない？あなたの美意識で、見る人が穏やかな気持ちになるような工夫をお願いしたいんだ。新しいオフィスレイアウトのアイデア出しなんだけど、皆がリラックスできて、自然の温もりを感じられる空間にするにはどうしたらいいと思う？あなたの感性を活かして、心地よい環境づくりのヒントを教えてくれないかな。この業務、少し手間がかかるかもしれないけど、あなたの丁寧な手作業と細部へのこだわりが活かせると思うんだ。最終的に皆が使うものだから、使いやすくて美しいものに仕上げてほしいんだけど、お願いできるかな？",dont:"急ぎで、とにかく成果を出すことだけ考えて、この企画書を短時間で仕上げて。美的センスとかは二の次でいいから、効率最優先でやってくれ。このプロジェクトは競争が激しいから、他のチームに勝つことだけを考えて、攻めの姿勢で取り組んでほしい。感情的な配慮は後回しで、どんどん意見をぶつけていこう。なぜもっと早くできないんだ？他のみんなはもっとスピード感を持ってやっているぞ。美的感覚なんて後でどうとでもなるから、まずはとにかく数をこなしてくれ。"},fullSections:[{title:"👤 この人はこんな人",content:"「この空間、なんだか居心地がいいな」「この道具、もう少しこうしたらもっと使いやすいのに」。クラフト職人にとって、世界は常に「もっと美しく、もっと心地よく」なる可能性に満ちている。自身の五感と感性を頼りに、身の回りにあるものをそっと拾い上げ、愛情を込めて磨き上げていく人だ。\n\n一人の静かな時間でエネルギーをチャージする。忙しい一日が終わった後、お気に入りのアロマを焚いてお茶を淹れる。そんな何気ない時間が、明日への活力を生む源泉となる。大勢で騒ぐよりも、気の置けない数人とじっくり語り合うことを好むタイプだ。\n\n仕事においては、現状維持や改善のスペシャリスト。急激な変化や新しい挑戦よりも、既存のものをより洗練させたり、細部を丁寧に作り込むことに喜びを感じる。「これまでのやり方を、少しだけ変えてみたらどうだろう？」という視点で、じわじわと周りを良い方向へ導く。\n\n弱点は、自分の意見を強く主張するのが苦手なこと。内心では確固たる価値観を持っているのに、衝突を避けるあまり言葉を飲み込んでしまうことがある。「まあ、みんなが良ければいいかな」と譲りがちだが、我慢が限界に達すると、静かに距離を置く選択をすることも。\n\n興味の幅は広く、「多趣味」のBr軸を持つ。手芸、料理、ガーデニング、写真、インテリア、旅行など、様々なことに好奇心旺盛に手を出してみる。一つを深く極めるというよりは、それぞれの体験から得た感動や知識を、自分の暮らしや仕事に幅広く取り入れていく。\n\n人との関係においては、共感力が高く、チームのムードメーカー的な存在ではないものの、縁の下の力持ちとして周囲を支える。誰かが困っていると、言葉なくそっと手を差し伸べる温かさを持つ。争いごとを避け、調和の取れた人間関係を大切にする。\n\n根底にあるのは、「自分らしく、自然体で生きたい」という強い願い。形式やルールに縛られることを嫌い、本質的な価値や美しさを追求する。自分の手で何かを生み出し、それが誰かの役に立ったり、喜ばれたりすることに、何よりも大きなやりがいを感じる繊細な芸術家タイプだ。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n「これなら自分にできるかも」「もっと良いものにできるはず」と感じた瞬間に、静かに動き出す。まず詳細な計画を立てるよりも、手を動かして感触を確かめながら進める派。与えられたタスクでも、自分なりの工夫や美的センスを加えられないか、と検討する。着手は穏やかだが、一度取り掛かると集中力は高い。\n\n【進行フェーズ】\n自分のペースでじっくりと作業を進める。タスクは複数並行するよりも、一つずつ丁寧に仕上げることを好む。細部にこだわり、少しでも気になるところがあれば納得がいくまで修正を重ねる。期限が迫ってきても「もっと良くしたい」という気持ちが強く、ギリギリまで粘りがち。進捗報告は簡潔だが、必要な情報はきちんとまとめる。\n\n【完了フェーズ】\n「これで本当に大丈夫かな」と最後の最後まで微調整を重ねる。成果物の完成度や美しさに強いこだわりを持ち、細部の確認も怠らない。ドキュメント作成や手順書の整備も、読みやすさや分かりやすさを重視して丁寧に行う。完璧主義ではないが、「より良い状態」で手放したいという思いが強い。\n\n【1日の働き方】\n静かで集中できる朝の時間を活用して、クリエイティブな仕事や思考を要するタスクに取り組むのがベスト。午前中は集中力が高く、午後はルーティンワークや会議、軽作業など、緩やかなタスクにシフトするのが良い。突発的な割り込みや、予期せぬ予定変更は苦手で、一日のリズムが崩れると調子を崩しやすい。一日の終わりには、静かに振り返りの時間を取り、心を整える。"},{title:"🗣️ 会議での振る舞い",content:"会議では聞き役に回ることがほとんどで、積極的に発言することは少ない。しかし、場の空気や参加者の感情には敏感に気づき、静かに見守っている。「それ、具体的にどうやるんだろう？」「この変更で、実際に使う人はどう感じるかな？」など、実践的で具体的な質問を投げかけることが多い。\n\nブレインストーミングのような場では、斬新なアイデアを出すよりも、既存のアイデアを「どうすればもっと良くできるか」「どうすれば実現可能か」という視点で、現実的な意見や改善策を提示する。意見の対立や感情的な議論は苦手で、穏便な解決策を模索する傾向がある。\n\n議事録の作成は比較的得意で、発言内容だけでなく、その場の空気感やニュアンスも汲み取りながら、要点を丁寧にまとめてくれる。長時間の会議や抽象的な議論が続くと、集中力が切れやすい。"},{title:"💬 チャットでの傾向",content:"メッセージは必要最低限の情報を、丁寧な言葉遣いで送る。感情的なやりとりや雑談は少なめだが、絵文字やスタンプは状況に応じて使う。長文よりも、簡潔で分かりやすいメッセージを心がける。個人宛のメッセージの方が得意で、グループチャットでは「見てるよ」という程度のリアクションが多くなりがちだ。\n\n返信は比較的早く、依頼や質問に対しては「承知しました」「確認します」など、きちんと返答する。ただし、曖昧な指示に対しては、そのまま「承知」してしまうこともあり、後で確認が必要になる場合もある。\n\n【周囲が知っておくと楽なこと】\n・丁寧な言葉遣いなので、指示が曖昧でも「分かりました」と返ってきがち。重要な依頼は、意図を口頭で確認するとより確実だ。\n・オープンな場で意見を求められるより、DMで相談された方が本音や具体的な意見を出してくれる。\n・一見静かに見えても、内心ではメッセージの内容を深く考えていることが多い。\n・リアクションは控えめだが、しっかりと内容を読み込み、行動に移している。見た目以上に信頼できる。"},{title:"👔 上司として／部下として",content:"【上司として】\n穏やかで、メンバーの意見や個性を尊重するリーダーだ。マイクロマネジメントはせず、一人ひとりのペースや強みに合わせて仕事を任せる。メンバーが安心して働けるよう、心理的安全性の高いチーム環境を整えることを重視する。「〇〇さんの意見、聞かせてくれる？」と、メンバーの自主性を促すのが上手い。チーム内の調和や、メンバーの心の状態を常に気にかけている。\n\n一方で、決断を迫られる場面や、厳しいフィードバックを求められる場面では、やや迷いがち。争いごとを好まないため、対立する意見の調整に苦労することもある。「まあ、みんなが納得していればいいかな」と、時に判断が曖昧になることもあるため、意思決定をサポートする参謀役がいるとチームは安定する。\n\n【部下として】\n任された仕事は責任感を持って、最後まで丁寧に仕上げるタイプだ。上司からの具体的な指示や期待をきちんと受け止め、自分なりに工夫を凝らしながら成果を出そうと努力する。自分の感性や裁量を尊重してくれる上司の元では、最高のパフォーマンスを発揮できる。穏やかなフィードバックや具体的なアドバイスは素直に受け入れ、成長に繋げる。\n\n管理型の、一方的な指示を出す上司とは相性が悪い。細かく監視されたり、自分のペースを乱されたりすると、モチベーションが急降下してしまう。「なんでこれをやるのか」という目的や背景が不明瞭なまま仕事をさせられることも苦手。競争的な環境や、感情的なプレッシャーは、本来の能力を発揮する妨げとなる。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・自分の手で何かを作り上げ、その「良さ」が認められたとき\n・既存のものを改善し、より良い状態にできたとき\n・静かで集中できる環境で、自分のペースで作業できるとき\n・自分の感性や美意識を活かせるプロジェクトに参加できたとき\n・チームの雰囲気が穏やかで、調和が取れていると感じるとき\n・尊敬する人から、具体的なフィードバックやアドバイスをもらえたとき\n・手がけた仕事が、誰かの役に立っていることを実感できたとき\n\n【📉 下がる瞬間】\n・人間関係の軋轢や、感情的な衝突が起きているとき\n・自分のペースを無視され、急かされたり、無理強いされたりするとき\n・自分の仕事の成果が見えない、あるいは評価されていないと感じたとき\n・過度に競争的な環境に置かれ、疲弊してしまうとき\n・抽象的すぎる目標を与えられ、具体的な行動に落とし込めないとき\n・自分の価値観や信条に反する行動を求められたとき\n・品質よりもスピードが優先され、妥協を強いられたとき"},{title:"📝 フィードバック",content:"【受けるとき】\nフィードバックは感情で受け止めるため、直接的で批判的な言葉は深く傷つく。まずは良かった点を具体的に伝え、その後、改善点を穏やかな言葉遣いで、かつ建設的に伝えてもらうと受け入れやすい。「もう少しこうすると、もっと良くなるよ」のような提案型がベストだ。すぐに反応できないこともあるが、時間を置いて一人でじっくり内容を咀嚼し、真摯に受け止めようと努力する。\n\n【伝えるとき】\n相手の気持ちを傷つけたくないという思いが強いため、厳しいフィードバックを直接的に伝えるのは苦手だ。遠回しな表現になったり、言いたいことを全て言い切れないことがある。そのため、ポジティブなフィードバックや、相手の良い点を具体的に褒めることは非常に得意。チームの調和を保つため、自分の感情よりも相手の感情を優先しがちだ。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・既存製品の品質改善：細部の調整や磨き込みで、完成度を高める\n・UI/UXデザイン：ユーザーの感覚に寄り添い、直感的で心地よい設計を考える\n・コンテンツ制作（美的要素）：写真編集、イラスト作成、資料デザインなど、視覚的に訴えるもの\n・チーム内の調和維持：メンバー間の橋渡し役、場の雰囲気作りで心理的安全性を高める\n・ワークフローの整理・改善：現状を分析し、地道な効率化や最適化を図る\n・クラフト系プロジェクト：手作業で何かを形にしたり、モノづくりに没頭する\n・イベントの空間デザイン：居心地の良い、洗練された空間を演出する\n\n【😰 苦手】\n・新規事業の立ち上げ（0→1）：未知へのリスクや不確実性が高く、苦手意識がある\n・大規模なプレゼン・ピッチ：大勢の前で強く主張したり、注目を集めるのは苦手\n・競争的な交渉やクロージング：相手を打ち負かすような場面は精神的に負担が大きい\n・突発的なトラブル対応：冷静さを保ちにくく、臨機応変な判断が難しい\n・抽象的な戦略策定：具体的な行動に落とし込むまでの段階で迷いが生じる\n・厳密な進捗管理：計画よりも現状の感覚を重視するため、細かな管理は苦手\n・数字を追いかける営業：人間関係よりも、目標達成に重きを置くのはストレス"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「これ、もっと良くならないかな？〇〇さんのセンスを活かしてほしい」→改善提案や感性を刺激されるとやる気になる\n・「△△について、詳しく教えてもらえるかな？経験や知識を頼りたい」→自分の専門性や経験を頼られると意欲的になる\n・「あなたのペースで大丈夫だから、じっくり考えてみてくれる？」→裁量と十分な時間を与えられると集中して取り組める\n・「チームのために協力してほしいんだけど」→調和と貢献意識に訴えかけると、快く引き受けてくれる\n・具体的な成果物のイメージや、最終的な目的を共有する→曖昧さより明確さがある方が、迷わず動ける\n・「ここまでは決まっているから、ここから先は任せるね」→一定の枠組みの中で自由を与えられると本気を出す\n\n【❌ パフォーマンスが落ちる】\n・「明日までにこれをやって！理由は後で説明するから」→急な無茶振りや、目的不明の指示はパニックになる\n・「とりあえずやってみて、考えながら進めよう」→目的や背景が不明瞭だと、何から手をつけて良いか迷う\n・「他のチームと競って、一番を目指そう！」→競争を煽られると、モチベーションが下がってしまう\n・「あなたの意見は聞かなくていいから、言われた通りにやって」→価値観や貢献を否定されると、やる気をなくす\n・感情的に指示を出したり、高圧的な態度を取る→心理的安全性が損なわれ、萎縮してしまう\n\n【💡 コツ】\n1. 作業の目的や、それがもたらす良い変化（誰が喜ぶか、何が改善されるか）を丁寧に説明する。\n2. 十分な時間と、集中できる静かな環境を提供する。途中での細かな進捗確認より、困っていることがないかの声かけが有効。\n3. 成果物の「質」や「美しさ」「使いやすさ」を評価ポイントに入れると、強いこだわりを発揮する。\n4. 「困っていることはない？」「何か手伝えることはある？」と、こまめに声をかけることで、抱え込みを防げる。\n5. 結果だけでなく、プロセスにおける工夫や努力、その人ならではのセンスを具体的に承認し、感謝を伝える。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・UI/UXデザイナー：ユーザーの感覚に寄り添い、直感的で心地よく、美しい体験をデザインする。細部へのこだわりや共感力が活きる。\n・プロダクトマネージャー（既存製品の改善）：既存の製品やサービスをより良くし、ユーザーの満足度を高める。地道な改善と品質へのこだわりが強み。\n・クラフト作家/職人：自分の手と感性で、心を込めて作品を作り上げる。美しいものへの探求心と、多趣味な発想を形にできる。\n\n【⭐ かなり合う】\n・コンテンツクリエイター（ビジュアル重視）：写真家、イラストレーター、動画編集者など、視覚を通して美しさや感情を表現する。\n・コミュニティマネージャー（調和型）：穏やかで居心地の良いコミュニティを作り、メンバー同士の繋がりや安心感を育む。共感力とG軸が活きる。\n・品質管理/QAエンジニア：細部にこだわり、製品やサービスの品質を高める。地道な検証作業や改善提案が得意。\n\n【💡 意外とハマる】\n・パーソナルトレーナー/ヨガインストラクター：個々の感覚に寄り添い、心身の調和をサポートする。穏やかなサポートで信頼を得る。\n・Webライター（取材・インタビュー重視）：人との対話を通じて、温かいストーリーや、体験に基づいた記事を紡ぐ。\n\n【⚠️ 避けた方がいい】\n・トップ営業（目標達成重視）：数字や競争を強く求められる環境は、心理的に大きなストレスとなる。\n・M&Aコンサルタント：ドライな交渉や、大規模な組織再編といった急激な変化は、価値観に合わないことが多い。\n・危機管理担当：突発的なトラブル対応や、感情的なプレッシャーが伴う状況は、冷静さを保ちにくい。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nISTJ-G-Dp「金庫番」 — クラフト職人の柔軟な感性や多趣味な発想を、金庫番が計画的かつ着実に形にしてくれる。安定志向のG軸が共通なので安心感があり、互いの苦手分野を完全にカバーし合える最強のコンビだ。\nENFJ-O-Br「カリスマ」 — クラフト職人の繊細な感性や、内に秘めた情熱を、カリスマが引き出し、周りに紹介してくれる。OとGで推進力は異なるが、F軸が共通なので感情的な理解があり、お互いを高め合える。\n\n【🔥 化学反応が起きるコンビ】\nESFP-O-Br「祭り人」 — クラフト職人の生み出した美しいものや、磨き上げたサービスを、祭り人が情熱的に広め、多くの人々に届けることができる。S（感覚）とP（知覚）、Br（多趣味）が共通で、感覚的な理解に基づいた活動が推進力となる。\nINFJ-G-Dp「深層探求者」 — クラフト職人の美的センスと、深層探求者の深い洞察力や哲学が組み合わさることで、より意味深く、心に響く作品やサービスが生まれる。G軸共通で穏やかに協力しながら、互いの世界観を深められる。\n\n【☀️ 居心地がいい仲間】\nISFJ-G-Br「世話焼き」 — クラフト職人の感性やペースを尊重し、世話焼きが温かくサポートしてくれる。G軸とBr軸が共通で、お互いに安心感を感じながら、穏やかで居心地の良い関係を築ける。共通の趣味で盛り上がることも。\nINFP-G-Dp「夢追い人」 — 共に内向的で理想主義的な面があり、互いの価値観や内面の世界を深く理解し合える。静かに創作活動を共有したり、感性を分かち合ったりする中で、自然と心が通じ合う親友のような関係を築けるだろう。\n\n【⚡ 未知の触発者】\nENTJ-O-Dp「将軍」 — クラフト職人の穏やかな感性や、細部へのこだわりに、将軍の明確なビジョンと強力な推進力が新たな視点をもたらす。GとOで方向性は真逆だが、その違いが新鮮な発見や成長のきっかけとなることもある。\nESTP-O-Br「開拓者」 — クラフト職人の内省的な視点に、開拓者の現実的で即断即決な行動力が刺激を与える。S（感覚）とBr（多趣味）が共通で、意外な形で共感し合える場面もあり、普段は選ばないような新しい体験へと誘ってくれるかもしれない。"},{title:"🌈 プライベートの顔",content:"休日は自然の中で過ごすことが多い。庭いじりをしたり、近くの公園や山を散歩したり、カフェで読書をしたりと、ゆったりとした時間を過ごすことを好む。「今日は新しいハーブの苗を植えてみたんだ」「この前行った公園、秋の紅葉がすごく綺麗だったよ」と、季節の移ろいや日常の小さな発見を大切にする。\n\n家の中では、手芸、料理、DIYなど、自分の手で何かを作り出す時間を楽しむ。週末にはパンを焼いたり、壊れた家具を修繕したり、インテリアの配置を変えたりと、常に自分の居場所を心地よく整えている。「この間、ずっと欲しかったあのアンティークの器、やっと手に入れたんだ」と、お気に入りのモノに囲まれて暮らすことに喜びを感じる。\n\nSNSは見る専か、自分の作品や美しい風景の写真をアップする程度。フォロワー数や「いいね」の数よりも、共感してくれる数人の親しい仲間との繋がりを大切にする。派手なイベントにはあまり顔を出さず、本当に興味のあるワークショップや展示会にはひっそりと参加している。\n\n友達とは少人数で、カフェ巡りや美術館、クラフトワークショップなど、落ち着いた場所で過ごすことを好む。流行のスポットを追いかけるよりも、ゆっくりと会話を楽しみ、深く語り合う時間を重視する。「この間の旅行で立ち寄った小さな美術館がすごく良かったんだ」と、自身の体験を穏やかに共有してくれる。\n\nファッションやインテリアは、流行を追いかけることよりも、自分にとって心地よいもの、長く使える本物を選ぶ。素材の肌触りや、デザインの美しさにこだわり、自分らしいスタイルを確立している。「この服、もう5年くらい着てるんだけど、全然飽きないんだよね」と、愛着のあるものを大切にする。\n\n旅行は、観光地を巡るよりも、その土地の風土や文化、食をじっくりと味わうタイプ。温泉旅館でゆっくりしたり、自然の中の隠れ家的な宿を選んだりする。お金の使い方も「体験」や「質の良いもの」重視。「いいな」と思ったら衝動的に購入することもあるが、後で「やっぱりこれにして良かった」と満足することも多い。直感を信じる、自然体な人だ。"}]},
"ISFP-G-Dp":{name:"癒し職人",character:"ジュビア（FAIRY TAIL）",great:"ヒルデガルト・フォン・ビンゲン",color:"#D2B4DE",summary:"「この一つの美と癒しを深く極める」静かな治療者。守り×深型で一つの癒しの技を究める。手の温もりで人を癒す力がある。",compatibility:{complement:[{code:"ENTP-O-Br",name:"アイデアマン",desc:"新規事業の企画会議では、ENTP-G-Brが知識の引き出しから多様な情報を提示し、ENTP-O-Brがそれに触発されて次々と新しいアイデアを繰り出す。知識と発想が高速で応酬し、無限の可能性が広がる。"},{code:"ENTJ-O-Dp",name:"将軍",desc:"将軍が組織全体の戦略を構築し、癒し職人が提供する質の高いケアをより多くの人に届ける仕組みを作ります。プロジェクト計画において、癒し職人の専門性を最大限に活かす場を整えます。"}],chemistry:[{code:"ESFP-G-Dp",name:"ゴッドハンド",desc:"ゴッドハンドの豊かな表現力と癒し職人の繊細な技術が融合し、顧客に感動的な癒し体験を生み出します。イベントでの共同施術では、互いの持ち味を活かし最高のパフォーマンスを発揮します。"},{code:"ISFJ-G-Dp",name:"守り神",desc:"守り神の細やかな気配りと癒し職人の静かな寄り添いが組み合わさり、お客様に最高の安心感を提供します。顧客対応では、互いに補完し合い、深い信頼関係を築くことができます。"}],comfort:[{code:"ISFP-G-Br",name:"クラフト職人",desc:"同じ感性を持つため、静かに黙々と作業する時間も心地よく共有できます。休憩時間には、お互いの趣味のクラフト作品を見せ合い、穏やかな共感と創造的な刺激を与え合います。"},{code:"INFP-G-Dp",name:"詩人",desc:"互いに内省的で繊細な感性を持つため、言葉を多く交わさなくても深い理解が生まれます。静かな空間で、癒しの本質や美意識について語り合うことで、精神的な充足感を得られます。"}],catalyst:[{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"},{code:"ESTP-O-Dp",name:"エース",desc:"エースの迅速な行動力と実行力が、癒し職人が温めていたアイデアを現実の形にするきっかけを与えます。新しい施術メニューの導入テストでは、エースの行動力が実験を加速させます。"}]},careers:{top:["鍼灸師","陶芸家（器）","和菓子の名匠"],good:["アロマセラピスト","リストラティブヨガ講師","漢方薬剤師"],surprise:["仏像修復師","苔庭の造園家"],avoid:["スピード営業","大規模イベント運営"]},strengths:["深い癒しの技","手の温もり","一つへの没入","静かな美意識"],weaknesses:["大人数","スピード","自己PR","変化"],tips:{do:"この特別な施術について、あなたの深い知識と技術を活かして、唯一無二の最高の体験を追求してくれない？ そのための時間と静かな環境はしっかり確保するよ。今度のプロジェクトで、この製品の繊細な部分を、あなたの感性で最も美しく、癒しが伝わるように仕上げてほしいんだけど、どうだろう？ 細部にこだわるあなたの視点が必要なんだ。お客様が本当に求めている深い癒しを提供するために、今の施術をさらに一段階高めるアイデアはないかな？ あなたの専門的な意見を聞かせてほしい。改善のための協力は惜しまないよ。",dont:"もっと効率を上げて、一日でできるだけ多くの顧客に対応してほしいんだけど、どうかな？ 量をこなすことも大切だからね。この資料、急ぎでパパッと終わらせてくれる？ 細かいことは気にしなくていいから、まずは形にしてほしいんだ。新しいプロジェクトでは、複数の異なるタスクを同時に担当してもらうことになるけど、大丈夫だよね？ 色々なことに挑戦して経験を積んでほしいから。"},fullSections:[{title:"👤 この人はこんな人",content:"「この一つの美と癒しを深く極める」静かな治療者。守り×深型で一つの癒しの技を究める。手の温もりで人を癒す力がある。\n\n「ここに心を尽くす」がモットー。深い共感力と職人肌の探究心で、特定の人や場に安心と安らぎをもたらす。目の前の困っている人に寄り添い、その人の心身の状態を肌で感じ取るのが得意だ。例えば、チームの誰かが少し疲れていると感じたら、さりげなく温かいお茶を差し入れたり、「大丈夫？」と優しく声をかけたりする。彼らにとって、他者の感情や場の空気は、言葉以上に多くの情報を伝えるものなのだ。一度決めたことは最後までやり遂げようとする、芯の強さも持ち合わせている。その探求心は、例えば「この製品の素材、もっと肌触りが良いものはないかな？」「このサービスの提供フロー、もっと利用者の負担を減らせるはずだ」といった形で発揮される。既存のものをただ維持するだけでなく、それを丹念に磨き上げ、より質の高いものへと昇華させることに、彼らは無上の喜びを感じるのだ。\n\nエネルギーは、人との交流から得るよりも、自分一人の静かな時間から充電するタイプだ。広い場所で大勢とわいわい過ごすよりも、落ち着いた空間で好きなことに没頭したり、静かに内省したりする時間を何よりも大切にする。例えば、仕事の合間の休憩時間には、ヘッドホンをして集中したり、窓の外を眺めて心を落ち着かせたりすることが多い。自分の内側に意識を向けることで、日々の喧騒で散漫になったエネルギーを取り戻し、再び目の前の仕事に集中できる状態へと整える。彼らにとって、一人の時間は「精神の栄養補給」なのだ。\n\n仕事においては、具体的な課題解決や、目の前の人の困り事に寄り添うのが圧倒的に得意だ。抽象的な概念や壮大なビジョンよりも、今、目の前にある現実的な問題に集中し、それを丁寧に解決していくことに価値を見出す。「こうすればもっと良くなるのに」という感覚は、常に彼らの内側に存在する。そのため、彼らは既存のプロセスや製品を丹念に見直し、その品質や効率を着実に向上させていくことを得意とする。リスクを冒して新しいものを創造するよりも、今あるものを丁寧に育み、守りながら改善していくことに情熱を傾けるのだ。彼らの探求心は一点集中型であり、一度興味を持った技術やテーマはとことん深く掘り下げ、その分野の専門家としての地位を確立していく。その知識や技術は、一朝一夕で身につくものではなく、日々の地道な努力と情熱の結晶である。彼らは「急がば回れ」の精神で、着実に高みを目指す職人そのものだ。\n\n完璧主義な一面があり、物事を最後まできっちり詰めることに妥協しない。しかしそのこだわりが強すぎるあまり、時には時間がかかりすぎてしまうこともある。また、急な変化や未知の状況にはストレスを感じやすい傾向がある。例えば、急なプロジェクトの方向転換や、予期せぬトラブルが発生した際、すぐに順応するのは難しいと感じるだろう。「もう少し考える時間が欲しい」「事前に教えてもらえていれば」といった本音が、心の奥底にあることが多い。広範囲な情報収集や抽象的な戦略立案よりも、目の前の具体的なデータや、既に実証された方法に基づいたアプローチを好む。自分のペースを乱されるとパフォーマンスが落ちやすく、感情的になることは少ないが、心の中で静かに不満を溜め込んでしまうこともあるため、周囲は注意が必要だ。意見を主張するのが苦手で、衝突を避ける傾向も弱点と言える。\n\n興味の対象は、広さよりも圧倒的な深さを重視する。世間の流行にはあまり流されず、むしろ流行の背後にある「本質」や「熟練の技」に深く惹かれる傾向がある。例えば、ファッションであればトレンドを追うよりも、長く愛用できる上質な素材や、丁寧な仕立てに価値を見出す。音楽であれば、話題の新曲よりも、古くから愛される名曲の深遠さに心惹かれるだろう。一度興味を持ったことは、とことん突き詰めて探求する。関連書籍を読み漁ったり、専門家に話を聞きに行ったり、実際に手を動かして試してみたりと、その熱心さは周囲を驚かせるほどだ。その探求の過程で得られた深い知識や技術は、彼らの大きな強みとなる。\n\n対人関係においては、大人数での賑やかな交流よりも、ごく少数の信頼できる人との深い交流を好む。初対面の人や大人数の前では物静かだが、それは相手を観察し、場に馴染もうとしている証拠だ。聞き上手で、相手の感情に寄り添うのが得意であり、相手が安心して話せる雰囲気を作り出すことができる。「うんうん、そうなんだね」「つらかったね」と、共感の言葉を挟みながら、じっと相手の話に耳を傾ける。信頼を築くのには時間がかかるが、一度心を開くと、相手との間に深く誠実な関係を築き上げる。無理に社交的になろうとはせず、自分のペースと心地よさを大切にする。\n\n彼らの根底にあるのは、誠実さ、調和、そして安心感への強い希求だ。自分の仕事が誰かの役に立っているという実感や、目の前の課題が解決され、穏やかな状態が保たれることに大きな喜びを感じる。「この仕事を丁寧にこなすことで、みんなが気持ちよく過ごせるなら」という思いが、彼らの行動の原動力となる。無理のない持続可能な働き方を求め、仕事とプライベートのバランスを大切にする。彼らは「癒し職人」の名の通り、静かに、しかし確実に、周囲に安らぎと質の高い価値を提供し続ける存在なのだ。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n新しいことを始めるよりも、現状の改善や深掘りに興味が湧く。既存の課題に対して「これで本当に大丈夫かな？」「もっと良い方法はないかな？」と熟考してから、慎重に動き出すタイプだ。具体的な手順が見えて、納得感があれば、すぐさま没頭する。直感的に「これは本物だ」「このアプローチは間違いない」と感じたものには、とことん時間を費やし、情熱を傾ける。\n\n【進行フェーズ】\n一つのタスクに集中し、丁寧に進めるのが自然体。マルチタスクは苦手で、複数のボールを同時に追いかけると混乱してしまう。細部にまでこだわり、完璧を目指すため、作業は着実だが時間はかかりがちだ。問題が発生しても感情的に対処せず、落ち着いて状況を分析し、最適な解決策を探る。進捗報告は詳細で丁寧だが、本人のこだわりが深いため、進捗自体が他の人から見えにくいこともある。「今、〇〇の品質を上げるために、××を試しているところです」といった具体性で安心感を与える。\n\n【完了フェーズ】\n品質へのこだわりが強く、最後の最後まで妥協しない。細部の確認や、ドキュメントの整備、後工程への配慮を怠らない。自分が納得するまで完成とは言えないため、締め切り直前まで修正を続けることもある。完璧主義がゆえに、時間がかかりすぎるのが弱点だが、その分、完成したもののクオリティは非常に高い。他者からのチェックが入る前に、自分で徹底的に見直す。\n\n【1日の働き方】\n朝は自分のペースでゆっくりと準備し、午前中に集中力のいる細やかな作業や深い思考を必要とするタスクをこなすのがベストだ。午後はルーティンワークや、少人数での密な連携を必要とする作業に充てるのが良い。静かで落ち着いた環境で、邪魔されずに作業できると最もパフォーマンスを発揮する。残業はあまりせず、プライベートの静かな時間も大切にしたいタイプ。突発的な依頼や会議は苦手なので、事前に予定を立てる方が良い。"},{title:"🗣️ 会議での振る舞い",content:"会議では静かに聞き役に徹することが多い。積極的に発言するタイプではないが、場の意見を注意深く聞き、違和感があれば的確な指摘をする。その発言は常に具体的で、説得力がある。\n\nブレストのような自由な発想が求められる場では、アイデアを出すのに時間がかかる。しかし、既存のアイデアを具体的にどう改善するか、どう実現するかについては、現実的で詳細な提案ができる。「〇〇のアイデア、すごく良いですね。実現するなら、まずはこの部分から着手して、こういう手順で進めるのが確実だと思います」といった意見を出せるだろう。\n\n感情的な議論は苦手で、場の雰囲気が荒れると沈黙してしまう。合意形成や調和を重んじ、建設的な議論を好む。結論が出ない、抽象的な議論が続くと集中力が落ちる。具体的な行動計画や改善策が提示される会議には真剣に参加し、細部まで確認を怠らない。議事録を取るのが得意で、丁寧かつ漏れなく記録する。"},{title:"💬 チャットでの傾向",content:"メッセージは短く、要点をまとめるのが特徴だ。絵文字やリアクションは控えめだが、必要な場合は適切なものを選ぶ。返信は早い方だが、熟考してから送信するため、即座に返ってくるわけではないことも。\n\n雑談チャンネルにはあまり参加しないが、必要な情報収集は怠らない。チーム内の会話は常にチェックしている。個別の相談や、具体的なタスク依頼には真摯に対応し、不明点があれば具体的に質問を投げかける。「〇〇の件、進め方についていくつか確認したい点があります」と丁寧なメッセージを送る。\n\n【周囲が知っておくと楽なこと】\n・返信がないのは検討中か、考える時間が必要なサイン。催促しすぎない方が良い。ただし、内容によっては不安に感じることもあるので、進捗を聞くなら「〇〇について、何か困っていることはありますか？」と優しく聞く。\n・感情的な表現は苦手なので、シンプルなテキストメッセージの裏に深い配慮があることが多い。言葉の端々に、相手への気遣いが滲み出ている。\n・長文でまとめて送るよりも、短いメッセージで具体的な質問をするとスムーズにコミュニケーションが取れる。\n・急な依頼よりも、事前に相談してもらうと落ち着いて対応できる。急かされると、焦りからミスを誘発してしまうこともある。"},{title:"👔 上司として／部下として",content:"【上司として】\nメンバーの意見を丁寧に聞き、一人ひとりの個性や感情を尊重するリーダーだ。チームの和を大切にし、穏やかな環境を保つことを重視する。急な方向転換はせず、着実な進捗を求める。メンバーが特定の分野での専門性を深く追求できるよう、そのための時間やリソースを確保し、サポートすることに喜びを感じる。\n\nマイクロマネジメントはしないが、メンバーの困り事には親身に寄り添い、具体的なサポートを提供する。成果よりもプロセスや丁寧さを評価する傾向がある。「この部分、すごく丁寧にやってくれたね」「この改善案は、本当にチームにとって良い影響を与えているよ」といった具体的なフィードバックを心掛ける。チーム全体のモチベーションを維持するよりも、個々が心地よく働ける環境づくりに力を入れる。\n\n【部下として】\n安定した環境で、一つのタスクにじっくり取り組むことを好む。上司からの具体的な指示や期待を明確に理解し、それを着実に、そして高い品質で実行することに喜びを感じる。「〇〇さんの専門性を活かして、この部分を深掘りしてほしい」といった依頼は、最高のモチベーションになる。\n\n急な指示変更や、抽象的な目標だけを渡されると混乱する。自分のペースを乱されるとストレスを感じやすく、感情的になることは少ないが、心の中で不満が溜まりやすい。彼らにとって、納得できない指示はモチベーションを大きく低下させる要因となる。細かい進捗報告を求められるのは苦ではないが、自分の仕事の進め方や方法を細かく指定されることには抵抗がある。自分のやり方で、最高の品質を追求したいのだ。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・自分の仕事が誰かの役に立っていると実感できたとき\n・既存のプロセスや製品を、自分の手でより良く改善できたとき\n・一つのことに深く集中し、専門性を高められたと実感できたとき\n・チームや組織の調和が保たれ、穏やかな環境で働けるとき\n・自分のペースで、納得のいくまで作業できたとき\n・尊敬する人から具体的なアドバイスや評価をもらえたとき\n・完成したものの品質や、細部へのこだわりを具体的に褒められたとき\n\n【📉 下がる瞬間】\n・急な変更や混乱が頻繁に続き、落ち着いて作業できないとき\n・自分の価値観と合わない指示に従わなければならないとき\n・成果が数値だけで評価され、プロセスや丁寧さが軽視されるとき\n・人間関係の軋轢や不協和音がチーム内に蔓延しているとき\n・複数のタスクを並行して急かされ、一つに集中できないとき\n・自分の専門分野と全く関係ないことを、理由も分からずさせられるとき\n・具体的なフィードバックがなく、漠然とした評価しか受けられないとき"},{title:"📝 フィードバック",content:"【受けるとき】\n感情的に受け止めやすいので、ポジティブな言葉から入ると心を開きやすい。「〇〇さんのこの点は本当に素晴らしい」「いつも丁寧な仕事に感謝しています」といった前置きがあると、安心して聞くことができる。具体的な事実に基づいたフィードバックを好み、感情的な批判や抽象的な指摘は苦手。「もっと頑張って」といった漠然とした言葉では、どうすれば良いか途方に暮れてしまうだろう。改善点については、具体的な方法や手順を提案されると素直に受け入れ、実践しようと努める。\n\n【伝えるとき】\n相手の感情を慮り、直接的な批判は避ける傾向がある。遠回しな表現や、サンドイッチ型（ポジティブ→ネガティブ→ポジティブ）の伝え方を好む。「〇〇さんのこの部分はいつも助かっています。一方で、この点について、もう少し別のやり方もあるかもしれませんね。でも、全体としては素晴らしいと思います！」といった具合だ。しかし、この優しさがゆえに、本当に伝えたいことが伝わらないこともあるため注意が必要だ。相手に不快な思いをさせたくないという気持ちが根底にある。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・**品質管理・品質改善**: 細部にこだわり、製品やサービスの品質を徹底的に高め、守る。\n・**専門分野の深い探求**: 一つのテーマや技術を深く掘り下げ、専門知識を習得する。\n・**顧客サポート・カウンセリング**: 相手の感情に寄り添い、個別のニーズに応じた解決策を丁寧に提供する。\n・**ルーティンワークの精度向上**: 定型的な作業を正確かつ効率的に、より良くしていく工夫をする。\n・**手作業を伴う創作活動**: 陶芸、デザイン、プログラミングなど、手を動かして形にする作業に没頭する。\n・**ドキュメントの整備・手順書作成**: 丁寧で分かりやすい、実用的な資料を作成する。\n・**環境整備・場の調和**: チームやオフィスの雰囲気を穏やかに保ち、働きやすい環境を作る。\n\n【😰 苦手】\n・**新規事業の立案・0→1の企画**: 既存のものを改善する方が得意で、未知の領域や不確実性は苦手。\n・**大規模なプレゼンテーション**: 大勢の前で話すのは苦手で、緊張しやすく、パフォーマンスが落ちる。\n・**競争的な交渉・営業**: 相手と争うことや、駆け引きは精神的に疲弊し、避けたがる。\n・**突発的なトラブル対応**: 急な事態には冷静さを保つのが難しく、落ち着いて対処するのに時間がかかる。\n・**抽象的な戦略会議**: 具体的な行動計画が見えない、概念的な議論は理解に苦しみ、戸惑う。\n・**広範囲な情報収集・トレンド分析**: 深く掘り下げる方が得意で、幅広い情報への関心は薄い。\n・**目標数値だけを追う営業**: 人や感情が介在しない目標設定はモチベーションが上がりにくい。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「〇〇さんのこの分野の専門知識を借りたい」→彼の専門性を頼られると、期待に応えようと燃える。\n・「このやり方をもっと良くするにはどうしたらいいかな？」→現状改善は得意分野なので、すぐに貢献しようとする。\n・「あなたのペースでじっくり取り組んでほしい」→裁量と時間を与えられると、最高の品質を目指せる。\n・「この仕事は〇〇さんにしかできないと思う」→特別感や唯一無二の貢献を求められると、本気を出す。\n・「〇〇さんの意見を聞かせてほしい」→丁寧に耳を傾けられることで、安心して自分の考えを話せる。\n・具体的な手順や期待値を明確に伝えることで、安心して作業に取り掛かれる。\n\n【❌ パフォーマンスが落ちる】\n・「とりあえず急ぎでやっておいて」→急かされると焦り、ミスにつながりやすくなる。丁寧さに欠ける結果になることも。\n・「これは前例がないけど、とにかくやってみて」→未知への挑戦は苦手意識が強く、不安を感じてしまう。\n・「もっと積極的に発言して」→無理に社交性を求められると、疲弊し、本来の良さが出なくなる。\n・「この仕事は誰でもできるから」→自分の専門性が活かせないと、やる気が大きく低下する。\n・「なんでまだ終わらないの？」→プロセスを無視した結果だけを求められると、プレッシャーに感じてしまう。\n\n【💡 コツ】\n1. なぜこの仕事が必要なのか「Why」と、具体的な「What」と「How」を丁寧に説明する。彼らは納得感がないと動けない。\n2. 彼の専門性やこだわりを尊重し、具体的な改善点を提案できる余地を残す。「あなたの視点でより良くしてほしい」と伝えるのが効果的だ。\n3. 彼のペースを尊重し、十分な時間を与える。ただし、締め切りは「いつまでにお願い」と明確に伝えることで、計画的に進められる。\n4. 一人の時間で集中できるよう、落ち着いた環境を確保する。ノイズの少ない空間での作業は、彼の集中力を最大限に引き出す。\n5. 完成したものや、プロセスでの工夫に対して、具体的な言葉で感謝や賞賛を伝える。「この部分のこだわりが素晴らしい」「細部まで丁寧に仕上げてくれてありがとう」といった言葉が、次のモチベーションにつながる。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・**専門職（職人、セラピスト、カウンセラー）**: 特定の技術や知識を深く追求し、人や環境に癒しと安らぎをもたらす。その道のプロフェッショナルとして、質の高いサービスを提供する。\n・**品質管理・品質保証**: 細部へのこだわりと丁寧さで、製品やサービスの質を守り高めることに喜びを感じる。常に改善の視点を持つ。\n・**UX/UIデザイナー**: ユーザーの感情に寄り添い、使いやすさや快適さを追求する。具体的なユーザー体験を向上させることに情熱を注ぐ。\n\n【⭐ かなり合う】\n・**プロダクトマネージャー（既存製品の改善）**: 現状のプロダクトをより良くするために深く掘り下げ、具体的な改善策を実行する。\n・**カスタマーサポート**: 顧客の困り事に親身に寄り添い、個別の解決策を丁寧に提供する。対面や個別のやり取りで真価を発揮する。\n・**コンテンツクリエイター（特定のテーマを深く掘り下げる）**: 興味のある分野を徹底的に調べ、質の高い情報や作品を提供する。\n\n【💡 意外とハマる】\n・**専門分野のインストラクター**: 自分が深く学んだ知識や技術を、相手のレベルに合わせて丁寧に教え、生徒の成長をサポートする。\n・**バックオフィス業務（経理、人事）**: 安定した環境で正確さが求められる定型業務や、個々の社員に寄り添う人事相談などは得意。\n\n【⚠️ 避けた方がいい】\n・**新規事業開発**: 0から1を生み出すプレッシャーや不確実性はストレスが大きく、得意な「深掘り」を活かせない。\n・**競争の激しい営業職**: 成果主義や競争環境は精神的に疲弊しやすく、人の感情や調和を重んじる彼らには合わない。\n・**M&A、リスクマネジメント**: 大規模な変化や不確実な状況への対応は苦手で、精神的な負担が大きい。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\n・**ENTJ-O-Dp「将軍」**: 癒し職人の生み出す品質と安定を将軍が戦略的に広げ、市場を切り開く。将軍の広い視野とリーダーシップが癒し職人の専門性を活かす場を創出し、彼らはその期待に応える。お互いの「深掘り」という共通点も相性が良い。\n・**ISTJ-G-Dp「金庫番」**: 共に安定志向で一点深掘り。金庫番の論理的思考と癒し職人の共感力が、堅実かつ人間味のある改善を可能にする。細部にまで徹底的にこだわる点で共鳴し合い、安心して協力できる関係だ。\n\n【🔥 化学反応が起きるコンビ】\n・**ENFP-O-Br「着火マン」**: 着火マンの広範なアイデアと情熱を、癒し職人が具体的な形に落とし込み、品質を高める。互いの弱点を補完し合い、創造的なものを生み出すことができる。着火マンの刺激が癒し職人の新たな扉を開くこともある。\n・**INFJ-G-Dp「洞察者」**: 共に内向的で深い思考を持つ。癒し職人の目の前の事柄への深い探求と洞察者の未来を見通す直観が、本質的な価値を持つものを生み出す。静かに深く語り合い、互いの世界を広げられるコンビだ。\n\n【☀️ 居心地がいい仲間】\n・**ISFJ-G-Dp「奉仕者」**: 共に守り型、深掘り型で、目の前の人や物事を大切にする。お互いの価値観を理解し合い、支え合いながら安心して協力できる。言葉を多く交わさずとも、互いの意図を察し合える。\n・**INFP-G-Dp「夢想家」**: 共に内向的で感情豊か。夢想家の持つ独特な世界観や理想を、癒し職人が現実的な形で表現する手助けができる。互いの繊細な感性を理解し合い、心地よい空間を共有できるだろう。\n\n【⚡ 未知の触発者】\n・**ESTP-O-Br「冒険家」**: 冒険家の行動力と変化への適応力が、癒し職人の殻を破るきっかけとなる。刺激的で全く異なる価値観を持つが、お互いのペースと個性への理解があれば、新しい世界を見せてくれる。\n・**ENTP-O-Br「アイデアマン」**: アイデアマンの無限の発想は癒し職人に新しい視点をもたらす。その斬新なアイデアを形にするには癒し職人の具体的なサポートが不可欠だ。アイデアマンが広げた風呂敷を、癒し職人が丁寧に畳むような関係性になる。"},{title:"🌈 プライベートの顔",content:"休日は、熱中している趣味に没頭していることが多い。SNSでの発信は少ないが、その道のプロ級の腕前を持っていることも少なくない。\n\n「今週はひたすら手編みのセーターを仕上げていたよ」「最近は〇〇茶の奥深さにハマってて、全国のお茶を取り寄せてるんだ」といった、特定の分野への深い探求が日常だ。ガーデニングや陶芸、特定の楽器の演奏など、手を動かす趣味で集中力を高め、心を落ち着かせている。\n\n友人との交流は大切にするが、大人数で騒ぐよりも、気の置けない数人と静かなカフェで語り合ったり、一緒に美術館に行ったり、趣味のイベントに参加したりするのを好む。じっくりと会話を楽しみ、相手の気持ちに寄り添うことで、より深い絆を育む。\n\n流行のスポットよりも、長年愛されている隠れ家的な場所や、職人の店に足を運ぶ。買い物をする際も、大量消費品よりも「長く使える、良いもの」を選び、修理して使うことも厭わない。家具や日用品も、デザインや機能性だけでなく、その背景にある物語や作り手の想いを重視する。一点豪華主義な傾向がある。\n\n自然の中で過ごすことを好む。キャンプやハイキングよりも、公園のベンチで本を読んだり、庭の手入れをしたりするような、穏やかな時間を過ごすことでリフレッシュする。自然の美しさや静けさから、新たなインスピレーションを得ることも多い。\n\n部屋はシンプルで整頓されており、お気に入りの道具や作品が丁寧にディスプレイされている。無駄がなく、機能的で美しいものを愛する。予定は詰め込まず、その日の気分や状況に合わせて柔軟に過ごす。急な誘いは苦手で、事前に分かっていることには快く応じる。基本的にインドア派だが、興味のあるイベントがあればフットワークは軽い。"}]},
"ISTJ-O-Br":{name:"ルール番人",character:"テンヤ飯田（僕のヒーローアカデミア）",great:"リンカーン",color:"#ABB2B9",summary:"「ルールと正義を幅広く守る」公正の人。攻め×広型で複数の領域に公正な基準を適用する。規律正しく信頼性が極めて高い。",compatibility:{complement:[{code:"ENFP-G-Dp",name:"共感屋",desc:"公正さに優しさの彩り。ルール適用時に、ENFP-G-Dpが個々の状況や感情への配慮を促すことで、より柔軟かつ人道的な判断を可能にします。人事評価基準の調整会議で、具体的な事例を基に議論が深まります。"},{code:"ESFP-O-Dp",name:"パフォーマー",desc:"プレゼンテーション準備中、ESFP-O-Dpのダイナミックで感情豊かな表現が、ENTP-G-Brの持つ豊富な知識に新たな視覚的・感覚的要素をもたらす。知識が鮮やかに彩られ、聴衆を惹きつけるコンテンツへと触発される。"}],chemistry:[{code:"ESTJ-O-Br",name:"鬼軍曹",desc:"INTPが導き出した根本原理を、具体的なプロジェクト計画や実装ステップへと落とし込む。実験の段取りや必要なリソース確保など、理論の検証を現実的に推進する。"},{code:"ISTJ-O-Dp",name:"任務遂行者",desc:"品質管理の現場で、ISTP-O-Dpが開発した精密な検査基準を、ISTJ-O-Dpが着実に運用し、寡黙ながらも高い精度で品質維持に貢献する。"}],comfort:[{code:"ISTJ-G-Br",name:"組織の記憶庫",desc:"「着火マン」が提示する大胆な企画に対し、「組織の記憶庫」は過去の事例やデータに基づき実現性を分析します。プロジェクトの方向性を議論する際、異なる視点から堅実な意見を出し合い、計画の精度を高めます。"},{code:"ISFJ-O-Br",name:"献身サポーター",desc:"プロジェクトでISFJ-O-Dpが深くコミットする対象を、ISFJ-O-Brも献身的に支えます。お互いの揺るぎないサポート精神が共鳴し、チームに安心感と確実性をもたらすでしょう。"}],catalyst:[{code:"ENTP-O-Br",name:"アイデアマン",desc:"新規事業の企画会議では、ENTP-G-Brが知識の引き出しから多様な情報を提示し、ENTP-O-Brがそれに触発されて次々と新しいアイデアを繰り出す。知識と発想が高速で応酬し、無限の可能性が広がる。"},{code:"ESFP-O-Br",name:"お祭り総隊長",desc:"職場イベントやカジュアルな場で、INTPはESFPがもたらす多様な人々の感情や反応、場の雰囲気を観察。これにより、理論だけでは見過ごしがちな人間行動のパターンや非言語情報に気づかされる。"}]},careers:{top:["裁判官","監査法人パートナー","コンプライアンス責任者"],good:["税務署長","品質保証マネージャー","法務部長"],surprise:["棋士（規則の中の創造）","鉄道ダイヤ編成者"],avoid:["即興エンタメ","感覚重視のデザイン"]},strengths:["公正な判断","規律の維持","幅広い基準適用","極めて高い信頼性"],weaknesses:["柔軟性","感情面","創造性","変化への対応"],tips:{do:"「この新しいプロジェクトの品質管理基準について、あなたの専門知識と公正な視点で、全ての工程に適用できる厳格なルールを策定してくれないか？」「現在のA業務プロセスが非効率であるというデータが出たため、あなたの分析力で問題点を特定し、より公平で効率的な改善策を具体的に提案してほしい。その際、関連部署への説明と調整もリードしてほしい。」「来期の予算配分において、各部署から提出された要望書を精査し、組織全体の利益と公平性を最大化する配分案を作成してほしい。最終的な承認はあなたの判断を尊重する。」",dont:"「この顧客からのクレーム、ルール通りだと厳しいから、今回は特例として何とかうまく処理しちゃってくれない？」「あの部署の件、細かい規定は気にせず、私の顔を立てる形で適当に調整してくれないか？」「今回のプロジェクトは時間がないから、品質チェックは後回しで、とりあえず納期優先で進めてほしい。多少の不備は目をつぶってくれ。」"},fullSections:[{title:"👤 この人はこんな人",content:"タイプ: ISTJ-O-Br「ルール番人」（テンヤ飯田 — 秩序を重んじる優等生）\nI（内向）- S（感覚）- T（思考）- J（判断）- O（攻め）- Br（多趣味）\n\n「もっと正しいやり方があるはずだ」。この人は常にそう考え、現状のルールやプロセスに疑問符を投げかける。非効率や不公平を見過ごせず、より良い秩序を確立するためなら、自ら先陣を切って変革をもたらそうとする「攻め」の姿勢を持つ。\n\n一人で集中して考えることでエネルギーを充電するタイプ。騒がしい場所や曖昧な議論は苦手で、深く思考を巡らせる静かな時間を大切にする。自分なりの正解を導き出し、それを現実世界に適用することに喜びを感じる。\n\n仕事では、論理的思考と客観的な分析力で課題の本質を見抜くのが得意だ。膨大な情報の中から共通のパターンや普遍的なルールを見つけ出し、それを基に精緻な計画を立てる。既存のルールを単に守るだけでなく、そのルールの意味を理解し、より良くするための改善提案を積極的に行う。新しいツールや仕組みがあれば、まずは自分が試して導入を推し進めるタイプだ。\n\n弱点としては、感情的な判断や曖昧な指示を極端に嫌うこと。「それって意味あるの？」が素直な疑問で、納得できないと動けない。融通が利かない、厳しすぎると見られることもあるが、それは彼が「公正さ」を何よりも重んじているからだ。\n\n興味の幅は広く、「多趣味」を自認する。特定の分野にとらわれず、様々な知識や業界のベストプラクティスに関心を持つ。「あの会社のこの制度、うちにも取り入れられないかな」と常にアンテナを張り、幅広い情報からより普遍的な正しさや効率的な方法を学び、それを自分のフィールドに適用しようとする。\n\n人との関係においては、公平さを重んじ、誰に対しても分け隔てなく接する。正論を優先しがちで、感情的なケアは苦手な側面もあるが、それは個人的な感情に流されず、公正な判断を下したいという彼の誠実さの表れだ。信頼できる人には深く関わるが、馴れ合いは避け、「事実に基づこう」が彼の口癖になっている。\n\n根底にあるのは、責任感、誠実さ、そして何よりも「公正さ」への強い価値観だ。「この組織を、社会を、もっと正しい方向に導きたい」という強い使命感を持ち、自身の行動が組織全体の秩序や効率にどう貢献するかを常に意識している。そのため、自身の理想を追求するために、現状維持ではなく「攻め」の姿勢を選ぶのだ。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\nまず徹底した事前調査と情報収集から始める。論理的な妥当性、実現可能性を重視し、「なぜそれをするのか？」のWhyを明確にしないと動き出せない。「まず計画を立てよう」と提案し、綿密な計画を立ててから実行に移すことを好む。無闇な行動は時間の無駄だと考えるタイプだ。\n\n【進行フェーズ】\n一度立てた計画通りに進めることを最優先する。進捗を定期的に確認し、逸脱があればすぐに修正を提案する。複数のタスクを並行して進める場合でも、それぞれのルールや期日を厳守。「現状の課題は何か？どうすれば改善できるか？」と常に自問自答しながら、より良いプロセスを模索する。\n\n【完了フェーズ】\n細部まで完璧に仕上げることにこだわりを持つ。ドキュメント整備、数値検証、手順書作成など、漏れなく実施することが重要だと考える。「最終チェックは怠らない。品質基準は高く保ちたい」と、妥協を許さない姿勢だ。特に、他の人が関わる部分に関しては、後の混乱を避けるために徹底した準備を心がける。\n\n【1日の働き方】\n決まったルーティンを好み、朝から計画的にタスクを消化する。集中力を高く保つため、邪魔が入らない静かな環境を重視し、会議や打ち合わせは午前中に集中させ、午後は分析や文書作成など、深い集中を要する作業に充てることが多い。突発的な予定変更はストレスに感じるため、スケジュールは常に明確にしておきたい。"},{title:"🗣️ 会議での振る舞い",content:"会議では、目的とアジェンダが明確であることを第一に求める。根拠に基づいた意見を求め、感情的な発言や主観的な意見には眉をひそめる。議論が本題から逸れそうになると、「本題に戻りましょう」「それよりも、この点について確認させてください」と切り出す。決定事項やネクストアクションは必ず確認し、曖昧なまま終わることを許さない。\n\n議事録は自身で取ることを好み、詳細かつ正確な記録を残そうとする。長時間の雑談型会議は苦手で、無駄な時間は避けたい。会議の目的が達成されたら、すぐに次の行動に移りたいと考える。"},{title:"💬 チャットでの傾向",content:"端的なメッセージを好む。事実と結論を明確に記載し、誤解を避けるため、丁寧で正確な言葉遣いを心がける。絵文字や顔文字はあまり使わず、使うとしてもビジネスライクなものが主だ。雑談チャンネルは基本的にROM専で、たまに有益な情報共有や疑問点への明確な回答を投稿する程度。\n\nメッセージの返信は早く、必要な情報があればすぐに確認する。一度のメッセージで複数の話題を振られると、どの点に返答すべきか迷うことがある。\n\n【周囲が知っておくと楽なこと】\n・質問には明確なYes/Noや具体的な情報が返ってくると喜ぶ。\n・感情的なメッセージや曖昧な依頼は避け、事実ベースで伝える。\n・緊急性を示す場合は、件名や冒頭で明示する。\n・返信が遅れることはないが、熟考していることが多いため、急かすのは避ける。\n・不明瞭な点があれば、すぐに質問を返してくるので、誠実に対応する。"},{title:"👔 上司として／部下として",content:"【上司として】\nメンバーに対し、明確な指示と期待値を提示するリーダーだ。公平な評価基準でメンバーを判断し、贔屓や偏見は一切ない。プロセス管理を重視し、進捗を定期的に確認することで、計画からの逸脱を防ごうとする。メンバーの成長のためなら、たとえ耳の痛いことであっても厳しいフィードバックを辞さない。しかしそれは、メンバーがより「正しい」方向へ進むことを願ってのことだ。「なぜそのルールがあるのか」を丁寧に説明し、納得感を醸成しようと努める。\n\n【部下として】\n上司からの明確な指示と期待には、120%の力で応えようと努力する。責任感が非常に強く、一度任された仕事は完璧にこなすことを目指す。不合理な指示や、論理的な説明のない方針には、納得がいくまで説明を求める。「なぜそうするのですか？」と問いかけ、その背景にある意図を理解しようとする。感情的な褒め言葉よりも、具体的な成果や正確な仕事ぶりへの評価を好むタイプだ。自身の成長のためには、建設的で正直なフィードバックを求める。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・新しいルールやプロセスの導入に成功し、効果が明確になったとき\n・自分の提案が採用され、組織がより良い方向に改善されたと実感したとき\n・非効率な現状を論理的に分析し、具体的な改善策を導き出せたとき\n・困難な課題に対し、体系的で秩序立った解決策を見つけられたとき\n・自分の仕事の成果が、具体的な数値や事実で客観的に評価されたとき\n・複雑な情報を整理し、誰にでも分かりやすい形にまとめられたとき\n・幅広い知識を統合し、新しい仕組みを構築できたとき\n\n【📉 下がる瞬間】\n・不明確な指示や目的が曖昧な作業を求められたとき\n・感情論や個人的な意見で物事が決められ、論理が通じないとき\n・ルールや規律が守られない状況に直面し、秩序が乱れていると感じたとき\n・自分の提案が根拠なく却下され、改善の機会が失われたとき\n・無意味な会議や非効率なプロセスに巻き込まれ、時間が浪費されていると感じたとき\n・責任感のない人との協業を強いられ、仕事の質が低下するとき\n・既存のルールやプロセスに縛られ、改善提案ができない環境に置かれたとき"},{title:"📝 フィードバック",content:"【受けるとき】\nフィードバックは事実に基づき、具体的に改善点が示されると素直に受け止める。感情的な批判や人格否定は、強い反発を招きやすい。「〇〇という事実があった。だから△△を改善してほしい」といった、論理的で明確な説明を求める。改善のための具体的なアクションプランまで提示されると、すぐに実行に移す行動力を持つ。自身の成長に繋がるものであれば、どんなに厳しい意見でも真摯に受け止める姿勢だ。\n\n【伝えるとき】\n相手の感情に配慮するよりも、正確さや公正さを優先してフィードバックを伝える。客観的な事実やデータに基づいて説明し、改善すべき点を明確に指摘する。遠回しな言い方はせず、ストレートに伝えることが多い。「〇〇というデータを見ると、この点が課題だ。どう改善するか、一緒に考えよう」と、課題解決への協力を促す形で伝えることを好む。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・業務プロセスの設計・改善: 最も効率的で公平な手順を構築し、新しい仕組みを導入する。\n・規約・マニュアル作成: 明確で分かりやすい文書化で、誰もが理解できる基準を作る。\n・データ分析・報告: 客観的な事実に基づいた分析と、論理的なレポート作成。\n・品質管理・チェック: 細部まで見落とさず、製品やサービスの品質を保証する。\n・新規システムの導入支援: 新しいルールやツールを定着させるための計画と実行。\n・プロジェクト計画立案: 実現可能で詳細な計画を策定し、着実に推進する。\n・法務・コンプライアンス関連業務: ルールを遵守し、組織のリスクを管理する。\n\n【😰 苦手】\n・曖昧なアイデア出し・ブレスト: 具体性がないとどう動けばいいか分からず、発言に困る。\n・感情的な顧客対応: 論理的説明が通じない状況はストレスを感じる。\n・突発的なイベントの企画運営: 事前の計画がないと混乱し、パフォーマンスが落ちる。\n・ルール変更の多いプロジェクト: 基準が定まらないと進め方に困惑する。\n・雑多な情報からの要点抽出: 具体的な指示がないと、どこまで拾えば良いか悩む。\n・非効率なルーティンワークの継続: 改善提案できないとモチベーションが下がる。\n・強引な交渉・説得: 論理が通じない相手とのやり取りは非常に苦手だ。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「このプロセス、もっと効率化できないか？」→改善の余地がある課題に燃える。\n・「このルール、現状に合っているか確認してほしい」→既存ルールの見直し依頼は彼の得意分野。\n・「具体的に〇〇のデータに基づいて分析してほしい」→具体的な指示と根拠があると動きやすい。\n・「最終的なアウトプットのイメージはこれ。プロセスは任せる」→ある程度の裁量と明確なゴールがあると力を発揮する。\n・「締め切りは〇〇、進捗は週に一度共有してほしい」→明確な期日と報告頻度は安心材料だ。\n・「新しいシステムの導入について、ルール設計から関わってほしい」→新規の仕組み作りはモチベーションになる。\n\n【❌ パフォーマンスが落ちる】\n・「なんかいい感じにやっといて」→曖昧な依頼は困惑を招き、どう動けばいいか分からない。\n・「感情論で押し切ろうとする」→理不尽さを感じ、モチベーションが著しく低下する。\n・「コロコロと方針が変わる」→一度立てた計画が無駄になり、強いストレスを感じる。\n・理由を説明せずに「とにかくやれ」→納得感がないと動けない。反発することもある。\n・プライベートな話題で関係を深めようとする→馴れ合いを嫌い、仕事と私事を混同されたくない。\n\n【💡 コツ】\n1. 「Why（なぜやるのか）」と「What（何をするのか）」を明確に伝える。\n2. 事実に基づいた情報と客観的なデータを提供する。\n3. 計画性と規律を重視し、進捗報告の機会を定期的に設ける。\n4. 裁量を渡す際は、最終的な品質基準やゴールを具体的に共有する。\n5. 成果を具体的に認め、「ありがとう、〇〇が助かった」と伝えることで、彼の貢献を正しく評価する。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・業務プロセスコンサルタント: 幅広い業界の課題に対し、最適なルールや仕組みを設計し、組織をより良い方向へ導く。\n・法務・コンプライアンス担当: 組織内外のルールを構築・運用し、公正かつ健全な活動を推進する。新しい規制への対応も得意だ。\n・プロジェクトマネージャー（大規模システム導入など）: 複雑なプロジェクトを計画的に推進し、新たな秩序を確立する。\n\n【⭐ かなり合う】\n・品質保証・品質管理: 厳格な基準に基づき、製品・サービスの品質を向上させる役割。細部へのこだわりが活きる。\n・経営企画・事業戦略: 論理的なデータ分析に基づき、組織全体の効率と公正な競争戦略を策定する。\n・システム監査・リスク管理: ルールに基づきシステムの健全性をチェックし、リスクを特定・改善する。\n\n【💡 意外とハマる】\n・データアナリスト（多領域）: 様々なデータからパターンを見つけ出し、新しいルールや傾向を発見。分析によって問題を「攻める」。\n・スポーツコーチ（ルール系）: 競技ルールを徹底させ、最適な戦略を指導。選手の公正な成長を促す。\n\n【⚠️ 避けた方がいい】\n・クリエイティブディレクター: 抽象的な発想や感情的な要素が中心で、具体的な指示やルールを好むこのタイプには不向き。\n・ホテルコンシェルジュ: 予測不能な顧客の要望に柔軟に対応することが多く、定型的な業務を好むこのタイプにはストレスが多いだろう。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nENFP-O-Br「着火マン」: ルール番人が作った確かな土台の上で、着火マンが自由にアイデアを広げ、新しい可能性を見出す。お互いの「攻め」の姿勢が、異なるアプローチで革新を生み出す最強のコンビだ。着火マンの奔放さを、ルール番人の堅実さが支える。\nESFP-O-Br「宴会部長」: ルール番人の生真面目さを宴会部長がユーモラスに和ませ、チームに活気をもたらす。堅実な計画と行動力で、イベントを成功に導き、新しい企画を形にする。\n\n【🔥 化学反応が起きるコンビ】\nENTJ-O-Dp「将軍」: 将軍の強力なリーダーシップと壮大なビジョンを、ルール番人が具体的な計画と手順に落とし込み、実現に向けて推進する。互いの「攻め」が組織変革を加速させる。\nESTJ-O-Dp「番頭」: 共通の現実主義と計画性を持つが、番頭が一点集中で深く掘り下げるのに対し、ルール番人は幅広い視点で全体を俯瞰。より網羅的で堅牢な仕組みを構築できる。\n\n【☀️ 居心地がいい仲間】\nISTJ-G-Dp「金庫番」: 同じISTJタイプとして、規律と秩序を重んじる価値観を共有する。互いの丁寧な仕事ぶりを理解し合い、堅実なプロジェクト推進を支え合う、安心感のある仲間だ。\nINTJ-G-Dp「戦略家」: 戦略家の深い洞察力とルール番人の実践的な計画性が融合する。論理的思考で共通の目標に向かい、効率的な解決策を見出すことができる。\n\n【⚡ 未知の触発者】\nENFJ-O-Br「インフルエンサー」: 人の感情を重視するインフルエンサーと、ルールと論理を重視するルール番人。異なるアプローチから、より人間中心で効果的なルールや仕組みの可能性を探る機会が生まれる。\nINFP-G-Br「夢見る哲学者」: 哲学者の一見非現実的なアイデアに対し、ルール番人が具体的な実現可能性やリスクを問い、現実的な形にするヒントを得る。彼の視点が、ルール番人の視野を広げることもあるだろう。"},{title:"🌈 プライベートの顔",content:"休日の過ごし方も、この人にとっては計画と秩序が重要だ。旅行計画は入念に練り、何時何分に何をするか分刻みで決めるタイプ。「〇月〇日午前10時、〇〇駅集合。遅れると次の電車に乗り遅れるから気をつけてね」と、事前に詳細なスケジュールを共有してくる。\n\nプライベートでも「多趣味」ぶりを発揮する。ある週末は歴史ドキュメンタリーを何本も鑑賞し、別の週末は新しいプログラミング言語の勉強に没頭する。最近では「DIYにハマっててね。正しい工具の使い方をYouTubeで学んでるんだ」と、趣味でも効率と正確さを追求する。\n\n単に「面白い」だけでなく、その背景にある「なぜ」や「仕組み」に深く興味を持つ。スポーツ観戦もただ見るだけでなく、ルールの歴史や戦略を分析することに面白さを見出す。あらゆる情報から、普遍的な原則や構造を見つけ出そうとする探究心がある。\n\n人との関係は、信頼できる少数の友人と、じっくりと深い話をするのを好む。社交的な場では聞き役に回りがちだが、話題の中に不公平や不合理な点があれば、すかさず「それって根拠があるの？」と訂正を入れることも。根底には常に公正でありたいという願いがある。\n\n家の中もオフィスも常に整理整頓されている。「必要なものがすぐ見つからないのは時間の無駄だからね」が口癖で、あらゆるものが定位置に収まっている。効率的で無駄のない空間こそが、最高の思考を生むと信じている。\n\n日常生活でも規則正しさや公正さを求める。スーパーのレジの列をきちんと並ばない人や、交通ルールを守らない人を見ると、内心イライラする。自分の価値観を押し付けることはしないが、正しい行動を静かに実践し、周囲にもその影響を与えようとする。彼の日常は、まさに「ルール番人」そのものだ。"}]},
"ISTJ-O-Dp":{name:"任務遂行者",character:"煉獄杏寿郎（鬼滅の刃）",great:"ウェリントン公爵",color:"#808B96",summary:"「この一つの任務を必ず遂行する」鉄の意志。一つの任務に全てを捧げ最後まで絶対にやり遂げる。寡黙だが行動で全てを語る。",compatibility:{complement:[{code:"ENFP-G-Br",name:"ムードメーカー",desc:"プロジェクトで黙々と作業する任務遂行者に対し、ムードメーカーが休憩中に明るい話題を提供し、チームの雰囲気を和ませる。業務の効率とメンバーのモチベーション維持に貢献する。"},{code:"ESFP-G-Br",name:"盛り上げ隊長",desc:"持ち前のユーモアとポジティブさで、過酷な目標達成の現場に活気と一体感を生み出す。プロジェクトの士気が下がりかけた時、チーム全体のモチベーションを高める。"}],chemistry:[{code:"ESTJ-O-Dp",name:"鬼教官",desc:"共通の目標達成への執念が、一点突破の強力な推進力となる。困難な目標に対し、具体的な行動計画と厳格な進捗管理で全軍を統率し、前線へ突進させる。"},{code:"ISTJ-O-Br",name:"ルール番人",desc:"作業効率を追求する中で、規律を重んじる番人が定める手順や品質基準を、彼の確かな技術力で実践する。お互いに信頼し、安心して業務に取り組める。"}],comfort:[{code:"ISTJ-G-Dp",name:"金庫番",desc:"求道者の技術への深い探求心と、金庫番の厳格な品質管理が融合し、揺るぎない専門性と信頼性を生み出します。共同でシステム開発を行う際、求道者が高度な機能を実装し、金庫番がその安定性とセキュリティを徹底的に検証することで、完璧な製品を完成させます。"},{code:"ISTP-O-Dp",name:"一刀流の職人",desc:"新しい技術課題に対し、互いに専門知識を深く掘り下げ、実践的な解決策を冷静に議論できる。高度な技術の探求で刺激し合う関係。"}],catalyst:[{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"},{code:"ENTP-O-Dp",name:"常識クラッシャー",desc:"既存プロセスの見直し会議では、ENTP-G-Brが現状の背景知識を提供する一方で、ENTP-O-Dpが常識にとらわれない大胆な提案で既成概念を打ち破る。知的好奇心を刺激し合い、自由な議論が交わされる居心地の良い関係。"}]},careers:{top:["特殊作戦部隊","原子力安全管理者","災害救助隊長"],good:["外科医（手術専門）","パイロット","プラントエンジニア"],surprise:["マラソンランナー","登山家"],avoid:["自由放任のクリエイティブ","合議制の多い組織"]},strengths:["鉄の意志","任務の完遂","寡黙な実行力","不屈の忍耐"],weaknesses:["柔軟性","感情表現","マルチタスク","撤退判断"],tips:{do:"このプロジェクトの〇〇部分について、君に全権を委任する。最終的な成果物だけは期日までに必ず完成させてほしい。進捗報告は不要だから、安心して最高のものを目指してくれ。来週の顧客提案資料、特にデータ分析と根拠の部分を君に任せたい。この資料が契約獲得の鍵となるから、期日までに完璧な状態で仕上げてくれないか？君の専門知識に期待している。このトラブル対応は非常に複雑で、誰もが躊躇している。しかし、君なら必ずやり遂げると信じている。この一件、君に託したい。必要なリソースは全て用意するから、最後まで遂行してほしい。",dont:"この資料、もう少しブラッシュアップしておいてくれない？どこをどうするかは君に任せるけど、なんとなくいい感じにしておいてほしいな。これもあれも、ついでにこれもやっておいてくれる？どれも緊急ではないけど、手が空いた時にでも進めておいてほしいんだ。この件、ちょっと手伝ってほしいんだけど、どこまでやるかは状況を見て判断して。もし難しそうなら、途中でやめてもいいから。"},fullSections:[{title:"👤 この人はこんな人",content:"「この任務を完遂する」という揺るぎない決意が原動力。一度引き受けた目標は、どんな困難があっても必ずやり遂げる鉄の意志を持つ。\n\n彼のエネルギーは、自身の内側から湧き出る集中力と、与えられた使命への責任感から生まれる。不確実性や曖昧さを嫌い、具体的な事実やデータに基づいて物事を判断する。常に冷静沈着で、感情に流されることなく、論理的に最適解を導き出そうとする。\n\n仕事においては、困難な課題に直面しても怯まず、正面から向き合う「攻め」の姿勢が際立つ。目標達成のためには労を惜しまず、細部までこだわり抜く。特に、複雑な問題を論理的に分解し、一つずつ着実に解決していくプロセスは彼の真骨頂だ。品質と正確性を追求し、一切の妥協を許さない。\n\n一方で、彼の弱点は予定外の事態や急な変更への対応だ。計画が変更されると、一度構築した完璧な道筋が崩れることに強いストレスを感じる。また、感情的なコミュニケーションは苦手で、率直すぎる物言いが時に相手を傷つけたり、誤解を招いたりすることもある。一度決めたやり方を変えることには、論理的な理由がなければ抵抗がある。\n\n興味の範囲は広く浅くではなく、自分が任された分野や課題に対して一点集中で深く掘り下げる「一点深堀」タイプ。その道の専門家になるまで知識やスキルを磨き続けることに喜びを感じる。新しいことへの挑戦意欲もあるが、それは「任務」の達成に直結する場合や、自身の専門性を高めるために必要だと判断した場合に限る。\n\n対人関係においては、寡黙で多くを語らないが、その行動で周囲の信頼を勝ち取る。無駄な人間関係は築かないが、一度信頼した相手には誠実であり、チームの一員としての責任を強く感じ、自分の役割を全うする。言葉よりも行動で示すタイプだ。彼の口から出る「任せろ」は、どんな状況でも必ず達成するという強い決意の表れである。\n\n根底にあるのは、約束を守ること、責任を全うすること、そして何よりも正確であることへの強いこだわりだ。自身の専門性を高め、組織やチームに貢献することに最大の価値を見出す。彼にとって仕事とは、自己実現の場であり、自身の存在意義を示す「任務」そのものなのだ。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n任務の全体像とゴールを正確に把握することから始める。まず、現状を詳細に分析し、必要なリソースや潜在的なリスクを徹底的に洗い出す。計画を立てる際も、「この方法が最も効率的で確実だ」と判断するまで、安易に手を動かさない。準備を怠らず、段取りを重視することで、後の工程で問題が起きることを未然に防ごうとする。\n\n【進行フェーズ】\n立てた計画に沿って淡々と、そして正確に作業を進める。途中で予期せぬ問題が発生しても、感情的になることはなく、事実に基づいて解決策を冷静に分析し、粛々と対応する。複数のタスクを並行して進めるよりも、一つを完璧に終わらせてから次へ移るのを好む。進捗報告は定期的かつ客観的なデータに基づいて行い、曖昧な表現は避ける。\n\n【完了フェーズ】\n完璧主義を貫き、最後の1%まで手は抜かない。ドキュメント整備や数値の最終確認、引き継ぎ資料の作成など、地味だが重要な作業にこそ価値を見出す。彼にとって「完了」とは、単にタスクが終わることではなく、「これで次のフェーズに完璧にバトンを渡せる」という、万全の準備が整った状態を指す。\n\n【1日の働き方】\n朝早くから仕事を始めることが多く、集中力を要するタスクは午前中に片付けるのを好む。決まったルーティンを重視し、予測可能な環境で最高のパフォーマンスを発揮する。突発的な割り込みや中断は集中力を著しく低下させるため、可能な限り避けたいと考えている。昼食も決まった時間、決まった場所で済ませることが多い。残業してでも与えられた任務をその日のうちにやり遂げようとする。"},{title:"🗣️ 会議での振る舞い",content:"目的が明確で、具体的な議題がある会議であれば、集中して参加する。自身の担当範囲や専門分野については、データに基づいた具体的な意見や事実を論理的に述べる。しかし、無駄な発言や感情的な議論には参加せず、議論が脱線したり、非効率だと感じると黙って聞き役に回るが、内心では不満を感じていることが多い。\n\n長時間のブレストや雑談がメインの会議は苦手で、無駄な時間だと感じる。意思決定の場では、論理的で現実的な選択肢を提案し、その実行方法まで視野に入れた具体的なプランを示す。議事録を取るのは得意で、誰よりも素早く要点を正確にまとめることができる。\n\n【ベストな会議の使い方】\n・目的とゴールが明確な進捗報告会議や意思決定会議に最適\n・具体的な課題解決のためのディスカッションで論理的な意見を提示\n・自身の専門領域に関する情報共有や技術レビューの場で力を発揮\n・雑談や漠然としたアイデア出しがメインの会議には必須でなければ参加不要にする方がお互い幸せ"},{title:"💬 チャットでの傾向",content:"メッセージは短く簡潔で、要点が明確。回りくどい言い回しや曖昧な表現は使わない。絵文字や記号は基本的にあまり使わないが、誤解を防ぐために必要であれば最小限に使うことがある。\n\n質問には「はい」「いいえ」だけでなく、事実に基づいた補足情報を必ず添える。依頼やタスクについては、必ず「承知しました。〇〇までに対応します」のように、具体的な行動計画を含んだ返信をする。業務連絡以外の雑談チャンネルにはほとんど参加せず、業務に必要な情報のみを厳選して発信する傾向にある。\n\n【周囲が知っておくと楽なこと】\n・メッセージは短く、質問は具体的に。「～はどうですか？」ではなく「～について、A案とB案どちらが良いですか？」と聞くと良い。\n・「○○だと思います」ではなく「○○です」と事実で伝えれば理解が早い。\n・感情的な表現は避け、論理的に話す。\n・頼みごとは、具体的な依頼内容と背景、期日を最初に伝える。\n・「承知しました」「確認します」だけの返信でも、本人はしっかりタスクを把握しており、確実に進めている。"},{title:"👔 上司として／部下として",content:"【上司として】\n非常に明確な目標設定と具体的な指示を出すリーダー。メンバーには高い専門性と責任感を求める。定期的な進捗確認を重視し、問題があれば早期に解決を促す。決して感情的に怒鳴ることはないが、論理に合わない行動や無責任な態度には厳しく指摘する。メンバーの成長を促すため、挑戦的な「任務」を与えることを恐れない。論理的で公平な評価を心がけ、感情的な判断は一切しない。プロセスよりも結果を重視するが、そのプロセスが論理的かつ確実であれば最大限に尊重する。「私に任せられたからには、必ずやり遂げよう」という姿勢をメンバーにも求める。\n\n【部下として】\n一度引き受けた任務は、上司からの指示がなくても最後まで責任を持って遂行する。上司の期待を上回る成果を出そうと常に努力し、そのために自身の専門性を磨く。不明点や懸念事項は早めに確認し、勝手な判断でプロジェクトを危険に晒すことは絶対にしない。感情論や曖昧な指示ではなく、具体的なデータや根拠に基づいた指示を求める。専門性を高める機会や、組織にとって重要な任務を任せられることで、彼のモチベーションは最高潮に達する。彼にとって、与えられた任務は自身の存在価値そのものであり、決して投げ出すことはない。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・困難で重要な任務や課題を任されたとき\n・自分の専門性がチームや組織の成功に直結したとき\n・論理的に正しいと判断した施策が採用され、良い結果を出したとき\n・複雑な問題を自分の手で分析し、最適な解決策を導き出せたとき\n・立てた計画通りに物事が進み、着実に成果が出たとき\n・自分のスキルや知識が認められ、さらに深掘りの機会を与えられたとき\n・曖昧だった状況が整理され、明確な方向性とプロセスが示されたとき\n\n【📉 下がる瞬間】\n・目的が不明確で、論理的な根拠のないタスクを依頼されたとき\n・論理的でない判断や感情論で物事が進められ、非効率だと感じるとき\n・細かいルールや前例に縛られ、非効率な作業を強いられるとき\n・計画が頻繁に変更され、先の見通しが立たない状況に陥ったとき\n・自分の専門性や努力が正しく評価されないと感じたとき\n・無駄な会議や雑談に時間を奪われ、集中力を削がれるとき\n・責任が曖昧な状態でタスクを振られたり、責任を擦り付けられそうになったとき"},{title:"📝 フィードバック",content:"【受けるとき】\n感情を挟まず、事実に基づいた客観的なフィードバックを求める。改善点や具体的な行動指針が明確に示されていれば、それを素直に受け入れ、次の行動にすぐに反映させようとする。抽象的な褒め言葉よりも、「このタスクのこの部分が具体的に良かった」という具体的な指摘に価値を感じる。批判的な内容でも、それが論理的な根拠に基づき、改善に繋がるものであれば、冷静に受け止め、自身の成長の糧にしようと努力する。\n\n【伝えるとき】\n相手の行動や成果を客観的な事実に基づいて評価する。改善点を伝える際も、感情的にならず、論理的な根拠と具体的な行動提案を添えて伝える。必要であれば厳しくも伝えるが、それは相手の成長や、チーム全体の任務遂行のためだと考えている。遠回しな表現はあまりせず、単刀直入に伝えることが多い。曖昧な表現は相手にとって不利益だと感じるため、明確な言葉を選ぶ。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・**複雑な課題の論理的分析:** 複雑な問題を要素に分解し、最適な解決策を導き出すプロセスに長けている。\n・**長期プロジェクトの計画・実行:** ゴールから逆算し、詳細なステップとマイルストーンを設定し、確実に実行する。\n・**品質保証・レビュー:** 細部まで徹底的にチェックし、完璧なアウトプットを目指す。バグやミスの見落としが少ない。\n・**専門分野の調査・研究:** 自分が担当する領域について深く掘り下げ、誰にも負けない専門知識を極める。\n・**手順書・マニュアル作成:** 誰でも正確に作業できるような、明確で抜け漏れのないドキュメントを作成する。\n・**データ分析・数値検証:** 客観的なデータに基づき、現状を正確に把握・分析し、具体的な改善策を提案する。\n・**リスク管理・危機対応:** 想定されるリスクを事前に洗い出し、具体的な対策を講じることで、不測の事態に備える。\n\n【😰 苦手】\n・**ブレストなど抽象的なアイデア出し:** 具体性がない議論や、結論が出ない議論は苦手で、苦痛に感じる。\n・**変化の激しい環境での臨機応変な対応:** 計画通りに進まないことや、急な方向転換に強いストレスを感じる。\n・**社内イベントの企画・運営:** 場の雰囲気を盛り上げたり、人を楽しませるような感情的なコミュニケーションは苦手。\n・**感情的な調整・仲介:** 人間関係の複雑な問題解決や、板挟みになる状況は苦手。\n・**マルチタスクでの並行作業:** 一つに集中して完璧に終わらせたいので、切り替えが多いとパフォーマンスが著しく落ちる。\n・**新しいツールやシステムの導入初期:** 慣れない操作や、確立されていない手順にストレスを感じる。\n・**あいまいな目標設定でのタスク:** ゴールが不明確だったり、測定不能な目標だと、どう動けばいいか途方に暮れる。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「この重要な任務を〇〇さんに任せたい。この分野の専門家は〇〇さんしかいない」→責任感と信頼に訴えかけると、全力を尽くす。\n・「具体的なゴールと期日は〇〇です。そこまでの進め方は〇〇さんの裁量にお任せします」→裁量と明確な目標を与えると本気を出す。\n・「この問題の原因を論理的に分析して、最適な解決策を提案してくれないか」→彼の分析力と問題解決能力を刺激する。\n・「現状維持ではなく、より効率的で確実な方法を模索し、実行してほしい」→「攻め」の姿勢を活かし、改善提案に意欲を燃やす。\n・「この新しい技術を深く掘り下げて、実用化の可能性を探ってほしい」→一点深堀りの探究心をくすぐる。\n\n【❌ パフォーマンスが落ちる】\n・「これ、なんか面白いことできない？」→抽象的すぎて、具体的な行動に繋がらないため困惑する。\n・「とりあえずやってみて、考えながら進めよう」→計画性がないと不安になり、パフォーマンスが落ちる。\n・「前例がないから難しいかもね」→新しい挑戦の芽を摘むような発言は、彼の「攻め」の意欲を削ぐ。\n・「みんなでワイワイ意見を出そうよ」→非効率だと感じ、議論の場に参加しなくなる。\n・「あの人と仲良くやっといて」→感情的な調整や人間関係の構築は苦手分野なので任せられると困惑する。\n\n【💡 コツ】\n1. **「Why」と「What」を明確に伝える:** 何のために、何を達成したいのかを論理的に、具体的な言葉で説明する。\n2. **具体的な期日と成果物を設定する:** 達成すべきゴールとスケジュールを明確にし、測定可能な目標を提示する。\n3. **「攻め」の視点を加える:** 課題解決や目標達成に向けた積極的な貢献を期待していることを明確に伝える。\n4. **権限と責任を委譲する:** 自分の専門性や判断で任務を遂行できる裁量を与え、信頼を伝える。\n5. **進捗は数値や事実で報告を求める:** 曖昧な表現ではなく、具体的な状況をデータや客観的な事実に基づいて共有してもらうよう促す。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・**プロジェクトマネージャー:** 複雑なプロジェクトの計画立案、実行、進捗管理までを一手に担い、目標達成に導く責任と裁量が、彼の緻密な計画性と「攻め」の推進力に合致する。\n・**品質管理/保証エンジニア:** 高い基準で品質を追求し、製品やサービスの信頼性を確保する職務は、彼の完璧主義と一点深掘りの専門性を最大限に活かせる。\n・**リスクコンサルタント:** 潜在的なリスクを徹底的に分析し、論理的な解決策を提案することで企業を守る。彼の危機察知能力と現実的思考が光る。\n\n【⭐ かなり合う】\n・**システムエンジニア:** 論理的思考力と正確さが極めて重視されるシステム設計・開発・保守の領域で、彼の強みが存分に発揮される。\n・**データアナリスト:** 大量のデータを正確に分析し、ビジネス上の課題解決に貢献する仕事は、客観的判断と深掘り能力が活きる。\n・**専門職研究開発員:** 特定の分野を深く掘り下げ、新しい技術や知識を生み出す研究は、彼の探求心を大いに満たす。\n\n【💡 意外とハマる】\n・**災害対策/危機管理担当:** 想定外の事態にも、冷静な判断と計画に基づき対応する能力が求められる分野で、その実力を発揮する。\n・**法律家/弁護士:** 論理的な思考力と事実に基づいた判断で、複雑な法律問題の解決に当たる。\n\n【⚠️ 避けた方がいい】\n・**イベントプランナー:** 変化が多く、突発的な対応や感情的な盛り上げが求められるため、計画性と安定性を好む彼にはストレスが大きい。\n・**広報/PR:** 曖昧な表現や社交性が求められ、成果が見えにくい仕事は、彼の論理的思考とは相性が悪い。\n・**カウンセラー:** 感情的な共感や柔軟な対応が中心となり、論理的思考が裏目に出ることが多いため、精神的な負担が大きい。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\n・**ENFP-O-Br「着火マン」:** 真逆のタイプだからこそ、最強の補完関係を築ける。着火マンの無限のアイデアと推進力を、任務遂行者が具体的な計画と確実な実行力で形にする。互いの強みを最大限に活かし、弱点を完璧にカバーし合える。\n・**ESFJ-G-Br「世話焼き番長」:** 任務遂行者が論理と事実で成果を出す傍ら、世話焼き番長がチーム内の人間関係や雰囲気作りに貢献。効率性と協調性のバランスが取れ、安心して任務に集中できる環境が生まれる。\n\n【🔥 化学反応が起きるコンビ】\n・**ENTJ-O-Dp「将軍」:** 任務遂行者の確実な実行力と、将軍の明確なビジョン・戦略策定能力が融合。目標達成に向けた強力な推進力と爆発的な成果を生み出し、まさに無敵の司令塔となる。\n・**INTJ-O-Dp「戦略家」:** 両者とも論理的で一点深掘り志向。戦略家の描く壮大なビジョンや長期的な戦略を、任務遂行者が現実的な計画に落とし込み、確実に実行に移すことで、絵空事ではない大きな成果を実現する。\n\n【☀️ 居心地がいい仲間】\n・**ISTJ-G-Dp「金庫番」:** 同じISTJ基盤で、責任感や秩序を重んじる価値観を共有する。互いの業務への真摯な姿勢を理解し、尊重し合えるため、安心して集中できる。彼とは多くを語らずとも、互いの存在を認め合うことができる。\n・**ISFJ-G-Dp「縁の下の力持ち」:** 任務遂行者が「攻め」の姿勢で成果を追求する一方、縁の下の力持ちが確実なサポートと細やかな配慮で支える。静かな信頼関係が築かれ、互いに安心して業務に取り組める。\n\n【⚡ 未知の触発者】\n・**ESFP-O-Br「ムードメーカー」:** 任務遂行者の計画性と冷静さに対し、ムードメーカーの即興性と感情豊かな表現が新しい視点をもたらす。予測不可能な状況から、時には意外な解決策が生まれる可能性を秘める。\n・**INFP-G-Br「夢追い人」:** 任務遂行者の現実的な視点と、夢追い人の豊かな想像力や理想主義が交差する。現実と理想のギャップから、これまでにない新たな解決策が生まれる可能性を秘め、視野を広げるきっかけとなる。"},{title:"🌈 プライベートの顔",content:"休日の過ごし方も計画的だ。衝動的に行動することは稀で、週末の予定は前もって立てられていることが多い。例えば、次の休日にキャンプに行くなら、道具のメンテナンスから食材の調達、現地の気象情報、最適なルートまで、あらゆる準備を抜かりなく行う。\n\n趣味は深く、一つのことをとことん極める傾向がある。もし釣りが好きなら、釣りの歴史、魚の種類ごとの生態、最新の釣り具の性能、潮の流れと魚の関係性まで徹底的に調べ上げる。そして、最高の釣果を出すために、黙々と技術を磨き続ける。彼にとって趣味は、新たな「任務」であり、追求し続けることで自己成長を感じる。\n\nスポーツをする場合も、ただ楽しむだけでなく、フォームや戦術を研究し、黙々と練習を重ねるタイプだ。ランニングであれば、タイムや距離だけでなく、心拍数やフォームの最適化までデータを分析し、科学的にアプローチする。\n\n友達と過ごす時も、少人数の気の置けない仲間との深い交流を好む。大人数での騒がしいパーティーや、目的のない飲み会にはあまり参加しない。信頼できる友人と、共通の趣味や深い話題について語り合う時間を大切にする。\n\n家で過ごす時間も重要だ。読書や映画鑑賞、あるいは何らかの専門知識を学ぶ時間など、一人で集中できる活動で心身をリフレッシュする。新しいことへの挑戦は、それが明確な目標や学びの機会に繋がると判断した場合に限り、計画的に取り組む。衝動的な挑戦はまずしない。\n\nお金の使い方も非常に計画的で、品質や機能性を重視する。衝動買いはほとんどせず、購入前には徹底的にリサーチし、「これは長期的に見て価値があるか」「任務達成に寄与するか」を常に考えて判断する。旅行に行くなら、事前に綿密な計画を立て、現地の歴史や文化、最適な観光ルートを深く学ぶことを楽しむ。無計画なバックパッカー旅は、彼の選択肢にはまず入らないだろう。"}]},
"ISTJ-G-Br":{name:"組織の記憶庫",character:"我愛羅（NARUTO）",great:"司馬遷",color:"#BDC3C7",summary:"「全てを正確に記録し守る」記録の守護者。守り×広型で幅広い情報を正確に管理。組織の記憶そのもの。",compatibility:{complement:[{code:"ENFP-O-Dp",name:"伝道師",desc:"「着火マン」と「伝道師」は、情熱と興奮を共有し、お互いのアイデアに深く共感し合えます。休憩時間の雑談でも、熱いビジョンを語り合い、自然体でいられるため、心からリラックスできる関係です。"},{code:"ESFP-O-Dp",name:"パフォーマー",desc:"プレゼンテーション準備中、ESFP-O-Dpのダイナミックで感情豊かな表現が、ENTP-G-Brの持つ豊富な知識に新たな視覚的・感覚的要素をもたらす。知識が鮮やかに彩られ、聴衆を惹きつけるコンテンツへと触発される。"}],chemistry:[{code:"ESTJ-G-Br",name:"なんでも屋",desc:"プロジェクトの進行状況やタスクの割り振りについて、なんでも屋が具体的な指示を出し、ISTJ-G-Brがその過程と結果を正確に記録・整理することで、運営が驚くほどスムーズに進みます。"},{code:"ISTJ-O-Br",name:"ルール番人",desc:"作業効率を追求する中で、規律を重んじる番人が定める手順や品質基準を、彼の確かな技術力で実践する。お互いに信頼し、安心して業務に取り組める。"}],comfort:[{code:"ISTJ-G-Dp",name:"金庫番",desc:"求道者の技術への深い探求心と、金庫番の厳格な品質管理が融合し、揺るぎない専門性と信頼性を生み出します。共同でシステム開発を行う際、求道者が高度な機能を実装し、金庫番がその安定性とセキュリティを徹底的に検証することで、完璧な製品を完成させます。"},{code:"ISFJ-G-Br",name:"屋台骨",desc:"既存業務プロセスの見直し会議で、ISFJ同士は現状の課題を共有し、既存の良さを残しつつ地道な改善を提案する際、互いに意見に深く共感し合い、居心地の良い関係を築きます。"}],catalyst:[{code:"ENTP-O-Br",name:"アイデアマン",desc:"新規事業の企画会議では、ENTP-G-Brが知識の引き出しから多様な情報を提示し、ENTP-O-Brがそれに触発されて次々と新しいアイデアを繰り出す。知識と発想が高速で応酬し、無限の可能性が広がる。"},{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"}]},careers:{top:["アーキビスト","経理部長","データベース管理者"],good:["図書館情報専門員","品質記録管理","保険の査定士"],surprise:["歴史研究者","系図学者"],avoid:["即興のエンタメ","変化の激しいスタートアップ"]},strengths:["正確な記録","幅広い情報管理","組織の記憶","信頼性"],weaknesses:["創造性","変化","自己PR","感情面"],tips:{do:"「このプロジェクトの全ての決定事項と議論の経緯を、後で参照できるよう正確に記録してもらえない？　特に重要な数値や合意事項は、具体的に残しておいてくれると助かるな。」「過去の類似案件に関する資料を探しているんだけど、君の正確な記憶力と情報整理のスキルを頼りにしたい。関連するファイルや議事録をいくつかピックアップしてもらえると嬉しいんだ。」「新しい業務フローを構築するにあたり、既存のプロセスや関連するルールを漏れなく洗い出して記録してほしい。未来の変更にも対応できるよう、体系的にまとめてくれると心強いよ。」",dont:"「この会議の議事録、とりあえず要点だけざっくりまとめておいてくれる？　細かいところは後で適当に肉付けするからさ。」「あの件の情報、なんか適当に集めておいてよ。別に完璧じゃなくていいから、雰囲気だけ分かればいいんだ。」「記録は後回しでいいから、とりあえず目の前のタスクを早く片付けて。正確さよりスピード重視で頼むよ。」"},fullSections:[{title:"👤 この人はこんな人",content:"「全ては記録され、守られるべきだ。」これが彼の人生を貫くモットーだ。組織の過去と現在、そして未来を確かな情報で繋ぐ番人であり、まさしく\"組織の記憶\"そのもの。\n\n彼のエネルギー源は、一人で深く思考し、情報を整理する時間にある。喧騒から離れた静かな空間で、雑多な情報や計画を頭の中でパズルのように組み立てる。この時間は彼にとって何よりも重要で、次に取るべき行動を計画することで、心の平穏と確固たる自信を得る。\n\n仕事においては、事実に基づいた客観的な判断力と、計画性と手順を重視する姿勢が彼の最大の強みだ。新しいプロジェクトが立ち上がると、まず「過去に似た事例はなかったか？」「既存のルールで対応できないか？」と、膨大な資料やデータベースから関連情報を探し出す。彼の脳内は常にアップデートされるライブラリのようなもので、必要な情報を瞬時に引き出せるのは彼だけだろう。\n\n一方で、新しいことや急な変更にはやや抵抗がある。なぜその新しい方法が必要なのか、具体的なデータで説明されない限り、納得して動き出すまで時間がかかることが多い。感情表現は控えめで、周囲には「クール」「冷静」と見られるが、彼なりに組織やチームに対する責任感と情熱を内に秘めている。\n\n興味の幅は驚くほど広い。社内規約から業界ニュース、他社の成功事例、果ては最新のテクノロジー動向や文化的なイベントまで、あらゆる情報を収集し、自身のデータベースにストックする。一つを深く極めるというよりは、多角的に情報を集め、それらを関連付けて整理することに喜びを感じる「広型」だ。この幅広い知識が、予期せぬリスクを回避したり、既存プロセスを改善する際のヒントになったりする。\n\n対人関係では、自分から積極的に話すことは少ない。しかし、信頼した相手や、具体的な情報交換が必要な場面では、的確かつ簡潔なアドバイスを提供する。感情的なやり取りは苦手だが、論理的な議論であれば長時間でも集中して参加できる。彼の言葉は少ないが、その一言一言には重みがあり、常に裏付けされた事実が伴っている。\n\n根底にあるのは「正確性」「信頼性」「秩序」「安定」への揺るぎない信念だ。組織の基盤を支え、ルールが守られ、情報が正しく流通している状態にこそ、最大の価値を見出す。曖昧さや不確実性を最も嫌い、「このデータには誤りがある。再確認が必要だ」「一度決まったルールは守るべきだ」と、はっきりと指摘することをためらわない。彼の存在が、組織全体の堅牢さと信頼性を高めていることは間違いない。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n計画と情報収集から入る。見切り発車は絶対にしないタイプだ。「まずは現状把握と過去の事例確認からだ」が口癖。新しい依頼が来ても、すぐに着手せず、まずは関係する過去のドキュメントやデータ、関連法規などを徹底的に洗い出す。全てを把握し、具体的な手順とリスクを脳内でシミュレーションできて初めて、彼は安心して動き出す。この準備段階こそが、後々の確実な進行を保証すると信じている。\n\n【進行フェーズ】\n確立された手順に従って着実に作業を進めるのが彼のスタイルだ。一度決めた計画からはめったに逸脱せず、イレギュラーな事態が発生することを最も嫌う。進行中も、複数の情報源を参照して常に正確性を重視。「念のため、このデータも確認しておこう」と、細部にまで目を配る。進捗報告はこまめに、かつ客観的なデータに基づいて行うことを得意とし、曖昧な表現は使わない。彼は自身のタスクリストを忠実に消化し、期限内に高品質な成果物を生み出すことに責任を感じている。\n\n【完了フェーズ】\n最後の詰めまで徹底的にこだわる。8割できた、で満足することはない。「これで完璧だ」と確信が持てるまで、何度でも見直し、確認を怠らない。ドキュメント化や手順書作成も、未来の参照のために完璧な状態に仕上げる。「この報告書は、誰が見ても誤解のないよう記述されているか？」「この手順書は、未経験者でも再現可能か？」と、常に検証する。彼にとって、完了とは\"完全に終わらせる\"ことであり、それは徹底的な品質保証を意味する。\n\n【1日の働き方】\nルーティンを非常に重視する。朝は決まった時間にスタートし、計画通りにタスクを消化していく。午前中は比較的重要度や集中力を要する作業をこなし、午後は確認作業や情報整理、資料作成といったタスクに充てることが多い。突発的な割り込みを嫌い、自分の作業リズムを乱されるとストレスを感じる。定時で上がり、プライベートの時間を確保することで、日々の精神的な安定を保つ。急な残業は極力避けたい。"},{title:"🗣️ 会議での振る舞い",content:"会議での発言は決して多くはない。しかし、彼が口を開けば、それは必ず論理的で建設的、そして的確な事実に基づいている。議論が脱線したり、感情的な意見が飛び交ったりすると、眉間にしわを寄せ、冷静に軌道修正しようとする。\n\n「それは具体的なデータに基づいているのでしょうか？」「過去の事例では、そのアプローチはうまくいきませんでした」といった発言で、議論を現実的な方向へ引き戻す役割を担う。議事録作成は彼の得意分野であり、誰よりも正確に、漏れなく会議の内容を記録する。抽象的なアイデア出しやフワッとした議論は苦手で、具体的な目的やアジェンダが不明瞭な会議には苦痛を感じる。参加するなら、明確な論点と結論を求めている。"},{title:"💬 チャットでの傾向",content:"メッセージは簡潔で要点のみを伝える。回りくどい表現や感情的な言葉はほとんど使わない。絵文字やリアクションも最小限で、基本的に必要な情報を正確に伝達することに特化している。誤字脱字には細心の注意を払い、送信前には必ず見直しを行うのが常だ。重要な情報は、後で参照できるよう全てテキストで残すことを重視する。\n\n【周囲が知っておくと楽なこと】\n・重要な依頼や確認事項は、必ず具体的な内容と期日を明記すること。曖昧な表現は伝わらない。\n・彼からの「了解」は、詳細の確認まで含んでいるとは限らないため、もし不明点があれば必ず確認し返すこと。\n・絵文字や軽いリアクションは、\"理解した\"ことを示すもので、必ずしも\"同意した\"という意味ではない。\n・彼のメッセージに質問がある場合、具体的な事実やデータを引用して問いかけるとスムーズに理解が進む。\n・長文メッセージであっても、\"情報\"として重要であれば丁寧に読み込み、整理しようとするだろう。"},{title:"👔 上司として／部下として",content:"【上司として】\n公平で一貫性のある指示を出すリーダーだ。メンバーに対しては、明確なルールと期待値を設定し、その範囲内での作業を求める。マイクロマネジメントはしないが、定期的な進捗報告と、数値に基づいた客観的な成果評価を重視する。部下の成長は長期的な視点で見守り、具体的なスキル向上や知識の蓄積を促すアドバイスを惜しまない。ルールを破ったり、無責任な行動をしたりする部下には厳しいが、真面目に努力する者には最大のサポートを提供する。彼のチームは、堅実かつ安定した成果を生み出すことが期待される。\n\n【部下として】\n与えられたタスクは責任感を持って完璧にこなす、非常に信頼できる部下だ。上司の指示には忠実に従い、曖昧な指示には質問をしてでも明確化しようとする。進捗報告は詳細かつ正確で、常に最新の状況を共有する。変化や不確実性の多い環境では不安を感じやすく、新しいツールやプロセスへの適応には時間がかかることがある。しかし、一度習得すれば、それを誰よりも正確に、そして効率的に運用することができる。彼の貢献は、チームの\"安定\"と\"正確性\"に大きく寄与するだろう。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・計画通りに物事が正確に進んだとき\n・自分の情報や分析が組織の課題解決に役立ったとき\n・既存のプロセスを効率化・改善できたとき\n・自身の\"正確性\"や\"堅実さ\"を評価されたとき\n・明確なルールや目標、具体的な手順が与えられたとき\n・チームや組織が安定して機能しているのを見たとき\n・新しい知識や情報を整理し、データベースに格納できたとき\n\n【📉 下がる瞬間】\n・計画が頻繁に変更されたり、指示が曖昧だったりするとき\n・論理的根拠のない判断や、感情的な意思決定が優先されるとき\n・情報が錯綜し、整理できない混沌とした状態に陥ったとき\n・ルールや手順が守られず、無秩序な状況に直面したとき\n・自分の堅実な貢献が見過ごされたり、\"当たり前\"とされたりするとき\n・非効率なプロセスや無駄な作業を強いられたとき\n・プライベートな時間が奪われ、ルーティンが崩れるとき"},{title:"📝 フィードバック",content:"【受けるとき】\n論理的かつ具体的な事実に基づいたフィードバックを最も重視する。感情的な言葉や抽象的な表現は響かず、むしろ\"なぜそう言えるのか\"という疑問を抱く。改善点があれば、「〇〇という状況で、△△のように行動すると、××という具体的な結果につながるだろう」といった具体的な提案を求める。自身の成果物に対する客観的な評価は真摯に受け止め、改善に向けて着実に努力するだろう。\n\n【伝えるとき】\n客観的なデータや事実に基づき、淡々と伝える。感情を挟まず、状況と結果、そして期待される改善のための具体的なステップを提示することが得意だ。「ここが課題で、その原因は〇〇にある。改善策として△△が必要だ」といった具合だ。遠回しな表現はせず、誤解のないようにストレートに伝える。相手の感情に配慮しすぎるあまり、本質が伝わらないことを避ける傾向がある。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・資料の整理・分類：膨大なドキュメントを体系的に整理し、必要な時にすぐ取り出せるようにする。\n・データベース構築・管理：情報を効率的に管理し、一貫性を保つためのシステムを作る。\n・手順書・マニュアル作成：誰でも迷わず作業できるよう、詳細かつ正確な手順書を作成する。\n・品質管理・監査：製品やプロセスの品質基準が満たされているか、細部まで確認する。\n・リスク管理：潜在的な問題点や懸念事項を洗い出し、対策を検討する。\n・情報収集・分析：幅広い分野から情報を集め、客観的なデータに基づいて分析する。\n・ルーティン作業：繰り返し発生する作業を正確かつ効率的にこなす。\n\n【😰 苦手】\n・アイデア出し・ブレスト：ゼロから新しい発想を生み出すことはあまり得意ではない。\n・変化への即時対応：急な計画変更や、予期せぬ状況への柔軟な対応は苦手。\n・突発的な顧客対応：感情的な要素が絡む不規則な対応はストレスに感じる。\n・感情的な議論：論理に基づかない、感情的なやり取りは苦手で避けたい。\n・抽象的な議論：具体性や根拠に欠ける、概念的な議論には集中しにくい。\n・広報・PR活動：感情に訴えかけるような、\"熱\"を伝える活動は苦手。\n・即興でのプレゼン：事前の準備なしに流暢に話すのは困難で、苦手意識がある。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「この情報の正確性を確認してほしい」：彼の知識と責任感を信頼していることを示す。\n・「このプロセスをより効率化できないか、改善点を探してほしい」：彼の\"守り\"と\"改善\"の意欲を刺激する。\n・「具体的な手順と期日を明確に伝えてほしい」：不安なくタスクに着手できるよう、確実な情報を与える。\n・「過去の事例や関連資料を参考にしたい」：彼の蓄積された知識を活用できることに喜びを感じる。\n・「この計画の懸念点やリスクを洗い出し、対策案を検討してほしい」：彼の堅実な視点を最大限に活かす。\n・「この新しいシステムについて、導入手順を詳細にドキュメント化してほしい」：彼の得意なタスクを与え、安心させる。\n\n【❌ パフォーマンスが落ちる】\n・「とりあえずやってみて、やり方は任せる」：不確実性を嫌い、混乱を招く。\n・「なんとなくでいいから、ざっくりでOK」：正確性を疎かにすることを許容できない。\n・「急遽計画変更！明日までに対応よろしく」：予期せぬ変更にストレスを感じ、パフォーマンスが低下する。\n・「感情に訴えかけるような、熱意あるプレゼンをお願い」：論理的思考に反するため、苦手意識が先行する。\n・「この資料、修正箇所だけパッと直しておいて」：全体像や背景が分からないと、誤った修正をしてしまう可能性を危惧する。\n\n【💡 コツ】\n1. 最初に「Why（なぜ必要か）」と「What（何をすべきか）」を明確に、かつ論理的に共有すること。\n2. 過去の成功事例や客観的なデータを示し、信頼性を高めること。\n3. 計画変更は極力避け、変更が必要な場合は事前に十分な情報共有と説明を行うこと。\n4. 具体的な成果物と明確な期日を設定し、細かすぎる進捗報告は求めず、要所でのチェックを依頼すること。\n5. 彼の正確さや堅実さ、そして組織への貢献を具体的に評価し、感謝の言葉を伝えること。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・品質保証/管理：製品やサービスの品質基準が確実に守られるよう、厳格なプロセスを維持・改善する。\n・情報セキュリティ担当：組織の情報を守り、規則や手順に則ってリスクを管理・対策する。\n・監査・コンプライアンス：規定や法令遵守を徹底し、組織の信頼性を保つ守護者となる。\n・知識マネジメント：組織内の膨大な情報を体系的に整理し、いつでも活用できる状態に保つ。\n\n【⭐ かなり合う】\n・データアナリスト：膨大なデータを正確に収集・整理し、客観的な事実に基づいて分析を行う。\n・ライブラリアン/アーカイブ管理者：情報を分類・保管し、必要な時にアクセスできるよう管理する。\n・システム保守・運用：既存システムの安定稼働を支え、効率的な運用プロセスを確立する。\n・プロジェクトマネジメントオフィス（PMO）：プロジェクト全体の進捗やリスクを管理し、計画の遵守を促す。\n\n【💡 意外とハマる】\n・テクニカルライター：複雑な情報を正確かつ分かりやすくドキュメント化する。\n・コンプライアンス担当：規則や法規制を徹底的に調査し、組織の遵守体制を構築する。\n\n【⚠️ 避けた方がいい】\n・新規事業開発：未知の領域への\"攻め\"は苦手。リスクを避ける傾向が強い。\n・広報・PR：感情に訴えかけるコミュニケーションや、不確実な状況での対応はストレスに感じる。\n・イベントプランナー：突発的なトラブル対応や、場の雰囲気を盛り上げる役割は得意ではない。\n・セールス/営業：顧客との感情的なやり取りや、不確実な目標達成へのプレッシャーは苦手。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\n・ENFP-O-Br「着火マン」：斬新なアイデアと熱意で新たな道を切り拓く着火マンに対し、組織の記憶庫はそれを現実的な計画と情報で裏打ちし、着実に形にする。アイデアの暴走を防ぎ、実現可能性を高める完璧な補完関係だ。\n・ENTP-O-Br「アイデアマン」：無限の発想力を持つアイデアマンが提案する様々な可能性を、組織の記憶庫は過去のデータや事実に基づき、実現可能性とリスクを評価し整理する。混沌としがちなブレストを具体的な情報で着地させる。\n\n【🔥 化学反応が起きるコンビ】\n・ESTJ-G-Dp「頑固職人」：頑固職人が定めた強固なルールや手順を、組織の記憶庫が多角的な情報で補強し、より堅牢なものにする。両者の\"守り\"の意識が掛け合わされ、揺るぎない組織基盤を築き上げる。\n・INTJ-G-Dp「戦略家」：戦略家の長期的なビジョンと論理的な思考を、組織の記憶庫が正確なデータと記録で支え、現実世界での実現へと導く。共に\"完璧なシステム\"を追求できる組み合わせだ。\n\n【☀️ 居心地がいい仲間】\n・ISFJ-G-Br「縁の下の力持ち」：共に組織を支える安定志向のG型として、お互いの堅実さや責任感を深く理解し、安心して協力できる。細かい配慮と正確な仕事ぶりで、堅実な成果を共にもたらす。\n・ISTJ-G-Dp「金庫番」：同じISTJ-G基盤を持つため、目的は異なるが、安定と正確さを重んじる点で深く共感し合える。お互いの仕事ぶりを尊重し、黙々と各自のタスクをこなす静かな信頼関係がある。\n\n【⚡ 未知の触発者】\n・ESFP-O-Br「ムードメーカー」：場の空気を読み、行動で示すムードメーカーの柔軟で即興的なアプローチは、組織の記憶庫の論理的な世界に\"感情的な刺激\"と\"予期せぬ変化\"をもたらす。新しい視点を発見するきっかけとなるだろう。\n・ENFJ-O-Dp「伝道師」：人を巻き込み、熱いビジョンで動かす伝道師のカリスマ性は、組織の記憶庫の論理的な世界に\"感情的な推進力\"と\"協力の輪\"をもたらす。彼の安定志向に、新たな行動のエネルギーを与えるかもしれない。"},{title:"🌈 プライベートの顔",content:"休日は家で静かに過ごすことが多い。外に出かけるよりも、自宅で整理整頓や読書、あるいは興味のある分野の情報収集に時間を費やすのが彼のスタイルだ。部屋の片付けは完璧で、\"どこに何があるか\"を常に把握している。\n\n趣味は驚くほど幅広い。歴史のドキュメンタリー鑑賞から、特定のジャンルの映画を網羅すること、プログラミング言語の基礎学習、世界各地の料理レシピ研究、はたまたDIYのHow-To動画を眺めることまで様々だ。しかし、どれも\"深く極める\"というよりは、\"知的好奇心を満たす\"ための情報収集や体験がメインであり、彼の脳内ライブラリを豊かにする目的がある。\n\n旅行に行く際は、事前に綿密な計画を立てるのが常だ。宿や交通手段はもちろんのこと、観光ルート、食事処、緊急時の連絡先まで、全てを事前に調べておく。現地でのイレギュラーな事態は極力避けたい。予定通りに旅行が進むことに最大の喜びを感じる。\n\n友人は厳選された数少ない人々で、彼らとは深く確固たる信頼関係を築いている。新しい人との交流よりも、既存の関係を大切にし、困っている友人がいれば、具体的な情報や実用的なアドバイスを提供して助けるだろう。無駄な社交辞令は苦手だが、心を開いた相手には真摯に向き合う。\n\nお金の使い方も非常に堅実だ。衝動買いはせず、高価なものを買う際は事前に徹底的にリサーチし、価格比較や機能の検証を行う。「これ、本当に必要か？」「費用対効果はどうか？」と自問自答してから購入に至る。家計簿や投資の記録もきっちりつけ、常に自分の財産を把握している。\n\n健康管理も例外ではない。日々の食事記録や運動量をアプリで管理し、自分の情報を整理して常に最適な状態を保とうとする。彼の生活は、情報と秩序によって完璧にコントロールされていると言っても過言ではない。"}]},
"ISTJ-G-Dp":{name:"金庫番",character:"平和島静雄（デュラララ!!）",great:"カント",color:"#5D6D7E",summary:"「この一つの仕組みを完璧に守り続ける」究極の番人。守り×深型で一つのシステムに深くコミットし完璧に維持する。寡黙で頑固だが絶対に壊れない信頼。",compatibility:{complement:[{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"},{code:"ESFP-O-Dp",name:"パフォーマー",desc:"プレゼンテーション準備中、ESFP-O-Dpのダイナミックで感情豊かな表現が、ENTP-G-Brの持つ豊富な知識に新たな視覚的・感覚的要素をもたらす。知識が鮮やかに彩られ、聴衆を惹きつけるコンテンツへと触発される。"}],chemistry:[{code:"ESTJ-G-Dp",name:"頑固職人",desc:"「着火マン」の大胆な提案に対し、「頑固職人」は経験に基づいた堅実な視点を提供します。これにより、プロジェクト計画の穴をなくし、多様な視点から物事を深く考察するきっかけを与え、視野を大きく広げます。"},{code:"ISTJ-O-Dp",name:"任務遂行者",desc:"品質管理の現場で、ISTP-O-Dpが開発した精密な検査基準を、ISTJ-O-Dpが着実に運用し、寡黙ながらも高い精度で品質維持に貢献する。"}],comfort:[{code:"ISTJ-G-Br",name:"組織の記憶庫",desc:"「着火マン」が提示する大胆な企画に対し、「組織の記憶庫」は過去の事例やデータに基づき実現性を分析します。プロジェクトの方向性を議論する際、異なる視点から堅実な意見を出し合い、計画の精度を高めます。"},{code:"ISTP-G-Dp",name:"専属オペレーター",desc:"求道者の深い専門性と専属オペレーターの静かで精密な技術が互いに理解し合い、言葉なくとも連携が可能です。共同で複雑な機械のメンテナンスを行う際、求道者が問題の根源を特定し、専属オペレーターが熟練した手つきで調整することで、完璧な連携を見せます。"}],catalyst:[{code:"ENTP-O-Br",name:"アイデアマン",desc:"新規事業の企画会議では、ENTP-G-Brが知識の引き出しから多様な情報を提示し、ENTP-O-Brがそれに触発されて次々と新しいアイデアを繰り出す。知識と発想が高速で応酬し、無限の可能性が広がる。"},{code:"ENFP-O-Dp",name:"伝道師",desc:"「着火マン」と「伝道師」は、情熱と興奮を共有し、お互いのアイデアに深く共感し合えます。休憩時間の雑談でも、熱いビジョンを語り合い、自然体でいられるため、心からリラックスできる関係です。"}]},careers:{top:["金庫職人","原子力発電所のオペレーター","高セキュリティ施設管理"],good:["時計修理師","伝統建築の保存","ダム管理者"],surprise:["古文書の保存修復","灯台守"],avoid:["即興営業","毎日変わるクリエイティブ"]},strengths:["絶対に壊れない信頼","一つへの完璧な維持","寡黙な忍耐","長期的な安定"],weaknesses:["変化","コミュニケーション","柔軟性","新しい環境"],tips:{do:"現在運用しているこのシステムについて、セキュリティ面でさらに盤石な状態を維持したいと考えています。あなたが細部まで完璧に守ってくれているからこそ、今の信頼があると思っています。現状のプロセスで何か改善できる点がないか、専門家として一度見直してくれないでしょうか？ この重要なデータ管理規約について、来月から厳格な運用が求められます。これまであなたが築き上げてきた堅牢な管理体制があるからこそ、安心して任せられます。新しい規約に完全に準拠できるよう、手順の最終チェックと運用をお願いできますか？ このプロジェクトの基盤となるシステムは、あなたの完璧な維持管理にかかっています。私たちの計画が滞りなく進むよう、この部分だけは絶対にブレずに守り抜いてほしい。何か問題があれば、すぐに相談に乗りますので、どうかこの仕組みを守り続けてください。",dont:"この運用ルール、ちょっと非効率だから、臨機応変に、もっと柔軟に対応してくれない？細かいことは気にしなくて大丈夫だよ。もっと自由にやってみたら？ 前例がないけど、とりあえずこの方法でやってみてよ。もし問題が起きても、その時考えればいいから。完璧じゃなくてもいいから、スピード重視で進めてくれない？ システム変更の計画、まだ完全に固まってないんだけど、とりあえずこの方針で動いておいてくれない？詳細が決まったらまた連絡するから、適当でいいよ。いつもの堅いやり方は一旦置いといて。"},fullSections:[{title:"👤 この人はこんな人",content:"「この一つの仕組みを完璧に守り続ける」ことを使命とする究極の番人。揺るぎない安定性と、責任感の塊のような人物だ。\n\n「やるべきことはやる」がモットーで、約束やルールは絶対に守る。一度引き受けたタスクは、どんなに細部まで泥臭くても最後までやり遂げる。周りからは「あの人に任せておけば大丈夫」と絶大な信頼を寄せられている。\n\n刺激や変化よりも、秩序と予測可能性を好む。新しいやり方よりも、既存の成功体験やデータに基づいた堅実なアプローチを選ぶ傾向がある。石橋を叩いて渡るどころか、その石橋の設計図を確認し、強度計算を何度も見直し、安全マージンを何重にも確保してからようやく一歩を踏み出すタイプだ。\n\n弱点は、変化への適応に時間がかかること。急な方針転換や曖昧な指示には混乱し、一度決めた計画の変更は強いストレスを感じる。「なんでそうなるんですか？」「根拠は？」と納得できないと、なかなか動き出せない頑固な一面も持つ。\n\n興味の幅は広くないが、一度関心を持った分野は徹底的に深く掘り下げる。その分野の歴史から最新の動向、微細なルールや隠れた構造まで、すべてを記憶し、完璧に理解しようと努める。その専門知識は、時に周りを圧倒するほどだ。\n\n人付き合いは不器用で、社交辞令や雑談は苦手。大人数でワイワイするよりも、信頼できる少数の友人と深い話をすることを好む。初対面では無口でとっつきにくい印象を与えるかもしれないが、一度信頼関係を築けば、その絆は非常に強固で、困っている仲間には黙って手を差し伸べる義理堅さがある。\n\n根底には「誠実であること」「責任を果たすこと」「社会の秩序に貢献すること」といった揺るぎない価値観がある。誰かのために、あるいは組織のために、自分が担うべき役割を完璧に遂行することに、静かな誇りを感じている。\n\n「データはすべて確認しました。間違いはありません。」その一言に、彼の仕事への姿勢と信頼が凝縮されている。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n計画は緻密に、リスクは徹底的に洗い出す。「これで本当に大丈夫か？」と自問自答を繰り返し、最悪のシナリオまで想定してからようやく着手する。突発的な依頼には即座に対応せず、まず「なぜ、今、これをやるのか」という背景と目的、そして具体的な手順を明確にしないと動けない。\n\n【進行フェーズ】\n計画通りに進めることに最大の喜びを感じる。イレギュラーな事態が発生すると一時的にフリーズするが、すぐに情報収集と冷静な分析に入り、最適な解決策を見つけ出そうとする。進捗は細かく、正確に記録し、必要に応じて詳細な報告書を作成する。複数のタスクを並行するのは苦手で、一つずつ確実に片付けることを好む。\n\n【完了フェーズ】\n完璧主義が最も発揮されるフェーズ。最後の1%まで手抜きをせず、誤字脱字、数字のずれ、手順の抜け漏れがないか、何度も確認する。ドキュメント整備やナレッジ化も抜かりなく行い、後から誰が見てもわかる状態にする。彼の「完了」は、まさに「完璧」を意味する。\n\n【1日の働き方】\nルーティンを何よりも重視する。朝は決まった時間にオフィスに着き、メールチェックから始まる一日の計画を脳内で完璧にシミュレーション。午前中に集中力のいる作業をこなし、午後はデータ整理やドキュメント作成など、正確性を要するタスクに取り組むことが多い。急な割り込みがない限り、計画通りに粛々と仕事を片付けていく。一人の時間を確保し、集中して業務に取り組む環境がベストだ。"},{title:"🗣️ 会議での振る舞い",content:"会議では発言は控えめだが、その発言は常に具体的で、事実と論理に基づいている。感情論や漠然とした意見には耳を傾けず、データや具体的な根拠を求める。「それは事実ですか？」「前例はありますか？」と問いかけることが多い。\n\nブレインストーミングのような自由なアイデア出しの場は苦手で、発言を求められても「現時点では特にありません」と答えることも。しかし、既存の計画やシステムの問題点を指摘したり、改善提案を求められたりすると、その洞察力を発揮する。\n\n議事録を取らせると右に出る者はいない。発言者と内容、決定事項、タスク、期日を明確に記録し、共有してくれる。長時間の議論や結論が出ない会議は苦痛で、時間通りに会議が終わらないとイライラすることもある。\n\n【ベストな会議の使い方】\n・明確な議題とアジェンダが事前に共有されている会議\n・事実に基づいたデータ共有や分析結果の報告会\n・具体的な改善策やリスク評価を行う会議\n・意思決定の場で、論理的な裏付けを求める際"},{title:"💬 チャットでの傾向",content:"メッセージは短く、簡潔で、要点が明確。回りくどい表現や感情的な言葉はあまり使わない。絵文字や顔文字を使うことは稀で、使うとしてもごくシンプルなものに限られる。\n\nタスク依頼に対しては、確認事項を複数投げかけ、すべてが明確になってから「承知しました。〇〇までに対応します」と具体的に返信する。返信は遅くはないが、内容を吟味し、誤解がないか確認してから送るため、即答ではないことが多い。\n\n雑談チャンネルでの発言はほとんどなく、基本的に業務連絡のみに使う。長文で質問が来た場合でも、簡潔に箇条書きで回答することが多い。\n\n【周囲が知っておくと楽なこと】\n・重要な依頼は具体的な期日と期待値を明確に伝えるのが鉄則\n・「検討します」は、詳細を調査する時間が必要というサイン\n・急ぎの連絡でも、まず要点を箇条書きで伝えるとスムーズ\n・絵文字やユーモアを期待しても仕方がない（そういう人ではない）\n・返信が短くても、それは「了解」のサインであり、怒っているわけではない"},{title:"👔 上司として／部下として",content:"【上司として】\nルールと規律を何よりも重んじるリーダー。メンバーには明確な指示と期待値を伝え、成果だけでなく、プロセスも重視する。公正で客観的な評価を行い、私情を挟むことはない。メンバーの成長のためには、厳しいフィードバックも惜しまないタイプだ。\n\nマイクロマネジメントと捉えられることもあるが、それは「完璧に仕事を遂行してほしい」という責任感の表れ。一度任せた仕事でも、リスクや問題点が見つかればすぐに改善を求める。チームの基盤を堅実に固め、組織全体の安定に貢献することを最優先に考える。\n\n【部下として】\n上司からの指示は絶対で、言われたことを完璧にこなすことに集中する。曖昧な指示は好まず、「どうすればいいですか？」と具体策を求める。上司の期待に応えるためなら、どんな地道な作業もいとわない。彼の仕事は常に期待以上の品質で、間違いがないため、安心して重要なタスクを任せられる部下だ。\n\n管理型の環境でこそ真価を発揮する。細かく進捗報告を求められたり、手順が明確に指定されている方が安心して仕事に取り組める。逆に、「自由にやっていいよ」と言われると、何から手をつけていいか戸惑うことがある。頻繁な方針変更や、責任感のない上司とは相性が悪い。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・計画通りに物事が完璧に進んだとき\n・エラーやバグが一つもないシステムを構築できたとき\n・自分の仕事が組織の安定やリスク回避に貢献したと実感したとき\n・緻密な計画が評価されたとき\n・正確さや専門知識を認められたとき\n・一人で集中できる静かな環境で作業に没頭できたとき\n・困難な問題を論理的に解決できたとき\n\n【📉 下がる瞬間】\n・ルールや手順が守られないとき\n・曖昧な指示や頻繁な方針変更があったとき\n・無責任な行動や言動に遭遇したとき\n・感情論で物事が決定されるとき\n・細部の確認を怠ったり、ミスが許容されたりするとき\n・集中を妨げられるような騒がしい環境で働くとき"},{title:"📝 フィードバック",content:"【受けるとき】\n感情ではなく、事実としてフィードバックを受け止める。まず「それは事実か？」と確認し、具体的なデータや根拠があれば素直に受け入れる。感情的な表現や漠然とした指摘は響かない。「ここが良かった」というポジティブな点よりも、「ここをこうすればもっと良くなる」という具体的な改善策を求め、それを論理的に納得すれば、すぐさま行動に移す。\n\n【伝えるとき】\n非常に論理的で客観的。感情を交えずに、事実に基づいたフィードバックを淡々と伝える。改善点や期待値を明確にし、「なぜそうなのか」「どうすればいいのか」を具体的に説明する。遠回しな表現は使わず、ストレートに核心を突くため、時に厳しい印象を与えることもあるが、それは相手の成長を願ってのことだ。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・**データ分析・整理**：膨大な情報から必要な事実を正確に抽出する\n・**システム構築・維持**：ルールに基づいた堅牢なシステムを作り、安定稼働させる\n・**品質管理・監査**：製品やサービスの品質を厳格にチェックし、規格に適合させる\n・**手順書・マニュアル作成**：誰が読んでも理解できる、明確で詳細なドキュメントを作成する\n・**予算管理・経理**：数字のずれを許さず、正確な財務状況を把握する\n・**リスク分析・危機管理**：潜在的な問題点を洗い出し、対策を講じる\n・**セキュリティチェック**：脆弱性を見つけ出し、システムを堅固に守る\n\n【😰 苦手】\n・**ブレインストーミング**：自由な発想を求められる場は苦手\n・**新規事業企画**：不確実性の高い0→1フェーズには慎重すぎる\n・**広報・PR**：感情に訴えかけるメッセージングや外向きの活動は苦手\n・**イベント運営**：突発的なトラブル対応が多く、計画通りに進まないことがストレス\n・**人間関係の調整**：感情的な対立の仲裁や、場の空気を読むのは不得意\n・**抽象的な概念の議論**：具体的な結論に繋がらない議論は苦痛\n・**サプライズ企画**：計画通りに進まないことが多いので苦手"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「このタスクの目的は〇〇で、期日は△△です。具体的な手順は⬜⬜になります。」→明確な指示と全体像に安心する。\n・「〇〇さんの専門知識が必要なんです。」→頼られると、その期待に応えようとする。\n・「このシステムを安定稼働させるためには、あなたの正確なチェックが必要です。」→自分の仕事の重要性を理解すると燃える。\n・「既存のデータによると…」→根拠となる情報や資料を提示すると、信頼して取り組む。\n・締切は「〇月〇日の終業までにお願いします」と具体的に、曖昧さなく伝える。\n・「まず〇〇まで進めて、一度ご報告いただけますか？」→中間チェックポイントがあると、計画的に進められる。\n\n【❌ パフォーマンスが落ちる】\n・「なんか面白いことやってみてよ」→何をすればいいか分からず困惑する。\n・「ざっくりでいいから、適当にやって」→適当という概念が存在しない。\n・「今日中にできないかな？急に悪いんだけど！」→急な変更や無計画さに不満を感じる。\n・理由を説明せずに「とにかくやって」→納得できないと動きが鈍る。\n・「前もって言ったじゃない」→情報の共有が不十分だと不信感を持つ。\n\n【💡 コツ】\n1.  最初に「Why（なぜ必要か）」と「What（何をすべきか）」を明確に、論理的に説明する。\n2.  具体的な指示と、期待する成果物の品質基準を伝える。\n3.  必要な情報や過去のデータ、手順書などをすべて提供する。\n4.  途中のチェックポイントや報告のタイミングを事前に取り決めておく。\n5.  彼の正確さや堅実な仕事ぶりを、具体的な言葉で評価し感謝を伝える。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・**システム監査・品質保証**：システムの安全性や品質を厳格にチェックし、基準を維持する番人。\n・**経理・財務**：数字の正確性を追求し、組織の財政基盤を堅実に守る。\n・**リスク管理**：潜在的なリスクを徹底的に洗い出し、組織の安定を確固たるものにする。\n\n【⭐ かなり合う】\n・**データベース管理者**：データの整合性とセキュリティを完璧に保つ。\n・**法務・コンプライアンス**：組織がルールを遵守しているかを厳しく監視し、法的なリスクを回避する。\n・**生産管理・サプライチェーン管理**：生産計画を緻密に立て、効率的かつ安定的な供給体制を築く。\n\n【💡 意外とハマる】\n・**精密機械エンジニア**：細かい仕様にこだわり、完璧な製品を作り上げることに没頭できる。\n・**図書館司書・アーキビスト**：膨大な情報を分類・整理し、秩序を保つことに喜びを感じる。\n\n【⚠️ 避けた方がいい】\n・**セールス・営業**：不確実性が高く、感情的なコミュニケーションが多いためストレスが大きい。\n・**広報・PR**：クリエイティブな発想や大衆への訴求は苦手。\n・**イベントプランナー**：突発的なトラブルや臨機応変な対応が多く、計画通りに進まないことが苦手。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\n・**ENFP-O-Br「着火マン」**：金庫番の堅実さと着火マンの奔放さが最高の化学反応を起こす。着火マンが広げた可能性を金庫番が現実の形にし、リスクを管理しながら着実に進める。お互いの弱点を完璧にカバーし合える、まさに相棒。\n・**ESFP-O-Br「盛り上げ役」**：金庫番が安定した基盤を作り、盛り上げ役がその上で自由に活躍できる。盛り上げ役の社交性と金庫番の信頼性が、異なる角度からチームを支えることができる。\n\n【🔥 化学反応が起きるコンビ】\n・**ENTJ-O-Dp「将軍」**：共通の思考（T）と判断（J）、深堀（Dp）で、組織の目的達成に向けて強力なタッグを組む。将軍の戦略的思考を、金庫番が具体的で堅実な計画に落とし込み、確実な実行へと導くことができる。\n・**ESTJ-G-Dp「頑固職人」**：同じく現実的で論理的、計画的なタイプで、ルールと秩序を重んじる。金庫番は職人の専門知識と経験を尊敬し、職人も金庫番の正確性と堅実さを信頼する。意見が食い違うと互いに譲らないが、その議論は常に生産的だ。\n\n【☀️ 居心地がいい仲間】\n・**ISTP-G-Dp「探求者」**：共に内向的で論理的、一点深掘りタイプ。金庫番の計画性と探求者の問題解決能力が、落ち着いた環境で最高のパフォーマンスを生む。互いの独立性を尊重し、静かに集中できる。\n・**ISFJ-G-Dp「支援者」**：金庫番の堅実さと支援者の献身性が組み合わさり、安定した関係を築く。支援者が細やかな気遣いで金庫番を支え、金庫番がその基盤の上で安心して業務に集中できる。言葉少なくても互いを理解し合える。\n\n【⚡ 未知の触発者】\n・**ENFJ-O-Br「伝道師」**：金庫番の論理的思考と伝道師の共感力が、異なる視点をもたらす。伝道師の情熱的なビジョンに、金庫番が現実的な実現可能性を提示することで、新たな道が開けるかもしれない。異なるアプローチから学ぶことが多い関係性だ。\n・**INFP-O-Br「夢追い人」**：金庫番の現実主義と夢追い人の理想主義が、互いに新鮮な視点を提供する。夢追い人の豊かな発想を金庫番が堅実に地に足をつかせようとする過程で、意外な発見があるかもしれない。互いの価値観の違いを理解することが重要となる。"},{title:"🌈 プライベートの顔",content:"休日の予定は常に計画済みで、Googleカレンダーにはしっかりと予定が書き込まれている。前日に「明日、急に温泉行かない？」と誘われても、「明日は〇〇をする予定があります」と断るだろう。彼のルーティンを崩すことは、彼自身の秩序を乱すことにも繋がるのだ。\n\n趣味は一つを深く極めるタイプ。プラモデル、歴史研究、囲碁、特定のゲームのやり込みなど、一度興味を持ったらその分野の知識を徹底的に深掘りする。関連書籍を全て読み漁り、関連イベントには必ず足を運ぶ。周りが新しいものに次々手を出す中、彼は変わらず一つのことに集中している。\n\n家の中は常に整理整頓が行き届いている。物が散らかっている状態は彼の精神を乱すため、常にどこに何があるか把握できるように整えられている。収納場所も機能的に工夫されており、彼の効率性を追求する姿勢がここにも表れている。\n\n人間関係は狭く深く。本当に信頼できる友人は少ないが、その友人たちとは長く、深い付き合いをする。彼らにとっての「親友」とは、数年に一度会うだけでも、会えば昨日までの続きのように語り合える存在だ。社交的な場よりも、自宅や静かな場所でじっくりと話す時間を好む。\n\nお金の使い方も堅実で、「衝動買い」という概念は彼の中に存在しない。買い物をする際は、必要なものか、耐久性はあるか、コストパフォーマンスは良いか、徹底的に吟味してから購入する。貯蓄は怠らず、将来に備えることを重視している。「新しいものより、長く使える良いものを」が彼の哲学だ。\n\n普段は寡黙だが、自分の専門分野の話になると饒舌になることがある。その知識量と細部へのこだわりは、聞く者を圧倒する。彼の静かな情熱は、このような瞬間に垣間見える。"}]},
"ISTP-O-Br":{name:"現場の万能技師",character:"キリト（SAO）",great:"チャック・イェーガー",color:"#DC7633",summary:"「どんな機械でも乗りこなし、どんな状況でも切り抜ける」万能の技師。攻め×広型で幅広い技術と冷静な判断力で困難に立ち向かう。手先が器用で即座に対応する力がある。",compatibility:{complement:[{code:"ENFJ-G-Dp",name:"寮長",desc:"技術力で難題を解決する彼が、周囲の協力や感情面を気にせず没頭できるよう、寮長がチームの人間関係を温かく調整し、全体の士気を高める。"},{code:"ESFJ-O-Dp",name:"肝っ玉番長",desc:"現場の技術的な問題解決に集中する彼に対し、番長は利用者目線で具体的なニーズを伝え、成果が「みんなのため」になるよう橋渡しをする。"}],chemistry:[{code:"ESTP-O-Br",name:"トラブルシューター",desc:"予期せぬトラブル発生時、互いの冷静な状況分析力と卓越した現場対応力で、即座に問題の根源を特定し、迅速かつ的確に解決へ導く最強のタッグ。"},{code:"ISTP-O-Dp",name:"一刀流の職人",desc:"新しい技術課題に対し、互いに専門知識を深く掘り下げ、実践的な解決策を冷静に議論できる。高度な技術の探求で刺激し合う関係。"}],comfort:[{code:"ISTP-G-Br",name:"修理屋",desc:"難解な機器のメンテナンスや改造作業において、多くを語らずとも互いの意図を察し、精度の高い技術力で協力し合えるため、非常に居心地が良い。"},{code:"ISTJ-O-Br",name:"ルール番人",desc:"作業効率を追求する中で、規律を重んじる番人が定める手順や品質基準を、彼の確かな技術力で実践する。お互いに信頼し、安心して業務に取り組める。"}],catalyst:[{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"},{code:"INFJ-O-Br",name:"革命家",desc:"目の前の技術課題に集中する彼に、革命家が「この技術で、どんな未来を創りたい？」と問いかけ、深い洞察と大きなビジョンで技術の方向性と意義を触発する。"}]},careers:{top:["テストパイロット","フィールドエンジニア","レスキュー隊員"],good:["メカニック","IT障害対応","消防士"],surprise:["スタントマン","eスポーツ選手"],avoid:["感情労働中心","長文の書類作成"]},strengths:["幅広い技術力","冷静な即時判断","手先の器用さ","困難への適応力"],weaknesses:["感情表現","長期計画","チームの空気","書類作業"],tips:{do:"このシステムのバグで現場が混乱しているんだ。君の技術で原因を特定して、できるだけ早く対処してくれないか？具体的な方法は任せるよ、君なら最善の方法を見つけられるはずだ。新しい生産ラインの効率が上がらず困っている。君の視点から、この現状を打破する画期的な改善策はないかな？試せるアイデアがあれば、ぜひ自由に試してみてほしい。突然、この装置が動かなくなった。何が原因か分からないんだ。まずは君に現場を見て、問題を特定してほしい。その上で、どうすれば復旧できるか、君の判断に任せるから、すぐに動いてくれるか？",dont:"このプロジェクトの進捗について、来週までに詳細な計画書を提出してほしい。それから、毎日午前中に進捗報告をチャットでしてくれないかな？細かいプロセスもきちんと書いてね。この件、みんながすごく困っているから、とにかく頑張ってほしいんだ。もっと情熱を持って取り組んでくれないか？具体的なことは、まあ、君の裁量でいいけど、とにかく熱意が大事だよ。君がどうやってその機械を修理するのか、全ての工程を事前に説明してくれ。そして、作業中は常に私に状況を報告し、私の許可なく次のステップに進まないでほしい。"},fullSections:[{title:"👤 この人はこんな人",content:"「これ、どうなってるんだろう？」「もっといいやり方があるはず」が口癖。\n頭で考えるよりまず手を動かし、試行錯誤しながら問題を解決するのがこの人の真骨頂だ。どんなトラブルにも動じず、冷静沈着に最適解を見つけ出し、手際よく対応する。\n\n一人で集中して作業する時間でエネルギーを充電するタイプ。周りから見ると「何を考えているのか分からない」と思われることもあるが、頭の中では常に物事を論理的に分析し、効率的な解決策を導き出している。\n\n実践的で現実主義者。机上の空論には興味がなく、「とりあえずやってみよう」「触ってみないと分からない」と、とにかく現場での検証を重んじる。新しい技術やツールが登場すれば、いち早く試して自分のものにしようとする攻めの姿勢を持っている。\n\n興味の幅が非常に広い「多趣味」タイプで、器用なため何でもソツなくこなしてしまう。プログラミングからDIY、楽器演奏、スポーツ、車の整備まで、気になったらすぐに手を出して一定レベルまで習得する。「あ、それなら俺もちょっとやったことある」と、意外なスキルを見せることがよくあるだろう。\n\n弱点は、長期的な計画や抽象的な議論が苦手なこと。目の前の問題解決には強いが、未来のビジョンを語ったり、細かな報告書をまとめたりするのは骨が折れる。感情的な対立も避けたがる傾向があり、議論が白熱すると「話にならない」と割り切ってしまうことも。\n\n人間関係においては、多くを語らないが、いざという時には頼りになる存在だ。余計な馴れ合いは好まないが、必要な情報交換や協力は惜しまない。信頼を置く相手には、言葉ではなく行動で示すことが多い。\n\n根本にあるのは「自由」と「自律」への強い欲求。自分のやり方で、自分の手で問題を解決し、より良いものを作り上げたいという思いが、この人を突き動かす。常に改善の余地を探し、現状を最適化しようとする探究心の持ち主だ。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n問題が発生した時や新しい課題が降ってきた時、まず現状を分析し、原因究明から始める。「これはどういう仕組みで動いているのか？」「何がボトルネックになっているのか？」と、分解して理解しようとする。計画を立てるよりも、まずはプロトタイプを作ったり、検証環境で試してみたりと、すぐに手を動かすタイプだ。\n\n【進行フェーズ】\n綿密な計画に従って進めるのは得意ではない。むしろ、状況の変化に応じて柔軟にアプローチを変えることを得意とする。「これはもっと良い方法があるな」と感じたら、途中でやり方を大きく変更することも厭わない。複数のタスクを並行して進める器用さも持ち合わせているが、それぞれに集中する時間はしっかりと確保する。\n\n【完了フェーズ】\n実用的なレベルに達したら、そこで満足する傾向がある。完璧を目指して細かい部分にこだわるよりも、「これで十分機能する」と判断すれば、次の新しい課題へ興味が移る。最終的なドキュメント作成や、細部のブラッシュアップは後回しになりがちだ。そのタスクの面白みが薄れると途端に集中力が途切れることもある。\n\n【1日の働き方】\n集中を妨げられない環境で、自分のペースで黙々と作業するのがベスト。朝は比較的早くから作業を始められるが、午後も集中力が途切れることなく継続できる。途中で休憩を挟むよりも、一つの作業に深く没頭し、一区切りついたところで気分転換に全く別の作業に切り替えることを好む。突発的なトラブル対応はむしろ得意で、そこに面白みを感じることもあるだろう。"},{title:"🗣️ 会議での振る舞い",content:"必要性の低い会議には参加したくない。参加するからには実用的な議論を望む。\n発言は最小限だが、核心を突くものが多い。「で、具体的にどうするんですか？」「それって本当に実現可能なんですか？」と、抽象的な話や感情論には疑問を呈する。無駄な議論が続くと、露骨に退屈そうな態度を見せることもある。\n\nブレストの場では、現実的な制約や実現可能性を考慮した上で、ユニークな解決策をポロッと提案することがある。しかし、アイデア出しそのものより、そのアイデアがどう機能するかを考える方に集中する。感情的な対立や長時間の報告会は苦痛で、早く結論を出して次の行動に移りたいと考えている。\n\n【ベストな会議の使い方】\n・課題解決のための技術的な議論には必須\n・緊急時のトラブルシューティング会議で的確な判断を下す\n・新しいツールの導入検討や、具体的なプロセス改善の場では積極的に参加\n・長時間の定例会議や、進捗報告が主体の会議は必要最低限の参加にするのが良い"},{title:"💬 チャットでの傾向",content:"メッセージは基本的に簡潔で要点をまとめている。余計な前置きや絵文字はあまり使わず、必要な情報だけを伝えることを重視する。「了解」「確認しました」「やります」など、短い返信が多い。質問に対しては即座に、かつ的確に回答する。\n\n長文のメッセージを送ることは稀だが、技術的な説明が必要な場合は、図やコードブロックなどを活用して分かりやすく表現する。他人の投稿へのリアクションはあまりしないが、有益な情報には「それ良いですね」程度の短い返信をすることがある。\n\n【周囲が知っておくと楽なこと】\n・簡潔なメッセージでも、やると決めたことはきちんと進めている\n・雑談や世間話にはあまり乗ってこないが、嫌っているわけではない\n・「検討します」は、すでに頭の中で解決策をシミュレーションしている状態である\n・曖昧な質問より、具体的かつ論理的な質問の方が早く的確な回答が得られる\n・返信が短くても、それは効率を重視しているだけで、決して不機嫌なわけではない"},{title:"👔 上司として／部下として",content:"【上司として】\nメンバーには必要最低限の指示しか出さず、最大限の裁量を与えるリーダーだ。「この問題を解決してくれ、やり方は任せる」というスタイルを好む。マイクロマネジメントは一切しない（というかできない）。プロセスよりも結果を重視し、具体的な成果が出ていれば、その過程についてはあまり口出ししない。\n\nメンバーが困っている時には、直接的な解決策を与えるよりも、ヒントを与えたり、一緒に問題の原因を探ったりと、自力で解決する能力を育むことを促す。感情的なケアは苦手だが、論理的な相談には真摯に対応する。チーム内の非効率なプロセスを見つけると、積極的に改善を提案するだろう。\n\n【部下として】\n与えられた課題に対して、自分のやり方で解決する自由を与えられると、最高のパフォーマンスを発揮する。「〇〇さんなら、もっと良い方法を見つけてくれるだろう」と信頼されることを喜ぶ。上司への報告も、要点だけをまとめて簡潔に行う。進捗が順調であれば、わざわざ細かく報告することは少ない。\n\n管理型の、細かく指示を出してくる上司とは相性が悪い。「言われた通りにやる」だけではモチベーションが上がらない。非効率なルールや理不尽な指示には反発心を覚えることもある。新しい技術やアプローチを試すことを制限されると、フラストレーションを感じるだろう。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・複雑で新しい問題の解決を任されたとき\n・誰もやったことのない新しい技術やツールを試せるとき\n・自分の手で、具体的な改善や成果を実感できたとき\n・自由に試行錯誤し、自分の裁量で仕事を進められるとき\n・トラブルが発生し、冷静かつ迅速な対応が求められたとき\n・非効率なプロセスを改善し、効率化に成功したとき\n・多岐にわたるスキルを組み合わせて、課題を解決したとき\n\n【📉 下がる瞬間】\n・非効率なルールやプロセスに従わなければならないとき\n・細かい指示が多く、自分の裁量がほとんどないとき\n・退屈で変化のないルーティンワークを強いられるとき\n・感情的な対立や人間関係の調整が求められたとき\n・具体的な成果が見えにくい、抽象的な議論が続くとき\n・長時間の無意味な会議に参加させられるとき\n・自分の提案が、理由も説明されずに却下されるとき"},{title:"📝 フィードバック",content:"【受けるとき】\n論理的で客観的なフィードバックなら、感情を挟まずに素直に受け止める。「ここがこうだったから、次はこうすると良い」といった具体的な内容であれば、即座に改善策を検討し、実行に移す。しかし、感情的な批判や、具体的な根拠のない指摘はスルーしてしまうことが多い。「なぜ？」という疑問が解決されないままでは、納得して行動することが難しい。\n\n【伝えるとき】\n基本的に感情を交えず、事実に基づいて率直に伝える。改善点がある場合は、具体的な解決策や代替案をセットで提示することが多い。遠回しな言い方や、相手の感情に配慮しすぎるのは苦手で、時にストレートすぎると思われてしまうこともある。しかし、相手を貶めようという意図はなく、あくまで問題解決のためだと考えている。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・トラブルシューティング：複雑な問題の原因を素早く特定し、解決策を導き出す\n・新しいツールの導入・検証：最新技術やガジェットをいち早く試し、業務に活用する\n・プロトタイプ作成：アイデアをすぐに形にし、実用性を検証する\n・危機管理・緊急対応：予測不能な事態にも冷静に対処し、被害を最小限に抑える\n・データ分析・可視化：膨大なデータから法則性を見つけ出し、実用的な知見を得る\n・技術調査・選定：様々な技術を比較検討し、最適なものを選択する\n・現場での改善活動：生産ラインや業務プロセスを直接見て、効率化案を考案・実行する\n\n
