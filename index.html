<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>64タイプ ワークスタイル診断</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23667eea'/><stop offset='100%25' stop-color='%23764ba2'/></linearGradient></defs><circle cx='50' cy='50' r='45' fill='url(%23g)'/><text x='50' y='62' text-anchor='middle' font-size='36' font-weight='bold' fill='white'>64</text></svg>">
<meta property="og:title" content="64タイプ ワークスタイル診断">
<meta property="og:description" content="MBTIの4軸に独自の2軸を加えた6軸・64タイプの職場パーソナリティ診断">
<meta property="og:type" content="website">
<meta property="og:image" content="https://shodaiyamaguchi-rgb.github.io/workstyle-diagnosis/ogp.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="64タイプ ワークスタイル診断">
<meta name="twitter:description" content="MBTIの4軸に独自の2軸を加えた6軸・64タイプの職場パーソナリティ診断">
<meta name="twitter:image" content="https://shodaiyamaguchi-rgb.github.io/workstyle-diagnosis/ogp.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:rgba(255,255,255,0.03);--card-border:rgba(255,255,255,0.06);--text:#e8e6e3;--text-muted:rgba(255,255,255,0.5);--accent:#E67E22}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.container{max-width:640px;margin:0 auto;padding:0 20px}

/* Start Screen */
#startScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 20px}
.start-label{font-size:11px;letter-spacing:4px;color:var(--text-muted);text-transform:uppercase;margin-bottom:24px}
.start-title{font-family:'Noto Serif JP',serif;font-size:32px;font-weight:700;margin-bottom:12px;line-height:1.4}
.start-sub{font-size:14px;color:var(--text-muted);margin-bottom:48px;line-height:1.8}
.start-btn{display:block;width:100%;max-width:360px;padding:16px 24px;border:none;border-radius:12px;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:500;cursor:pointer;transition:all .3s;margin-bottom:16px}
.start-btn.primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.start-btn.primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(102,126,234,0.3)}
.start-btn.secondary{background:var(--card);color:var(--text);border:1px solid var(--card-border)}
.start-btn.secondary:hover{background:rgba(255,255,255,0.06)}
.start-note{font-size:12px;color:var(--text-muted);margin-top:8px}
.mbti-grid{display:none;flex-wrap:wrap;gap:8px;justify-content:center;max-width:360px;margin:16px auto}
.mbti-grid.show{display:flex}
.mbti-chip{padding:8px 14px;border-radius:8px;background:var(--card);border:1px solid var(--card-border);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.mbti-chip:hover,.mbti-chip.selected{background:rgba(102,126,234,0.2);border-color:rgba(102,126,234,0.5)}

/* Question Screen */
#questionScreen{display:none;min-height:100vh;padding:20px}
.q-header{position:sticky;top:0;background:var(--bg);padding:16px 0 12px;z-index:10}
.q-progress-wrap{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.q-progress-bar{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.q-progress-fill{height:100%;border-radius:2px;transition:width .4s ease;background:linear-gradient(90deg,#667eea,#764ba2)}
.q-count{font-size:12px;color:var(--text-muted);white-space:nowrap}
.q-axis-label{font-size:11px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase}
.q-card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:32px 24px;margin:24px auto;max-width:560px}
.q-text{font-family:'Noto Serif JP',serif;font-size:18px;line-height:1.8;margin-bottom:32px;text-align:center}
.q-scale{display:flex;justify-content:space-between;align-items:center;gap:4px;margin-bottom:12px}
.q-scale-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--card-border);background:transparent;color:var(--text-muted);font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.q-scale-btn:hover{border-color:rgba(102,126,234,0.5);background:rgba(102,126,234,0.1)}
.q-scale-btn.selected{background:linear-gradient(135deg,#667eea,#764ba2);border-color:transparent;color:#fff;transform:scale(1.15)}
.q-scale-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted)}
.q-nav{display:flex;gap:12px;justify-content:center;margin-top:24px;max-width:560px;margin-left:auto;margin-right:auto}
.q-nav-btn{padding:12px 32px;border-radius:10px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:14px;cursor:pointer;transition:all .2s}
.q-nav-btn.prev{background:var(--card);color:var(--text);border:1px solid var(--card-border)}
.q-nav-btn.next{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.q-nav-btn:disabled{opacity:0.3;cursor:not-allowed}

/* Result Screen */
#resultScreen{display:none;padding:40px 0 80px}
.r-header{text-align:center;padding:40px 20px 32px;position:relative;background:radial-gradient(ellipse at center top, color-mix(in srgb, var(--accent) 12%, transparent), transparent 70%)}
.r-label{font-size:11px;letter-spacing:4px;color:var(--text-muted);text-transform:uppercase;margin-bottom:16px}
.r-avatar{width:200px;height:200px;border-radius:50%;border:3px solid var(--accent);background:rgba(255,255,255,0.03);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px color-mix(in srgb, var(--accent) 20%, transparent);overflow:hidden}
.r-avatar img{width:100%;height:100%;object-fit:cover}
.r-avatar-letter{font-size:64px;font-family:'Noto Serif JP',serif;font-weight:700}
.r-name{font-family:'Noto Serif JP',serif;font-size:42px;font-weight:700;margin-bottom:8px;text-shadow:0 0 30px color-mix(in srgb, var(--accent) 25%, transparent)}
.r-code{font-size:14px;letter-spacing:2px;margin-bottom:20px;opacity:0.6}
.r-summary{font-size:15px;line-height:1.9;color:var(--text-muted);max-width:540px;margin:0 auto;padding:0 20px}

/* Score bars */
.score-section{padding:24px 20px}
.score-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.score-label{font-size:12px;width:28px;text-align:right;font-weight:700}
.score-bar-wrap{flex:1;height:14px;background:rgba(255,255,255,0.06);border-radius:7px;position:relative;overflow:hidden}
.score-bar-fill{position:absolute;height:100%;border-radius:7px;transition:width 1s ease,left 1s ease}
.score-bar-center{position:absolute;top:-2px;left:50%;width:2px;height:18px;background:rgba(255,255,255,0.3);border-radius:1px;transform:translateX(-50%);z-index:1}
.score-pct{font-size:11px;color:var(--text-muted);width:36px;text-align:right}
.score-label-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:-4px;margin-bottom:8px;padding-left:40px;padding-right:36px}

/* Cards */
.r-card{background:rgba(255,255,255,0.04);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid color-mix(in srgb, var(--accent) 12%, var(--card-border));border-left:4px solid color-mix(in srgb, var(--accent) 60%, transparent);border-radius:16px;margin:16px 20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.15)}
.r-card:nth-child(odd){border-left-color:color-mix(in srgb, var(--accent) 40%, transparent)}
.r-card-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;padding:20px 24px;display:flex;align-items:center;gap:10px;color:var(--accent);border-bottom:1px solid rgba(255,255,255,0.04)}
.r-card-title .card-emoji{font-size:22px}

/* Character & Great */
.r-persona{display:flex;gap:16px;padding:0 24px 20px}
.r-persona-item{flex:1;padding:16px;border-radius:12px;background:rgba(255,255,255,0.02);border:1px solid var(--card-border)}
.r-persona-label{font-size:11px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.r-persona-name{font-size:14px;font-weight:500}

/* Accordion */
.accordion-item{border-top:1px solid var(--card-border)}
.accordion-header{padding:16px 24px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:500;transition:background .2s;user-select:none}
.accordion-header:hover{background:rgba(255,255,255,0.02)}
.accordion-arrow{transition:transform .3s;font-size:12px;color:var(--text-muted)}
.accordion-header.open .accordion-arrow{transform:rotate(180deg)}
.accordion-body{display:none;padding:0 24px 20px;font-size:14px;line-height:2;color:var(--text-muted);white-space:pre-line}
.accordion-body.open{display:block}

/* Tabs */
.tab-bar{display:flex;gap:4px;padding:0 24px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--card-border);background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;transition:all .2s}
.tab-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(255,255,255,0.03)}
.tab-content{padding:0 24px 20px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.compat-item{padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.compat-item:last-child{border-bottom:none}
.compat-name{font-weight:700;font-size:14px;margin-bottom:4px}
.compat-code{font-size:12px;color:var(--text-muted)}
.compat-desc{font-size:13px;color:var(--text-muted);margin-top:4px;line-height:1.7}

/* Career */
.career-group{margin-bottom:16px}
.career-group-title{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.career-tags{display:flex;flex-wrap:wrap;gap:6px}

/* Tags */
.tag{display:inline-block;padding:6px 14px;border-radius:20px;font-size:13px;border:1px solid var(--card-border);background:rgba(255,255,255,0.02)}
.tag.green{border-color:rgba(16,185,129,0.4);color:#10b981;background:rgba(16,185,129,0.08);box-shadow:0 0 12px rgba(16,185,129,0.1)}
.tag.red{border-color:rgba(248,113,113,0.35);color:#f87171;background:rgba(248,113,113,0.08)}
.tag.blue{border-color:rgba(59,130,246,0.35);color:#3b82f6;background:rgba(59,130,246,0.08)}
.tag.purple{border-color:rgba(168,85,247,0.35);color:#a855f7;background:rgba(168,85,247,0.08)}
.tag.gold{border-color:rgba(245,158,11,0.4);color:#f59e0b;background:rgba(245,158,11,0.1);box-shadow:0 0 10px rgba(245,158,11,0.08)}
.tag.warn{border-color:rgba(190,60,50,0.25);color:rgba(220,90,80,0.85);background:rgba(190,60,50,0.06)}

/* Tips */
.tip-section{padding:0 24px 20px}
.tip-item{display:flex;gap:10px;padding:10px 14px;font-size:14px;line-height:1.7;color:var(--text-muted);border-radius:10px;margin-bottom:6px}
.tip-item.tip-do{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.12)}
.tip-item.tip-dont{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.12)}
.tip-icon{flex-shrink:0;font-size:16px}

/* Share */
.share-section{position:relative;overflow:hidden;border-radius:16px;background:linear-gradient(135deg,rgba(102,126,234,0.10),rgba(118,75,162,0.10));border:1px solid rgba(102,126,234,0.18);padding:28px 24px}
.share-section::before{content:'';position:absolute;top:-40%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,rgba(102,126,234,0.12),transparent 70%);pointer-events:none}
.share-heading{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
.share-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:20px}
.share-preview{background:rgba(0,0,0,0.25);border-radius:12px;padding:16px;margin-bottom:20px;display:flex;align-items:center;gap:14px;border:1px solid rgba(255,255,255,0.06)}
.share-preview-avatar{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
.share-preview-info{flex:1;min-width:0}
.share-preview-type{font-size:15px;font-weight:700;margin-bottom:2px}
.share-preview-code{font-size:11px;color:var(--text-muted);letter-spacing:1px}
.share-buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.share-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:12px;border:1px solid var(--card-border);background:var(--card);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .25s;text-decoration:none}
.share-btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.share-btn-icon{font-size:24px;line-height:1}
.share-btn.x{background:rgba(0,0,0,0.4);border-color:rgba(255,255,255,0.12)}
.share-btn.x:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.25)}
.share-btn.line{background:rgba(6,199,85,0.08);border-color:rgba(6,199,85,0.25);color:#06c755}
.share-btn.line:hover{background:rgba(6,199,85,0.15);border-color:rgba(6,199,85,0.4)}
.share-btn.copy{background:rgba(102,126,234,0.08);border-color:rgba(102,126,234,0.25);color:#667eea}
.share-btn.copy:hover{background:rgba(102,126,234,0.15);border-color:rgba(102,126,234,0.4)}
.share-toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(102,126,234,0.95);color:#fff;padding:12px 28px;border-radius:12px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:100;backdrop-filter:blur(8px)}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Restart */
.restart-wrap{text-align:center;padding:40px 20px}
.restart-btn{padding:14px 40px;border-radius:12px;border:1px solid var(--card-border);background:var(--card);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;cursor:pointer;transition:all .2s}
.restart-btn:hover{background:rgba(255,255,255,0.06)}

/* fadeInUp animation for result cards */
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 30px color-mix(in srgb, var(--accent) 15%, transparent)}50%{box-shadow:0 0 60px color-mix(in srgb, var(--accent) 30%, transparent)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.r-card{animation:fadeInUp .6s cubic-bezier(0.22,1,0.36,1) both}
.r-card:nth-child(2){animation-delay:.08s}
.r-card:nth-child(3){animation-delay:.16s}
.r-card:nth-child(4){animation-delay:.24s}
.r-card:nth-child(5){animation-delay:.32s}
.r-card:nth-child(6){animation-delay:.40s}
.r-card:nth-child(7){animation-delay:.48s}
.r-card:nth-child(8){animation-delay:.56s}
.r-card:nth-child(9){animation-delay:.64s}
.r-header{animation:fadeInUp .7s cubic-bezier(0.22,1,0.36,1) both}
.r-avatar{animation:scaleIn .6s cubic-bezier(0.22,1,0.36,1) .2s both;animation-name:scaleIn,glowPulse;animation-duration:.6s,3s;animation-delay:.2s,1s;animation-iteration-count:1,infinite;animation-fill-mode:both,none}
.r-name{animation:fadeInUp .5s ease .4s both}
.r-code{animation:fadeInUp .5s ease .5s both}
.type-badges{animation:fadeInUp .5s ease .55s both}
.r-summary{animation:fadeInUp .5s ease .6s both}

/* Question fade transition */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-card.fade-in{animation:fadeIn .3s ease both}

/* History panel */
.history-section{width:100%;max-width:400px;margin:24px auto 0;border-radius:16px;background:rgba(255,255,255,0.02);border:1px solid var(--card-border);overflow:hidden}
.history-title{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:700;padding:16px 20px;color:var(--text-muted);display:flex;align-items:center;gap:8px;cursor:pointer}
.history-list{padding:0 20px 16px}
.history-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--card-border);margin-bottom:8px;cursor:pointer;transition:all .2s}
.history-item:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.12)}
.history-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.history-info{flex:1;min-width:0}
.history-name{font-size:13px;font-weight:600}
.history-date{font-size:11px;color:var(--text-muted)}
.history-code{font-size:11px;color:var(--text-muted);white-space:nowrap}

/* PDF export button */
.export-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:12px;border:1px solid var(--card-border);background:rgba(255,255,255,0.03);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;cursor:pointer;transition:all .25s;margin:12px 0}
.export-btn:hover{background:rgba(255,255,255,0.07);transform:translateY(-1px)}
.export-btn .icon{font-size:18px}

/* Section divider shimmer */
.r-card + .r-card{margin-top:20px}

/* Team Diagnosis */
#teamScreen{display:none;min-height:100vh;padding:40px 20px}
.team-container{max-width:640px;margin:0 auto}
.team-title{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;text-align:center;margin-bottom:8px}
.team-sub{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:32px}
.team-members{margin-bottom:24px}
.team-member{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--card-border);border-radius:12px;margin-bottom:8px;animation:fadeInUp .3s ease both}
.team-member-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.team-member-info{flex:1;min-width:0}
.team-member-name{font-size:14px;font-weight:600}
.team-member-code{font-size:11px;color:var(--text-muted)}
.team-member-remove{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .2s}
.team-member-remove:hover{background:rgba(239,68,68,0.1);color:#f87171}
.team-add-area{border:2px dashed var(--card-border);border-radius:12px;padding:20px;text-align:center;margin-bottom:24px}
.team-add-area select{background:var(--card);color:var(--text);border:1px solid var(--card-border);border-radius:8px;padding:10px 16px;font-size:14px;font-family:'Noto Sans JP',sans-serif;width:100%;max-width:320px;margin-bottom:12px;cursor:pointer}
.team-add-area select option{background:#1a1e2e}
.team-add-btn{padding:10px 24px;border-radius:10px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:14px;cursor:pointer;transition:all .2s}
.team-add-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(102,126,234,0.3)}
.team-add-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.team-analyze-btn{display:block;width:100%;padding:16px;border-radius:12px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:24px}
.team-analyze-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(102,126,234,0.3)}
.team-analyze-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.team-result{margin-top:24px}
.team-chart-wrap{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:24px;margin-bottom:16px}
.team-chart-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;margin-bottom:16px;color:var(--accent)}
.team-axis-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.team-axis-label{font-size:11px;width:24px;font-weight:700;text-align:right}
.team-axis-bar{flex:1;height:24px;background:rgba(255,255,255,0.04);border-radius:12px;position:relative;overflow:hidden}
.team-axis-bar-inner{position:absolute;height:100%;border-radius:12px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.8);transition:width .8s ease}
.team-axis-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);padding:0 32px;margin-top:-6px;margin-bottom:8px}
.team-type-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.team-type-chip{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--card-border);background:var(--card)}
.team-insight{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:20px 24px;margin-bottom:16px}
.team-insight-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.team-insight-text{font-size:13px;color:var(--text-muted);line-height:1.8}
.team-back-btn{display:block;margin:24px auto;padding:12px 32px;border-radius:10px;border:1px solid var(--card-border);background:var(--card);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;cursor:pointer;transition:all .2s}
.team-back-btn:hover{background:rgba(255,255,255,0.06)}

/* Type badge chips */
.type-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:16px auto 20px;max-width:480px}
.type-badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:0.5px;border:1.5px solid var(--accent);color:var(--accent);background:rgba(255,255,255,0.03)}
.type-badge.axis-ei{border-color:rgba(99,102,241,0.6);color:#6366f1;background:rgba(99,102,241,0.08)}
.type-badge.axis-sn{border-color:rgba(139,92,246,0.6);color:#8b5cf6;background:rgba(139,92,246,0.08)}
.type-badge.axis-tf{border-color:rgba(236,72,153,0.6);color:#ec4899;background:rgba(236,72,153,0.08)}
.type-badge.axis-jp{border-color:rgba(245,158,11,0.6);color:#f59e0b;background:rgba(245,158,11,0.08)}
.type-badge.axis-og{border-color:rgba(16,185,129,0.6);color:#10b981;background:rgba(16,185,129,0.08)}
.type-badge.axis-db{border-color:rgba(6,182,212,0.6);color:#06b6d4;background:rgba(6,182,212,0.08)}
/* Compat dot */
.compat-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;vertical-align:middle;background:var(--accent);box-shadow:0 0 6px color-mix(in srgb, var(--accent) 40%, transparent)}

/* Prominent restart button for shared links */
.restart-btn.prominent{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;font-size:16px;padding:16px 48px}
.restart-btn.prominent:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(102,126,234,0.3)}

@media(max-width:400px){
  .q-scale-btn{width:38px;height:38px;font-size:13px}
  .r-name{font-size:32px}
  .r-avatar{width:140px;height:140px}
  .r-avatar img{width:100%;height:100%;object-fit:cover}
  .r-avatar-letter{font-size:48px}
  .r-persona{flex-direction:column}
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen">
  <div class="start-label">Work Style Personality Map</div>
  <div class="start-title">64タイプ<br>ワークスタイル診断</div>
  <div class="start-sub">MBTIの4軸に独自の2軸を加えた<br>6軸・64タイプの職場パーソナリティ診断</div>
  <button class="start-btn primary" onclick="startFull()">90問で診断する<br><span style="font-size:12px;opacity:0.7">所要時間：約10分</span></button>
  <button class="start-btn secondary" onclick="toggleMbtiSelect()">MBTIを知っている人はこちら<br><span style="font-size:12px;opacity:0.7">30問ショートカット（約4分）</span></button>
  <div class="mbti-grid" id="mbtiGrid"></div>
  <div class="start-note" id="mbtiNote" style="display:none">MBTIタイプを選んでください</div>
  <div style="margin-top:18px">
    <button class="start-btn secondary" onclick="showTeamScreen()" style="border-color:rgba(102,126,234,0.4);background:rgba(102,126,234,0.06)">
      👥 チーム診断<br><span style="font-size:12px;opacity:0.7">複数人の結果からチームバランスを可視化</span>
    </button>
  </div>
  <div id="historyPanel"></div>
</div>

<!-- TEAM SCREEN -->
<div id="teamScreen">
  <div class="team-container">
    <div class="team-title">チーム診断</div>
    <div class="team-sub">メンバーのタイプを追加して、チームのバランスを分析しましょう</div>
    <div class="team-members" id="teamMembers"></div>
    <div class="team-add-area">
      <select id="teamTypeSelect">
        <option value="">タイプを選択...</option>
      </select>
      <br>
      <button class="team-add-btn" onclick="addTeamMember()" id="teamAddBtn" disabled>+ メンバーを追加</button>
    </div>
    <button class="team-analyze-btn" onclick="analyzeTeam()" id="teamAnalyzeBtn" disabled>チームを分析する</button>
    <div class="team-result" id="teamResult"></div>
    <button class="team-back-btn" onclick="backFromTeam()">← スタートに戻る</button>
  </div>
</div>

<!-- QUESTION SCREEN -->
<div id="questionScreen">
  <div class="container">
    <div class="q-header">
      <div class="q-progress-wrap">
        <div class="q-progress-bar"><div class="q-progress-fill" id="progressFill"></div></div>
        <div class="q-count" id="qCount"></div>
      </div>
      <div class="q-axis-label" id="qAxisLabel"></div>
    </div>
    <div class="q-card">
      <div class="q-text" id="qText"></div>
      <div class="q-scale" id="qScale"></div>
      <div class="q-scale-labels"><span>全く当てはまらない</span><span>非常に当てはまる</span></div>
    </div>
    <div class="q-nav">
      <button class="q-nav-btn prev" id="prevBtn" onclick="prevQ()">← 戻る</button>
      <button class="q-nav-btn next" id="nextBtn" onclick="nextQ()">次へ →</button>
    </div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="resultScreen">
  <div class="container" id="resultContent"></div>
</div>

<script>
const PROFILES = {
"ENFP-O-Br":{name:"着火マン",character:"ルフィ（ONE PIECE）",great:"マルコ・ポーロ",color:"#E67E22",summary:"「あ、それ面白そう」が人生のエンジン。0→1が圧倒的に得意で、興味の幅が広く異分野の知識を組み合わせてアイデアを出す。人の気持ちに敏感でチームの空気を真っ先に察知する。",compatibility:{complement:[{code:"ISTJ-G-Dp",name:"金庫番",desc:"求道者の技術への深い探求心と、金庫番の厳格な品質管理が融合し、揺るぎない専門性と信頼性を生み出します。共同でシステム開発を行う際、求道者が高度な機能を実装し、金庫番がその安定性とセキュリティを徹底的に検証することで、完璧な製品を完成させます。"},{code:"ISTJ-G-Br",name:"組織の記憶庫",desc:"「着火マン」が提示する大胆な企画に対し、「組織の記憶庫」は過去の事例やデータに基づき実現性を分析します。プロジェクトの方向性を議論する際、異なる視点から堅実な意見を出し合い、計画の精度を高めます。"}],chemistry:[{code:"ENTJ-O-Dp",name:"将軍",desc:"将軍が組織全体の戦略を構築し、癒し職人が提供する質の高いケアをより多くの人に届ける仕組みを作ります。プロジェクト計画において、癒し職人の専門性を最大限に活かす場を整えます。"},{code:"ENTP-O-Br",name:"アイデアマン",desc:"新規事業の企画会議では、ENTP-G-Brが知識の引き出しから多様な情報を提示し、ENTP-O-Brがそれに触発されて次々と新しいアイデアを繰り出す。知識と発想が高速で応酬し、無限の可能性が広がる。"}],comfort:[{code:"ENFP-O-Dp",name:"伝道師",desc:"「着火マン」と「伝道師」は、情熱と興奮を共有し、お互いのアイデアに深く共感し合えます。休憩時間の雑談でも、熱いビジョンを語り合い、自然体でいられるため、心からリラックスできる関係です。"},{code:"ESFP-O-Br",name:"お祭り総隊長",desc:"職場イベントやカジュアルな場で、INTPはESFPがもたらす多様な人々の感情や反応、場の雰囲気を観察。これにより、理論だけでは見過ごしがちな人間行動のパターンや非言語情報に気づかされる。"}],catalyst:[{code:"ESTJ-G-Dp",name:"頑固職人",desc:"「着火マン」の大胆な提案に対し、「頑固職人」は経験に基づいた堅実な視点を提供します。これにより、プロジェクト計画の穴をなくし、多様な視点から物事を深く考察するきっかけを与え、視野を大きく広げます。"},{code:"ISTP-G-Dp",name:"専属オペレーター",desc:"求道者の深い専門性と専属オペレーターの静かで精密な技術が互いに理解し合い、言葉なくとも連携が可能です。共同で複雑な機械のメンテナンスを行う際、求道者が問題の根源を特定し、専属オペレーターが熟練した手つきで調整することで、完璧な連携を見せます。"}]},careers:{top:["新規事業開発","プロデューサー","コミュニティマネージャー"],good:["ブランドマーケティング","UXリサーチャー","組織開発"],surprise:["ソリューション営業","ファシリテーター"],avoid:["定型的な経理","品質検査・データ入力"]},strengths:["アイデア出し","企画の初期ドラフト","プレゼン","社外パートナーとの関係構築"],weaknesses:["定型フォーマット入力","数字の細かいチェック","長期間の単独作業","手順書の作成"],tips:{do:"今度、新しいプロジェクトを立ち上げたいんだけど、君の斬新な視点で何か面白いアイデアを一緒に考えてくれない？企画の初期段階から君にリードしてもらいたいんだ。チームの雰囲気を盛り上げるために、何かユニークなイベントを企画してほしいんだけど、どういうのが面白そうかな？君に一任するから、ぜひ自由に発想を広げてほしい。この業務、もっと楽しく効率的にできる方法がないかな？君のアイデアで変革を起こしてほしいんだけど、何か面白い改善策を提案してくれない？",dont:"この資料は、ここに記載されているフォーマットと手順通りに一字一句間違いなく作成して、毎日細かく進捗を報告してね。君の役割は、あくまでこのマニュアルに沿って業務を淡々とこなすことだから、独自のやり方や新しいアイデアは求められていないよ。提案してくれた企画は面白いけど、非現実的だから却下。とにかく現状維持で、決められた枠の中で動いてくれるかな？"},fullSections:[{title:"👤 この人はこんな人",content:"「あ、それ面白そう」が人生のエンジン。\n会話の中でふと出たアイデアに目を輝かせて、「それってさ、こういう風にもできない？」と勝手に広げ始める。本人に悪気はない。ただ、可能性が見えると黙っていられないだけだ。\n\n人といるとエネルギーが湧いてくるタイプで、一人で黙々と作業する日が続くとなんとなく元気がなくなる。ランチに誰かを誘うのはだいたいこの人だし、飲み会の「じゃあ次どこ行く？」もだいたいこの人が言い出す。でも意外と、仲の良い友達と二人でずっと喋っている夜も好きだったりする。大人数がいつも必要なわけじゃない。ただ、「誰かとつながっている感覚」がないとしんどい。\n\n仕事では「0→1」のフェーズが圧倒的に得意。何もないところから企画を立ち上げたり、まだ誰もやったことのないことに手を挙げたりする。「前例がない」と言われると、普通の人はひるむのに、この人はなぜかワクワクする。失敗してもあまり引きずらない。「まあ、やってみないとわからなかったし」と切り替えて次に行ける。\n\n一方で、物事を最後まできっちり詰めるのは正直しんどい。企画書の8割まではノリノリで書けるのに、残り2割の詳細を埋める段階で急に手が止まる。同じ作業の繰り返しや、決まったフォーマットへの入力作業をやっていると、だんだん魂が抜けていく感覚がある。\n\n興味の幅が広い。先月はキャンプにハマっていたのに、今月は急にコーヒーの焙煎を始めたりする。中途半端だと言われることもあるけど、本人としてはどれも本気だった。ただ、「もっと面白いもの」が現れると、そっちに吸い寄せられてしまう。この広い興味が仕事では意外な武器になっていて、全然違う分野の知識を組み合わせて「その発想はなかった」と言われるアイデアを出したりする。\n\n人の気持ちに敏感で、チームの空気が悪いと真っ先に気づく。でも「気づいちゃう」からこそ、自分が楽しくない環境にいるとすごく消耗する。誰かが不機嫌だと「自分のせいかな」と考えてしまうこともある。\n\n根底にあるのは「人生は一度きり、面白いことを全部やりたい」という感覚。それが仕事にもプライベートにも滲み出ている。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n「面白い」と思った瞬間に動き出す。タスクを受けたらまず人に話しに行く。「これってさ、こういう風にもできない？」と広げながら自分のテンションを上げていく。着手は早いが、計画を立てるよりまず手を動かす派。ゴールのイメージは直感的に持っているが、そこに至る道筋は走りながら考える。\n\n【進行フェーズ】\n複数のタスクを並行して進めるのが自然体。一つに集中し続けるより、切り替えながらやる方が調子が出る。途中で「もっといいやり方があるかも」と方向転換することが多い。進捗報告はざっくりしがちで、本人の中では進んでいても他の人から見えにくいことがある。\n\n【完了フェーズ】\n8割できたあたりで「だいたいOK」と思いがち。最後の詰め（細かい確認、ドキュメント整備、数値の検証）が最大の弱点。締切直前に集中力が爆発するタイプだが、できれば詰めの作業はISTJ型やDp型のメンバーに助けてもらうと品質が上がる。\n\n【1日の働き方】\n朝はゆっくりスタート、午前中に人と話してエンジンをかけ、午後にクリエイティブな仕事をするのがベスト。夕方以降に突然アイデアが降ってくることも多い。固定のルーティンよりも、日によってリズムが違う方がパフォーマンスが出る。"},{title:"🗣️ 会議での振る舞い",content:"会議の盛り上げ役。沈黙が続くと自分から口火を切る。ブレストでは誰よりもアイデアを出し、他の人の意見に「それいいね！」と乗っかってさらに広げる。場の空気が重いと感じたら、あえて軽い話題を挟んで和ませることも。\n\n一方で、議論が細部の詰めに入ると集中力が落ちる。議事録を取るのは苦手。長時間の報告型会議は体力的にきつい。\n\n【ベストな会議の使い方】\n・ブレスト・アイデア出しの場にはマスト\n・キックオフミーティングのファシリテーターとして最適\n・意思決定の会議では「選択肢を広げる役」として参加\n・詳細レビュー会議には必須でなければ参加不要にする方がお互い幸せ"},{title:"💬 チャットでの傾向",content:"メッセージ量が多い。思いついたらすぐ送る。絵文字・リアクションを多用し、他の人の投稿にもよくリアクションする。雑談チャンネルの常連。\n\nテキストは長めになりがちで、一つのメッセージに複数のトピックが混在することがある。スレッドを立てずに本文に返信しがち。既読は早いが、タスク依頼への返信は「了解！」だけで詳細の確認が漏れることがある。\n\n【周囲が知っておくと楽なこと】\n・重要な依頼はSlackだけでなく口頭でも確認する方が安全\n・「これ面白い！」のリアクションは「やります」の意味ではない\n・長文が来たら要点を聞き返してOK（本人も整理できて助かる）\n・深夜にアイデアメモが飛んでくることがあるが、返信は翌日で全然OK"},{title:"👔 上司として／部下として",content:"【上司として】\n自由にやらせてくれるリーダー。メンバーの強みを見つけるのが上手く、「〇〇さんってこれ得意だよね」と活かすポジションに配置する。ビジョンを熱く語り、チームのモチベーションを上げるのが得意。\n\n一方で、マイクロマネジメントは一切しない（できない）。進捗管理がゆるく、「任せてるから大丈夫でしょ」になりがち。評価の基準もフィーリングに寄ることがある。ISTJ型やG型のサブリーダーを置くとチームが安定する。\n\n【部下として】\n自由を与えてもらうと120%の力を発揮する。「好きにやっていいよ」が最高の褒め言葉。上司には友達のように接したいタイプで、フラットな関係性を好む。\n\n管理型の上司とは相性が悪い。細かく報告を求められたり、やり方を指定されるとモチベーションが急降下する。ただし「なぜそのルールがあるのか」を納得できれば従える。理由なきルールが最も苦手。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・新しいプロジェクトのキックオフ\n・「前例がないけどやってみよう」と言われたとき\n・自分のアイデアが採用されたとき\n・異なる分野の人と話して新しい発見があったとき\n・チームメンバーが自分の言葉で動いてくれたとき\n・複数のプロジェクトを横断して意外な繋がりを見つけたとき\n・「〇〇さんがいたから上手くいった」とフィードバックされたとき\n\n【📉 下がる瞬間】\n・同じ作業の繰り返しが続くとき\n・アイデアを出しても全部却下されるとき\n・理由の説明なくルールを押し付けられるとき\n・自由度のない環境に閉じ込められたとき\n・一つのことだけを延々とやらされるとき\n・チーム内の空気が悪く、誰も話さない状況\n・自分の貢献が見えない・認められないとき"},{title:"📝 フィードバック",content:"【受けるとき】\n感情で受け取る。ポジティブなフィードバックにはすごく素直に喜ぶ。ネガティブなフィードバックは最初感情的に落ち込むが、少し時間を置くと建設的に受け止められる。\n\n「まずここが良かった」→「ここをこうするともっと良くなる」の順番が鉄則。いきなりダメ出しから入ると心のシャッターが閉まる。具体的な改善アクションを一緒に考える形にすると前向きに動ける。\n\n【伝えるとき】\n基本的にポジティブなことを言うのが得意で、褒め上手。良いところに自然と目が行く。一方で、厳しいフィードバックを伝えるのは苦手で、遠回しになったり先延ばしにしがち。\n\n「嫌われたくない」が根底にあるため、言いにくいことを我慢して爆発するパターンに注意。定期的な1on1で小さいフィードバックを積み重ねる仕組みがあると助かる。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意（任せると輝くタスク）】\n・アイデア出し・ブレインストーミング\n・企画書の初期ドラフト作成\n・プレゼンテーション・ピッチ\n・社外パートナーとの関係構築\n・ワークショップのファシリテーション\n・新規プロジェクトの立ち上げ\n・部門横断の調整・コラボ推進\n・チームのムード改善・カルチャー作り\n\n【😰 苦手（できるけどエネルギーを消耗するタスク）】\n・定型フォーマットへの入力作業\n・数字の細かいチェック・校正\n・長期間の単独作業（レポート執筆など）\n・厳密な手順書の作成\n・予算管理・経費精算\n・同じ会議体の継続的な運営\n・過去データの整理・アーカイブ作業\n・一つのバグを延々とデバッグすること"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと気持ちよく動いてくれる】\n・「面白い企画があるんだけど、一緒に考えてくれない？」→ 巻き込まれるのが好き\n・「〇〇さんの得意分野だと思って」→ 頼られると燃える\n・「自由にやってOK、方向性だけ合わせよう」→ 裁量をもらえると本気を出す\n・「これ、他のチームにも展開したいんだけど」→ 影響範囲が広いほどやる気が出る\n・締切は「いつまでにお願い」と明確に伝える → 本人は楽観的に見積もるので\n・「まず30%の段階で一回見せて」→ 完璧を目指して抱え込むのを防げる\n\n【❌ こう頼むとパフォーマンスが落ちる】\n・「このフォーマット通りにやって」→ 自由度がないと窮屈に感じる\n・「細かく進捗報告して」→ 監視されている感覚になる\n・「前例通りにやればいいから」→ 新しさがないと退屈してしまう\n・「一人で全部仕上げて」→ 人と話せない環境は辛い\n・理由を説明せずに「とにかくやって」→ 納得しないと動けない\n・複数依頼を同時に投げて優先順位を示さない → 全部に手を出して中途半端になる\n\n【💡 取り扱いのコツまとめ】\n1. 最初に「Why」を共有する。目的に共感すると驚くほど動く\n2. 自由と裁量を渡す。ただし締切とチェックポイントは明確にする\n3. 一人にしない。壁打ち相手や協業メンバーをつける\n4. 得意なフェーズ（0→1の立ち上げ）に集中させ、苦手なフェーズは別の人に引き継ぐ\n5. こまめに「ありがとう」「いいね」を伝える。承認がエネルギー源\n6. 飽きてきたサインが見えたら、新しい角度や追加ミッションを振って鮮度を保つ"},{title:"🎯 適職マップ",content:"【🏆 天職レベル】\n・新規事業開発／事業企画 — 0→1を作りながら人を巻き込む。多趣味ゆえに異業種の知見を繋げられる\n・プロデューサー（メディア・イベント・コンテンツ） — 多方面のステークホルダーをまとめ、ビジョンを形にする\n・コミュニティマネージャー／DevRel — 外向×共感×攻めの三拍子で、コミュニティを活性化する天賦の才\n\n【⭐ かなり合う】\n・ブランドマーケティング／PR — ストーリーを描く力と人への感度\n・UXリサーチャー／サービスデザイナー — 共感力＋直感的な洞察力＋幅広い興味\n・組織開発／人事企画 — 攻めの姿勢で新しい制度や文化づくりを推進\n・スタートアップの共同創業者（COO/CMO） — カオスを楽しめる\n\n【💡 意外とハマる】\n・ソリューション営業（新規開拓） — 共感×攻め×話題の広さ\n・ファシリテーター／研修講師 — 場の空気を作る力と即興力\n・編集者 — 多方面の興味を企画に変換し、人を巻き込む\n\n【⚠️ 避けた方がいい】\n・定型的な経理・監査 — ルーティンと正確性の連続で消耗する\n・品質検査・データ入力 — エネルギーの源が断たれる\n・厳密な手順遵守の製造管理 — 自由度のなさがストレスに\n・一つの専門だけを10年深掘りする研究職 — Br（多趣味）との相性が悪い"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nISTJ-G-Dp「金庫番」 — 正反対だからこそ最強の補完関係。着火マンが広げたアイデアを金庫番が着実に形にする。お互いの弱点を完全にカバーし合える。ただし、最初は「なんでそんなに慎重なの？」「なんでそんなに適当なの？」と感じるかも。互いの価値を理解するまでの対話が鍵。\nISTJ-G-Br「組織の記憶庫」 — 幅広い知識という共通言語がある分、対話のハードルが低い。「こういう前例がある」と引き出す情報に、「じゃあそれを今風にアレンジしたら？」と返す。過去と未来を繋ぐペア。\n\n【🔥 化学反応が起きるコンビ】\nENTJ-O-Dp「将軍」 — ビジョンの方向が合えば、戦略×巻き込み力で大きなインパクト。着火マンがアイデアと人を集め、将軍が戦略と実行に落とし込む。スピード感が合うのでテンポよく進む。\nENTP-O-Br「アイデアマン」 — アイデアの応酬が止まらない。着火マンが「人」起点で発想し、アイデアマンが「仕組み」起点で発想する。二人が揃うと企画の幅が爆発的に広がる。ただし誰かが止めないと永遠にブレストが終わらない。\n\n【☀️ 居心地がいい仲間】\nENFP-O-Dp「伝道師」 — 同じENFP-Oベースで共感しやすい。ただしDp型なので一つのテーマへの熱量が深く、着火マンの多趣味さに「もっとこれ掘ろうよ」と引き留めてくれる存在。お互いの情熱を認め合える。\nESFP-O-Br「お祭り総隊長」 — 一緒にいると楽しさが2倍になる。フットワークの軽さが同じなので「今から行こう」が成立する稀有な相手。仕事でもイベント企画やチームビルディングで最強のタッグ。\n\n【⚡ 未知の触発者】\nESTJ-G-Dp「頑固職人」 — 自由vs規律の対立が起きやすい。「もっと柔軟にやろうよ」と言うと「ルールがあるから回ってるんだよ」と返される。ただし互いの視点を取り入れられると「自由だけど破綻しない」バランスの取れた成果が生まれる。\nISTP-G-Dp「専属オペレーター」 — 「広く浅く」と「狭く深く」が真っ向からぶつかる。でも、着火マンが見つけてきたテーマを専属オペレーターが職人技で仕上げると、とんでもないクオリティのものが生まれる。"},{title:"🌈 プライベートの顔",content:"休日の予定を聞くと、毎回違うことを言っている人。先週は「陶芸体験に行ってきた」、今週は「友達とフットサルした」、来週は「気になってたカレー屋に行く」。Googleカレンダーに「空白の日」が続くとソワソワして、とりあえず誰かに「今週末暇？」とLINEを送る。\n\n旅行は計画を立てる段階が一番テンションが上がるが、実際に行くと計画を無視して現地で見つけたものに飛びつく。「ここ行く予定じゃなかったけど、よくない？」が旅先での口癖。ガイドブックに載っていない路地裏の店を見つけると、自分の嗅覚を誇りに思う。\n\n友達は広く浅く…と見せかけて、実は一人ひとりとの関係をちゃんと大事にしている。久しぶりに会った相手にも「あの時こう言ってたよね」と覚えていて驚かれる。異業種の友達が多く、飲み会で「なんでこのメンツ？」と言われるような謎の人脈がある。\n\nSNSは見る専のつもりが、つい面白いものを見つけるとシェアしてしまう。ストーリーズの更新頻度が高め。「誰かに共有したい」という衝動が強い。\n\nお金の使い方は「体験」重視。物より経験にお金を使いたい。新しいレストラン、旅行、ワークショップ、イベント。「あの時行っておけばよかった」と後悔するのが一番嫌だから、迷ったら行く。その結果、月末に「あれ、今月なんでこんなに使ってるんだっけ」となることもしばしば。\n\n一人の時間も嫌いじゃない。ただ、一人の時間にやることが「次に人と会ったときに話すネタの仕込み」だったりするので、結局ベクトルは人に向いている。Netflixを見ていても「これ〇〇さんに勧めよう」と思いながら見ている自分に気づいて、ちょっと笑う。"}]},
"ENFP-O-Dp":{name:"伝道師",character:"ナルト（NARUTO）",great:"キング牧師",color:"#D35400",summary:"「これだけは絶対に伝えたい」という一つのテーマに人生を賭ける情熱家。一つのテーマに人生を賭けて人を動かす情熱家。一つの信念で人を動かす。",compatibility:{complement:[{code:"ISTJ-G-Br",name:"組織の記憶庫",desc:"「着火マン」が提示する大胆な企画に対し、「組織の記憶庫」は過去の事例やデータに基づき実現性を分析します。プロジェクトの方向性を議論する際、異なる視点から堅実な意見を出し合い、計画の精度を高めます。"},{code:"ISTJ-O-Dp",name:"任務遂行者",desc:"品質管理の現場で、ISTP-O-Dpが開発した精密な検査基準を、ISTJ-O-Dpが着実に運用し、寡黙ながらも高い精度で品質維持に貢献する。"}],chemistry:[{code:"ENFJ-O-Dp",name:"恩師",desc:"チームビルディングの場で、ENFJ-O-Dpが掲げる明確なビジョンや使命感が、ENTP-G-Brの膨大な知識に具体的な方向性と目的を与える。知識が単なる情報ではなく、人や組織を動かす力として触発される。"},{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"}],comfort:[{code:"ENFP-G-Dp",name:"共感屋",desc:"公正さに優しさの彩り。ルール適用時に、ENFP-G-Dpが個々の状況や感情への配慮を促すことで、より柔軟かつ人道的な判断を可能にします。人事評価基準の調整会議で、具体的な事例を基に議論が深まります。"},{code:"INFP-O-Dp",name:"理想主義者",desc:"共通の「真理」や「理想」について語り合うことで、互いの内なる情熱を深く理解し、増幅させます。ブレインストーミングでは、静かながらも熱い議論が生まれ、革新的な解決策に繋がります。"}],catalyst:[{code:"ESTP-O-Br",name:"トラブルシューター",desc:"予期せぬトラブル発生時、互いの冷静な状況分析力と卓越した現場対応力で、即座に問題の根源を特定し、迅速かつ的確に解決へ導く最強のタッグ。"},{code:"INTP-O-Br",name:"発明家",desc:"研究テーマについてチャットで議論する際、お互いの抽象的な発想や仮説をすんなり理解し合い、安心して思考を深められる。居心地の良い知的空間が広がる。"}]},careers:{top:["社会起業家","布教型マーケター","教育改革者"],good:["NPOリーダー","トレーナー・講師","クリエイティブディレクター"],surprise:["政治家","ドキュメンタリー制作"],avoid:["定型事務","価値観に合わない営業"]},strengths:["一つのテーマへの没入","人を巻き込む情熱","深い共感力","使命感"],weaknesses:["マルチタスク","事務処理","客観性","興味外の仕事"],tips:{do:"このプロジェクトを通して、私たちのビジョンを世界に広めてくれない？あなたの情熱がなければ、このメッセージは多くの人に届かないと思うんだ。;あなたが心から信じる『X』という価値観を、このチームで実現するにはどうすればいいと思う？ぜひあなたのリーダーシップで、みんなを巻き込んでほしい。;この新しい取り組みは、きっと社会に大きな変革をもたらすはずだ。その第一歩として、このコンセプトをみんなに伝える役割を担ってくれないか？あなたの言葉で、未来への扉を開いてほしい。",dont:"この資料作成やデータ入力、細かい事務作業もたくさんあるから、手伝ってくれない？どれも地味だけど、やらなきゃいけないんだ。;あの件もこの件も、手広くいろいろと関わって、様子を見てほしいんだけど。幅広く対応してくれると助かるな。;これはあくまでルーティンワークだから、深く考えずにマニュアル通りに淡々と進めてくれるだけで大丈夫だよ。特に情熱は必要ないから。"},fullSections:[{title:"👤 この人はこんな人",content:"「このビジョンに、自分の人生を賭けてみたい。」\n心の奥底に燃え盛る情熱の炎を宿す情熱家。心揺さぶられる一つのテーマに出会うと、他のことが霞んで見えなくなるほど没頭する。\n\n彼の原動力は、自身の信念と深く結びついた「これだけは譲れない」という揺るぎない確信だ。可能性や未来を見通す直感力に優れ、ただ面白いというだけでなく、それが本当に人や社会にとって価値があるのか、深く問いかける。そして、その答えが見つかると、彼の全エネルギーはその実現へと向かう。\n\n人との交流を通じてエネルギーを得る外向型であり、その情熱は周囲の人々の心を動かす。彼の話を聞いていると、いつの間にか「自分も何かできるはずだ」という気持ちにさせられる。チームの目標やプロジェクトの意義を熱く語ることで、メンバーの心を一つにまとめ上げる求心力を持つ。彼の言葉には、単なる情報共有以上の、人々の感情に訴えかける力がある。\n\nしかし、その熱意が時に空回りすることもある。信念と異なる意見には感情的に反発しやすく、一度スイッチが入ると周りが見えなくなることも。また、自身の興味のない定型業務や細かな事務処理には全く熱が入らず、後回しにしがちだ。「これって、本当に必要な作業なのかな…？」と疑問を抱き始めると、途端に集中力が途切れる。\n\n興味の対象は広く浅くではなく、一つの分野を徹底的に深掘りする。表面的な知識だけでなく、その根源にある思想や背景まで理解しようと努める。だからこそ、彼の言葉には重みがあり、一貫性が感じられる。その深い知識と信念が、彼の「伝道師」としての説得力の源だ。\n\n人間関係では、表面的な付き合いよりも、共通の価値観やビジョンを共有できる仲間との深い絆を求める。彼の情熱を理解し、共に歩んでくれる存在には、惜しみない愛情と信頼を注ぐ。彼にとって、仕事は単なる作業ではなく、自身の信念を形にし、世界を変えるための崇高なミッションそのものなのだ。\n\n根底にあるのは、「もっと良い未来を創りたい」「人々の心に火を灯したい」という強い願い。彼は決して現状維持を望まない。常に前へ、上へ、より良い方向へと変革を求め、そのための努力を惜しまない。彼の人生は、情熱と信念によって突き動かされる、壮大な旅のようなものだ。\n\n弱点は、情熱のあまり客観的な視点を見失うことがある点。感情に訴えかけるのは得意だが、論理的な裏付けやデータが不足することもある。また、一つのことに集中しすぎるあまり、他の重要なタスクを見落としたり、締め切りをうっかり忘れてしまうこともある。彼の情熱の火を絶やさず、同時に周囲とのバランスを取ることが、彼がさらに輝くための鍵となるだろう。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n自分の信念やビジョンと合致するテーマやプロジェクトには、文字通り火の玉となって飛び込む。アイデアを思いつくと、まずその熱い思いを周囲に語りかけ、共感者を募る。「ねえ、これ、めちゃくちゃ面白くない？！」と熱弁を振るい、チームの士気を一気に高める。計画を緻密に立てるよりも、まずは行動して試してみる「走りながら考える」タイプ。しかし、その根底には揺るぎない「なぜやるのか」という強い理由がある。\n\n【進行フェーズ】\n一度「これだ！」と決めたプロジェクトに対しては、驚くほどの集中力と粘り強さで取り組む。困難に直面しても簡単には諦めず、「この壁を乗り越えれば、もっと素晴らしい未来が待っている！」と自分と仲間を鼓舞し続ける。他のタスクが山積していても、自分が信じるプロジェクトを優先しがち。進捗報告は、自身の情熱やストーリーを交えながら語るため、具体的な数値やデータよりも、ビジョンの進捗を重視する傾向がある。\n\n【完了フェーズ】\nプロジェクトのゴール、つまり「ビジョンの実現」に向けては一切妥協しない。しかし、その過程での細かい事務処理やドキュメンテーション、数値の最終チェックといった作業は苦手だ。「本質は伝わったよね？」と思いがちで、最後の詰めの甘さが出ることがある。目標達成の感動を共有することに最大の価値を見出すため、完了後のプロセス改善や報告書の作成は、誰かに任せられると最も力を発発揮できる。\n\n【1日の働き方】\n朝から人と会ってアイデアを語り合ったり、インスピレーションを刺激される情報に触れることでエンジンがかかる。午後は、自分のビジョンに関連するテーマに深く没頭し、具体的なアウトプットを生み出すのが理想。夜には、その日の気づきや新たなアイデアを整理したり、さらに深く思考を巡らせる時間を持つ。常に新しい刺激と、自分の信念を深める時間を求めており、固定されたルーティンよりも、その日の情熱によって柔軟に働く方がパフォーマンスが高い。"},{title:"🗣️ 会議での振る舞い",content:"会議では、その場を鼓舞する情熱的なスピーカーとして活躍する。自分の信念やビジョンを熱く語り、参加者の心を揺さぶる。議論が停滞したり、目標を見失いそうになったりすると、「私たちは何のためにこの会議をしているんだっけ？！」と、本質的な問いを投げかけ、場の焦点を明確にする。彼の発言は、単なる意見ではなく、強い思いと信念が込められている。\n\nブレインストーミングでは、自身のテーマに沿ったアイデアを惜しみなく出し、他の参加者の発言にも「それ、すごく可能性を感じるね！」とポジティブに反応する。ただし、議論が細部の詰めや、自身の信念と異なる方向へ進みそうになると、途端に集中力が途切れるか、あるいは感情的に反論することもある。形式的な報告会や、魂の込められていない議論には退屈を感じ、内心では「早く本題に入りたい」と思っている。\n\n【ベストな会議の使い方】\n・ビジョン共有やキックオフミーティングのリード役\n・組織の課題解決に向けた啓蒙活動のプレゼンター\n・変革を促すワークショップのファシリテーターとして最適\n・議論が本質から逸れた際に軌道修正を促す触媒役\n・具体的な数字や形式的な報告が多い会議には、必須でなければ参加不要にする方がお互いにとって良い。"},{title:"💬 チャットでの傾向",content:"チャットでもその熱意は健在だ。メッセージ量は多く、特に「これだけは伝えたい！」というトピックがある時には、ついつい長文になってしまう。絵文字やリアクションを多用し、感情豊かにコミュニケーションを取る。他の人の投稿に対しても、共感や激励のリアクションを積極的に送る。\n\n雑談チャンネルでは、自身の興味関心のある特定のテーマについて熱く語ることで、新たな発見や仲間との出会いを期待する。テキストは長めになりがちで、一つのメッセージに自身の情熱と複数のトピックが混在することがある。既読は早いが、興味のないタスク依頼への返信は「了解！」だけで詳細の確認が漏れることもしばしば。深夜に突然、「今のアイデア、すごく良い気がする！」と熱いメッセージが飛んでくることも珍しくない。\n\n【周囲が知っておくと楽なこと】\n・重要な依頼は、彼の信念やビジョンと紐づけて口頭でも確認する方が安全\n・「これ面白い！」のリアクションは、「そのアイデア、すごく好き！」の意味であり、「やります」を意味しない\n・長文が来たら、要点を彼に聞いてもOK（本人も頭の中が整理できて助かる）\n・深夜のアイデアメモは、返信は翌日でまったく問題ない。むしろ彼にとっては閃きを記録する衝動なので、即座の反応は不要\n・彼の言葉の裏にある「Why（なぜ）」に耳を傾けることで、彼が本当に伝えたいことが理解できる。"},{title:"👔 上司として／部下として",content:"【上司として】\nチームに明確なビジョンと情熱を与えるリーダーだ。自身の信念を熱く語り、メンバー一人ひとりの心を動かし、共通の目標達成に向けて鼓舞する。メンバーの自主性を尊重し、「このビジョンのために、君の得意なことで自由にやってみてほしい」と、大きな裁量を与える。個々の強みを見つけて活かすのが得意で、チームを一つの情熱的なムーブメントに変える力がある。彼のリーダーシップの下では、メンバーは目的意識を持って意欲的に取り組めるだろう。\n\n一方で、ビジョンに沿わないことや、情熱を持てない業務には厳しい一面を見せることもある。進捗管理は「みんながビジョンを共有していれば大丈夫だろう」とややゆるくなりがち。細かいプロセスよりも、最終的なビジョンの達成を重視するため、細部の調整や数値的な進捗管理は、ISTJ型やG型のサブリーダーに任せることで、チーム全体の安定とパフォーマンスが向上する。\n\n【部下として】\n自分の信念と合致する仕事や、意義を感じるプロジェクトには、誰よりも情熱を燃やし、120%の力を発揮する。「このビジョンの実現のために、ぜひ君の力を貸してほしい」という言葉は、彼にとって最高の褒め言葉であり、モチベーションの源泉となる。上司とは、単なる指示命令の関係ではなく、共通のビジョンを追いかける「仲間」としてのフラットな関係性を好む。\n\n管理型の上司とは相性が悪い。細かく進捗報告を求められたり、自身の信念と異なるやり方を一方的に指定されたりすると、途端にモチベーションが急降下する。「なぜ、これをやる必要があるんですか？」という問いに納得できる答えがないと、心の火が消えてしまう。彼の情熱を理解し、その燃料を投下してくれる上司の下で最も輝く。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・自分のビジョンや信念が、多くの人に共感され、広がっていくとき\n・「前例はないけど、この挑戦、一緒にやってみよう！」と言われたとき\n・自身のアイデアや情熱が、チームや組織を大きく変えるきっかけになったとき\n・困難な状況に直面しても、それを乗り越えることで、より強い絆が生まれたとき\n・「あなたのおかげで、私も行動できた」と、人々の心を動かせたことを実感したとき\n・自分の貢献が、目に見える形で人や社会の役に立っていると実感できたとき\n\n【📉 下がる瞬間】\n・自分の信念やビジョンが、理由なく頭ごなしに否定されたとき\n・情熱を注いでいるテーマに対して、周囲の無関心や冷たい反応に直面したとき\n・目的や意義が見えない、退屈な定型作業の繰り返しが延々と続くとき\n・自由な発想や行動が許されず、厳格なルールやプロセスに縛り付けられたとき\n・自分の貢献が、単なる「作業」としてしか評価されないとき\n・組織内のしがらみや政治に巻き込まれ、本質的な活動ができないとき"},{title:"📝 フィードバック",content:"【受けるとき】\nフィードバックは感情で受け止める。ポジティブなフィードバック、特に自分のビジョンや情熱を評価されると、素直に喜び、さらにモチベーションが高まる。「あなたの言葉が、多くの人の心を動かしているよ」と言われると、涙が出るほど嬉しい。ネガティブなフィードバック、特に信念や価値観への批判は、深く傷つき、一時的に落ち込むこともあるが、少し時間を置けば、感情的な部分を乗り越え、建設的に受け止めようと努力する。「まず、この点は素晴らしかった。ここを改善することで、あなたのメッセージはさらに力強くなる」という、成長を促すような伝え方が最も響く。\n\n【伝えるとき】\n基本的に、相手の可能性を信じ、成長を後押ししたいという気持ちが強い。だから、ポジティブなフィードバックや激励の言葉を伝えるのが得意だ。厳しいフィードバックを伝えるのは苦手で、「嫌われたくない」という思いから、遠回しな表現になったり、感情的になりすぎたりすることがある。しかし、チームのビジョンや個人の成長にとって重要だと判断すれば、相手を思って情熱的に、時には厳しくも率直に伝えることができる。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・ビジョン策定・ミッション浸透：未来の姿を明確にし、その意義を熱く語る\n・プレゼンテーション・講演：自身の信念を言葉にし、人々の心を動かす\n・関係者への啓蒙・巻き込み：共感を生み出し、協力者を増やす\n・ワークショップ設計・ファシリテーション：参加者の内発的な動機を引き出す\n・新規プロジェクト立ち上げ（意義があるもの）：ゼロからビジョンを形にする\n・チームのモチベーション向上：情熱でチームを鼓舞し、一体感を醸成する\n・社会貢献活動・ボランティア企画：自身の信念に基づき、行動を起こす\n\n【😰 苦手】\n・定型フォーマットへの正確な入力：細部への集中力を持続させるのが難しい\n・数字の細かいチェック・分析：感情や直観を重視するため、客観的な数値分析は苦手\n・長期間の単独作業（目的が見えないもの）：人との交流や意義がないとモチベーションが続かない\n・手順書やマニュアルの作成：創造性が低い作業に苦痛を感じる\n・予算管理・経費精算：数字の管理や細かい事務作業は得意ではない\n・一つのバグを延々とデバッグ：地道で単調な作業は精神的にきつい\n・ルーティンワーク全般：変化や成長がないと飽きやすい"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「このビジョンを実現するために、君の情熱と力を貸してほしい」→使命感に燃える\n・「〇〇さんの〇〇（特定のテーマ）に対する深い知識と熱意が必要なんだ」→頼られると燃える\n・「方向性だけ共有するから、やり方は君に任せるよ。君の最高のやり方を見せてほしい」→裁量をもらえると本気を出す\n・「〇〇までに、まずはアイデアを形にしてくれる？一緒にディスカッションしよう」→彼の情熱を受け止め、対話の機会を作る\n・「このプロジェクトが、どう社会に貢献できるか、君の言葉で語ってほしい」→彼の真髄を引き出す\n\n【❌ パフォーマンスが落ちる】\n・「これはただの作業だから、言われた通りにやってくれればいい」→彼の情熱の火が消える\n・「細かく進捗報告して。進捗管理表に毎日記入するように」→監視されている感覚に陥り、窮屈さを感じる\n・理由を説明せずに「とにかくやって」→納得できないと、内発的な動機が失われる\n・「君の感情的な意見よりも、客観的なデータが必要だ」→彼自身の価値観を否定されたように感じる\n・「他のメンバーと同じようにやってくれ」→個性や情熱を抑えつけられると感じる\n\n【💡 コツ】\n1. 最初に「Why（なぜこの仕事をするのか、どのような未来を実現したいのか）」を情熱的に共有し、彼の信念と紐づける。\n2. 自由と裁量を渡し、彼の情熱を尊重する。ただし、最終的な目標と重要なチェックポイントは明確に伝える。\n3. 一人にしない。彼の熱い思いをぶつける壁打ち相手や、共にビジョンを追いかける仲間をつけることで、モチベーションを維持する。\n4. 彼が得意な「ビジョンを語り、人を巻き込む」フェーズに集中させ、苦手な「細かい詰めや事務作業」は他のメンバーと協力させるか、引き継ぐ。\n5. 彼が発する熱い言葉やアイデアに対して、「ありがとう」「それ、すごく共感できる！」「感動した！」など、こまめにポジティブなフィードバックを伝える。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・ソーシャルイノベーター：自身の信念に基づき、社会課題を解決する新たな仕組みを創り出す\n・NPO代表/活動家：特定の社会テーマに人生を賭け、人々にその重要性を訴え、行動を促す\n・ブランドアンバサダー：企業のビジョンや製品のストーリーを、自身の情熱を込めて世の中に伝える\n\n【⭐ かなり合う】\n・広報/PR担当（特に理念浸透）：組織のミッションやビジョンを社内外に伝え、共感を醸成する\n・教育者/メンター：生徒やメンバーの可能性を信じ、情熱を持って育成・指導する\n・組織開発コンサルタント：企業文化の変革や、チームのビジョン浸透を支援する\n\n【💡 意外とハマる】\n・ソリューション営業（課題解決型）：顧客の課題に深く共感し、最適な解決策を情熱的に提案する\n・イベントプロデューサー：特定のテーマやメッセージを伝えたいイベントを企画し、人々を巻き込む\n\n【⚠️ 避けた方がいい】\n・定型的な経理・監査業務：正確性とルーティンワークが中心で、彼の情熱が発揮されにくい\n・品質検査・データ入力：単調な作業が多く、創造性や人との交流が少ないため飽きやすい\n・システム保守・運用：安定稼働が最優先で、変革や新しい価値創造の機会が少ない"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nISTJ-G-Dp「金庫番」 — 伝道師の熱いビジョンと金庫番の揺るぎない実直さが合わさると、まさに鬼に金棒。伝道師が描く壮大な青写真を、金庫番が着実に形にし、細部まで完璧に仕上げてくれる。お互いの弱点を完全にカバーし合い、揺るぎないムーブメントを創り出す。\n\n【🔥 化学反応が起きるコンビ】\nENTJ-O-Dp「将軍」 — 共通のビジョンに向かって、伝道師の情熱と将軍の強力な戦略的思考が融合。感情と論理のバランスが取れ、圧倒的な推進力で目標を達成する。時に衝突することもあるが、それが互いの成長の糧となる。\nINFJ-G-Dp「共感者」 — 伝道師のビジョンに深く共感し、内面的な支えとなる存在。伝道師の情熱を理解し、精神的な面で深く繋がることができる。静かなる情熱と外向きの情熱が響き合い、深遠な価値を創造する。\n\n【☀️ 居心地がいい仲間】\nENFP-O-Br「着火マン」 — 同じENFPでO軸、情熱的な気質は共通。伝道師が深掘りしたテーマを着火マンが多角的に広げる。互いのアイデアに共感し、ポジティブなエネルギーを交換し合える居心地の良い関係だ。\nENFJ-O-Dp「導師」 — 伝道師の熱いメッセージを、導師が組織全体に浸透させる手助けをしてくれる。お互いの人に対する影響力が高く、共に人を動かす喜びに共感できる。\n\n【⚡ 未知の触発者】\nINTP-G-Dp「探究者」 — 伝道師の感情的な訴えに、探究者の鋭い論理的思考が新たな視点をもたらす。一見すると正反対だが、探究者がビジョンの本質的な問いを深掘りすることで、伝道師の信念がより強固になる。互いの存在が、思考と情熱の新たな融合を生み出す。\nESTJ-G-Dp「頑固職人」 — 真逆の価値観を持つがゆえに、互いの視野を広げる刺激的な存在。頑固職人の現実的で堅実な視点が、伝道師の理想を現実へと落とし込む手助けをする。最初は反発しあうが、互いの本質的な価値を理解することで、強固な信頼関係が生まれる。"},{title:"🌈 プライベートの顔",content:"休日は、彼にとって自身の情熱を深めるための大切な時間だ。特定のアートや社会問題、歴史など、彼の心をとらえた一つのテーマについて、徹底的に学び、体験することに時間を費やす。「この週末は、〇〇（特定の分野）のワークショップに参加してきたんだ！」とか、「最近、△△（特定の社会課題）について本を読み漁ってるんだけど、これが本当に興味深くて！」と目を輝かせて語り出す。\n\nGoogleカレンダーに空白の日が続くと、自身の情熱を注ぐ対象が見つからず、少しソワソワしてしまう。ただ遊ぶだけでなく、そこには常に「学び」や「探求」が伴っている。友人との集まりでも、つい自分の興味のあるテーマについて熱く語ってしまい、気づけば彼が独演会状態になっていることも。\n\n友達は、共通の価値観や信念を持つ人を深く大切にする。広く浅くというよりは、本当に心が通じ合う少数の友人と、深い関係を築くことを重視する。彼にとって友情とは、互いの人生を豊かにする、精神的な支えなのだ。異業種の友人との交流も好きだが、それは多様な視点から自身のテーマを深掘りしたいという探求心からくる。\n\nお金の使い方は、自身の信念や興味に紐づく「体験」や「学び」に惜しみなく投資するタイプ。「あのセミナーに参加すれば、このテーマについてもっと深く理解できるはずだ！」「この場所に行けば、新たなインスピレーションが得られるに違いない！」と、迷ったらすぐ行動する。物質的な所有よりも、精神的な豊かさを重視する傾向がある。彼のプライベートは、自身の信念を追求し、内面を豊かにするための旅のようなものだ。\n\n社会貢献活動やボランティアにも積極的に参加する。自分の能力や情熱が、誰かの役に立つことを心から喜び、それを自身の生きがいの一つとしている。彼は、仕事とプライベートの境界線が非常に曖昧だ。なぜなら、彼の人生そのものが、一つの大きな情熱と信念によって貫かれているからである。彼の日常は、常に「より良い未来」を創造するための試みで満たされている。"}]},
"ENFP-G-Br":{name:"ムードメーカー",character:"善逸（鬼滅の刃）",great:"ダイアナ妃",color:"#F0B27A",summary:"「みんなが楽しく過ごせるように」が行動原理。守り×広型で場の空気を温かくする天才。自分が目立つより周囲が笑顔になることが嬉しい。",compatibility:{complement:[{code:"ISTJ-O-Dp",name:"任務遂行者",desc:"品質管理の現場で、ISTP-O-Dpが開発した精密な検査基準を、ISTJ-O-Dpが着実に運用し、寡黙ながらも高い精度で品質維持に貢献する。"},{code:"INTJ-O-Dp",name:"ラスボス",desc:"難解な技術課題についてチャットで議論する際、ラスボスとINTPは互いの鋭い洞察をぶつけ合い、緻密な論理で構築された全く新しい解決策を生み出します。妥協なき知的探求が、組織に革新的な戦略をもたらすでしょう。"}],chemistry:[{code:"ESFJ-G-Br",name:"調和の達人",desc:"会議でINTPの専門的な発見が難解で周囲が戸惑う際、調和の達人がその意図を分かりやすく翻訳し、チームの理解と協力を促進します。探究の孤立を防ぎ、職場に円滑な空気をもたらします。"},{code:"INFP-G-Br",name:"やさしさ担当",desc:"プロジェクトで課題に直面した際、INFPの優しく深い共感力とISFPの穏やかな受容力が、互いの気持ちを尊重し合い、安心して相談できる関係性を築きます。"}],comfort:[{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"},{code:"ENFP-G-Dp",name:"共感屋",desc:"公正さに優しさの彩り。ルール適用時に、ENFP-G-Dpが個々の状況や感情への配慮を促すことで、より柔軟かつ人道的な判断を可能にします。人事評価基準の調整会議で、具体的な事例を基に議論が深まります。"}],catalyst:[{code:"ENTJ-O-Br",name:"総司令",desc:"互いに高度な戦略と実行力を評価し合う知的同盟関係。大規模プロジェクトの初期計画段階で、複雑な問題を瞬時に分解し、実現可能な戦略を構築する。"},{code:"ESTJ-O-Dp",name:"鬼教官",desc:"共通の目標達成への執念が、一点突破の強力な推進力となる。困難な目標に対し、具体的な行動計画と厳格な進捗管理で全軍を統率し、前線へ突進させる。"}]},careers:{top:["チームビルディング担当","カスタマーサクセス","社内コミュニケーション担当"],good:["イベント企画","カウンセラー","広報"],surprise:["保育関連","ホスピタリティ"],avoid:["厳格な監査","一人の長時間データ作業"]},strengths:["場の空気を温める","誰にでも優しい","チームの心理的安全性","気配り"],weaknesses:["厳しい判断","自己主張","対立の処理","一人作業"],tips:{do:"今回のイベント、みんなが笑顔になれるような企画を考えてくれない？ 君のアイデアでチームの雰囲気を最高に盛り上げたいんだ。新しいプロジェクト、メンバーのモチベーションを上げるためのユニークな方法を一緒に考えてみない？ 君のポジティブなエネルギーが必要なんだ。最近少し元気がないメンバーがいるみたいなんだ。休憩時間とか、雑談の時に、君の明るさで自然と場を和ませてあげてくれないかな？ みんな君に話しかけやすいと思うんだ。",dont:"もっと厳しく、論理的に、感情を挟まずにフィードバックしてくれない？ チームには規律が必要だ。この地味で単調な事務作業、君に任せてもいいかな？ 細かいミスがないか、黙々とチェックしてくれると助かる。君の意見は聞くけど、最終決定は私がするから。余計な議論は避けて、とにかく指示通りに動いてほしい。"},fullSections:[{title:"👤 この人はこんな人",content:"「みんなが楽しく過ごせるように」が、この人の行動原理だ。周囲の人の気持ちに寄り添い、どんな状況でも場を明るく温かい雰囲気にする天才。自分が目立つことよりも、周りの人が笑顔になることに最高の喜びを感じる。\n\nE（外向）らしく、人といるとエネルギーが湧いてくる。カフェで偶然会った同僚の隣に自然と座って雑談を始めたり、ランチに誰かを誘うのはだいたいこの人だったりする。「〇〇さん、最近元気ないかな？」「△△さんが今プロジェクトで大変そう」など、人の小さな変化にも敏感に気づき、そっと声をかける気配り上手だ。\n\nN（直観）の持ち主として、物事の可能性や未来を直感的に捉える。ただし「攻め」の着火マンのように新しいアイデアで変革を起こすというよりは、既存のチームやプロジェクト、関係性をより良いものにするための改善点や、みんながもっと楽しく働ける方法をひらめくのが得意だ。例えば、会議がマンネリ化していると感じたら、新しい進行役を提案したり、休憩時間にみんなで楽しめるミニゲームを企画したりする。\n\nF（感情）軸が示す通り、意思決定の基準は常に「人々の感情」や「調和」だ。論理よりも共感を重視し、誰かの意見が対立しそうになったら、間に立って双方の気持ちを汲み取ろうと努力する。チームのムードが悪くなることを何よりも避けたいと考えている。\n\nP（知覚）型なので、計画よりも柔軟性を好む。仕事でもプライベートでも、その場の状況やみんなの気分に合わせて臨機応変に対応する。完璧な計画を立てるよりも、まずは行動してみて、みんなの反応を見ながら調整していく方が合っている。\n\nG（守り）のスタンスは、この人の根底にある「安定」と「調和」への強い願いを表す。新しいものを生み出す「攻め」よりも、今ある良いものを守り、さらに育てることに力を注ぐ。チームの文化や人間関係を大切にし、変化を求める際も、必ず「みんなにとってどうか」という視点を持つ。既存のルールやプロセスを「みんながもっと快適に使えるように」と改善提案を行う。\n\nBr（多趣味）の軸を持つため、興味の幅は広い。映画、読書、スポーツ、料理、旅行など、様々な分野にアンテナを張っている。これらの幅広い知識は、単に個人の楽しみとしてだけでなく、チームの雑談ネタとして場を和ませたり、社内イベントの企画に活かしたりと、「みんなを笑顔にする」ために使われることが多い。常に「みんなが楽しめることは何だろう？」と考えている。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n「みんなのためになる」と感じた瞬間に動き出す。まず「これ、みんなでやったら面白くない？」と周囲に声をかけ、共感を得ることから始める。プロジェクトの目的や意義を共有し、チームメンバーのモチベーションを上げていくのが得意だ。計画をガチガチに固めるより、まずは「みんなでざっくり方向性を決めて、あとは走りながら考えよう！」というスタンス。ゴールのイメージは「みんなが笑顔で達成している姿」だ。\n\n【進行フェーズ】\nチームの進捗状況やメンバーのコンディションを常に気にかけている。問題が発生したら、まず「みんなはどう思ってる？」と意見を聞き、解決策を一緒に考えることを重視する。複数のタスクを並行して進めるのは得意だが、優先順位は「みんなの気分」や「場の空気」に左右されることもある。個々のメンバーに「大丈夫？」と声をかけたり、少し疲れている人には「無理しないでね」と気遣ったりと、サポート役を買って出ることも多い。\n\n【完了フェーズ】\n「みんなが納得して、気持ちよく終わる」ことを最も重視する。最終的な詰めの作業や細かい確認は苦手な方だが、「後工程の人が困らないように」「みんなのために」という気持ちで粘り強く取り組む。ドキュメント化や引き継ぎも、次に使う人のことを考えながら、分かりやすく丁寧にまとめようと努力する。完成度よりも、プロセスでの「みんなの満足度」を気にかける傾向がある。\n\n【1日の働き方】\n朝は軽い雑談からスタートし、午前中に人と話してエンジンをかけるのがベスト。午後は比較的集中できる作業をこなす。休憩時間には進んで雑談を始め、気分転換を図る。固定のルーティンよりも、日によってチームの状況やメンバーのニーズに応じた柔軟な働き方をする方がパフォーマンスが出る。終業間際に「明日も頑張ろうね！」と、みんなに声をかけるのも忘れない。"},{title:"🗣️ 会議での振る舞い",content:"会議のムードメーカーであり、潤滑油のような存在だ。議論が停滞したり、沈黙が続いたりすると、自分から口火を切ったり、軽いジョークを挟んで場の空気を和ませたりする。「みんな、なんか疲れてない？」と休憩を提案することもある。\n\nブレストでは、誰かのアイデアに「それ、面白いね！」とポジティブに反応し、さらに広げる手助けをする。発言が少ないメンバーには「〇〇さんはどう思いますか？」と優しく話を振り、意見を引き出そうと努める。意見が対立しそうなときには、間に立って調和を図ろうとするが、自分の意見を強く主張するのは苦手だ。\n\n一方で、議論が細部の詰めや厳密な数値確認に入ると、集中力が落ちる傾向にある。議事録作成は得意ではないが、みんなのためにと頑張って書き、終わった後に「これで大丈夫かな？」と誰かに確認を求めることが多い。長時間の報告型会議は体力的に消耗する。\n\n【ベストな会議の使い方】\n・チームビルディングや相互理解を深めるワークショップのファシリテーターとして最適\n・新規プロジェクトのキックオフで、メンバーの士気を高める役割\n・意見が対立しそうな場面での調停役\n・みんなの意見を吸い上げ、共通認識を醸成する場\n・詳細レビューや厳密な意思決定会議には、必要最低限の参加にとどめるのがお互いのため"},{title:"💬 チャットでの傾向",content:"メッセージ量は多めで、絵文字やリアクションを多用する。特に、ポジティブなリアクションでみんなの投稿を盛り上げるのが得意だ。「お疲れ様です！」「ありがとうございます！」「頑張りましょう！」など、チーム全体の士気を高めるようなメッセージを頻繁に送る。\n\nテキストは長めになりがちで、状況説明やメンバーへの気遣いの言葉が多く含まれる。「〇〇さんも大変かもしれませんが、一緒に頑張りましょうね！」といった、相手の気持ちに寄り添う表現が多い。既読は早いが、具体的なタスク依頼への返信は「承知しました！頑張ります！」のような前向きな返事が先行し、詳細の確認が漏れることもある。\n\n【周囲が知っておくと楽なこと】\n・重要な依頼はチャットだけでなく、口頭や会議でも補足説明するとより確実だ\n・「いいね！」「頑張ろう！」のリアクションは、共感や応援の意味が強く、「自分がやります」の意味ではないことが多い\n・長文で送られてきたら、要点を聞き返してOKだ（本人も頭の中が整理できて助かる）\n・深夜に「明日のランチ、みんなでどこ行く？」のような雑談メッセージが飛んでくることがあるが、返信は翌日で全然問題ない"},{title:"👔 上司として／部下として",content:"【上司として】\nメンバーの気持ちを汲み取り、共感を大切にするリーダーだ。チームの和を最優先し、メンバーの意見を尊重し、自由な発言を促すことを得意とする。「みんなで意見を出し合って、最高のチームを作ろう！」と、常にポジティブな言葉でチームを鼓舞する。目標設定は「みんなで一緒に達成しよう」という一体感を重視する。\n\n一方で、厳しい決断や人事評価は苦手な傾向がある。対立を避けるため、耳の痛い話やネガティブなフィードバックは後回しにしがちだ。個々の進捗管理も「任せてるから大丈夫だよね」と、ややゆるめになることが多い。チーム内にISTJ型やDp型のメンバーを置くと、細かい管理や厳密な実行面を補完し合い、バランスの取れたチーム運営ができるだろう。\n\n【部下として】\nチームの一員として貢献したい気持ちが非常に強く、上司や同僚からの「ありがとう」「助かったよ」といった感謝の言葉や、自分の貢献を認められることで最高のパフォーマンスを発揮する。「みんなのために頑張ろう！」という目的意識があると、どんな困難なタスクでも粘り強く取り組める。上司とは、フランクでオープンな関係性を好む。\n\n管理型の、細かく指示を出したり、報告を厳しく求めたりする上司とは相性が悪い。しかし、「着火マン」のように反発するのではなく、ストレスを抱え込んだり、モチベーションを低下させたりしがちだ。自分の意見が軽視されたり、感情を否定されたりすると、やる気を失ってしまう。自由に意見を言える環境と、共感的なコミュニケーションを求めている。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・チームメンバーが笑顔で生き生きと働いているのを見たとき\n・自分の働きで職場の雰囲気が良くなったと実感できたとき\n・「ありがとう」「助かったよ」と心からの感謝を伝えられたとき\n・みんなで協力してプロジェクトを成功させ、喜びを分かち合ったとき\n・意見が衝突していたメンバーが、自分の働きかけで仲良くなったとき\n・チームの成長や改善を実感でき、「もっと良くできる」と可能性を感じたとき\n・「あなたがいると助かるよ」と存在価値を認めてもらえたとき\n\n【📉 下がる瞬間】\n・職場の雰囲気がギスギスしていて、人間関係に亀裂が入っているとき\n・人間関係のトラブルに巻き込まれたり、板挟みになったりしたとき\n・自分の意見が軽視され、一方的に物事が進められるとき\n・感謝の気持ちや認められることが感じられない環境で働いているとき\n・対立や批判ばかりで、建設的な議論ができない会議が続いているとき\n・チームの目標が不明確で、何のために頑張っているか見えないとき\n・感情や共感を否定され、論理ばかりを求められるとき"},{title:"📝 フィードバック",content:"【受けるとき】\nENFP型らしく、フィードバックは感情で受け取る傾向がある。まず「話を聞いてくれてありがとう」と感謝を示し、ポジティブなFBには素直に喜ぶ。ネガティブなFBは、最初に感情的に落ち込むこともあるが、少し時間を置くと「みんなのためになるなら」と建設的に受け止めようと努力する。「まずここが良かった」→「ここをこうすると、みんながもっとハッピーになる」のように、ポジティブな側面から入り、改善点を「みんなにとって」という視点で伝えられると、よりスムーズに受け入れられる。\n\n【伝えるとき】\n基本的にポジティブなことを伝えるのが得意で、褒め上手だ。しかし、厳しいフィードバックや相手の心に踏み込むような内容は苦手で、遠回しになりがちだ。「相手を傷つけたくない」「嫌われたくない」という気持ちが根底にあるからだ。伝える際は、具体的な事例を挙げながら、相手の感情に配慮し、「あなたの成長がチームのためになる」という視点で話すと、相手も受け入れやすいと理解している。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・チームビルディングイベントの企画・運営：みんなが楽しめる企画を考え、実行するのが得意だ。\n・新メンバーのオンボーディングサポート：新しい仲間が安心してチームに溶け込めるよう、手厚くサポートする。\n・社内交流会・ランチ会企画：部署間の壁を越えた交流を促し、一体感を醸成する。\n・ポジティブな雰囲気作り：会議や休憩時間など、あらゆる場面で場のムードを明るくする。\n・メンバーの相談役：親身になって話を聞き、相手の気持ちに寄り添いながら一緒に解決策を考える。\n・既存プロセスの改善提案：みんなが働きやすくなるような、小さな改善策を見つけて提案する。\n・チーム内の情報共有促進：部署間の連携不足や情報格差を解消し、スムーズなコミュニケーションを促す。\n\n【😰 苦手】\n・厳しい進捗管理：メンバーを細かく管理したり、納期を厳しく指摘したりするのは心苦しい。\n・個人間の対立解決の仲裁：板挟みになるのは避けたい。できれば平和的に解決してほしいと願う。\n・ルール違反者への指導：厳しい口調で注意したり、一方的に叱責したりするのは苦手だ。\n・単独での数値分析・レポート作成：人と協力しない黙々とした作業はモチベーションが続きにくい。\n・機密性の高い人事評価：人の評価を数字や論理で判断するのは、感情的に難しい。\n・予算の厳格な執行管理：数字の細かいチェックや、規則に則った厳密な管理は苦手だ。\n・繰り返し行う単調な入力作業：集中力が途切れやすく、飽きてしまう。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「みんなが困ってるから、〇〇さんの力を貸してほしいんだ」→貢献意識や共感力を刺激され、積極的に動く。\n・「〇〇さんの共感力や調整力は、このプロジェクトに不可欠なんだ」→自分の強みを認められると、最大限の力を発揮する。\n・「〇〇さんがいてくれると、場が明るくなるから助かるよ」→存在価値を認める言葉でモチベーションが上がる。\n・「最終的なゴールは、関わるみんなが笑顔になることだよ」→具体的な目的と、それがもたらすポジティブな結果を共有する。\n・「まずはみんなで意見出しから始めようか」→チームで取り組む形を提示すると、安心して参加できる。\n・締切は「いつまでにお願い」と明確に伝えつつ、「みんなで協力すれば間に合うよ」とポジティブな声かけを添える。\n\n【❌ パフォーマンスが落ちる】\n・「とにかくこれをやって。理由は聞かなくていい」→目的が見えないと、何のために頑張っているか分からなくなりやる気を失う。\n・「〇〇さんだけが悪い」と個人を攻撃するような発言→チームの和を乱す言動は許せない。\n・「感情論は抜きにして、論理的に話して」→感情を否定されると、心を閉ざしてしまう。\n・「決まったことだから、黙って従え」と一方的に押し付けられる→納得感がないと、内心で反発を感じる。\n・「他の人に任せられないから、一人でやってほしい」→孤独な作業は苦手で、サポートがないと途中で投げ出しそうになる。\n\n【💡 コツ】\n1. 「Why」だけでなく「Whom」（誰のために）を共有する：その仕事が誰の喜びにつながるのかを明確に伝える。\n2. 感謝の言葉をこまめに伝える：「ありがとう」「助かったよ」といったポジティブなフィードバックが、この人の原動力となる。\n3. 対立や衝突を避けるための「セーフティネット」を用意する：対立が予想される場面では、第三者が調停役になるなど、事前に配慮する。\n4. チームメンバーとの連携を促す役割を与える：孤立させず、積極的に周囲と協働させることで、最も輝く。\n5. フィードバックはポジティブな側面から入り、改善点を柔らかく伝える：「みんなのため」という視点での伝え方が効果的だ。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・組織開発/人事企画：社員のエンゲージメント向上や働きがいのある組織づくりに情熱を燃やす。みんながもっと楽しく働ける環境を企画する。\n・チームリーダー/マネージャー：チームのパフォーマンスを上げつつ、メンバー一人ひとりのケアを重視。人間関係を円滑にし、和気あいあいとしたチームを作る。\n・社内コミュニケーション担当：社内の円滑な情報交換やイベント企画を通じて、部署間の壁をなくし、一体感を醸成する。\n\n【⭐ かなり合う】\n・カスタマーサクセス：顧客の満足度向上と長期的な関係構築をサポート。顧客の気持ちに寄り添い、信頼関係を築く。\n・広報：企業の魅力を社内外に伝え、ポジティブなイメージを醸成。人々の共感を得るストーリー作りが得意だ。\n・イベントプランナー（社内向け）：社員の交流を深めたり、モチベーションアップにつながるイベントを企画し、成功させる。\n\n【💡 意外とハマる】\n・教育・研修担当：受講生のモチベーションを引き出し、学びをサポート。共感的なアプローチで、受講者の成長を後押しする。\n・メンター/コーチ：相手の可能性を信じ、寄り添いながら目標達成まで伴走する。親身なサポートで信頼を得る。\n\n【⚠️ 避けた方がいい】\n・監査・コンプライアンス：厳しい規則の適用や違反指摘は、人の心を傷つける可能性があり、心的負担が大きい。\n・データ入力・事務処理（定型）：単調で繰り返し行う作業は退屈で、集中力が続かず、モチベーションも下がりやすい。\n・クレーム対応専門：ネガティブな感情に直接向き合い続けることは、精神的に大きく疲弊させてしまうだろう。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nISTJ-G-Dp「金庫番」：ムードメーカーが作り出す和やかな雰囲気の中で、金庫番が堅実に計画を実行し、安定した成果を生み出す。ムードメーカーが苦手な細部の詰めや厳密な管理を金庫番が補い、金庫番の硬さをムードメーカーが和らげる。お互いの弱点を完全にカバーし合える関係だ。\nESTJ-G-Dp「頑固職人」：頑固職人の明確な指示と実践力が、ムードメーカーが求める「みんなで進める安定」の土台となる。ムードメーカーは頑固職人の厳しさを和らげ、チーム全体の調和を保つことで、より生産的な環境を作り出す。\n\n【🔥 化学反応が起きるコンビ】\nENFJ-G-Dp「調停者」：共に人や組織の調和を重んじるタイプ。お互いの感情を深く理解し、協力してチームの士気を高め、より良い環境を作り出す。まるで親友のように信頼し合える関係だ。\nINFJ-G-Dp「相談役」：ムードメーカーの明るさで相談役の心を開かせ、相談役の深い洞察力がムードメーカーに新たな気づきを与える。お互いに心を開き、深い共感で結びつき、精神的な支えとなるだろう。\n\n【☀️ 居心地がいい仲間】\nENFP-G-Dp「伝道師」：同じENFP基盤とG軸で、共感と調和を重視する。互いに自然体でいられ、楽しい雰囲気の中でアイデアマッピングができる。共通の価値観を持つが、興味の方向性（広さか深さか）に違いがあるため、飽きずに刺激し合える。\nISFJ-G-Dp「縁の下」：ムードメーカーが場の空気を明るくする中で、縁の下の人が細やかな気配りでサポートする。お互いの献身性が心地よい関係を築き、言わずとも通じ合う安心感がある。\n\n【⚡ 未知の触発者】\nENTJ-O-Dp「将軍」：将軍の明確な目標達成志向と、ムードメーカーの人間中心のアプローチが交わることで、時に摩擦はあっても、最終的にはよりバランスの取れた成果を生み出す。ムードメーカーは将軍に「人の心」を思い出させ、将軍はムードメーカーに「効率性」を教える、互いに学びの多い関係だ。\nINTJ-O-Dp「戦略家」：戦略家の客観的で論理的な視点と、ムードメーカーの感情的で共感的な視点が混ざり合うことで、これまでになかった発想や解決策が生まれる可能性がある。最初は戸惑うこともあるが、異なる視点から物事を見ることで、視野が大きく広がるだろう。"},{title:"🌈 プライベートの顔",content:"休日の予定を聞くと、毎回違うことを言っていることが多い。「先週は友達と新しいカフェ巡りした！」「今週はみんなでボルダリングに挑戦するんだ！」といった具合だ。Googleカレンダーに空白の日が続くと、なんだかソワソワしてきて「誰か遊べる人いないかな？」と連絡を取り始める。\n\n友達は広く浅く…に見せかけて、実は一人ひとりとの関係性をちゃんと大事にしている。困っている友人がいれば、すぐに駆けつけて親身に話を聞くし、ちょっとしたお祝い事にはサプライズを企画することもある。多様なコミュニティに顔を出し、それぞれの場で愛されキャラとして親しまれている。\n\n多趣味（Br）なので、フットサル、料理教室、ボードゲームカフェ、陶芸体験など、様々なジャンルに手を出す。ただし、一人で黙々と取り組むよりは、誰かと一緒に体験することに価値を見出す。新しいことにチャレンジする時も、「これ、みんなでやったら楽しそうじゃない？」と声をかけるのが常だ。\n\nお金の使い方は「みんなで楽しい体験」を重視する。豪華なレストランでの食事や、友達との旅行、サプライズパーティーの企画など、みんなで思い出を作ることには惜しみなく投資するタイプだ。迷ったら「みんなが喜ぶ方」を選ぶ。\n\n家で過ごす時間は、好きな音楽を聴きながら読書をしたり、気になっていたドラマを一気見したりと、気分転換になることを選ぶ。しかし、一人でいる時間が長すぎると、少しずつ「なんか寂しいな」「誰かと話したいな」と感じ始める。友人との電話や、家族とのたわいない会話が、そんな時の最高の癒しとなる。\n\n常に「みんなの笑顔」を中心に考えて行動する、まさにプライベートでもムードメーカーな存在だ。"}]},
"ENFP-G-Dp":{name:"共感屋",character:"炭治郎（鬼滅の刃）",great:"アウンサンスーチー",color:"#EB984E",summary:"「あなたの気持ち、わかるよ」が自然に出る人。守り×深型で一人の人に深く寄り添う。静かだが温かい共感力で、この人と話すと不思議と楽になる。",compatibility:{complement:[{code:"ISTJ-O-Br",name:"ルール番人",desc:"作業効率を追求する中で、規律を重んじる番人が定める手順や品質基準を、彼の確かな技術力で実践する。お互いに信頼し、安心して業務に取り組める。"},{code:"INTJ-G-Br",name:"黒幕参謀",desc:"プロジェクトのリスク分析時、INTPが本質的な問いを深掘りし、黒幕参謀はそれに基づいて堅牢な戦略や予見的な解決策を構築する。静かに、しかし強力な同盟が生まれる。"}],chemistry:[{code:"INFJ-G-Dp",name:"カウンセラー",desc:"互いの内省的な思考や感情を安心して分かち合い、プロジェクトの精神的な側面を支え合います。困難な状況での個別面談は、心の負担を軽減し、前向きな解決策を見つける助けとなります。"},{code:"INFP-G-Dp",name:"詩人",desc:"互いに内省的で繊細な感性を持つため、言葉を多く交わさなくても深い理解が生まれます。静かな空間で、癒しの本質や美意識について語り合うことで、精神的な充足感を得られます。"}],comfort:[{code:"ENFP-G-Br",name:"ムードメーカー",desc:"プロジェクトで黙々と作業する任務遂行者に対し、ムードメーカーが休憩中に明るい話題を提供し、チームの雰囲気を和ませる。業務の効率とメンバーのモチベーション維持に貢献する。"},{code:"ENFP-O-Dp",name:"伝道師",desc:"「着火マン」と「伝道師」は、情熱と興奮を共有し、お互いのアイデアに深く共感し合えます。休憩時間の雑談でも、熱いビジョンを語り合い、自然体でいられるため、心からリラックスできる関係です。"}],catalyst:[{code:"ENTJ-O-Dp",name:"将軍",desc:"将軍が組織全体の戦略を構築し、癒し職人が提供する質の高いケアをより多くの人に届ける仕組みを作ります。プロジェクト計画において、癒し職人の専門性を最大限に活かす場を整えます。"},{code:"ESTP-O-Dp",name:"エース",desc:"エースの迅速な行動力と実行力が、癒し職人が温めていたアイデアを現実の形にするきっかけを与えます。新しい施術メニューの導入テストでは、エースの行動力が実験を加速させます。"}]},careers:{top:["臨床心理士","EAP（従業員支援）カウンセラー","コーチ"],good:["ソーシャルワーカー","パストラルケア","メンタリング担当"],surprise:["占い師","セラピスト"],avoid:["攻撃的な営業","ハイスピードのトレーディング"]},strengths:["深い共感","一人に寄り添う力","信頼構築","静かな温かさ"],weaknesses:["大人数対応","自己主張","ドライな判断","スピード"],tips:{do:"「〇〇さんが最近元気がなくて、一人で抱え込んでいるように見えるんだ。彼の話を聞いて、そっと寄り添ってあげてくれないかな？ 静かな場所でゆっくり話を聞いてあげてほしい。」「このプロジェクトで、一部メンバーが不安を感じているみたいで。特に〇〇さんは繊細だから、彼の気持ちを汲んで、安心できるような言葉をかけてあげてほしい。彼の気持ち、どう思う？」「先日クレーム対応したお客様が、まだ納得されていないようで。表面的な解決だけでなく、お客様の本当の心境を理解し、深く共感する視点から、次にどうアプローチすべきか、あなたの意見を聞かせてくれない？」",dont:"「この問題、多くの部署に影響があるから、全員の意見を広く集めて、それぞれに寄り添って対応してほしいんだ。できるだけ多くの人に話を聞いてくれない？」「今日の会議、全員が発言できるように、一人一人の意見を短時間でまとめて、共感的に受け止めてもらえない？時間はあまりないから手早くお願い。」「感情論は抜きにして、公平にこの問題を処理してほしい。個人の感情に深入りせず、客観的な事実に基づいて、効率よく全員を納得させてほしいんだけど、どうかな？」"},fullSections:[{title:"👤 この人はこんな人",content:"タイプ: ENFP-G-Dp「共感屋」（炭治郎 — 鬼と人の間で心を尽くす者）\nE（外向）- N（直観）- F（感情）- P（知覚）- G（守り）- Dp（一点深堀）\n\n「あなたの気持ち、わかるよ」が自然に出る人。相手の言葉の裏にある感情や本音を敏感に察知し、深く寄り添うことに喜びを見出す。特定の誰か、あるいはチーム全体が「安心して、幸せに」いられることを何よりも大切にする。その温かい共感力は、周りの人を不思議と癒し、前向きな気持ちにさせる力がある。\n\n人と関わることでエネルギーを得るが、その関わりは広く浅くではなく、一人ひとりとじっくり向き合うことで深まっていく。表面的なやり取りよりも、相手の深い話を聞き、その人自身を理解したいと強く願う。常にオープンで、相手が心を開いてくれるのを辛抱強く待つことができる。\n\n仕事においては、新しいものを次々と生み出すより、今ある関係性や仕組みを「もっと良くする」「より安定させる」ことに情熱を注ぐ。チーム内の人間関係を円滑にしたり、困っているメンバーをそっとサポートしたりするのが得意。目立たなくても、その存在が組織の心理的安全性を高める。\n\n一方で、自分の感情が大きく揺さぶられると、普段の冷静さを失ってしまうことがある。特に、誰かが不当な扱いを受けたり、チーム内の調和が乱れたりすると、強いストレスを感じる。人の痛みに感情移入しすぎて、自分自身が疲弊してしまうことも少なくない。\n\n興味の幅は広くないが、一度関心を持ったことや、特定の誰かの抱える問題にはとことん深堀りする。表面的な解決策ではなく、根底にある原因や感情的な側面まで探り、納得のいくまで考え抜こうとする。そのため、一つのことを極める専門家になることも多い。\n\n対人関係では、常に相手の気持ちを優先し、相手が話しやすい雰囲気を作るのが上手い。「なんかあった？」と声をかけ、相手の言葉にじっと耳を傾ける姿は、まるでカウンセラーのよう。ただ、感情を表現するのが得意な分、自分の感情をストレートに出しすぎてしまうこともある。\n\n根底には「全ての人には良い面があり、誰もが幸せになるべきだ」という強い信念がある。誰かの笑顔を見るためなら、どんな努力も惜しまない。争いを嫌い、調和と共感を重んじる、まさにチームやコミュニティの「心の支柱」となる存在だ。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n「誰かが困っている」「このチームがもっと良くなる」といった“守り”の動機があると、すぐに行動を開始する。新しいことをゼロから始めるより、既存の課題を改善したり、困っている人をサポートしたりすることに強い意欲を示す。まずは関係者に丁寧にヒアリングし、問題の本質や背景にある感情を理解しようと努める。計画を立てるよりも、目の前の相手に寄り添うことが優先だ。\n\n【進行フェーズ】\n一つのタスクにじっくりと時間をかけ、丁寧に進めるのが特徴。多くのタスクを並行して進めるのは得意ではなく、一つのことに集中することで最高のパフォーマンスを発揮する。途中で「もっと人の気持ちに寄り添ったやり方はないか」と立ち止まって考えることも多い。進捗報告は、単なる事実だけでなく、そこに至るまでの経緯や関係者の感情的な状況も織り交ぜて伝える傾向がある。\n\n【完了フェーズ】\n細部の確認やドキュメント整備、関係者への丁寧な引き継ぎまで、納得がいくまでやり遂げようとする。特に、自分が関わった結果が誰かの役に立つことを意識しているため、品質には徹底的にこだわる。完璧主義な面もあるため、最後の詰め込み作業に時間がかかってしまうこともある。一つひとつ丁寧に完了させていくプロセスに意味を見出す。\n\n【1日の働き方】\n安定したルーティンを好み、急な割り込みや変化は苦手だ。朝は今日のタスクや優先順位を整理し、午前中に集中力のいる作業に取り組むのがベスト。午後は関係者とのコミュニケーションや、じっくり考える必要がある仕事に時間を割くと良い。一人ひとりと落ち着いて話せる環境があれば、最高のパフォーマンスを発揮する。夕方以降も、気になっていることや誰かの困りごとについて考え続けてしまうことがある。"},{title:"🗣️ 会議での振る舞い",content:"会議では場の空気を敏感に察知し、発言しにくい人がいないか常に気を配っている。沈黙が続いたり、特定の意見に偏りそうな時は、「〇〇さんはどう思いますか？」と、優しくパスを出すことが多い。意見の対立が起こりそうな時には、それぞれの意見の背景にある意図や感情を丁寧に聞き取り、共通点や落とし所を探そうと努める。\n\nブレインストーミングでは、奇抜なアイデアを次々と出すより、提案されたアイデアが「誰にどのような影響を与えるか」「既存の仕組みとどう連携するか」といった、人間的な側面や実現可能性を考慮したコメントをすることが多い。場の調和を重んじるため、攻撃的な発言や感情的な議論は苦手で、精神的な負担が大きい。\n\n議事録は、発言内容だけでなく、その場の空気感や参加者の感情の動きもメモに残そうとする傾向がある。長時間の数字や論理中心の会議は、集中力が続きにくい。"},{title:"💬 チャットでの傾向",content:"メッセージは常に丁寧で、相手への配慮が感じられる言葉遣いをする。絵文字やリアクションも、相手の感情を読み取って適切に使いこなす。思いついたらすぐに送るが、内容を吟味してから送信するため、即レスではないことが多い。\n\n一つのメッセージが長文になることもあり、状況説明や背景にある感情、意図なども細かく伝えたがる。個人チャットで「最近どうですか？」と、相手の近況を気遣うメッセージをよく送る。\n\n【周囲が知っておくと楽なこと】\n・丁寧すぎる返信や「大丈夫です」の裏には、実は少し無理をしている可能性がある。\n・長文で感情を込めたメッセージが来たら、時間をかけて向き合ってあげるのが一番喜ばれる。\n・相手の近況を尋ねる雑談には、少し時間を割いて答えてあげると信頼関係が深まる。\n・すぐに返信が来なくても、内容をしっかり考えている証拠なので焦らないで待つのが吉。"},{title:"👔 上司として／部下として",content:"【上司として】\nメンバー一人ひとりの成長と幸福を一番に考える、温かく包容力のあるリーダーだ。個々の強みや特性を丁寧に見極め、安心して働けるポジションや役割を割り当てる。困っているメンバーには徹底的に寄り添い、個人的な相談にも親身になって耳を傾ける。目標達成だけでなく、「メンバーがどう成長できたか」「心理的に安定して働けているか」を重視する。厳しく叱ることが苦手で、どう伝えれば相手が傷つかずに成長できるか深く悩むことが多い。\n\n【部下として】\n信頼できる上司には深くコミットし、期待に応えようと努力する。チームや組織への貢献意欲が非常に高く、「誰かの役に立ちたい」という気持ちが原動力になる。上司からの丁寧なフィードバックや承認の言葉を特に喜び、それがモチベーションに直結する。指示は具体的である方が安心して業務に取り組める。上司との関係性は、仕事仲間というよりは、信頼できる相談相手のように感じたいタイプだ。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・誰かの悩みや課題を解決し、感謝されたとき\n・チームメンバーが自分のサポートで成長している実感を得られたとき\n・信頼している人やチームから「〇〇さんが必要だ」と頼られたとき\n・自分が関わったプロジェクトやサービスが安定稼働し、多くの人に貢献していると実感できたとき\n・価値観が合う仲間と、深い議論や対話ができたとき\n・チーム内の人間関係が良好で、安心して働ける環境だと感じたとき\n\n【📉 下がる瞬間】\n・チーム内の不和や人間関係が悪化し、調和が乱れたとき\n・人の感情や倫理を無視した決定がされたとき\n・短期的な成果や競争だけを求められるとき\n・自分の貢献が目に見えなかったり、認められなかったりするとき\n・急な変化や不確実性の高い状況に置かれ、心が不安定になったとき\n・表面的な付き合いしかできず、深い関係性を築けないとき"},{title:"📝 フィードバック",content:"【受けるとき】\nフィードバックは感情で受け止めるため、伝え方が非常に重要だ。まずポジティブな点や努力を認められた上で、改善点も具体的かつ丁寧な言葉で説明されると、真摯に受け止め深く反省し、次へと活かそうと努める。一方、抽象的で批判的な言葉はストレートに受け止めすぎてしまい、深く落ち込んでしまうことがある。「まずは良い点、次に改善点、最後に期待」のサンドイッチ型が鉄則だ。\n\n【伝えるとき】\n相手の気持ちを慮り、言葉を非常に慎重に選ぶ。直接的な批判や厳しい指摘は苦手で、遠回しになったり、良い点をたくさん伝えてから少しだけ改善点を提示したりすることが多い。「嫌われたくない」「相手を傷つけたくない」という気持ちが根底にあるため、どう伝えれば相手が前向きに受け止めてくれるか、じっくりと考える。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・人間関係の調整：チーム内の潤滑油となり、調和を生み出す\n・長期的な顧客サポート：信頼関係を築き、顧客の課題に深く寄り添う\n・メンタリング/コーチング：相手の強みを見つけ、成長をサポートする\n・チームビルディング：心理的安全性の高い、居心地の良いチーム作り\n・課題ヒアリング：表面的な問題だけでなく、本質的な困りごとを察知する\n・既存サービスの改善提案：ユーザーの声を元に、より使いやすく安定させる\n・関係者の合意形成：異なる意見をまとめ、みんなが納得できる着地点を見つける\n\n【😰 苦手】\n・新規事業の立ち上げ：ゼロから市場を切り拓く開拓フェーズは不得意\n・大規模なプレゼン：不特定多数を相手にする場面では緊張しがち\n・競合分析/市場競争戦略：誰かと争うことや、相手を出し抜くことへの苦手意識\n・数字を伴う厳密な予算管理：人の感情と直接結びつかないため、関心が薄い\n・急な方向転換や計画変更への対応：安定志向のため、変化への適応に時間がかかる\n・論理のみでの意思決定：感情や倫理的な側面を無視した判断は受け入れがたい\n・タスクの優先順位付け：全てのタスクを丁寧にやりたいという気持ちが強く、絞り込みが難しい"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「〇〇さん、少し困っていることがあるんですが、相談に乗ってもらえませんか？」→頼られると喜んで力を貸してくれる。\n・「あなたの共感力と丁寧さが必要なんです」→自身の強みが活かせると感じると、モチベーションが上がる。\n・「このチームのために、〇〇さんの力が必要なんです」→チームへの貢献意識が高いので、喜んで引き受ける。\n・「じっくり取り組んでほしいので、期限は少し長めに設定しますね」→焦らず丁寧に作業できる環境が、最高のパフォーマンスを引き出す。\n・「まずは現状を教えてください、何が一番困っていますか？」→ヒアリングから入ると、深く入り込みやすい。\n\n【❌ パフォーマンスが落ちる】\n・「とにかく早くやって、詳細はいらないから」→雑な仕事はしたくないため、不満が募る。\n・「これはあなたの担当だから」と冷たく突き放す→孤立感を感じ、責任感からくるプレッシャーで疲弊する。\n・「競合に勝つために、もっと攻めてほしい」→競争的な環境や攻撃的な指示は苦手。\n・感情を無視した、ロジック一辺倒の指示→納得感が得られず、行動に移しにくい。\n\n【💡 コツ】\n1.「Why」（なぜそれをするのか）と「誰のためか」を丁寧に説明し、共感を呼ぶ。\n2.プロセスを重視し、焦らせない。進捗を確認する際も、相手の感情に配慮する。\n3.精神的なサポートや共感を惜しまない。話を聞いてあげるだけでも大きな支えになる。\n4.具体的な貢献や努力に対して、「ありがとう」「助かりました」と感謝の言葉を伝える。\n5.チームや既存の枠組みをより良くするための役割や、誰かの成長をサポートする役割を与える。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・カウンセラー/コーチ：個人の問題に深く寄り添い、心の内面から解決を支援する\n・人事/組織開発：従業員のメンタルケアや、心理的安全性の高い働きやすい環境作りを担う\n・カスタマーサクセス：顧客の課題解決を長期的にサポートし、深い信頼関係を築く\n\n【⭐ かなり合う】\n・社内研修講師：受講者の感情に寄り添い、理解度に合わせて丁寧に指導する\n・NPO/社会貢献活動：特定の社会課題に深くコミットし、人々を支える活動\n・品質管理/サービス改善：既存の製品やサービスの品質を安定させ、より良くしていく\n\n【💡 意外とハマる】\n・図書館司書：特定の情報に深く精通し、利用者のニーズに寄り添って最適な情報を提供する\n・学校の先生（特に担任）：生徒一人ひとりに深く向き合い、心の成長を支える役割\n\n【⚠️ 避けた方がいい】\n・投資銀行/M&Aコンサル：競争が激しく、短期的な成果と数字が全ての世界はストレスが大きい\n・スタートアップの新規事業責任者：0→1の開拓、不確実性、速い変化が常に求められる環境は苦手\n・営業（特にゴリゴリの新規開拓）：競争と断られることへの精神的な負荷が大きい"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\n・ISTJ-O-Dp「開拓職人」 — 共感屋が築いた信頼関係を元に、開拓職人が着実に成果を出し、その成果をさらに共感屋が守り育てる。お互いの弱点を完全に補完し合える。\n・ESTJ-O-J「統率者」 — 共感屋の持つ人の気持ちを察する温かさと、統率者の論理的思考とリーダーシップが結びつくことで、人間的な視点も考慮した強い組織を構築できる。\n\n【🔥 化学反応が起きるコンビ】\n・INFP-G-Dp「賢者」 — 共に内向的な思考と一点深掘りの特性を持ち、深い対話を通じて、共感屋が持つ感情的な洞察を賢者が理論的に深掘りする。お互いの内面世界を理解し合い、独自の価値観に基づいた深い共創が生まれる。\n・INFJ-G-Dp「守護者」 — 共に人の心に深く寄り添い、チームや組織の安定と成長を願う。共感屋の柔軟な受容力と守護者の強い信念が、揺るぎない安心感と前進を生み出す。\n\n【☀️ 居心地がいい仲間】\n・ENFJ-G-Br「世話焼き」 — どちらも他者の幸福を願い、チームの調和を大切にする点で共通する。世話焼きの活発さと共感屋の丁寧さが、お互いを尊重し合う心地よい関係性を築く。\n・ISFP-G-Dp「芸術家」 — 静かで控えめながら、内側に豊かな感情と特定の美意識を持つ芸術家と、それに深く共感し理解しようとする共感屋。言葉が少なくても心が通じ合う。\n\n【⚡ 未知の触発者】\n・ENTP-O-Br「アイデアマン」 — 共感屋の安定志向に対し、アイデアマンは常に新しい可能性を追求し、議論を活発にする。その新鮮な視点と挑戦的な姿勢が、共感屋に刺激を与える。\n・ESTP-O-Br「トラブルシューター」 — 実践的で行動力のあるトラブルシューターは、共感屋の慎重さにないスピード感と決断力を持つ。予測不能な展開が共感屋の視野を広げ、新たな視点をもたらす。"},{title:"🌈 プライベートの顔",content:"休日は、気の置けない友人や家族とじっくり過ごすことが多い。一人で過ごす時間も大切にするが、それは内省を深めたり、特定のテーマについて深く考えたりするための時間だ。誰かの相談に乗ったり、心を通わせる会話をしたりすることで、心の充足感を得る。\n\n特定の趣味を深く掘り下げる「一点深堀」が特徴だ。例えば、特定の歴史分野の研究、こだわりの手料理作り、あるいは特定のアーティストの作品を徹底的に分析するなど。興味を持ったことにはとことん没頭し、その世界を極めようとする。多趣味で次々と新しいことに手を出すタイプではないが、一度ハマると飽きずに長く続ける。\n\n友人関係では、広く浅くよりも、心を許せる数少ない友人と深い関係を築くことを好む。「最近どう？」と定期的に連絡を取り、相手の近況を気遣う。大切な友人や家族が困っていたら、どんなに忙しくても駆けつけようとするだろう。そのため、友人からは「いつも話を聞いてくれる人」「いざという時に頼りになる人」と信頼されている。\n\nお金の使い方は「体験」よりも「深い学び」や「大切な人との時間」を重視する傾向がある。趣味の専門書や、友人とゆっくり語り合える場所での飲食代には惜しまない。衝動買いは少なく、よく考えてから購入する。\n\nSNSでは、自分の日常を大々的に発信するよりも、友人や特定のコミュニティの投稿に丁寧なコメントを残したり、共感する内容に「いいね」を押したりすることが多い。誰かの頑張りを応援したり、素敵な出来事に感動を共有したりすることで、心の繋がりを深める。\n\n根底には、誰かのためになりたいという強い奉仕の精神がある。「〇〇さんのためなら」と、困っている人への協力は惜しまない。普段は穏やかだが、大切な人や信念が脅かされた時には、強い情熱と行動力を発揮することもあるだろう。"}]},
"ENTP-O-Br":{name:"アイデアマン",character:"五条悟（呪術廻戦）",great:"エジソン",color:"#5DADE2",summary:"「それ、もっと面白くできない？」が口癖。既存の仕組みを分解して再構築するのが大好き。知的好奇心の塊で議論が大好物。",compatibility:{complement:[{code:"ISFJ-G-Dp",name:"守り神",desc:"守り神の細やかな気配りと癒し職人の静かな寄り添いが組み合わさり、お客様に最高の安心感を提供します。顧客対応では、互いに補完し合い、深い信頼関係を築くことができます。"},{code:"ISFJ-G-Br",name:"屋台骨",desc:"既存業務プロセスの見直し会議で、ISFJ同士は現状の課題を共有し、既存の良さを残しつつ地道な改善を提案する際、互いに意見に深く共感し合い、居心地の良い関係を築きます。"}],chemistry:[{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"},{code:"INTJ-O-Br",name:"軍師",desc:"INTP-O-Brの多角的な知識と軍師の戦略的思考が融合し、複雑な課題に対する包括的なロードマップが描かれます。企業戦略の策定プロジェクトで深い洞察を共有します。"}],comfort:[{code:"ENTP-O-Dp",name:"常識クラッシャー",desc:"既存プロセスの見直し会議では、ENTP-G-Brが現状の背景知識を提供する一方で、ENTP-O-Dpが常識にとらわれない大胆な提案で既成概念を打ち破る。知的好奇心を刺激し合い、自由な議論が交わされる居心地の良い関係。"},{code:"ENTP-G-Br",name:"歩く百科事典",desc:"プロジェクトでISFJ-O-Dpが深くコミットする中、ENTP-G-Brが多角的な知識で具体的な改善案を提示。二人の連携で献身が最適な形で実を結び、チームの成果を最大化します。"}],catalyst:[{code:"ISFP-G-Dp",name:"癒し職人",desc:"ストレスの多いプロジェクトの休憩時間、ISFJとISFPは静かにカフェで過ごし、お互いの存在が自然な癒しとなり、穏やかな気持ちでリフレッシュできる居心地の良い関係です。"},{code:"ESFJ-G-Dp",name:"ベテラン寮長",desc:"新入社員の歓迎会を企画する際、ESFJが全体をまとめ、ISFJが細かい準備や配慮を担うことで、参加者全員が心から楽しめる温かい場を作り上げ、ケアの心が一致します。"}]},careers:{top:["戦略コンサルタント","起業家","R&Dディレクター"],good:["プロダクトマネージャー","弁護士","テクニカルアーキテクト"],surprise:["お笑い脚本家","ディベートコーチ"],avoid:["定型的なルーティン事務","感情ケア中心の仕事"]},strengths:["議論・ディベート","仕組みの分析と再構築","知的好奇心","多角的な問題解決"],weaknesses:["感情面のケア","完遂","ルーティン","空気を読む"],tips:{do:"「この問題、根本から原因を解明して、全く新しい解決策を構築してほしいんだけど、どう思う？」。既存のプロセスをゼロベースで見直して、誰も思いつかないような革新的な方法を提案してくれない？。この複雑な課題を、もっとシンプルで面白い仕組みにできないか、一緒に議論してくれないかな？",dont:"「この資料、過去のフォーマット通りに作成してくれない？」。いつものやり方でお願いね。変に弄らなくて大丈夫だから。特に改善点はないから、ルーティン作業として淡々とこなしてほしいんだけど。"},fullSections:[{title:"👤 この人はこんな人",content:"「それ、もっと面白くできない？」が人生のテーマ。既存の枠組みや常識に疑問を投げかけ、常に新しい可能性を探求する。目の前の課題を解決するだけでなく、「そもそもこの課題は何から生まれているのか？」と本質的な問いを立て、誰も思いつかないような独創的なアイデアを閃く。0→1の概念構築や変革をリードするのが得意だ。\n\n知的好奇心が尽きない。世界は自分にとって巨大なパズルであり、その仕組みを理解し、再構築することに喜びを感じる。議論こそ最高の思考ツールであり、人と意見を交わすことで自身の思考を研ぎ澄まし、新しい視点や仮説を発見する。カフェで延々と友達と抽象的な概念について語り合ったり、複雑なシステムについて熱弁を振るうのは日常茶飯事だ。\n\n仕事では、ロジックと創造性を武器に、型破りなアプローチで問題を解決する。現状維持は退屈でしかなく、「このプロセス、もっと合理的にできない？」「このサービス、もっとユーザーにとって刺激的にできない？」と、常に改善や変革の種を探している。複雑な情報の中から本質を見抜き、全く異なる分野の知識を組み合わせて、誰もが納得するような大胆な解決策を提示する。\n\n一方で、ルーティンワークや細部の詰めに膨大なエネルギーを消費する。一度構築した仕組みを運用したり、感情的な対話を通じてチームをまとめたりするのは苦手意識がある。完成度よりもプロトタイプの速さを重視しがちで、8割できた時点で「残りの2割は本質的じゃないから、誰か他の人に任せても大丈夫」と考えやすい。\n\n興味の幅はとてつもなく広い。最新のAI技術から哲学、歴史、宇宙論、サブカルチャーまで、常にアンテナを張り巡らせている。一つを深く極めるよりも、様々な分野の知識を浅く広く取り入れ、それらを頭の中で自由に接続することで、誰も思いつかないようなアイデアを生み出す。例えば、「ブロックチェーン技術って、〇〇の歴史的背景と組み合わせるとこんなサービスにならない？」といった発想は日常的だ。\n\n人間関係においては、感情的な側面よりも知的な刺激を求める。本音で建設的な議論ができる相手を高く評価し、時には「それは論理的じゃないよ」と遠慮なく指摘することも。一見ドライに見えるかもしれないが、これは相手の成長を願うがゆえの行動であり、本人は悪気なく、むしろそれが誠実だと考えている。自分を偽らず、ありのままでいられる関係性を好む。\n\n彼/彼女の根底には、現状への飽くなき疑問と、より良い未来を創造したいという強い欲求がある。固定観念を打ち破り、未知の領域を切り拓くことに情熱を燃やす。そのため、退屈な日常や停滞した環境では魂が枯れてしまう。「世の中はもっと面白くできるはずだ」という信念が、常に彼/彼女を突き動かす原動力となっている。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n「これって、もっと違うやり方があるんじゃない？」そう閃いた瞬間、彼の頭の中では無限の可能性が広がる。まず概念を構築し、そのアイデアが持つポテンシャルについて語り始める。計画を緻密に練るよりも、まずプロトタイプを作って検証する派。ゴールのイメージは抽象的かつ壮大だが、そこに至る道筋は「とりあえずやってみよう」と試行錯誤しながら見つける。既存のツールやプロセスに囚われず、最適なものを常に模索する。\n\n【進行フェーズ】\n複数のプロジェクトやアイデアを同時に進めるのが得意。一つに集中し続けると飽きてしまい、思考が停滞する。「こっちで行き詰まったら、あっちのアイデアを練るか」と、脳内で自由にタスクを切り替えながら進める。途中で「もっと合理的な、あるいはもっと刺激的な方法があるはずだ」と気づけば、躊躇なく方向転換することも。進捗報告は概念的な説明に終始しがちで、具体的なタスクの進捗よりも「この方向性で合っているか？」といった本質的な議論を求める。\n\n【完了フェーズ】\n「本質はだいたい掴めたし、あとは細かい調整でしょ？」という気持ちになりやすい。最後の詰め（データ入力、詳細なドキュメント作成、数値の最終検証など）が最大の弱点だ。完璧主義よりも、革新性とスピードを重視するため、完成度80%で満足してしまう傾向がある。締切直前になると驚異的な集中力を発揮して、概念を形にすることはできるが、ディテールの品質向上は他のメンバー、特にISTJ型やDp型のメンバーに任せると、プロジェクト全体のクオリティが飛躍的に向上する。\n\n【1日の働き方】\n固定のルーティンを強制されるとパフォーマンスが落ちる。朝からひたすら思考に没頭したり、午後に集中的に議論する時間を設けたりと、日によって異なるリズムで働く方が調子が良い。新しい情報や知的な刺激に触れると脳が活性化し、特に午後の遅い時間帯や夕食後などに、突如として革新的なアイデアが降ってくることが多い。オフィスにいるよりも、カフェや自宅など、思考に集中できる場所を好む傾向がある。"},{title:"🗣️ 会議での振る舞い",content:"会議は、彼/彼女にとって思考とアイデアをぶつけ合う場だ。沈黙が続いたり、形式的な報告会に終始したりすると不満を感じる。「それって本当にそう言えるの？」と本質的な問いを投げかけたり、「この論点、もっと深く掘り下げられませんか？」と議論を活性化させたりする。ブレストでは誰よりも多くの、そしてユニークなアイデアを連発し、既存の意見を分解・再構築して新たな視点を提示するのが得意だ。\n\n場の空気を論理的に分析し、必要であれば「そもそも、この会議の目的って何だっけ？」と冷静に軌道修正を図ることもある。しかし、感情的な対立や人間関係の調整を目的とした議論は苦手で、論理的な結論が出ない会議には早々に興味を失う。詳細なレビューや具体的なタスク配分、議事録の作成といった作業は他のメンバーに任せたい。長時間の、特にアウトプットの少ない報告型会議は、時間と労力の無駄だと感じてしまう。\n\n【ベストな会議の使い方】\n・ブレスト・アイデア出しの場では、彼の存在が不可欠だ。\n・戦略会議やコンセプト設計の場で、既存の常識を打ち破る視点を提供できる。\n・複雑な問題に対する本質的な解決策を議論する場に最適。\n・意思決定の会議では、「そもそもの選択肢を増やす役」として議論を深める。\n・詳細なレビューやタスク管理の会議には、必須でなければ参加を避ける方がお互い効率的だ。"},{title:"💬 チャットでの傾向",content:"思考が活発になると、思いついたことをすぐにメッセージで送ってくる。長文になる傾向があり、一つのメッセージに複数のトピックが混在することも珍しくない。「これって〇〇ってことだよね？」「〇〇じゃない？」といった疑問形や反語表現を多用し、チャット相手との議論を楽しもうとする。知的な刺激のあるトピックには即座に反応し、自身の見解や仮説を熱く展開する。\n\n一方で、定型的な連絡やルーティン作業の確認メッセージには反応が遅れがち。興味が薄いトピックや、思考を必要としない単純な依頼に対しては、「了解」の一言だけで終わらせてしまい、後で詳細の確認が漏れることもある。雑談チャンネルでも、時折誰も思いつかないような突飛なアイデアや、深い洞察に基づく問いを投げかけ、議論を巻き起こすことがある。\n\n【周囲が知っておくと楽なこと】\n・彼の長文メッセージは、思考の壁打ちや意見交換を求めていることが多い。\n・「〇〇ってこと？」と疑問形で投げかけられたら、それは彼なりの思考の整理や、あなたの意見を引き出そうとしているサインだ。\n・重要なタスク依頼や具体的な確認事項は、チャットだけでなく、口頭や別の方法でも念押しすると安全だ。\n・深夜に突然、哲学的な問いや革新的なアイデアが飛んでくることがあるが、返信は翌日で全く問題ない。彼はただ思考をアウトプットしたいだけだ。\n・絵文字やリアクションは論理的な共感や思考の活性化を意味し、感情的な同意を示すものではない。"},{title:"👔 上司として／部下として",content:"【上司として】\nメンバーには自由と権限を惜しみなく与え、本質的な問いかけを通じて自律的な思考を促すリーダーだ。「〇〇について、君はどう思う？」と問いかけ、メンバーの知的な能力を引き出すのが得意。目標達成のためには手段を選ばない合理性を持ち、非効率なプロセスや無駄な慣習を徹底的に排除しようとする。チーム全体のビジョンは明確に語るが、その達成方法はメンバーに任せ、個々の裁量を尊重する。\n\n一方で、マイクロマネジメントは一切しない（できない）。進捗管理や細かいフィードバックは苦手で、「任せたから大丈夫だよね」と信頼しきってしまう傾向がある。チーム内の感情的な側面への配慮が不足することもあり、時にドライな印象を与えることも。ISTJ型やG型のメンバーをサブリーダーに据えることで、チームの運用が安定し、彼のアイデアがより着実に形になる。\n\n【部下として】\n自由な発想と知的な挑戦を評価されると、120%の力を発揮する。「この課題、君ならどう解決する？」という問いかけは、最高のモチベーションに繋がる。上司に対しても、常に論理的根拠を求め、納得できない指示には臆することなく疑問を呈する。フラットな関係性の中で、対等に議論できることを理想とする。\n\n管理型の上司とは相性が悪い。細かく報告を求められたり、やり方を一方的に指定されたりすると、モチベーションが急降下する。「なぜそうするのか」という本質的な理由が不明瞭なまま作業を強いられることは、彼にとって最も苦痛なことだ。彼の発想力を活かすためには、枠にはめず、むしろその枠を広げるような指示を与えることが重要となる。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・複雑で本質的な課題の解決策を考えるとき\n・誰も思いつかないような斬新なアイデアを閃いたとき\n・既存のルールや常識を打ち破る議論ができたとき\n・異なる分野の知識を組み合わせて、新たな概念を構築できたとき\n・自分の提案した仮説が、論理的に正しいと証明されたとき\n・知的な好奇心を刺激する新しい技術や情報に触れたとき\n・チームメンバーとの議論を通じて、自身の思考が深まったとき\n\n【📉 下がる瞬間】\n・意味のないルーチンワークや定型作業を延々とやらされるとき\n・非論理的な判断や感情的な対立に巻き込まれるとき\n・思考停止を強いられ、言われた通りに作業するだけの状況\n・自分のアイデアや疑問が、検討されずに却下されるとき\n・詳細な数値のチェックやドキュメントの整備といった詰めの作業\n・退屈で生産性の低い会議が長々と続くとき\n・自由な発想や探求が許されない、硬直した環境にいるとき"},{title:"📝 フィードバック",content:"【受けるとき】\n感情論ではなく、論理的根拠に基づいた具体的なフィードバックであれば、冷静かつ建設的に受け止めることができる。指摘された事実に対しては素直に耳を傾け、改善策や代替案の提示があれば、さらに深く思考し、自分のものとして消化しようとする。しかし、個人的な感情や主観的な意見が先行するフィードバックは、「それは論理的じゃない」と反発を感じやすい。まずは「〇〇という事実があった」→「それに対して、△△という改善策を提案したい」の順で伝えるのが効果的だ。\n\n【伝えるとき】\n基本的に、相手の感情よりも事実や論理、改善点を重視してフィードバックを伝える。遠回しな言い方よりも、具体的かつ直接的に「ここが問題だ」「こうすればもっと良くなる」と伝える方が効率的だと考えている。そのため、時にドライで厳しい印象を与えてしまうこともあるが、これは悪気があるわけではなく、本人は「本質を伝えたい」という意図だ。相手に思考を促すために、「なぜそうなるのか？」と問いかける形でフィードバックを始めることもある。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・アイデア出し・ブレスト：無限のアイデアを出し、既存の概念を覆す発想で場を活性化する。\n・コンセプト設計・戦略立案：複雑な情報から本質を見抜き、革新的な事業や製品のコンセプトを構築する。\n・問題解決・ボトルネック分析：目の前の問題だけでなく、根本原因を突き止め、ロジカルな解決策を導き出す。\n・プレゼン・ディベート：自身のアイデアや論理を明確に伝え、相手の思考を刺激する。\n・新規プロジェクト立ち上げ：0から1を生み出すフェーズで、最も力を発揮する。\n・R&D・技術調査：新しい技術や理論を深く理解し、その応用可能性を探る。\n・ワークショップのファシリテーション：議論を構造化し、参加者の思考を活性化させる。\n\n【😰 苦手】\n・定型的なデータ入力・書類作成：思考を伴わない単純作業は、苦痛でしかない。\n・細かい数値のチェック・品質管理：完璧な正確性よりも、大局的な概念やスピードを重視する。\n・長期間の単独作業（特にルーチン）：飽きやすく、思考が停滞するためパフォーマンスが落ちる。\n・手順書・マニュアル作成：一度概念が構築されれば、その詳細を言語化することには興味が薄い。\n・予算管理・進捗の詳細報告：細かな数値やタスクの管理は、本質的な業務ではないと感じる。\n・感情的な対話・人間関係の調整：論理的ではない感情的な側面への対応は苦手意識がある。\n・既存システムの運用・保守：変革や改善の余地がないとモチベーションが上がらない。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「これってどうすればもっと面白くなると思う？」→知的好奇心を刺激され、喜んで思考を巡らせる。\n・「この仕組み、もっと効率的で合理的にできないかな？」→既存の枠組みの再構築は彼の得意分野だ。\n・「自由にやっていいよ、ただし成果として〇〇は出してほしい」→裁量と目的が明確であれば本気を出す。\n・「〇〇という仮説があるんだけど、一緒に検証してくれないか？」→議論や探求の機会に積極的に参加する。\n・「この複雑な問題、君ならどうアプローチする？」→彼の論理的思考力と問題解決能力を信頼していることを示す。\n・「〇〇さんの得意な論理的思考で、このアイデアを深掘りしてほしい」→知的な能力を頼られると燃える。\n\n【❌ パフォーマンスが落ちる】\n・「このマニュアル通りに、深く考えずにそのままやって」→思考停止を強いられることが最も苦痛。\n・「とりあえず、理由の説明なしにやって」→納得できない指示には反発を感じ、モチベーションが下がる。\n・「感情的な側面も考慮して、みんなが納得するように穏便に済ませてほしい」→論理的ではない依頼に困惑する。\n・「一つずつ丁寧に、完璧に細部まで確認してほしい」→完成度よりも概念やスピードを重視するため、イライラしやすい。\n・「毎日同じ時間に、このルーティン作業を欠かさずこなして」→飽きっぽく、生産性が激減する。\n\n【💡 コツ】\n1. 本質的な課題や問いを提示し、「Why」を共有する。\n2. 自由な発想と裁量を渡し、知的な挑戦の機会を与える。\n3. 彼のアイデアや仮説に対して、建設的な議論や壁打ちの相手になる。\n4. 詳細の詰めやルーチンワークは、別のメンバーにアサインすることを検討する。\n5. 彼の論理的思考力や独創的なアイデアに対して、具体的な言葉で感謝や賞賛を伝える。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・新規事業開発：0から1の概念を構築し、既存の枠組みを打ち破るアイデアを形にする。\n・戦略コンサルタント：複雑な課題を論理的に分析し、革新的な解決策を提示する。\n・R&D/研究者：知的好奇心に基づき、未知の領域を探求し、新しい理論や技術を生み出す。\n\n【⭐ かなり合う】\n・プロダクトマネージャー：ユーザーの課題を本質的に捉え、革新的なプロダクトコンセプトを設計する。\n・システムアーキテクト：複雑なシステムの全体像を設計し、論理的かつ効率的な構造を構築する。\n・弁護士/哲学者：論理的思考力と議論のスキルを活かし、複雑な概念や問題を深く考察する。\n\n【💡 意外とハマる】\n・デジタルマーケター（仮説検証型）：データに基づいた仮説構築と検証を高速で繰り返し、効果的な戦略を見つけ出す。\n・データサイエンティスト：膨大なデータから本質的なパターンや法則を発見し、新しい知見を生み出す。\n\n【⚠️ 避けた方がいい】\n・定型的な経理・監査：思考を伴わない、細かい数値の確認や入力作業はモチベーションを著しく低下させる。\n・品質検査・カスタマーサポート：決められた基準での確認作業や、感情的な対応が求められる業務は苦手。\n・単純なデータ入力・事務：反復作業の連続で、彼の創造性と知的好奇心が活かせない。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nISTJ-G-Dp「金庫番」 — アイデアマンが空想する未来の概念を、金庫番が着実に現実の計画に落とし込む。金庫番の揺るぎない実直さが、アイデアマンの自由な発想に安定した基盤を提供する。お互いの思考と行動のギャップを埋め、革新を確実に実行に移せる最強のコンビだ。\n\n【🔥 化学反応が起きるコンビ】\nENTJ-O-Dp「将軍」 — アイデアマンの無限のアイデアを、将軍が具体的な戦略と実行計画に落とし込み、強力なリーダーシップで推し進める。アイデアの量と質を最大化し、爆発的なスピードで成果を生み出すことができる。知的な議論から生まれたものを、一気に現実へと駆動させる関係だ。\nINTJ-G-Dp「設計者」 — アイデアマンの奔放な発想に対し、設計者が緻密な論理と構造で深掘りし、より洗練された理論を構築する。知的な探求と完璧なシステムの構築を追求し、複雑な問題を本質的に解決へと導く。\n\n【☀️ 居心地がいい仲間】\nENTP-O-Dp「伝道師」 — 同じ知的探求心と変化への欲求を共有しているため、会話が尽きることがない。互いのアイデアに刺激を受け合い、無限の議論を繰り広げることができる。共通の価値観を持つが、伝道師の深掘り志向がアイデアマンの広さを補い、さらに議論を深める。\nINTP-G-Dp「賢者」 — 賢者の深い内省と分析力が、アイデアマンの多岐にわたる発想に新たな洞察を与える。互いに知的な刺激を与え合い、概念的な議論を心ゆくまで楽しめる。内向的な賢者にとって、外向的なアイデアマンは思考をアウトプットする良い相手となる。\n\n【⚡ 未知の触発者】\nISFJ-G-Dp「番人」 — アイデアマンの論理的な変革志向に対し、番人の実直で安定を重んじる姿勢は真逆の価値観を示す。この対極的な視点が、アイデアマンに「人」や「組織」の感情的な側面、あるいは既存の安定の重要性といった、普段見落としがちな視点をもたらすことがある。\nESFJ-G-Br「世話焼き」 — 世話焼きの人間関係重視の姿勢や、チームの調和を保とうとする努力は、時にアイデアマンにとって非論理的に映るかもしれない。しかし、その根底にある「人」を大切にする価値観は、アイデアマンの思考に新たな視点を与え、より多角的な解決策へと導く可能性がある。"},{title:"🌈 プライベートの顔",content:"彼のプライベートは、常に「探求」と「議論」に満ちている。休日に何をしているか聞くと、先週は最新のAIモデルについて勉強していたかと思えば、今週は哲学カフェで世界の真理について語り合っていたりする。一つの趣味に没頭するよりも、様々な分野に顔を出し、その本質や仕組みを理解しようと好奇心の赴くままに活動する。\n\n友達との会話は、ただの雑談では終わらない。「最近読んだこの本なんだけどさ、これって〇〇ってことだと思わない？」と、突然深い問いを投げかけ、周囲を巻き込んで議論を始める。答えのない問いについて真剣に語り合うのが最高の楽しみであり、時にはその場の空気を置き去りにして熱弁を振るうこともある。\n\n新しいガジェットや技術には目がなく、常にその原理や将来性を調べ尽くす。「これって、こうやって作られてるんだよ。もっと応用すれば、こんなこともできるはずだ」と、友達に熱く語る姿はまるで研究者のようだ。一方で、使い方も知らずに買って放置しているガジェットが部屋の隅に転がっていることも珍しくない。\n\n興味の幅が広いため、SNSのフォローリストもカオスだ。最新テックニュースのアカウントから、歴史学者、哲学者のツイート、アート系のインフルエンサーまで、とにかく情報を幅広く収集し、それらを頭の中で自由に結びつけて新たなインサイトを得ようとする。映画を見ても「この設定はもっとこうできたはず」「この展開は論理的じゃない」と、常に批判的思考が働いている。\n\nお金の使い方は「知的な体験」や「新しい知識」への投資が中心。気になるセミナーがあれば迷わず参加し、高価な専門書でも躊躇なく購入する。物質的な所有欲よりも、自分の頭の中を豊かにすることに価値を見出す。常に思考を刺激し、新しい発見があることを求めて、日々の生活を送っている。"}]},
"ENTP-O-Dp":{name:"常識クラッシャー",character:"夜神月（DEATH NOTE）",great:"スティーブ・ジョブズ",color:"#2E86C1",summary:"「常識？それ、誰が決めたの？」既存のルールを根本から壊して新しい秩序を作る人。一つのテーマに深くのめり込み、誰も思いつかない解を導く。",compatibility:{complement:[{code:"ISFJ-O-Dp",name:"守護者",desc:"チーム内のメンバーが個人的な悩みを抱えている時、ISFJ同士で情報共有し、連携して相手に寄り添うことで、より深いサポートと安心感を提供し、深いケアが共鳴します。"},{code:"ISFJ-O-Br",name:"献身サポーター",desc:"プロジェクトでISFJ-O-Dpが深くコミットする対象を、ISFJ-O-Brも献身的に支えます。お互いの揺るぎないサポート精神が共鳴し、チームに安心感と確実性をもたらすでしょう。"}],chemistry:[{code:"INTJ-O-Dp",name:"ラスボス",desc:"難解な技術課題についてチャットで議論する際、ラスボスとINTPは互いの鋭い洞察をぶつけ合い、緻密な論理で構築された全く新しい解決策を生み出します。妥協なき知的探求が、組織に革新的な戦略をもたらすでしょう。"},{code:"ENTP-O-Br",name:"アイデアマン",desc:"新規事業の企画会議では、ENTP-G-Brが知識の引き出しから多様な情報を提示し、ENTP-O-Brがそれに触発されて次々と新しいアイデアを繰り出す。知識と発想が高速で応酬し、無限の可能性が広がる。"}],comfort:[{code:"ENTP-G-Dp",name:"設計屋",desc:"プロジェクトの計画立案時、ENTP-G-Brが多角的な情報を提示する傍らで、ENTP-G-Dpがその情報を効率的に構造化し、体系的に整理することで、お互いの思考がスムーズに連動し、居心地の良い協業が生まれる。"},{code:"INTP-O-Dp",name:"研究者",desc:"INTP-G-Dpの探究する原理に対し、INTP-O-Dpはデータの深堀りや細部の検証で貢献。互いの専門性を尊重し、高度な専門知識が必要な議論で深い共感を覚える。"}],catalyst:[{code:"ESFJ-O-Br",name:"総支配人",desc:"INTPの深遠な理論を社内外に適切に伝え、関係部署との調整や情報共有を円滑に進める。会議での発表資料作成や対外折衝で、その理論の価値を理解者に届ける手助けとなる。"},{code:"ENFJ-O-Br",name:"カリスマ委員長",desc:"プロジェクト発表会で、ISTP-O-Dpの高度な技術が生み出した成果を、ENFJ-O-Brが情熱的なプレゼンで社内外に広め、技術の価値を最大化する。"}]},careers:{top:["破壊的イノベーター","技術戦略の立案と開発組織づくり","知財戦略家"],good:["暗号技術者","ハッカー（ホワイトハット）","哲学者"],surprise:["風刺作家","異端の研究者"],avoid:["合意形成重視の組織","ルーティン事務"]},strengths:["既存の破壊と再構築","深い論理","常識を疑う力","一つへの没入"],weaknesses:["協調性","感情面","日常管理","完遂"],tips:{do:"〇〇の現状維持はもはや古い。今のやり方で本当にベストなのか、根本から疑ってほしい。もしあなたがこのシステムを全く新しいものに作り変えるとしたら、どんな常識を破壊し、どんな秩序を構築するだろうか？この課題について、あなたの常識破りのアイデアを聞かせてくれないか？現在進行中のプロジェクトで、誰もが当然だと思っている前提条件が、実はボトルネックになっている可能性がある。その「当たり前」の裏に潜む真実を暴き、誰も思いつかないような、全く新しい視点から解決策を導き出してほしい。この問題の核心を深く探求し、画期的なアプローチを提案してくれないか？今取り組んでいる課題には、長年の慣習や業界の常識が深く根付いている。しかし、この「常識」こそが進化を阻害しているのではないかと感じている。あなたならば、この既存の概念をどのように解体し、未来を見据えた新しいフレームワークを再構築するだろう？そのためのアイデア出しに協力してくれないか？",dont:"このプロジェクトでは、チーム全体の調和を最優先したい。あなたのユニークな発想も素晴らしいが、まずは既存のプロセスに沿ってみんなと足並みを揃えて進めてくれないか？周囲の意見に耳を傾け、協調性を重視して行動してほしい。現状のルールやガイドラインは、これまでの経験に基づいて作られたものだから、まずはそれを守ってほしい。突飛なアイデアを出すよりも、まずは標準的な手順で作業を進め、組織の方針に従って行動してくれないか？逸脱した行動は控えてほしい。今回の会議では、多くの関係者がいるため、意見の対立を避けてスムーズに進行したい。あなたの鋭い指摘も重要だが、もう少しオブラートに包んで、みんなの意見を尊重する形で発言してくれないか？場の空気を読んで、調整役として立ち回ってほしい。"},fullSections:[{title:"👤 この人はこんな人",content:"「常識？それ、誰が決めたの？」既存のルールや慣習に、まず疑問符を投げかけるのがこの人の流儀だ。現状維持の空気の中で「いや、これってそもそもおかしくない？」と真っ先に声を上げる。そして、誰も思いつかないような新しい秩序や革新的な解決策を、徹底した論理で構築することに情熱を燃やす。0→1の変革フェーズにおいて、その思考力は圧倒的だ。\n\n人との議論を通じてエネルギーを得るタイプ。自分の論理やアイデアが他者を刺激し、既存の枠組みを揺るがすことに快感を覚える。常に頭の中では世界の仕組みや物事の本質を分析しており、退屈な日常会話よりも、白熱したディベートや知的な頭脳戦を好む。カフェで隣の席から聞こえる会話が非論理的だと、内心で「いや、それは違うだろ」とツッコミを入れている。\n\n仕事においては、既存の枠にとらわれず、論理的に問題の本質を見抜き、革新的な解決策を生み出すのが得意だ。特に、誰も手をつけていない領域や、非効率な慣習を改善するフェーズで、その真価を発揮する。「前例がないから無理」という言葉は、彼にとって「挑戦の機会」にしか聞こえない。\n\n一方で、他者の感情や既存の人間関係に配慮が足りず、正論をストレートにぶつけてしまうことがある。そのため、意図せず相手を傷つけてしまったり、「冷たい人」と誤解されたりすることも。「いや、事実としてそうでしょう」と本人は悪気なく言うのだが、場の空気を壊してしまう場面も少なくない。\n\n興味の対象は限定的だが、一度興味を持てばとことん深掘りする「一点深堀」のタイプ。そのテーマに関するあらゆる情報を収集し、独自の視点から分析・再構築する。表面的な知識では満足せず、本質を解き明かすまで手を止めない。趣味も「極める」傾向が強く、特定の分野では専門家以上の知識を持つことも珍しくない。\n\n対人関係においては、上辺だけの社交辞令や感情的なコミュニケーションを苦手とする。本音で語り合える相手、建設的な議論ができる相手には心を開くが、感情的な議論や非論理的な主張にはイライラすることも多い。「なるほど、君の意見は論理的に破綻しているね」と、つい言ってしまいがちだ。\n\n根底には、既存の常識や権威を盲目的に受け入れず、常に「なぜそうなのか？」「もっと良い方法はないか？」と問い続ける探究心がある。知的な刺激と、自らの手で世界を変革する（あるいは少なくとも改善する）ことを求める、生粋のイノベーターであり、常識の破壊者である。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n「今のやり方は非効率だ」「このシステムは論理的に破綻している」と感じた瞬間に動き出す。頭の中に「こうすればもっと良くなるはずだ」というアイデアが閃くと、すぐに周囲に議論を仕掛け、その論理的妥当性を検証しようとする。具体的な計画を立てるよりも先に、概念を検証し、論理的な裏付けを固めることに時間を費やすタイプだ。まずは核心となるコンセプトを練り上げ、それが本当に機能するか、既存の枠組みをどう壊せるかを徹底的に思考する。\n\n【進行フェーズ】\n問題解決やシステムの再構築に没頭する。既存の資料やデータを徹底的に分析し、矛盾点や改善点を見つけ出す能力に長けている。周りの意見も参考にはするが、最終的には自分の論理と確信に基づいてプロジェクトを進める。途中でより良い方法や、より効率的なアプローチを発見すれば、迷わず方向転換する柔軟性も持つ。進捗報告は概念的な進捗を重視し、「この問題はこうすれば解決できる、そのための論理はこれで…」といった思考の進展を語りがちで、具体的なタスクの進捗は簡潔になりやすい。\n\n【完了フェーズ】\n完璧主義的な一面もあり、自分の納得がいくまで徹底的に詰める。特に、アイデアの論理性やシステムの完成度、概念的な整合性には一切妥協しない。最後の最後まで「本当にこれで最適なのか？」と問い続け、限界まで最適化を図ろうとする。ただし、ルーティン的な最終チェックや、誰にでもわかるような詳細なドキュメントの整備
