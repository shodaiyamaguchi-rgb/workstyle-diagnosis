【😰 苦手】\n・長期的な戦略立案：数年先のビジョンや、抽象的な目標設定は苦手\n・人間関係の調整・仲裁：感情的な対立の間に立つのは疲れる\n・契約交渉・法務関連：細かい書類の読み込みや、感情を伴う駆け引きは避けたい\n・定型的な事務作業：変化のないルーティンワークは苦痛\n・報告書・計画書の作成：時間をかけて書類をまとめるより、手を動かしたい\n・予算管理・経費精算：数字の細かい管理はミスが出やすい\n・イベントの企画・運営：人を巻き込み、盛り上げるような活動は苦手"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「この問題、原因が分からないんだけど、ちょっと見てくれない？」→探求心と問題解決意欲を刺激する\n・「新しいツール（技術）を導入したいんだけど、どうすれば一番効率的だと思う？」→試すのが好き\n・「自由に試行錯誤していいから、一番良い方法を見つけてほしい」→裁量を与えられると燃える\n・「〇〇さんなら、きっとスマートなやり方を見つけてくれると思って」→能力を認められると嬉しい\n・「これは〇〇さんの専門分野だよね？」→得意分野を頼られると意欲的になる\n\n【❌ パフォーマンスが落ちる】\n・「マニュアル通りに、この手順で進めてください」→自由度がないと息が詰まる\n・「細かい進捗状況を毎日報告してください」→監視されていると感じ、モチベーションが下がる\n・「とにかく、感情論は抜きにして、言われた通りにやってください」→納得できない指示には従いたくない\n・「この報告書を、A4用紙5枚で、丁寧に作成してください」→書類仕事は苦手\n・「チーム内の人間関係を円滑にするために、〇〇さんに話してきてほしい」→感情的な調整は苦手\n\n【💡 コツ】\n1. 最初に「Why」と「何を解決したいのか」を簡潔かつ論理的に伝える。\n2. 解決方法については最大限の裁量を与え、「結果さえ出ればOK」というスタンスを示す。\n3. 具体的なアウトプットのイメージは共有しつつ、細かなプロセスは任せる。\n4. 一人で集中できる環境を整え、邪魔をしない時間を確保してあげる。\n5. 感謝は具体的な成果や行動に対して、シンプルに「ありがとう、助かったよ」と伝える。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・現場エンジニア：機械やシステムのトラブルシューティング、保守、改善など、手を動かして問題を解決する\n・プロダクトマネージャー（技術寄り）：製品の技術的な側面を深く理解し、開発チームと連携してプロダクトを最適化する\n・研究開発（R&D）：新しい技術や素材、手法を研究し、プロトタイプ開発を通じて実用化を目指す\n\n【⭐ かなり合う】\n・データサイエンティスト：大量のデータからパターンや傾向を見つけ出し、課題解決に繋がる示唆を導く\n・システムアーキテクト：システムの全体設計を行い、複数の技術を組み合わせて効率的な構造を構築する\n・UXデザイナー（プロトタイピング重視）：ユーザー体験を向上させるため、迅速にプロトタイプを作成し検証を繰り返す\n\n【💡 意外とハマる】\n・アフターサービス/カスタマーサポート（技術専門）：顧客の複雑な技術的問い合わせやトラブルに、その場で解決策を提供する\n・フィールドエンジニア：顧客現場に出向き、機器の設置、トラブル対応、メンテナンスを迅速に行う\n\n【⚠️ 避けた方がいい】\n・営業：顧客の感情に寄り添うことや、長期的な関係構築、契約交渉が苦手\n・人事：人の感情を読み解くことや、社内調整、細かい規定の運用が苦手\n・広報：抽象的なメッセージの発信や、外部との関係構築、華やかな場での振る舞いが苦手\n・経理/事務職：定型的で変化のない業務や、細かい数字の管理が退屈で苦痛"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nENFJ-O-Dp「カリスマリーダー」 — 現場の万能技師の具体的な解決策や実践的なアイデアを、カリスマリーダーがビジョンとして壮大に語り、人を巻き込む。万能技師の苦手な感情的な側面を補完し、チームのモチベーションを最大化できる。\nESTJ-G-Dp「頑固職人」 — 万能技師の多様なスキルと攻めの姿勢を、頑固職人が確かな品質と堅実な計画で支える。計画と実行、新規性と安定性のバランスを取り、プロジェクトを確実に成功に導く。\n\n【🔥 化学反応が起きるコンビ】\nENTJ-O-Dp「将軍」 — 万能技師の迅速な実践力と、将軍の戦略的思考が組み合わさることで、アイデアを高速で実現し、0→1を力強く推進する。お互いの思考のスピード感が近く、建設的な議論ができる。\nENTP-O-Br「アイデアマン」 — アイデアマンの無限の発想を、万能技師が「それならこうできる」と具体的に形にする。互いに知的好奇心を刺激し合い、遊びのような感覚で新しいものを次々と生み出す。\n\n【☀️ 居心地がいい仲間】\nINTP-O-Dp「理論家」 — 互いに論理的思考を好み、無駄な感情を挟まないため、深い技術的な議論を安心してできる。それぞれの専門分野を尊重し、独立した作業を好む。\nISTP-G-Dp「孤高の職人」 — 似た者同士で、お互いの独立性を尊重し、黙々と自分の作業に集中できる。言葉少なくても互いの仕事ぶりを理解し合える、心地よい距離感のパートナー。\n\n【⚡ 未知の触発者】\nESFP-O-Br「ムードメーカー」 — 社交的で楽しいことが大好きなムードメーカーが、万能技師を外の世界に連れ出し、新しい刺激や人との交流の機会をくれる。万能技師の内に秘めた情熱を引き出す。\nINFJ-G-Dp「賢者」 — 深い洞察力や人間理解を持つ賢者が、万能技師にはない視点や倫理的な側面をもたらす。万能技師の論理的な思考に、人間的な意味合いを加え、視野を広げるきっかけとなる。"},{title:"🌈 プライベートの顔",content:"休日の予定を聞くと、「先週はバイクのエンジンいじってた」「今週は新しいDIYの工具買っちゃった」と、だいたい何かを分解したり組み立てたりしている人。\nGoogleカレンダーに空白の日が続くと、ムズムズして何か新しいスキルを身につけようと動き出す。多趣味ぶりはプライベートでも健在で、突然「今度ボルダリング行かない？」と誘ってくることも。\n\n友達は特定の趣味を通じて繋がることが多く、一緒にキャンプに行ったり、ツーリングに出かけたり、共通のガジェットをいじったりすることが多い。多くを語らずとも、同じ体験を共有することで絆を深めるタイプだ。\n\n旅行に行くなら、歴史的建造物の構造を観察したり、現地のユニークな技術や文化に触れたりする体験を重視する。観光名所を巡るよりも、裏路地の工房や地元の技術博物館に立ち寄る方が楽しいと感じるだろう。\n\n自宅は、必要なものが機能的に配置されており、常に整理整頓されている。作業スペースは特に充実しており、工具や部品、半完成のガジェットなどが整然と並べられていることが多い。「ここをこうすればもっと便利になる」と、家の中も常に改善の対象だ。突発的に「よし、やるぞ！」と思い立って、夜遅くまで作業に没頭することも珍しくない。"}]},
"ISTP-O-Dp":{name:"一刀流の職人",character:"ゾロ（ONE PIECE）",great:"宮本武蔵",color:"#A04000",summary:"「この一つの技を極限まで磨く」究極の技術者。一つの技に生涯を捧げ極限まで磨き上げる。寡黙で孤高。技で全てを語る。",compatibility:{complement:[{code:"ENFJ-O-Br",name:"カリスマ委員長",desc:"プロジェクト発表会で、ISTP-O-Dpの高度な技術が生み出した成果を、ENFJ-O-Brが情熱的なプレゼンで社内外に広め、技術の価値を最大化する。"},{code:"ESFJ-O-Br",name:"総支配人",desc:"INTPの深遠な理論を社内外に適切に伝え、関係部署との調整や情報共有を円滑に進める。会議での発表資料作成や対外折衝で、その理論の価値を理解者に届ける手助けとなる。"}],chemistry:[{code:"ISTP-O-Br",name:"現場の万能技師",desc:"新規設備の導入プロジェクトで、修理屋が安定稼働のための技術的基盤を固め、現場の万能技師がさらに効率的な運用方法やカスタマイズを提案。二人の技術力が相乗効果を生みます。"},{code:"ESTP-O-Dp",name:"エース",desc:"エースの迅速な行動力と実行力が、癒し職人が温めていたアイデアを現実の形にするきっかけを与えます。新しい施術メニューの導入テストでは、エースの行動力が実験を加速させます。"}],comfort:[{code:"ISTP-G-Dp",name:"専属オペレーター",desc:"求道者の深い専門性と専属オペレーターの静かで精密な技術が互いに理解し合い、言葉なくとも連携が可能です。共同で複雑な機械のメンテナンスを行う際、求道者が問題の根源を特定し、専属オペレーターが熟練した手つきで調整することで、完璧な連携を見せます。"},{code:"ISTJ-O-Dp",name:"任務遂行者",desc:"品質管理の現場で、ISTP-O-Dpが開発した精密な検査基準を、ISTJ-O-Dpが着実に運用し、寡黙ながらも高い精度で品質維持に貢献する。"}],catalyst:[{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"},{code:"ENTP-O-Dp",name:"常識クラッシャー",desc:"既存プロセスの見直し会議では、ENTP-G-Brが現状の背景知識を提供する一方で、ENTP-O-Dpが常識にとらわれない大胆な提案で既成概念を打ち破る。知的好奇心を刺激し合い、自由な議論が交わされる居心地の良い関係。"}]},careers:{top:["刀鍛冶","スナイパー","精密機械技師"],good:["外科医","レーサー","サイバーセキュリティ専門家"],surprise:["弓道の師範","時計職人"],avoid:["チームの感情管理","大規模営業"]},strengths:["一つの技の極限","寡黙な集中力","冷静な実行力","手先の究極の器用さ"],weaknesses:["コミュニケーション","チームワーク","感情表現","柔軟性"],tips:{do:"「この分野で最高の〇〇を開発してほしいんだが、君ならできると思う。最高の環境を用意するから、とことん追求してくれないか？」「この問題、現状の解決策では不十分だと感じている。君の唯一無二の技術で、誰もが驚くような究極の改善策を見つけてくれないか？期限は〇〇で、詳細はここにまとめた。」「このプロジェクトの核となる技術部分を、君に全幅の信頼を置いて任せたい。成果は君の技術力で語ってほしい。進捗は週に一度、チャットで簡潔に報告してくれると助かる。」",dont:"「もっと積極的にチームと交流して、意見交換してくれないかな？雑談も大事だよ。あとは、この会議にもっと参加して、発言を増やしてほしいんだ。」「このタスク、とりあえずでいいから早く仕上げて。品質は後で調整するから。それから、なぜそうしたのか、プロセスについて詳しく説明してくれない？」 「最近どう？困っていることない？気分転換に、みんなでランチに行かない？少しはリラックスして、もっと笑顔でいてほしいな。」"},fullSections:[{title:"👤 この人はこんな人",content:"「これ、最高の状態ってどんなだろう？」\nこの問いが、一刀流の職人の原動力だ。一つの技を極限まで磨き上げ、最高のクオリティを追求する孤高の技術者。新しい技術や未解決の課題を見ると、その仕組みを解明し、完璧な解を導き出したいという探究心が燃え上がる。\n\n彼のエネルギー源は、一人で深く集中できる時間と空間にある。他人の会話や雑音から離れ、黙々と自分の課題に取り組むことで、精神的なバッテリーが充電される。集団行動より単独での作業を好み、余計な社交辞令や感情的なやり取りは避ける傾向がある。\n\n仕事においては、極めて現実的で実践的だ。抽象的な議論には興味がなく、「で、具体的にどうするの？」と核心を突く。問題の根本原因を論理的に分析し、最も効率的で確実な解決策を導き出すことに長けている。机上の空論ではなく、自らの手で試し、検証し、改善していくプロセスを重視する。\n\n弱点としては、感情表現が乏しく、自分の考えを言葉で伝えるのが苦手な点がある。そのため、寡黙さや無愛想な印象を与え、周囲から誤解されることもある。また、組織内の政治的な駆け引きや根回しには全く興味がなく、純粋に技術的な優劣や論理の正しさで判断しようとするため、時には摩擦を生むこともある。\n\n興味の対象は非常に狭く、しかしその深さは計り知れない。一度興味を持った分野については、とことん掘り下げ、その道のプロフェッショナルとなることを目指す。最新のテクノロジーや複雑なシステムの裏側を解き明かすことに喜びを感じ、その知識と技術を自身の「技」として昇華させていく。\n\n人との関係においては、言葉数は少ないものの、信頼する相手には惜しみなく知識やアドバイスを提供する。無駄話はしないが、技術的な話題や課題解決の議論になると、普段の寡黙さが嘘のように熱を帯びる。相手の感情よりも、客観的な事実や論理に基づいた意見を尊重する。\n\n根底にあるのは、最高の品質と効率性、そして専門性の追求だ。自分の手で何かを作り、改善し、それを完璧に近づけることこそが彼の喜びであり、人生の価値そのものだ。まるで刀鍛冶が一本の刀に全神経を集中させるように、彼もまた自身の「技」に全てを捧げる。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n新しい技術の可能性や、解決すべき問題の存在を察知すると、まずは自分で黙々と調査を始める。「どうすればこれが最高のパフォーマンスを出せるか」を頭の中でシミュレーションしながら、まずは手を動かして試す派。計画を立てるよりも、コードを書き始めたり、ツールをいじり始めたりするのが早い。誰かに相談する前に、まずは自分で解決の糸口を探すことを好む。\n\n【進行フェーズ】\n集中モードに入ると、周りの声が聞こえなくなるほど作業に没頭する。完璧を目指すというより、「このやり方が本当に一番効率的か」「他に改善の余地はないか」を常に考え、最適な解を追求しながら進める。無駄を徹底的に省き、最短経路で最高の品質に到達することに喜びを感じる。複数のタスクを並行するよりも、一つのタスクに深く集中して深掘りする方が、圧倒的にパフォーマンスが高い。\n\n【完了フェーズ】\n「これで十分」というラインに到達するまで手を抜かない。最終的なアウトプットの品質、特に機能性や効率性には徹底的にこだわる。細部の検証や数値の正確性も、自分で納得がいくまで、あるいはバグがないと確信できるまで丹念に行う。ドキュメント作成や報告は必要最低限に抑えたい。アウトプットそのもので語ることを最も望んでいる。\n\n【1日の働き方】\n朝から黙々と作業を開始し、午前中に集中して頭を使うタスクをこなすのがベスト。自分のペースで集中できる時間を何よりも大切にする。午後は午前中の進捗を踏まえ、さらに深掘りしたり、具体的な実装を進めたりする。夜は一人で深く思考したり、新しい技術について調べたりする時間にあてることも多い。突発的な会議や割り込み作業で集中を途切れさせられることは、彼にとって大きなストレスとなる。"},{title:"🗣️ 会議での振る舞い",content:"会議では必要がなければほとんど発言しない。沈黙が続いても特に気にならないタイプだ。発言するときは、極めて論理的で具体的な意見のみ。冗長な説明はせず、要点だけを明確に伝える。ブレインストーミングのような抽象的な議論は苦手で、具体的な問題解決や技術仕様の検討の場ではその能力を最大限に発揮する。\n\n「それって具体的にどういうこと？」「そのデータは？」と、本質を突く質問を投げかけることが多い。根拠のない意見や感情論には耳を傾けない。議事録を取るのは苦手で、議論の本質をメモする程度。長時間の報告型会議は苦痛で、自分の専門外の話題が続くと意識が飛ぶこともある。\n\n【ベストな会議の使い方】\n・課題解決や技術仕様の検討会議には彼の参加がマスト。鋭い洞察力で問題の核心を突く。\n・意思決定の場では、論理的な根拠に基づいた彼の意見が非常に有効。\n・新しい技術の導入検討や、複雑なシステム設計のレビューには不可欠な存在。\n・雑談メインや目的が不明確な会議は、彼を参加させない方がお互い幸せだ。"},{title:"💬 チャットでの傾向",content:"メッセージは短く、要点のみで構成される。回りくどい表現はせず、常に簡潔さを追求する。絵文字やリアクションはほぼ使わない。無駄だと思っているからだ。質問には的確に回答するが、雑談チャンネルで自ら発言することは稀で、他人の雑談にも基本的には加わらない。\n\n長文で説明するよりも、コードスニペットや具体的な資料、図解で示すことを好む。夜間や休日でも、解決策や改善策が思いついたら、時間を問わずすぐにメッセージを送ることがある。これは彼にとって、思考を整理するためのアウトプットであり、返信は翌日で構わない。\n\n【周囲が知っておくと楽なこと】\n・「了解」の一言でも、内容はしっかり理解し、行動に移している場合が多い。\n・絵文字や長文がないからといって、不機嫌なわけではない。それが彼のデフォルトだ。\n・「これってどういう意味？」と聞いても、嫌がらずに丁寧に、かつ論理的に説明してくれる。\n・レスポンスは早くないが、送られてくる情報は正確で信頼性が高い。急ぎの要件は口頭か別手段で確認するとより確実。\n・個人的な質問より、技術的な質問で話しかける方が、彼との距離が縮まる可能性がある。"},{title:"👔 上司として／部下として",content:"【上司として】\nメンバーへのマイクロマネジメントは一切しない。というより、彼の思考回路にはマイクロマネジメントという概念が存在しない。任せた相手の専門性と自律性を信頼し、口出しせずに見守るスタイルだ。メンバーが新しい技術や困難な課題に挑戦することを歓迎し、最大限の技術的・環境的サポートを提供する。\n\n成果物で評価し、プロセスは結果が出れば問わない傾向がある。感情的なマネジメントは苦手で、論理と公平性に基づいて判断を下す。メンバーが特定の専門性を深めることを強く推奨し、そのための育成投資には積極的だ。チーム全体で目標達成を目指すというより、各々が最高の「技」を磨くことを促す。\n\n【部下として】\n具体的な課題と明確なゴールが与えられると最高のパフォーマンスを発揮する。「この部分を最高に仕上げてほしい」と依頼されると、燃えるように集中する。抽象的な指示や、感情的なフィードバックは理解に苦しむため、具体的で論理的な指示を求める。自分のやり方や技術的なアプローチに口出しされることを嫌い、裁量を与えられることでその能力を最大限に引き出す。\n\n新しい技術や困難な課題には自ら進んで挑戦し、期待以上の成果を出すことが多い。自分の専門性を認め、頼ってくれる上司を信頼する。評価においても、結果と技術的な貢献度を重視されることを望む。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・新しい技術やシステムの導入に、主要メンバーとして携われるとき。\n・難解で誰も解けなかった問題の解決策を自力で見つけ出したとき。\n・自分の専門性が、チームやプロジェクトの成功に不可欠だと実感したとき。\n・非効率なプロセスを自動化・効率化によって劇的に改善できたとき。\n・長年悩まされていたバグやボトルネックを、自分がデバッグ・最適化できたとき。\n・「この分野は彼に任せれば大丈夫」と、深く信頼され、全権を委任されたとき。\n・一人で深く集中できる時間と、最新の設備や環境が与えられたとき。\n\n【📉 下がる瞬間】\n・非効率なプロセスや、無駄な承認フロー、形骸化したルールに縛られるとき。\n・技術的な議論が感情論や社内政治で流され、合理的な判断がされないとき。\n・新しい挑戦や技術の導入を許されず、現状維持やルーティンワークばかりを強いられるとき。\n・自分の専門性が活かされない定型作業ばかりを延々とやらされるとき。\n・チームや組織内の感情的な駆け引き、政治的な根回しに巻き込まれるとき。\n・目的が不明確な会議や、誰でもできる雑務に時間を取られるとき。\n・自分の技術的な成果ではなく、表面的なコミュニケーションスキルで評価されるとき。"},{title:"📝 フィードバック",content:"【受けるとき】\n感情的な褒め言葉より、具体的な成果や行動に対する論理的な評価を好む。例えば「あなたの書いたこのコードによって、処理速度が〇%改善された」といった事実に基づいたフィードバックは素直に受け止める。改善点については、率直に、かつ具体的なデータや事実に基づいて伝えてほしい。回りくどい表現や、相手の感情を考慮しすぎた婉曲表現は、むしろ意図が伝わりにくく苦手だ。\n\n「あなたのこの技術力が今回の成功に不可欠だった」のように、自身の専門性を認め、評価されると深く納得する。感情的に批判されると、心を閉ざしてシャットダウンしてしまうが、建設的な指摘であれば冷静に分析し、自身のスキルやプロセスを改善しようと努める。\n\n【伝えるとき】\n基本的に、事実と論理に基づいた客観的なフィードバックを心がける。感情を交えず、淡々と成果や改善点を伝えることが多い。褒めるのが苦手なわけではないが、抽象的な褒め方はしない。「ここがこうなっていたのが非常に効率的だった」のように具体的に、どこがどう良かったのかを明確に伝える。相手の感情に配慮するよりも、真実を率直に伝えることを優先しがちだ。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・**システム設計・アーキテクチャ構築:** 複雑なシステムを効率的かつ堅牢に設計し、最適な構造を構築する。\n・**技術的な問題解決:** 困難なバグやシステムのボトルネックを特定し、根本原因から解決する。\n・**プログラミング・コーディング:** 高品質で保守性の高いコードを書き、システムの核となる部分を開発する。\n・**新しい技術の導入・検証:** 未知の技術をいち早く習得し、その実用性や可能性を検証・導入する。\n・**自動化・効率化の推進:** 手作業のプロセスや非効率な部分を見つけ出し、自動化や改善策を実装する。\n・**専門技術の深掘り・研究:** 特定の技術分野を深く探求し、誰にも負けない専門性を高める。\n・**ツールの選定・最適化:** プロジェクトや課題に最適なツールを見つけ出し、導入・設定・カスタマイズを行う。\n\n【😰 苦手】\n・**人間関係の調整・仲介:** チーム内の感情的な対立の仲裁や、意見の調整役。\n・**抽象的なビジョン策定:** 具体性のない長期的な目標や、ふわっとしたビジョンを描くこと。\n・**大人数でのブレインストーミング:** 漠然としたアイデアを出すだけのセッション。\n・**繰り返し行う定型的な事務作業:** 改善の余地がない、変化のないルーティンワーク。\n・**広範囲にわたる情報収集・分析:** 広く浅い情報を大量に扱うことや、マーケティング調査など。\n・**外部との交渉・折衝:** 利害関係が複雑な相手との感情的な駆け引きを伴う交渉。\n・**進捗状況の詳細な共有・報告:** 日々の細かな進捗報告書の作成や、口頭での状況説明。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「このバグ、誰も解けない難題なんだけど、君の力で解決してほしい」→挑戦的な課題に燃え、本気で取り組む。\n・「この技術領域は君が一番詳しいから、全て任せる」→専門性を認められ、裁量を与えられると最高のパフォーマンスを発揮。\n・「新しい技術なんだけど、これをプロダクトに導入できるか検証してみてくれないか？」→探求心と実践欲を刺激し、前のめりで取り組む。\n・「目標はこれ。達成方法は君に任せる」→自由と責任を与えられることで、独自の最適な方法を見つけ出す。\n・「締切は〇日。それまでに、ここまで作り込んでほしい」→明確なゴールと期限があると、集中して計画的に作業を進めやすい。\n\n【❌ パフォーマンスが落ちる】\n・「この資料、このフォーマット通りに細かく作って」→自由度がなく、ただの作業になると途端にやる気が失せる。\n・「みんなと協力して、和気あいあいとやってほしい」→人間関係の調整や社交性を求められると疲弊し、本質的な業務に集中できなくなる。\n・「とにかく早く。品質はそこそこでいいから」→中途半端な品質を求められると、自身のプライドに反し、反発を感じる。\n・「週報、日報、細かく状況を報告してね」→本質的ではない管理や報告業務にストレスを感じ、集中力が削がれる。\n・「この会議、目的は後で話すからとりあえず参加して」→目的が不明確なものに時間を奪われたくない。\n\n【💡 コツ】\n1. 解決すべき「問題」や「技術的な課題」を明確に提示し、彼の知的好奇心と探求心を刺激する。\n2. 彼に自由な発想とアプローチを尊重し、具体的な期限と達成すべきゴールだけを設定する。\n3. 彼の専門知識や技術力を具体的に褒め、信頼を言葉で伝える。感情的な褒め言葉より事実に基づいた評価が響く。\n4. 余計な会議や雑務から彼を解放し、集中できる物理的・精神的な環境を整える。\n5. 結果だけでなく、彼が問題を解決した「技術的なプロセス」や「工夫」にも関心を示し、議論することで関係が深まる。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・**データサイエンティスト/機械学習エンジニア:** 未知のデータからパターンを見つけ出し、最適なモデルを構築する専門家。探求心と実践力、そして一点深掘りの特性が存分に活かされる。\n・**サイバーセキュリティアナリスト:** 複雑なシステムを深く理解し、脆弱性を特定・解決する。論理的思考と技術への一点深掘りが必須であり、常に新しい脅威に「攻め」の姿勢で対処する。\n・**研究開発エンジニア:** 新しい技術の原理を深く掘り下げ、その応用可能性を探る。O型とDp型が融合し、最先端の技術を実用化する役割はまさに天職。\n\n【⭐ かなり合う】\n・**システムアーキテクト:** 全体のシステム構造を論理的に設計し、最適な技術選定を行う。複雑な要素を体系化する能力が光る。\n・**プロダクトマネージャー (技術寄り):** 技術的な実現可能性を深く理解し、製品の方向性を決める。技術的視点から、最適なプロダクトの形を追求する。\n・**専門コンサルタント (技術系):** 特定分野の深い知識と、論理的な問題解決能力で企業の技術課題を解決する。客観的な分析と具体的な解決策提示が得意。\n\n【💡 意外とハマる】\n・**ゲーム開発者 (プログラマー):** 技術的なパズルを解き、パフォーマンスを追求する楽しさがある。緻密な設計と最適化が求められる。\n・**カスタマーサポート (技術):** 顧客の技術的な問題を深く掘り下げ、根本原因と解決策を見つける。困難な問題を解決した時に喜びを感じる。\n\n【⚠️ 避けた方がいい】\n・**広報/PR:** 抽象的なメッセージングや社外との感情的なコミュニケーションがメインとなり、彼にとってはストレスが多い。\n・**営業 (新規開拓・ルート営業):** 人との交流が多く、感情的な折衝や、商品の魅力を言葉で伝えるスキルが求められるため、疲弊しやすい。\n・**人事/採用:** 人の感情や適性を判断する機会が多く、ロジックだけでは割り切れない領域が多く、彼の強みが活かしにくい。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\n・**ENFJ-G-Br「船長」:** 一刀流の職人が黙々と作り上げた最高の「技」を、船長が人々に語りかけ、ビジョンを示し、チーム全体を巻き込む。感情と論理、内向と外向が互いの弱点を補完し合い、強力なチームを形成する。職人が技術的な深みを、船長が人間的な広がりをもたらす。\n・**ESTJ-G-Dp「頑固職人」:** 一刀流の職人の攻めの姿勢と頑固職人の守りの姿勢が、堅実な基盤の上で新しい挑戦を可能にする。両者ともに現実的・論理的で、専門性を重んじる点で共感しやすく、職人が開発したものを頑固職人が安定稼働させる、最高のコンビネーションが期待できる。\n\n【🔥 化学反応が起きるコンビ】\n・**ENTP-O-Br「アイデアマン」:** アイデアマンの無限に湧き出るアイデアを、一刀流の職人が具体的な技術で実現する可能性を探る。思考と知覚の共通点から、知的好奇心と技術的な挑戦心がスパークし、革新的な成果を生み出す、刺激的な関係性。\n・**INTJ-O-Dp「戦略家」:** 戦略家の緻密な計画とビジョンを、一刀流の職人が具体的な技術的アプローチで現実のものとする。深い思考と論理的な判断で互いに高め合い、大規模なプロジェクトを成功に導く、強固なパートナーシップが築ける。\n\n【☀️ 居心地がいい仲間】\n・**INTP-O-Dp「探究者」:** 共に論理的思考と一点深掘りを好むため、深い技術的な議論で意気投合する。お互いの独立性を尊重し、無理にコミュニケーションを取らずとも心地よい関係性を築ける、静かなる同志。\n・**ISTP-G-Dp「孤高の技術者」:** 同じISTP-Dp型であるため、言葉少なくとも互いの考えや作業スタイルが通じ合う部分が多い。互いの専門性と集中力を尊重し、黙々と作業する時間を共有できる、理解者としての絆がある。\n\n【⚡ 未知の触発者】\n・**ESFP-G-Br「盛り上げ役」:** 一刀流の職人の寡黙な世界に、盛り上げ役が陽気なエネルギーと新しい視点をもたらす。最初は戸惑うかもしれないが、意外な交流から新しい発見や、仕事に対する違ったインスピレーションを得ることがある。\n・**ENFP-O-Br「着火マン」:** 着火マンの湧き出るアイデアや人脈が、職人の技術力を生かす新たな出口を示すことがある。真逆の特性だからこそ、互いの世界を広げ、新たな可能性に気づかせてくれる存在であり、彼自身の技術をより広い世界に適用するきっかけをもたらすかもしれない。"},{title:"🌈 プライベートの顔",content:"休日は、人混みを避け、一人で黙々と趣味に没頭していることが多い。例えば、自宅でDIYに挑戦して完璧な棚を作り上げたり、最新のガジェットを分解して仕組みを理解しようとしたり、あるいは自作PCのパーツ選定に何時間もかけたりする。彼にとって、手を動かし、何かを作り出すプロセスそのものが最高の喜びだ。\n\nアウトドアも好きで、キャンプや釣り、登山など、五感を使い、体を動かす活動でリフレッシュする。自然の中で静かに過ごす時間が、彼の内向的なエネルギーを充電する大切な機会となる。計画を立てる時は綿密だが、急な天候の変化にも臨機応変に対応できる柔軟性も持ち合わせている。\n\nゲームをすることも多く、特に戦略性や技術が求められるものに没頭する。eスポーツのプロ選手がプレイする様子を分析したり、難易度の高いミッションを何度も試行錯誤してクリアしたりする。ただ遊ぶだけでなく、ゲームのシステムや裏側のロジックまで深く探求しようとする。\n\n人付き合いは、本当に気の合う数人の友人とだけ深く付き合うタイプだ。多くを語らないが、いざという時には頼りになる存在として、友人たちからの信頼は厚い。人との交流でエネルギーを消耗するため、友人たちと会った後は、一人で過ごす時間を必ず確保し、静かに過ごすことでバランスを取る。\n\nお金の使い方は、自分の専門分野や趣味に使う道具や機材には惜しみなく投資する。高性能なPCパーツ、プロ仕様の工具、最新のキャンプギアなど、機能性や品質を徹底的に追求する。それ以外の部分では非常に合理的で、無駄な出費はしない。衝動買いはせず、事前に調べて性能やコスパを徹底的に比較検討してから購入する。"}]},
"ISTP-G-Br":{name:"修理屋",character:"カカシ先生（NARUTO）",great:"ライト兄弟",color:"#EB984E",summary:"「何でも直せる、何でも作れる」万能の修理屋。守り×広型で幅広い技術を持ち現場の問題を確実に解決する。寡黙だが頼りになる技術の万能選手。",compatibility:{complement:[{code:"ENFJ-G-Br",name:"守護霊",desc:"プロジェクトの技術課題解決時、修理屋の的確な技術力に、守護霊がチームの士気を高める温かいフォローを加える。技術と人の調和で円滑な進行を助けます。"},{code:"ESFJ-G-Dp",name:"ベテラン寮長",desc:"新入社員の歓迎会を企画する際、ESFJが全体をまとめ、ISFJが細かい準備や配慮を担うことで、参加者全員が心から楽しめる温かい場を作り上げ、ケアの心が一致します。"}],chemistry:[{code:"ESTP-G-Br",name:"安全番長",desc:"求道者の技術へのこだわりと安全番長の現場での実践力が共鳴し、お互いに安心して仕事に取り組めます。現場作業で求道者が専門的なツールを扱う際、安全番長は周囲の状況を的確に把握し、安全な作業環境を確保することで、集中力を高めます。"},{code:"ISTP-O-Br",name:"現場の万能技師",desc:"新規設備の導入プロジェクトで、修理屋が安定稼働のための技術的基盤を固め、現場の万能技師がさらに効率的な運用方法やカスタマイズを提案。二人の技術力が相乗効果を生みます。"}],comfort:[{code:"ISTP-G-Dp",name:"専属オペレーター",desc:"求道者の深い専門性と専属オペレーターの静かで精密な技術が互いに理解し合い、言葉なくとも連携が可能です。共同で複雑な機械のメンテナンスを行う際、求道者が問題の根源を特定し、専属オペレーターが熟練した手つきで調整することで、完璧な連携を見せます。"},{code:"ISTJ-G-Br",name:"組織の記憶庫",desc:"「着火マン」が提示する大胆な企画に対し、「組織の記憶庫」は過去の事例やデータに基づき実現性を分析します。プロジェクトの方向性を議論する際、異なる視点から堅実な意見を出し合い、計画の精度を高めます。"}],catalyst:[{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"},{code:"ENTP-O-Br",name:"アイデアマン",desc:"新規事業の企画会議では、ENTP-G-Brが知識の引き出しから多様な情報を提示し、ENTP-O-Brがそれに触発されて次々と新しいアイデアを繰り出す。知識と発想が高速で応酬し、無限の可能性が広がる。"}]},careers:{top:["ビルメンテナンスのプロ","自動車整備士（マイスター）","ITインフラエンジニア"],good:["大工","電気工事士","農業機械の修理"],surprise:["万能の執事","ピアノ調律師"],avoid:["感情中心のカウンセリング","抽象的な戦略のみ"]},strengths:["何でも直せる万能さ","寡黙な信頼性","幅広い技術","冷静な問題解決"],weaknesses:["感情表現","自己PR","抽象的議論","華やかさ"],tips:{do:"「このネットワーク機器が不安定で困っているんだけど、原因を究明して安定稼働させてくれない？ いつまでに、という具体的な期日だけ伝えて、あとは君に任せるよ。」「先日話した新しい生産ラインのプロトタイプ、君の技術力で実現可能か、まずは試作品を作ってみてくれない？ 細かい指示はしないから、やりやすいように進めてみて。」「現場で発生しているこの繰り返しエラー、根本原因を突き止めて再発防止策を考えてほしい。どんなツールや部品が必要か教えてくれれば、すぐに手配するから。」",dont:"「来週の全体会議で、君が直したシステムについて導入経緯から効果まで、詳細にプレゼンしてくれない？ 質疑応答もあるから、しっかり準備してね。」「このプロジェクトの課題について、みんなでブレインストーミングしたいんだけど、君の斬新なアイデアを積極的に発言して、議論を盛り上げてくれないかな？」 「チームの結束力を高めるために、週末のレクリエーションの企画を任せたいんだ。みんなが楽しめるような、感動的なイベントを提案してほしい。」"},fullSections:[{title:"👤 この人はこんな人",content:"「とりあえず、いじらせて」が口癖。\n目の前の問題に対し、直感と豊富な経験から「こうすれば直るんじゃないか？」と仮説を立て、すぐさま手を動かす。説明書を読み込むより、実際に触って仕組みを理解するタイプ。その手際の良さと確かな技術で、いつの間にかチームの「困った時の駆け込み寺」になっている。\n\n一人の時間でエネルギーをチャージし、複雑なシステムや機械の構造について深く思考する。決して社交的ではないが、必要とされればフットワークは軽い。人ごみや騒がしい環境は苦手で、静かに集中できる空間を何よりも好む。\n\n仕事においては「現状をより良く、より安定させる」ことに情熱を燃やす。新しいものをゼロから生み出すより、既存の仕組みや製品の性能を最大限に引き出し、改善していくことに喜びを感じる。目の前の課題に対し、具体的な解決策を冷静かつ論理的に導き出す能力は群を抜いている。\n\n弱点は、感情表現が苦手なこと。感謝の気持ちや喜びも「うん」「あぁ」といった短い返事になりがちで、誤解されることも。また、自身の技術や知見を人に伝えるのは少し億劫に感じてしまう。だからこそ「あの人、何でも知ってるけどあんまり話さないよね」と思われがちだ。\n\n興味の範囲は非常に広く、手当たり次第に「面白そう」と思ったことには手を出してみる。専門分野以外にも、DIY、キャンプ用品の修理、料理の効率化、最新ガジェットの分解など、幅広い知識と実践経験を持つ。それは一つ一つの分野を深く極めるというよりは、「何かあった時に役立つかもしれない」という実用的な視点から、使えるスキルをストックしている感覚に近い。\n\n人付き合いは深く狭くを好むが、困っている人を見過ごせない義理堅さも持ち合わせる。頼まれると「別にいいけど」と言いつつ、結局は手を貸してくれるタイプ。言葉数は少ないものの、その行動と確かな技術で周囲からの信頼を勝ち取る。無駄な会話はしないが、技術やシステムに関する話になると饒舌になる一面もある。\n\n彼を突き動かす根底にあるのは、「物事がスムーズに機能する状態」への強いこだわり。故障は直し、非効率は改善し、不具合を未然に防ぐ。世界をより安定させ、より実用的にするための静かなる万能職人。彼は今日も、どこかの問題解決のために、静かに手を動かしているだろう。\n\n「触ればわかる」は、彼が世界を理解し、支配するための、確かな手がかりだ。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n問題が発生すると、まず詳細な情報収集よりも「現物を見る」「触ってみる」ことから始める。「え、また壊れたの？」と呟きながら、早速現場に足を運び、自身の目で状況を観察し、原因を探る。計画を立てるより先に、まずは具体的な原因の特定と初期検証を行い、手を動かしながら解決の糸口を探る派だ。\n\n【進行フェーズ】\n試行錯誤を繰り返し、最適な解決策を見つけ出していく。問題の根源に辿り着くまで、様々なアプローチを試すことに抵抗はない。複数のタスクを並行して進める器用さも持つが、一つ一つのタスクに対しては、冷静に分析し、論理的にアプローチする。進捗は着実に進むが、逐一報告するのは苦手。求められれば的確に、しかし簡潔に伝える。\n\n【完了フェーズ】\n「これで問題ない」と判断する基準は、機能性や実用性が満たされていること。完璧主義ではないが、安定稼働や長期的な維持の観点から、品質にはこだわる。細かいドキュメント整備や、他者への丁寧な説明は苦手なため、完了報告は「直した」「動いた」など、最小限になりがち。必要な場合は、補足資料を渡す方が本人にとっては楽だ。\n\n【1日の働き方】\n静かで集中できる環境があれば、朝から黙々と作業を始める。午前中に主要なタスクや問題解決に集中し、午後は検証や細部の調整、または新たな改善点の洗い出しを行うのが理想的。突発的なトラブル対応も、冷静に優先順位をつけて処理する。ルーティンワークも得意だが、突発的な問題解決の依頼があった方が、むしろモチベーションが上がることがある。"},{title:"🗣️ 会議での振る舞い",content:"基本的には聞き役で、無駄な発言はしない。しかし、議論が非論理的になったり、事実と異なる発言があったりすると、的確な一言を挟んで修正する。抽象的な議論には興味がなく、具体的な課題や解決策に関する話に集中する。ブレストでは、意見を出すことは少ないが、実現可能性や技術的な観点から「それはできる」「それは難しい」と冷静に評価する。\n\nホワイトボードの前で、システム構成図やフローチャートをスラスラと書きながら説明するのは得意な一面。言葉より視覚で伝える方が楽だと感じている。長時間の報告会や、感情的な議論は苦手。必要な情報だけを簡潔にまとめてほしいと思っている。会議の目的が不明確だと、途中で集中力が切れてしまう。"},{title:"💬 チャットでの傾向",content:"メッセージは短く、必要な情報や事実のみを伝える。「OK」「了解」のような簡潔な返信が多く、絵文字や顔文字はほとんど使わない。質問には具体的に、しかし最小限の言葉で答える傾向がある。長文のメッセージを送るのは苦手で、複数のトピックがある場合は、箇条書きでまとめて送ることが多い。\n\n【周囲が知っておくと楽なこと】\n・既読は早いものの、返信は後回しになりがち。急ぎの場合は直接声をかけるのが確実。\n・「大丈夫です」「問題ありません」は文字通り、それ以上の意図はない。\n・長文のチャットは読み飛ばすことがあるため、要点を絞って伝えるのが効果的。\n・雑談チャンネルにはほとんど現れないが、技術的な質問には素早く反応する。"},{title:"👔 上司として／部下として",content:"【上司として】\n部下には基本的に放任主義で、マイクロマネジメントは一切しない。しかし、困っている部下がいれば、具体的にどうすれば良いかを冷静にアドバイスし、問題解決のプロセスを共に考える。技術的な課題については、率先してサポートに入る。成果を出すための手段は部下自身に任せ、最終的な結果を重視するタイプだ。部下の頑張りは言葉ではなく、具体的な評価やサポートで示すことが多い。チームの安定稼働と効率化を重視し、無駄なプロセスは徹底的に排除しようとする。\n\n【部下として】\n具体的なタスクと目標が明確に与えられ、ある程度の裁量を与えられると最高のパフォーマンスを発揮する。「あとは任せる」と言われるのが最も気持ち良く、与えられたミッションを静かに、しかし着実に遂行する。不明点があれば、自分で調べて解決しようとする自律性も高い。上司への報告は簡潔に事実のみを伝え、感情的な要素は排除する。細かすぎる指示や不必要なルール、頻繁な進捗報告を求められると、モチベーションが著しく低下する。上司にも論理的な判断を求める傾向がある。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・誰も解決できなかった複雑な問題の原因を特定し、解決できた時\n・自分のスキルや知識が具体的な形で誰かの役に立ったと実感できた時\n・新しいツールや技術を試す機会が与えられ、その仕組みを理解した時\n・自由な裁量で仕事を任され、自分の方法で効率化を追求できる時\n・既存のシステムやプロセスに、自分の改善提案が採用され、効果が出た時\n・実際に手を動かし、壊れたものを直したり、何かを作り上げたりした時\n・論理的思考が求められる難解なパズルを解き明かした時\n\n【📉 下がる瞬間】\n・無意味な会議や非効率なルールに縛られ、時間や労力を奪われる時\n・根拠のない感情論や非論理的な判断を押し付けられる時\n・同じ作業の繰り返しが延々と続き、改善の余地がないと感じる時\n・自分の貢献が正しく評価されず、誰かの手柄にされる時\n・不必要な社交や対人関係の調整を過度に求められる時\n・具体的な課題がなく、抽象的な議論ばかりが続く時\n・新しい技術や知識の習得が制限される時"},{title:"📝 フィードバック",content:"【受けるとき】\n事実に基づいた客観的かつ論理的なフィードバックを好む。感情的な批判や抽象的な指摘には戸惑い、反発することもある。「なぜそうなのか」「どうすれば改善できるのか」が明確に示されると、素直に受け入れ、改善に向けて動き出す。建設的な意見であれば、冷静に分析し、自身の成長に繋げようとする。ただし、言葉で感謝を伝えることは少ないが、行動で示すタイプだ。\n\n【伝えるとき】\n遠回しな表現はせず、事実と論理で問題点や改善点を直接的に伝える。感情的な要素は含まず、客観的な視点から「こうするともっと良くなる」という解決策を提示することが多い。相手の感情に配慮して言葉を選ぶのが苦手なため、伝え方がぶっきらぼうに聞こえることもあるが、悪意はなく、純粋な改善提案であることがほとんどだ。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・トラブルシューティング：複雑な問題の原因を特定し、解決策を実行する\n・プロトタイプ作成：とりあえず動くものを作り、検証と改善を繰り返す\n・ツールの導入・検証：新しい技術やソフトウェアを試し、実用性を評価する\n・システム改善：既存の仕組みやプロセスを分析し、効率化や最適化を図る\n・技術調査：幅広い分野の技術情報を収集し、実用的な知識として整理する\n・手作業での組み立て・修理：機械や電子機器を分解・組み立てし、修理する\n・実験・検証：仮説を立て、実際に試してみて結果を導き出す\n・マニュアル作成（図解多め）：手順を視覚的に分かりやすくまとめる\n\n【😰 苦手】\n・長時間のプレゼン：人前で長く話すことよりも、実際に手を動かす方が好き\n・感情的な交渉：ロジックが通じない相手との駆け引きや調整は苦痛\n・詳細なドキュメント作成：必要最低限で済ませたい、本質的でないと感じる\n・大規模なイベント企画：人との調整や感情的な配慮が多く、煩わしい\n・抽象的なアイデア出し：具体的な形が見えないゼロベースの企画は苦手\n・経理処理：規則に厳密に従うルーティン作業は単調でモチベーションが下がる\n・人間関係の調整：合理的でない個人的な感情の介入を不快に感じる\n・広報・PR活動：自身の成果を自らアピールするのは得意ではない"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「これ、どうやったら直せると思う？」「何か改善できないかな？」→問題解決を求められると探求心が刺激される\n・「とりあえず試してみてくれないかな？」→実践的な行動を促すことで、スムーズに作業に取り掛かる\n・「この部分、もっと効率化できないかな？」→既存の改善提案は、彼の得意分野であり、歓迎される\n・「ゴールは〇〇で、現状は△△。あとは任せる」→具体的な課題と目的を伝え、裁量を与えることで本気を出す\n・「これに必要なツールは揃ってる？」→作業に必要な情報やツールを提供すると、スムーズに作業に移れる\n・困った時に「〇〇さんに聞けば大丈夫」と頼られると、静かにモチベーションが上がる\n\n【❌ パフォーマンスが落ちる】\n・「なんでこんなことになったの？（感情的に）」→感情論で責められると、シャットダウンしてしまう\n・「とにかく全部、完璧に資料にまとめて。誰にでもわかるように」→書く作業より実践を重視するため、負担が大きい\n・「みんなで意見出し合って（ふわっとしたテーマで）」→具体的なテーマや論点がないブレストは苦手\n・過度な進捗報告や、細かすぎる作業指示を求める→監視されている感覚になり、窮屈に感じる\n・理由を説明せずに「とにかくこの通りにやって」→納得できない指示には、反発心を覚える\n・「あの人に気を使って」「こっちを優先して」といった非合理的な指示\n\n【💡 コツ】\n1. 具体的な課題と「なぜ」を最初に共有し、納得感を与える\n2. ある程度の自由な裁量と、試行錯誤の機会を与える\n3. 相談役として控めにサポートし、必要な情報やツールはすぐに提供する\n4. 結果や改善点について、シンプルかつ論理的にフィードバックする\n5. 彼の知識や技術力を信頼し、頼りにしていることを言葉や態度で示す"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・フィールドエンジニア：現場でのトラブルシューティングと修理、幅広い技術を駆使して問題を解決する\n・メカニック/メンテナンスエンジニア：機械やシステムの保守・点検・修理を通じて、安定稼働を維持する\n・R&Dエンジニア（試作・評価担当）：新しい技術や製品の実用化に向けた検証と改善を繰り返す\n\n【⭐ かなり合う】\n・品質保証・テストエンジニア：製品やシステムの品質を客観的に評価し、改善提案を行う\n・ITインフラエンジニア：システムの安定稼働を支え、効率化や最適化を図る。縁の下の力持ち的存在\n・テクニカルサポート：顧客からの具体的な問題を分析し、的確な解決策を提供する\n\n【💡 意外とハマる】\n・技術コンサルタント：多様な業界の技術課題に対し、実践的な解決策を提案する\n・職人：手先の器用さや幅広い技術を活かし、ものづくりや修理に没頭する（特に個人事業主として）\n\n【⚠️ 避けた方がいい】\n・営業（新規開拓）：人との交流が主体で、目標達成へのプレッシャーや感情的な要素が多い\n・採用担当：人とのコミュニケーションや感情的な判断が多く、抽象的な評価基準が苦手\n・プロジェクトマネージャー（大規模）：コミュニケーションと調整が多すぎ、細部への関与が難しい"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\nENFJ-O-Br「熱血教師」：修理屋が現実的な解決策や安定性を提供し、熱血教師がその成果をチーム全体に広め、鼓舞する。お互いの苦手分野を完全に補い合い、バランスの取れたチームを築く。\nESFJ-G-Dp「支え役」：修理屋が技術的な課題解決に集中できるよう、支え役が人間関係やチームの調和を細やかに保つ。具体的なサポートで修理屋の力を最大限に引き出す。\n\n【🔥 化学反応が起きるコンビ】\nENTP-O-Br「アイデアマン」：アイデアマンの無限のアイデアや構想を、修理屋が「とりあえず作ってみる」「実現可能か試す」という実践力で形にする。新たな発見と創造の連続となる。\nINTJ-O-Dp「戦略家」：戦略家の練り上げた壮大な計画やビジョンに対し、修理屋が技術的な実現可能性を検証し、具体的なアプローチで実際に動かす。論理と実践の相乗効果が期待できる。\n\n【☀️ 居心地がいい仲間】\nISTJ-G-Dp「金庫番」：お互いの寡黙さや論理的思考、具体的な事実を重視する姿勢に共感し、黙々と作業する時間を尊重し合える。技術的な議論で深く共感し合う、信頼できる仲間。\nINTP-O-Br「研究者」：論理的思考と新しい技術への探究心で意気投合する。お互いの専門性を認め合い、知識を共有することで、新たな発見に繋がる。\n\n【⚡ 未知の触発者】\nESFP-O-Br「ムードメーカー」：修理屋のクールで合理的な世界に、ムードメーカーが楽しさや活気をもたらす。予期せぬ誘いや体験を通じて、修理屋の視野を広げる刺激的な存在となる。\nENFP-O-Br「着火マン」：着火マンの無限の可能性への探求や、新しいことへの挑戦が、修理屋の現実的な問題解決能力に新たな課題や興味深いテーマを与え、触発されることがある。"},{title:"🌈 プライベートの顔",content:"休日は、自宅のガレージや作業部屋にこもっていることが多い。友人から頼まれたバイクの修理をしたり、古くなった家具をDIYでリメイクしたり、自分の手で何かを作り変えることに時間を費やす。キャンプ用品が壊れたら自分で直し、家電が調子悪ければまず分解してみる。\n\n彼のGoogleカレンダーは、他人の予定で埋まることは少ないが、自身の「やりたいことリスト」でいっぱいだ。オンラインの技術系フォーラムを巡回したり、新しい工具の使い方を動画で学んだり、次々と興味の対象が変わっていく。一つを深堀りするより、「何にでも対応できる自分」を磨くことが楽しい。\n\n買い物は機能性や耐久性を重視。最新のガジェットやツールはとりあえず試してみるが、本当に長く使えるかどうかを厳しく見極める。安物買いの銭失いはしない。高価でも、一度買ったらとことん使い倒すタイプだ。\n\n友人関係は広く浅く…というよりは、必要な時にだけ連絡を取り合う、というスタンス。少数の信頼できる友人と、共通の趣味（釣りやキャンプ、バイクなど）を通じて、深くはないが途切れない関係を築いている。飲み会に誘われても「別にいいけど」と言いながら、いざ行くと意外と楽しんでいる一面も。\n\n旅行に行くなら、知らない土地で観光名所を巡るよりも、道具を持って自然の中でキャンプをしたり、一人で釣りを楽しんだりする方が好きだ。計画は綿密に立てず、現地の状況に合わせて柔軟に行動する。時には、突然思い立って日帰りツーリングに出かけることもあるだろう。\n\n家での過ごし方もシンプル。黙々と趣味の作業に没頭するか、ドキュメンタリーやSF映画を観たり、技術書を読んだり。休日は誰かに気を使うことなく、自分の好奇心と向き合う静かな時間を何よりも大切にしている。"}]},
"ISTP-G-Dp":{name:"専属オペレーター",character:"ターミネーター（T-800）",great:"ニコラ・テスラ",color:"#873600",summary:"「この一つの機械を完璧に理解し永遠に動かす」究極のオペレーター。守り×深型で一つの機械・システムに深くコミットし完璧に維持する。人間よりも機械と語り合う。",compatibility:{complement:[{code:"ENFJ-O-Dp",name:"恩師",desc:"チームビルディングの場で、ENFJ-O-Dpが掲げる明確なビジョンや使命感が、ENTP-G-Brの膨大な知識に具体的な方向性と目的を与える。知識が単なる情報ではなく、人や組織を動かす力として触発される。"},{code:"ESFJ-O-Br",name:"総支配人",desc:"INTPの深遠な理論を社内外に適切に伝え、関係部署との調整や情報共有を円滑に進める。会議での発表資料作成や対外折衝で、その理論の価値を理解者に届ける手助けとなる。"}],chemistry:[{code:"INTJ-G-Dp",name:"設計狂",desc:"共通のプロジェクトで、INTPの根本原理に基づき、より洗練された複雑なシステム設計やモデル構築を二人で深く掘り下げる。チャットで夜遅くまで議論を交わし、精緻な構造を創り上げる。"},{code:"ISTJ-G-Dp",name:"金庫番",desc:"求道者の技術への深い探求心と、金庫番の厳格な品質管理が融合し、揺るぎない専門性と信頼性を生み出します。共同でシステム開発を行う際、求道者が高度な機能を実装し、金庫番がその安定性とセキュリティを徹底的に検証することで、完璧な製品を完成させます。"}],comfort:[{code:"ISTP-G-Br",name:"修理屋",desc:"難解な機器のメンテナンスや改造作業において、多くを語らずとも互いの意図を察し、精度の高い技術力で協力し合えるため、非常に居心地が良い。"},{code:"ISTP-O-Dp",name:"一刀流の職人",desc:"新しい技術課題に対し、互いに専門知識を深く掘り下げ、実践的な解決策を冷静に議論できる。高度な技術の探求で刺激し合う関係。"}],catalyst:[{code:"ENFP-O-Br",name:"着火マン",desc:"現場の技術的問題解決に没頭する彼に、着火マンが「これ、もっと面白くできないかな？」と問いかけ、技術の新たな可能性や、挑戦への意欲を掻き立てる。"},{code:"ESFP-O-Br",name:"お祭り総隊長",desc:"職場イベントやカジュアルな場で、INTPはESFPがもたらす多様な人々の感情や反応、場の雰囲気を観察。これにより、理論だけでは見過ごしがちな人間行動のパターンや非言語情報に気づかされる。"}]},careers:{top:["発電所オペレーター","精密工作機械の専門家","潜水艦のエンジニア"],good:["エレベーター保守","天文台の望遠鏡管理","医療機器のスペシャリスト"],surprise:["オルゴール修復師","蒸気機関車の保存運転士"],avoid:["対人サービス","チームの感情管理"]},strengths:["一つの機械の完全理解","究極の維持管理","寡黙な信頼","長期的な安定運用"],weaknesses:["人間関係","コミュニケーション","変化","新しい環境"],tips:{do:"「〇〇システムが安定稼働しているか、君の目で徹底的にチェックしてほしい。もし何か問題があれば、完璧な状態に戻すための最善策を一人で考えて、実行してくれないか？」「この新しい機械の導入にあたり、今後発生しうる運用上の潜在的なリスクを洗い出し、完璧に回避するための手順書を作成してほしい。君の専門知識を活かし、詳細まで詰めてもらえると助かる。」「現在稼働中のAシステムのパフォーマンスが若干低下している気がする。原因を特定し、最高の状態に戻すための具体的な改善策を提案してほしい。必要な道具や環境は用意するから、じっくり取り組んでみてくれないか？」",dont:"「もっとチームメンバーと積極的にコミュニケーションを取って、プロジェクト全体の進捗について活発に意見交換してほしい。機械だけでなく、人間関係も円滑にすることが大切だよ。」「このシステム、なんか最近調子悪い気がするんだよね。とりあえず見ておいてくれない？ あと、あの会議にも参加して、みんなでアイデア出し合ってほしいな。」「君の担当しているシステムだけでなく、他のチームの業務も手伝って、もっと部署全体を盛り上げてほしい。みんなで協力して、和気あいあいとした雰囲気を作っていこうよ。」"},fullSections:[{title:"👤 この人はこんな人",content:"「このシステム、完璧に動かしてみせる。」この人にとって、目の前の機械やシステムを完璧に理解し、滞りなく動かすことこそが最高の喜びだ。究極の職人であり、究極のオペレーター。一つのものに深くコミットし、その本質を徹底的に追求することに全力を注ぐ。\n\nエネルギーは一人で集中する時間から得られる。複雑な問題に一人静かに向き合い、無駄なく解決策を導き出すプロセスで活力を回復する。人との交流は必要最小限で、表面的な会話よりも、具体的な課題解決に向けた議論を好む。\n\n仕事では、冷静な判断力と実践的な技術力が光る。複雑なシステムや機械の内部構造を感覚的に、そして論理的に把握し、効率的な解決策を瞬時に見つけ出す。「まあ、とりあえず動くようにしてみる」と言って、すぐに手を動かし、問題の本質を解明していく。\n\n弱点は、人間関係の機微や感情的なコミュニケーション。チームの雰囲気を盛り上げたり、抽象的なビジョンを語ったりするのは苦手だ。また、興味のない分野や、自分の専門外の雑務には、とことんモチベーションが上がらない。「それ、何のためにやるの？」と、目的が見えないタスクには疑問を呈する。\n\n興味の対象は「一点深堀」型。一度興味を持った技術や仕組みは、徹底的に深く掘り下げて探求する。関連する専門書やマニュアルを熟読し、手を動かしながら完璧に理解しようとする。「これの仕組み、面白いな」と思ったら、寝食を忘れて没頭することもしばしばだ。\n\n対人関係においては、言葉数は多くないが、的確なアドバイスをする。「これ、こうすればもっと効率的だよ」と、無駄を省いた具体的な提案は、聞く人の信頼を得る。表面的なおしゃべりは苦手で、必要のない会話は最小限に抑えたい。だが、一度信頼を置いた相手には、自分の持つ専門知識を惜しみなく共有する。\n\n根底にあるのは、効率性、正確性、そして実用性への強いこだわりだ。無駄を嫌い、本質を追求し、いかに目の前のものを「完璧に機能させるか」に心血を注ぐ。その姿勢は、まるで精密な機械そのもののようだ。"},{title:"💼 仕事の進め方",content:"【着手フェーズ】\n問題が発生すると、まず自分で手を動かして原因を探る。闇雲に動くのではなく、現状を具体的に把握し、そこから論理的に可能性を絞り込んでいく。マニュアルや仕様書を読み込み、過去のログやデータを確認するなど、五感を使いながら全体像を把握しようとする。「まあ、やってみないと分からないしね」と言いながらも、その手つきは慎重かつ的確だ。計画を立てるよりも、まずは状況を「動かして」理解することから始める。\n\n【進行フェーズ】\n集中力は非常に高く、一度始めたタスクは中断せずに完璧を目指してやり遂げる。無駄を嫌い、最短経路で解決策を見つけることに長けている。技術的な課題に直面すると、自力で徹底的に調べ、試行錯誤しながら解決策を見つけ出す。困難な問題ほど「これは面白い」と燃えるタイプだ。複数のタスクを並行するよりは、一つに深く集中して取り組む方が、精度が高まる。\n\n【完了フェーズ】\n「完璧に機能させる」ことがこの人の目標。8割できた段階では「まだ何か見落としがあるかもしれない」と疑い、最後の最後まで細部の調整やテストを繰り返す。バグや不具合の徹底的な排除に強いこだわりを見せる。ドキュメント化は必要最小限に抑えるが、他の人が見て実用的に使える手順書であれば丁寧に作成する。最終確認は誰よりも入念に行い、自らが納得できるレベルに達するまでリリースをしない。\n\n【1日の働き方】\n朝は比較的早くからスタートし、静かな環境で集中して作業に取り組む。午前中に思考を要するタスクや技術的な問題解決に没頭するのがベストだ。午後は具体的なシステム改善や、チームメンバーからの技術的な相談に乗ることが多い。休憩は気分転換というよりは、情報整理や次のタスクへの思考を巡らせる時間として使う。ルーティンワークは効率的だと感じるが、問題解決のためなら臨機応変に調整する柔軟性も持ち合わせる。"},{title:"🗣️ 会議での振る舞い",content:"会議では多くを語らないが、発言する際は事実に基づいた具体的で論理的な意見を述べる。抽象的な議論や感情論にはあまり興味がなく、「で、何が問題なんですか？」「具体的な解決策は？」と、常に本質を問う姿勢を見せる。\n\n長時間の会議や、目的が曖昧な会議は苦手。必要な情報だけを効率的に得たいと考えており、無駄な時間は避けたい。議論が熱を帯びると、冷静な視点から「この視点が抜けている」「そのロジックには穴がある」と的確な指摘をすることもある。決定事項には従うが、技術的な不備や非効率な点があれば、黙って見過ごすことはない。\n\n会議中は観察者に徹することが多く、他の参加者の発言や資料を冷静に分析している。ふと視線を向けると、難しい顔で腕を組み、資料の隅に何か書き込んでいる姿が見られるかもしれない。\n\n【ベストな会議の使い方】\n・問題解決のための技術的な議論やブレインストーミング\n・システムの仕様確認や課題の洗い出し\n・少人数で具体的なテーマに絞った会議\n・技術的な専門知識が求められるレビュー会議\n・報告会は必要であれば参加するが、資料で完結させてほしいのが本音"},{title:"💬 チャットでの傾向",content:"メッセージは短く、要点をまとめる。無駄な絵文字や装飾はほとんど使わない。必要な情報だけを簡潔に伝え、相手からの質問には的確に答えるが、雑談チャンネルやカジュアルな会話には積極的に参加しないことが多い。\n\n長文のメッセージや複雑な依頼が来ると、内容を完璧に理解するために時間がかかることがある。返信は遅くはないが、内容を吟味し、完璧な答えを出すために考える時間を使うため、即答を期待されると困る。\n\n緊急時や具体的な問題解決の依頼であれば、迅速に反応する。\n\n【周囲が知っておくと楽なこと】\n・依頼は簡潔かつ具体的に。何をしてほしいのか、目的は何かを明確に伝える。\n・「どう思う？」のような漠然とした問いより、「この件で〇〇について、どうすれば一番効率的か？」と具体的な課題を提示する方が良い。\n・返信がなくても焦らない。今、最適な解決策を考えている最中だ。\n・連絡手段はテキストメインで問題ない。電話や口頭は緊急時や複雑な説明が必要な場合のみに留める。\n・「了解！」だけの返信でも、内容を深く理解していることが多い。"},{title:"👔 上司として／部下として",content:"【上司として】\nメンバーには技術的な課題解決やスキルアップの機会を惜しみなく与える。無駄な会議や形式だけの報告は嫌い、メンバーには実務と、自分の専門性を高めることに集中させる。具体的な目標設定とその達成に必要なリソースの提供を重視する。\n\nマイクロマネジメントは一切しない。しかし、問題発生時には的確なアドバイスと必要なサポートを迅速に行う。感情的な評価ではなく、メンバーのスキルと成果を客観的かつ公平に評価し、専門性を高めることに貢献したメンバーには正当な報酬を与えたいと考える。チームは「個々の専門家集団」と捉えている。\n\n【部下として】\n任されたタスクは責任を持って完璧にこなす。口頭ではなく、文書で明確な指示が与えられると、内容を深く理解しやすいため好む。自分の専門性を存分に活かせる仕事で最大の力を発揮し、新しい技術やツールの習得にも強い意欲を示す。\n\n上司からのフィードバックは、論理的で具体的なものを求める。感情的な褒め言葉や抽象的な評価はあまり響かないため、具体的な成果や改善点に基づいて評価されることを好む。自由な裁量と、特定の深い領域に没頭する時間を与えられると、そのパフォーマンスは最大化する。"},{title:"🔥 モチベーション",content:"【🚀 上がる瞬間】\n・複雑な技術的課題を解決できたとき\n・自分の手でシステムを完璧に動かせたとき\n・新しいツールや技術を深く習得できたとき\n・改善提案が採用され、実際に効率化や安定化に貢献できたとき\n・一人で集中して作業できる、邪魔の入らない時間があるとき\n・自分の専門性がチームやプロジェクトに不可欠だと実感したとき\n・無駄が排除され、システムが洗練されていくプロセスを見たとき\n\n【📉 下がる瞬間】\n・非効率なルールやプロセスを強いられ、改善の余地がないとき\n・感情的な対立や人間関係の摩擦に巻き込まれ、本質的な議論が進まないとき\n・抽象的な議論が延々と続き、具体的な結論や解決策が出ないとき\n・自分の専門外で、かつ興味のない雑務を延々と頼まれたとき\n・マニュアル通りにしか動けないことを強要され、技術的な探求を阻害されたとき\n・自分の努力や技術的貢献が正当に評価されないとき\n・目的や「Why」が不明確なタスクを依頼されたとき"},{title:"📝 フィードバック",content:"【受けるとき】\n事実に基づいて論理的・客観的に伝えられるフィードバックは、素直に受け入れることができる。改善点も、具体的な例やデータと共に示されると納得しやすく、次の行動にすぐに移せる。感情的な言い回しや抽象的な表現は理解に苦しむため、具体的に「何が」「どう」悪かったのか、そして「だからどうすればいいのか」という解決策が欲しい。褒め言葉よりも、改善すべき点に集中して耳を傾けることが多い。\n\n【伝えるとき】\n必要であれば、感情を挟まず、率直に事実と論理に基づいたフィードバックを伝える。問題点と、それに対する具体的な解決策や改善案を明確に提示することを重視する。相手の感情に配慮して遠回しに話すのは苦手なため、ストレートな物言いだと感じられることがある。しかし、その根底にあるのは「物事をより良くしたい」「効率化したい」という純粋な改善の意欲だ。"},{title:"✅ 得意・苦手タスク",content:"【🎯 得意】\n・システム構築・設計：技術的な要件を深く理解し、堅牢で効率的なシステムを設計・構築する。\n・トラブルシューティング：発生した複雑な問題の原因を冷静に突き止め、根本的な解決策を見つける。\n・品質保証・テスト：完璧を追求し、製品やシステムのバグや不具合を徹底的に見つけ出し潰す。\n・技術調査・分析：新しい技術やツールを深く掘り下げて理解し、その実用性を評価する。\n・運用・保守：既存システムを安定稼働させ、パフォーマンスを最大化するための改善を行う。\n・マニュアル作成（実用重視）：他の人が見てすぐに使える、実用的な手順書を論理的に記述する。\n・プログラミング・コーディング：論理的思考力と精密さで、効率的で美しいコードを記述する。\n\n【😰 苦手】\n・感情的な顧客対応：共感よりも事実確認や論理的解決を優先してしまうため、顧客の感情に寄り添うのが難しい。\n・広報・宣伝活動：抽象的な表現や感情的な訴求を用いたコミュニケーションが苦手。\n・大人数でのブレスト：自分の意見を発言するタイミングを見つけにくく、多くの意見が飛び交う場は苦手。\n・チームビルディングイベント：人との交流そのものにエネルギーを消費するため、このような場は負担に感じる。\n・予算の交渉・管理：数字の裏にある人間関係や政治的要素の理解が苦手で、純粋な最適化に集中したい。\n・曖昧な要件定義：具体的な指示や目標がないと、何をすべきか分からず動き出しにくい。\n・長時間のプレゼン：要点を伝えることに特化し、冗長な説明や感情的なアピールは苦手。"},{title:"📖 頼み方マニュアル",content:"【✅ こう頼むと動く】\n・「このシステム、最近不安定で困っている。原因究明と根本的な改善をお願いできないか？」→具体的な問題解決に燃える。\n・「〇〇さんの技術力がないと、この課題は解決できないと思うんだ」→専門性を認められ、頼られると本気になる。\n・「最終的な目標は〇〇だが、その達成に向けた具体的なやり方は任せる」→裁量と技術的自由度を与えられると、最高の結果を出す。\n・「このマニュアル、もっと分かりやすく、誰でも完璧に再現できるようにできないか？」→改善と効率化への意欲を刺激する。\n・「ここまでのデータはあるが、足りない情報があれば遠慮なく言ってくれ」→実用的な情報やリソースを与えられると、安心して作業に集中できる。\n・「このシステムの隠れた脆弱性を見つけてほしい」→探求心と完璧主義をくすぐる。\n\n【❌ パフォーマンスが落ちる】\n・「みんなでワイワイアイデア出ししよう！何でもありだよ！」→漠然とした場や、具体的な目的が見えないブレストは苦手。\n・「感情を込めて、もっと分かりやすく、ドラマチックにプレゼンしてほしい」→本質からずれると感じ、モチベーションが下がる。\n・「細かいことはいいから、とりあえずこれやって」→「なぜ」が不明確なまま動くことは難しく、納得できないと手が進まない。\n・「この通りにやって、変更は一切なし。改善の余地も考えなくていい」→技術的な探求や効率化の機会が失われると、モチベーションが急降下する。\n・「チームのムードを盛り上げてほしい」→役割が不明確で、自分の得意分野ではないと感じると困惑する。\n\n【💡 コツ】\n1. 具体的な課題と最終目標、そしてその「Why（なぜ必要か）」を明確に伝える。\n2. その分野の専門家として深く尊重し、技術的な裁量と思考の自由を与える。\n3. 必要なリソース（正確な情報、専門ツール、集中できる時間）を惜しまず提供する。\n4. 不要な制約や非効率なプロセスは極力排除し、彼が本質に集中できる環境を整える。\n5. 技術的な貢献や、システムの安定化・効率化といった具体的な成果を正当に評価し、感謝を伝える。"},{title:"🎯 適職マップ",content:"【🏆 天職】\n・システムエンジニア/SRE：複雑なシステムを構築し、安定稼働を維持するための設計・実装・運用に没頭できる。技術的な深掘りと問題解決が日常。\n・品質保証エンジニア：製品の品質を徹底的に追求し、完璧を期す。細部にこだわり、潜在的な不具合を排除するスペシャリスト。\n・研究開発（特定技術）：特定の技術や理論を深く掘り下げ、その原理や応用可能性を究明する。一人で集中して探求できる環境が理想的。\n\n【⭐ かなり合う】\n・データサイエンティスト：大量のデータを分析し、そこから本質的な課題やパターンを特定する。論理的思考と深掘りが活かされる。\n・産業機械オペレーター：複雑な機械を完璧に操作・維持管理し、そのパフォーマンスを最大限に引き出す。手先の器用さと分析力が光る。\n・技術コンサルタント：クライアントの抱える技術的課題に対し、論理に基づいた具体的な解決策を提示する。実用的な知見が求められる。\n\n【💡 意外とハマる】\n・職人（精密機械・修理）：壊れたものを分解し、原因を究明して完璧に修理する。手先の器用さと分析力が活きる。\n・ゲームデバッガー：ゲームのバグを見つけ、その原因を特定し、完璧なゲーム体験のために貢献する。没頭できる作業。\n\n【⚠️ 避けた方がいい】\n・広報・イベント企画：対人折衝が多く、感情的な訴求や社交性が強く求められるため、エネルギーを消耗しやすい。\n・営業（新規開拓）：不確実性が高く、人との交流が中心となる業務。契約獲得のための柔軟な対応が求められ、苦手な領域。\n・人事採用担当：人の感情や多様な意見、抽象的な評価基準を扱うことが多く、自身の価値観と合わないと感じやすい。"},{title:"🤝 相性マップ",content:"【💎 最強の補完パートナー】\n・ENFJ-O-Br「伝道師」：専属オペレーターが完璧にしたシステムや技術を、伝道師が熱意を持って人々に広め、社会に届ける。それぞれの強みが互いの弱点をカバーし、素晴らしい成果を生み出す。\n・ENTJ-O-Dp「将軍」：専属オペレーターが提供する堅牢で信頼性の高い技術基盤を、将軍が大胆な戦略で活用し、大きな目標を達成する。論理的な思考で連携し、無駄なく前に進むことができる。\n\n【🔥 化学反応が起きるコンビ】\n・INTP-G-Dp「理論家」：二者とも論理と知的好奇心で物事を深く掘り下げることに長けている。理論家が提示する抽象的な概念やモデルを、専属オペレーターが具体的なシステムとして実装・検証することで、革新的な発見や解決策が生まれる。\n・INTJ-G-Dp「設計者」：共に独立志向が強く、システム思考。設計者が描く壮大なビジョンや複雑なアーキテクチャを、専属オペレーターが現実の堅牢なシステムとして形にし、安定稼働させる。互いの専門性を深く理解し尊重し合える。\n\n【☀️ 居心地がいい仲間】\n・ISTJ-G-Dp「金庫番」：共に現実的で、守り×一点深堀。安定志向と実用性を重視し、黙々と作業するスタイルを尊重し合える。無駄を嫌い、効率性を追求する点で価値観が一致し、一緒にいると落ち着く。\n・ISFJ-G-Dp「世話役」：世話役の細やかなサポートと、専属オペレーターの確実な実行力が絶妙なバランスを生む。互いの役割を自然に理解し、言葉を多く交わさずとも円滑に連携できる。\n\n【⚡ 未知の触発者】\n・ESFP-O-Br「インフルエンサー」：感情豊かで、常に新しい刺激を求めるインフルエンサーの世界観は、専属オペレーターにとって新鮮な驚き。異なる視点から物事を見るきっかけを与え、技術の新たな応用先を発見する可能性もある。\n・ENFP-O-Br「着火マン」：着火マンの無限に広がるアイデアと、専属オペレーターの現実的で堅牢な技術力。一見相容れないように見えるが、着火マンの奔放な発想を専属オペレーターが具体的な形で実現しようと試みることで、意外な創造性が生まれることもある。"},{title:"🌈 プライベートの顔",content:"休日は、人混みを避け、一人で集中できる趣味に没頭していることが多い。例えば、PCの自作やカスタマイズ、ヴィンテージバイクの徹底的なメンテナンス、複雑なプラモデル製作、あるいは難解なボードゲームの攻略に時間を忘れて取り組む。\n\n本棚には小説よりも、特定の専門分野に関する技術書や詳細なマニュアルがずらりと並んでいる。「これは〇〇の回路図、こっちは△△のプログラムの解説書だね」と、嬉しそうに説明し始める姿も珍しくない。興味のある話題になると、普段の寡黙さが嘘のように饒舌になる。\n\n旅行に行く計画を立てる際も、入念なリサーチが欠かせない。目的地の歴史や文化、交通手段、宿泊施設の設備などを徹底的に調べ上げ、無駄のない効率的なルートを組む。観光地を巡るよりも、工場見学や科学館、技術博物館など、仕組みや構造に触れられる場所を好んで選ぶ傾向がある。\n\n友人との交流は広く浅くというよりは、特定の趣味仲間と深くつながるタイプだ。互いの技術や知識を教え合い、意見交換することで、自身の専門性をさらに深めることを楽しむ。飲み会では聞き役に回ることが多いが、技術的な話題になると熱心に議論に参加する。\n\nお金の使い方も実用性重視。最新のガジェットやツールを購入する際も、衝動買いはせず、機能や性能、耐久性を徹底的に比較検討する。「これは長期的に見て価値があるか？」「本当に必要か？」と自問自答を繰り返してから財布の紐を緩める。\n\n根っからのメカニック気質で、自宅の家電が壊れたり、DIYで不具合が生じたりすると、まず自分で分解して修理を試みる。その過程を楽しみ、無事に直った時の達成感は格別だ。"}]},
};

const CUSTOM_QUESTIONS = QUESTIONS.filter(q => q.id >= 61);

// スコアリング
function calcScores(answers, mbtiOverride) {
  const axes = { EI: 0, SN: 0, TF: 0, JP: 0, OG: 0, DB: 0 };
  const counts = { EI: 0, SN: 0, TF: 0, JP: 0, OG: 0, DB: 0 };

  for (const q of QUESTIONS) {
    if (mbtiOverride && q.id < 61) continue;
    const val = answers[q.id];
    if (val === undefined) continue;
    const score = q.dir === 1 ? val : (8 - val);
    axes[q.axis] += score;
    counts[q.axis]++;
  }

  const results = {};
  for (const axis of Object.keys(axes)) {
    if (mbtiOverride && (axis === "EI" || axis === "SN" || axis === "TF" || axis === "JP")) continue;
    const max = counts[axis] * 7;
    const min = counts[axis];
    results[axis] = { raw: axes[axis], pct: Math.round(((axes[axis] - min) / (max - min)) * 100) };
  }
  return results;
}

// タイプ判定
function getType(scores, mbtiOverride) {
  let e, n, t, j;
  if (mbtiOverride) {
    e = mbtiOverride[0] === "E"; n = mbtiOverride[1] === "N";
    t = mbtiOverride[2] === "T"; j = mbtiOverride[3] === "J";
  } else {
    e = scores.EI.pct >= 50; n = scores.SN.pct >= 50;
    t = scores.TF.pct >= 50; j = scores.JP.pct >= 50;
  }
  const o = scores.OG.pct >= 50;
  const br = scores.DB.pct >= 50;
  const code = `${e?"E":"I"}${n?"N":"S"}${t?"T":"F"}${j?"J":"P"}-${o?"O":"G"}-${br?"Br":"Dp"}`;
  return code;
}

});

function toggleMbtiSelect() {
  grid.classList.toggle('show');

function startFull() {
  mode = 'full';
  mbtiOverride = null;
  currentQs = [...QUESTIONS];
  answers = {};
  currentIdx = 0;
  showQuestionScreen();
}

function startShortcut(type) {
  mode = 'shortcut';
  mbtiOverride = type;
  currentQs = [...CUSTOM_QUESTIONS];
  answers = {};
  currentIdx = 0;
  showQuestionScreen();
}

function showQuestionScreen() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('questionScreen').style.display = 'block';
  document.getElementById('resultScreen').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  const q = currentQs[currentIdx];
  const total = currentQs.length;
  document.getElementById('progressFill').style.width = ((currentIdx + 1) / total * 100) + '%';
  document.getElementById('qCount').textContent = `${currentIdx + 1} / ${total}`;
  // Axis label hidden to avoid response bias
  document.getElementById('qText').textContent = q.text;

  // Trigger fade animation on question card
  const qCard = document.querySelector('.q-card');
  if (qCard) {
    qCard.classList.remove('fade-in');
    void qCard.offsetWidth; // force reflow
    qCard.classList.add('fade-in');
  }
  
  const scaleDiv = document.getElementById('qScale');
  scaleDiv.innerHTML = '';
  for (let i = 1; i <= 7; i++) {
    const btn = document.createElement('button');
    btn.className = 'q-scale-btn' + (answers[q.id] === i ? ' selected' : '');
    btn.textContent = i;
    btn.onclick = () => selectAnswer(q.id, i);
    scaleDiv.appendChild(btn);
  }
  
  document.getElementById('prevBtn').disabled = currentIdx === 0;
  const isLast = currentIdx === total - 1;
  document.getElementById('nextBtn').textContent = isLast ? '結果を見る →' : '次へ →';
  document.getElementById('nextBtn').disabled = answers[q.id] === undefined;
}

function selectAnswer(qid, val) {
  answers[qid] = val;
  renderQuestion();
  // Auto-advance after short delay
  setTimeout(() => {
    if (currentIdx < currentQs.length - 1) {
      nextQ();
    }
  }, 300);
}

function nextQ() {
  const q = currentQs[currentIdx];
  if (answers[q.id] === undefined) return;
  if (currentIdx < currentQs.length - 1) {
    currentIdx++;
    renderQuestion();
    window.scrollTo({top: 0, behavior: 'smooth'});
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentIdx > 0) {
    currentIdx--;
    renderQuestion();
  }
}

  `;

  // Set share links
  setupShareLinks(typeCode, profile, allScores);
  
  // Render score bars
  renderScoreBars(allScores, color);
  
  // Render accordion
  renderAccordion(profile.fullSections);
  
  // Render compatibility tabs
  renderCompatibility(profile.compatibility, color);
  
  // Render careers
  renderCareers(profile.careers);
  
  // Render tags
  renderTags('strengthTags', profile.strengths, 'green');
  renderTags('weaknessTags', profile.weaknesses, 'red');
  
  // Render tips
  renderTips(profile.tips);

  // Save to history & scroll
  saveToHistory(typeCode, profile, allScores);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderScoreBars(allScores, color) {
  const wrap = document.getElementById('scoreBars');
  const axes = ['EI','SN','TF','JP','OG','DB'];
  const axisColors = {EI:'#6366f1',SN:'#8b5cf6',TF:'#ec4899',JP:'#f59e0b',OG:'#10b981',DB:'#06b6d4'};
  let html = '';
  axes.forEach(axis => {
    const s = allScores[axis];
    const pct = s ? s.pct : 50;
    const labels = AXIS_LABELS[axis];
    const ac = axisColors[axis];
    // pct = left-side label's strength. Bar extends from center toward dominant side.
    // barWidth scaled: deviation from 50 doubled for visual impact (0〜50% range)
    const isLeft = pct >= 50;
    const dominant = isLeft ? pct : (100 - pct);
    const barWidth = Math.min((dominant - 50) * 2, 50); // double the visual width, cap at 50%
    const displayLabel = isLeft ? labels[0].split(' ')[0] : labels[1].split(' ')[0];
    html += `
      <div class="score-row">
        <div class="score-label" style="color:${ac}">${displayLabel}</div>
        <div class="score-bar-wrap">
          <div class="score-bar-center"></div>
          <div class="score-bar-fill" data-width="${barWidth}" data-left="${isLeft}" style="width:0%;left:50%;background:${ac};box-shadow:0 0 10px ${ac}44"></div>
        </div>
        <div class="score-pct">${dominant}%</div>
      </div>
      <div class="score-label-row"><span>${labels[0]}</span><span>${labels[1]}</span></div>
    `;
  });
  wrap.innerHTML = html;
  requestAnimationFrame(() => {
    wrap.querySelectorAll('.score-bar-fill').forEach(bar => {
      const w = parseFloat(bar.dataset.width);
      const isLeft = bar.dataset.left === 'true';
      if (isLeft) {
        bar.style.left = (50 - w) + '%';
        bar.style.width = w + '%';
      } else {
        bar.style.left = '50%';
        bar.style.width = w + '%';
      }
    });
  });
}

function renderAccordion(sections) {
  const wrap = document.getElementById('accordionWrap');
  if (!sections || !sections.length) { wrap.innerHTML = '<p style="padding:20px 24px;color:var(--text-muted)">詳細データなし</p>'; return; }
  let html = '';
  const filtered = sections.filter(sec => !sec.title.includes('適職マップ') && !sec.title.includes('相性マップ'));
  filtered.forEach((sec, i) => {
    html += `
      <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAccordion(this)">
          <span>${sec.title}</span>
          <span class="accordion-arrow">▼</span>
        </div>
        <div class="accordion-body">${sec.content}</div>
      </div>
    `;
  });
  wrap.innerHTML = html;
  // Open first by default
  const first = wrap.querySelector('.accordion-header');
  if (first) toggleAccordion(first);
}

function toggleAccordion(header) {
  header.classList.toggle('open');
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

function renderCompatibility(compat, color) {
  if (!compat) return;
  const tabs = [
    {key:'complement',label:'💎 補完',data:compat.complement},
    {key:'chemistry',label:'🔥 化学反応',data:compat.chemistry},
    {key:'comfort',label:'☀️ 居心地',data:compat.comfort},
    {key:'catalyst',label:'⚡ 触発',data:compat.catalyst}
  ];
  
  const tabBar = document.getElementById('compatTabs');
  const content = document.getElementById('compatContent');
  
  let tabHtml = '';
  let panelHtml = '';
  tabs.forEach((t, i) => {
    tabHtml += `<button class="tab-btn${i===0?' active':''}" onclick="switchTab(this,'compat',${i})">${t.label}</button>`;
    let items = '';
    if (t.data && t.data.length) {
      t.data.forEach(item => {
        items += `<div class="compat-item"><div class="compat-name"><span class="compat-dot"></span>${item.name || ''}</div><div class="compat-code">${item.code || ''}</div><div class="compat-desc">${item.desc || ''}</div></div>`;
      });
    } else {
      items = '<p style="color:var(--text-muted);font-size:14px">データなし</p>';
    }
    panelHtml += `<div class="tab-panel${i===0?' active':''}" data-tab-group="compat" data-tab-idx="${i}">${items}</div>`;
  });
  tabBar.innerHTML = tabHtml;
  content.innerHTML = panelHtml;
}

function switchTab(btn, group, idx) {
  btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll(`[data-tab-group="${group}"]`).forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-tab-group="${group}"][data-tab-idx="${idx}"]`).classList.add('active');
}

function renderCareers(careers) {

// ── Share functions ──
function buildShareURL(typeCode, allScores) {
  const base = window.location.href.split('?')[0].split('#')[0];
  const s = ['EI','SN','TF','JP','OG','DB'].map(a => (allScores[a]||{pct:50}).pct).join(',');
  return `${base}?type=${encodeURIComponent(typeCode)}&s=${s}`;
}

function setupShareLinks(typeCode, profile, allScores) {
  const url = buildShareURL(typeCode, allScores);
  const text = `私のワークスタイルタイプは「${profile.name}」（${typeCode}）でした！\n64タイプワークスタイル診断`;

  const xLink = document.getElementById('shareX');
  if (xLink) xLink.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;

  const lineLink = document.getElementById('shareLine');
  if (lineLink) lineLink.href = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;

  // Store URL for copy
  window._shareURL = url;
}

function copyShareLink() {
  if (!window._shareURL) return;
  navigator.clipboard.writeText(window._shareURL).then(() => {
    showToast('リンクをコピーしました！');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = window._shareURL;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('リンクをコピーしました！');
  });
}

function showToast(msg) {
  let toast = document.querySelector('.share-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.className = 'share-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── PDF Export ──
function exportPDF() {
  const btn = document.querySelector('.export-btn');
  const origText = btn.innerHTML;
  btn.innerHTML = '<span class="icon">⏳</span> 生成中...';
  btn.disabled = true;

  const loadScript = (src) => new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });

  Promise.all([
    loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
    loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js')
  ]).then(async () => {
    const resultEl = document.getElementById('resultContent');
    // Temporarily expand all accordions for PDF
    const bodies = resultEl.querySelectorAll('.accordion-body');
    const headers = resultEl.querySelectorAll('.accordion-header');
    bodies.forEach(b => b.classList.add('open'));
    headers.forEach(h => h.classList.add('open'));
    // Show all compat tabs
    resultEl.querySelectorAll('.tab-panel').forEach(p => { p.style.display = 'block'; p.classList.add('active'); });

    // Wait for images to load
    await new Promise(r => setTimeout(r, 500));

    // Capture each card separately to avoid memory issues
    const cards = resultEl.querySelectorAll('.r-header, .r-card, .share-section');
    const pdf = new window.jspdf.jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
    const pageW = 210, pageH = 297, margin = 10;
    const contentW = pageW - margin * 2;
    let yPos = margin;
    let firstPage = true;

    for (let i = 0; i < cards.length; i++) {
      try {
        const canvas = await html2canvas(cards[i], {
          backgroundColor: '#0a0e17',
          scale: 2,
          useCORS: true,
          allowTaint: true,
          logging: false,
          width: 600
        });
        const imgData = canvas.toDataURL('image/jpeg', 0.85);
        const imgH = (canvas.height / canvas.width) * contentW;

        if (!firstPage && yPos + imgH > pageH - margin) {
          pdf.addPage();
          yPos = margin;
        }
        pdf.addImage(imgData, 'JPEG', margin, yPos, contentW, imgH);
        yPos += imgH + 2;
        firstPage = false;
      } catch(e) { console.warn('Skip card', i, e); }
    }

    // Restore accordion state
    bodies.forEach(b => b.classList.remove('open'));
    headers.forEach(h => h.classList.remove('open'));
    const first = resultEl.querySelector('.accordion-header');
    if (first) { first.classList.add('open'); first.nextElementSibling.classList.add('open'); }
    resultEl.querySelectorAll('.tab-panel').forEach((p, i) => {
      p.style.display = '';
      p.classList.toggle('active', i === 0);
    });

    const typeName = resultEl.querySelector('.r-name')?.textContent || 'result';
    pdf.save(`workstyle_${typeName}.pdf`);
    showToast('PDFを保存しました！');
  }).catch(err => {
    console.error('PDF export error:', err);
    showToast('PDF生成に失敗しました。もう一度お試しください。');
  }).finally(() => {
    btn.innerHTML = origText;
    btn.disabled = false;
  });
}

// ── LocalStorage History ──
function saveToHistory(typeCode, profile, allScores) {
  try {
    const history = JSON.parse(localStorage.getItem('ws_history') || '[]');
    const entry = {
      code: typeCode,
      name: profile.name,
      color: profile.color,
      scores: ['EI','SN','TF','JP','OG','DB'].map(a => (allScores[a]||{pct:50}).pct).join(','),
      date: new Date().toISOString()
    };
    // Remove duplicate if exists
    const filtered = history.filter(h => h.code !== typeCode || h.scores !== entry.scores);
    filtered.unshift(entry);
    // Keep last 10
    localStorage.setItem('ws_history', JSON.stringify(filtered.slice(0, 10)));
  } catch(e) {}
}

function renderHistory() {
  const panel = document.getElementById('historyPanel');

    let html = '<div class="history-section"><div class="history-title">📋 過去の診断結果</div><div class="history-list">';
    history.slice(0, 5).forEach(h => {
      const d = new Date(h.date);
      const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
      html += `<div class="history-item" onclick="loadHistoryItem('${h.code}','${h.scores}')">
        <div class="history-dot" style="background:${h.color}"></div>
        <div class="history-info"><div class="history-name">${h.name}</div><div class="history-date">${dateStr}</div></div>
        <div class="history-code">${h.code}</div>
      </div>`;
    });
    html += '</div></div>';
    panel.innerHTML = html;
  } catch(e) { panel.innerHTML = ''; }
}

function loadHistoryItem(code, scoresStr) {
  const url = window.location.pathname + `?type=${encodeURIComponent(code)}&s=${scoresStr}`;
  window.location.href = url;
}

// ── Team Diagnosis ──
let teamMembers = [];

function showTeamScreen() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('teamScreen').style.display = 'block';
  populateTypeSelect();
  renderTeamMembers();
}

function backFromTeam() {
  document.getElementById('teamScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
  window.scrollTo({top: 0});
}

function populateTypeSelect() {
  const sel = document.getElementById('teamTypeSelect');
  if (sel.options.length > 1) return;
  const sorted = Object.keys(PROFILES).sort((a, b) => PROFILES[a].name.localeCompare(PROFILES[b].name, 'ja'));
  sorted.forEach(code => {
    const opt = document.createElement('option');
    opt.value = code;
    opt.textContent = `${PROFILES[code].name}（${code}）`;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    document.getElementById('teamAddBtn').disabled = !sel.value;
  });
}

function addTeamMember() {
  const sel = document.getElementById('teamTypeSelect');
  const code = sel.value;
  if (!code || !PROFILES[code]) return;
  teamMembers.push(code);
  sel.value = '';
  document.getElementById('teamAddBtn').disabled = true;
  renderTeamMembers();
}

function removeTeamMember(idx) {
  teamMembers.splice(idx, 1);
  renderTeamMembers();
}

function renderTeamMembers() {
  const wrap = document.getElementById('teamMembers');
  document.getElementById('teamAnalyzeBtn').disabled = teamMembers.length < 2;
  if (teamMembers.length === 0) {
    wrap.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:13px;padding:16px 0">まだメンバーがいません</div>';
    return;
  }
  wrap.innerHTML = teamMembers.map((code, i) => {
    const p = PROFILES[code];
    return `<div class="team-member" style="animation-delay:${i * 0.05}s">
      <div class="team-member-dot" style="background:${p.color}"></div>
      <div class="team-member-info">
        <div class="team-member-name">${p.name}</div>
        <div class="team-member-code">${code}</div>
      </div>
      <button class="team-member-remove" onclick="removeTeamMember(${i})">✕</button>
    </div>`;
  }).join('');
}

function analyzeTeam() {
  if (teamMembers.length < 2) return;

  const AXES = [
    {key: 'EI', left: 'E（外向）', right: 'I（内向）', colorL: '#6366f1', colorR: '#818cf8'},
    {key: 'SN', left: 'S（現実）', right: 'N（直感）', colorL: '#8b5cf6', colorR: '#a78bfa'},
    {key: 'TF', left: 'T（思考）', right: 'F（感情）', colorL: '#ec4899', colorR: '#f472b6'},
    {key: 'JP', left: 'J（計画）', right: 'P（柔軟）', colorL: '#f59e0b', colorR: '#fbbf24'},
    {key: 'OG', left: 'O（楽観）', right: 'G（慎重）', colorL: '#10b981', colorR: '#34d399'},
    {key: 'DB', left: 'D（主導）', right: 'B（協調）', colorL: '#06b6d4', colorR: '#22d3ee'}
  ];

  // Count left vs right for each axis
  const axisCounts = AXES.map(axis => {
    let left = 0, right = 0;
    teamMembers.forEach(code => {
      const letter = code.charAt({EI:0,SN:1,TF:2,JP:3}[axis.key] ?? (axis.key === 'OG' ? 5 : 7));
      // Parse from code format: ENFP-O-Br -> E,N,F,P,-,O,-,B,r
      const parts = code.split('-');
      const mbti = parts[0]; // ENFP
      const og = parts[1];   // O or G
      const db = parts[2];   // Br, Dr, Bl, Dl

      let isLeft;
      if (axis.key === 'EI') isLeft = mbti[0] === 'E';
      else if (axis.key === 'SN') isLeft = mbti[1] === 'S';
      else if (axis.key === 'TF') isLeft = mbti[2] === 'T';
      else if (axis.key === 'JP') isLeft = mbti[3] === 'J';
      else if (axis.key === 'OG') isLeft = og === 'O';
      else if (axis.key === 'DB') isLeft = db.startsWith('D') || db.startsWith('d');

      if (isLeft) left++; else right++;
    });
    return {left, right, total: teamMembers.length};
  });

  // Unique types
  const uniqueTypes = [...new Set(teamMembers)];
  const typeFreq = {};
  teamMembers.forEach(c => typeFreq[c] = (typeFreq[c] || 0) + 1);

  // Generate insights
  const insights = [];

  // Diversity score
  const diversity = uniqueTypes.length / teamMembers.length;
  if (diversity >= 0.8) {
    insights.push({icon: '🌈', title: 'タイプ多様性が高い', text: `${teamMembers.length}人中${uniqueTypes.length}種類のタイプが揃っています。多角的な視点でのディスカッションが期待できます。`});
  } else if (diversity < 0.5) {
    insights.push({icon: '⚠️', title: 'タイプの偏りあり', text: `同じタイプのメンバーが多く、盲点が生まれやすい構成です。意識的に異なる視点を取り入れる工夫が必要です。`});
  }

  // Axis balance insights
  axisCounts.forEach((ac, i) => {
    const axis = AXES[i];
    const ratio = ac.left / ac.total;
    if (ratio >= 0.8) {
      insights.push({icon: '📊', title: `${axis.left.split('（')[1].replace('）','')}型に偏り`, text: `チームの${Math.round(ratio*100)}%が${axis.left}側です。${axis.right}側の視点が不足する可能性があります。`});
    } else if (ratio <= 0.2) {
      insights.push({icon: '📊', title: `${axis.right.split('（')[1].replace('）','')}型に偏り`, text: `チームの${Math.round((1-ratio)*100)}%が${axis.right}側です。${axis.left}側の視点が不足する可能性があります。`});
    }
  });

  // Strength areas
  const hasE = axisCounts[0].left > 0, hasI = axisCounts[0].right > 0;
  const hasT = axisCounts[2].left > 0, hasF = axisCounts[2].right > 0;
  const hasD = axisCounts[5].left > 0, hasB = axisCounts[5].right > 0;
  if (hasE && hasI) insights.push({icon: '💬', title: 'コミュニケーションバランス◎', text: '外向型と内向型が共存しており、発信力と傾聴力の両方を持つチームです。'});
  if (hasT && hasF) insights.push({icon: '⚖️', title: '意思決定バランス◎', text: '論理重視と感情重視が混在し、データに基づきながらも人への配慮ができるチームです。'});
  if (hasD && hasB) insights.push({icon: '🤝', title: 'リーダーシップバランス◎', text: '主導型と協調型が共存し、推進力と合意形成力の両面を持つチームです。'});

  if (insights.length === 0) {
    insights.push({icon: '✅', title: 'バランスの取れたチーム', text: '各軸のバランスが比較的均等です。多様な強みを活かしたチームワークが期待できます。'});
  }

  // Render
  let html = '';

  // Axis distribution chart
  html += '<div class="team-chart-wrap"><div class="team-chart-title">6軸バランス分布</div>';
  axisCounts.forEach((ac, i) => {
    const axis = AXES[i];
    const leftPct = Math.round(ac.left / ac.total * 100);
    const rightPct = 100 - leftPct;
    html += `<div class="team-axis-row">
      <div class="team-axis-label">${axis.key[0]}</div>
      <div class="team-axis-bar">
        <div class="team-axis-bar-inner" style="width:${leftPct}%;background:${axis.colorL};left:0;justify-content:flex-end">${leftPct}%</div>
      </div>
      <div class="team-axis-bar">
        <div class="team-axis-bar-inner" style="width:${rightPct}%;background:${axis.colorR};left:0;justify-content:flex-end">${rightPct}%</div>
      </div>
      <div class="team-axis-label">${axis.key[1]}</div>
    </div>
    <div class="team-axis-labels"><span>${axis.left}</span><span>${axis.right}</span></div>`;
  });
  html += '</div>';

  // Type chips
  html += '<div class="team-chart-wrap"><div class="team-chart-title">メンバー構成</div><div class="team-type-grid">';
  uniqueTypes.sort((a,b) => (typeFreq[b] - typeFreq[a])).forEach(code => {
    const p = PROFILES[code];
    const count = typeFreq[code];
    html += `<div class="team-type-chip" style="border-color:${p.color};color:${p.color}">
      ${p.name}${count > 1 ? ` ×${count}` : ''}
    </div>`;
  });
  html += '</div></div>';

  // Insights
  html += '<div class="team-chart-wrap"><div class="team-chart-title">チームインサイト</div>';
  insights.forEach(ins => {
    html += `<div class="team-insight">
      <div class="team-insight-title">${ins.icon} ${ins.title}</div>
      <div class="team-insight-text">${ins.text}</div>
    </div>`;
  });
  html += '</div>';

  document.getElementById('teamResult').innerHTML = html;

  // Animate bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.team-axis-bar-inner').forEach(el => {
      const w = el.style.width;
      el.style.width = '0';
      requestAnimationFrame(() => { el.style.width = w; });
    });
  });

  document.getElementById('teamResult').scrollIntoView({behavior: 'smooth', block: 'start'});
}

// ── On page load, check for shared URL + render history ──
window.addEventListener('DOMContentLoaded', () => {
  loadFromURL();
  renderHistory();
});
</script>
